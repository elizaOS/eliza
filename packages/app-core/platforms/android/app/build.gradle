apply plugin: 'com.android.application'

android {
    namespace "ai.elizaos.app"
    compileSdk rootProject.ext.compileSdkVersion
    // BuildConfig is needed for AOSP_BUILD gating in MiladyAgentService.java —
    // see eliza/packages/agent/src/runtime/aosp-llama-adapter.ts and
    // scripts/miladyos/build-aosp.mjs. AGP 8+ defaults this to false.
    buildFeatures {
        buildConfig true
    }
    defaultConfig {
        applicationId "ai.elizaos.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode System.getenv("ELIZAOS_VERSION_CODE")?.toInteger() ?: 1
        versionName System.getenv("ELIZAOS_VERSION_NAME") ?: "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // AOSP-only build gate. The MiladyOS AOSP product build sets
        // -PmiladyAospBuild=true via scripts/miladyos/build-aosp.mjs; the
        // Capacitor APK build path (`bun run build:android`) leaves it
        // unset and the field stays false. MiladyAgentService reads this
        // to decide whether to export MILADY_LOCAL_LLAMA=1 to the bun
        // process so the AOSP-only libllama.so loader takes over inference.
        buildConfigField "boolean", "AOSP_BUILD", "${project.findProperty('miladyAospBuild') ?: 'false'}"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            // For Google Play App Signing: use an upload keystore.
            // CI provides these via environment variables; local builds fall back to debug signing.
            if (System.getenv("ELIZAOS_KEYSTORE_PATH")) {
                storeFile file(System.getenv("ELIZAOS_KEYSTORE_PATH"))
                storePassword System.getenv("ELIZAOS_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ELIZAOS_KEY_ALIAS")
                keyPassword System.getenv("ELIZAOS_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (signingConfigs.release.storeFile) {
                signingConfig signingConfigs.release
            }
        }
    }

    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    packaging {
        jniLibs {
            keepDebugSymbols += ["**/libimage_processing_util_jni.so"]
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation "com.google.code.gson:gson:2.14.0"
    implementation "com.google.firebase:firebase-common-ktx:21.0.0"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
