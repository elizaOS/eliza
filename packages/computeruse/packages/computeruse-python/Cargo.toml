[package]
name = "computeruse-py-bindings"
version.workspace = true
edition.workspace = true

[lib]
name = "computeruse"
crate-type = ["cdylib", "rlib"]
# This package is exercised through Python/maturin flows; running a Rust lib
# test harness for the extension module just adds a host libpython dylib
# dependency and fails on machines where that path is not configured.
test = false
doctest = false

[dependencies]
# PyO3 for Python bindings
pyo3 = { version = "0.25", features = ["abi3-py310"] }
pyo3-async-runtimes = { version = "0.25", features = ["attributes", "tokio-runtime"] }
# Keep a version on the local path dependency so cargo publish can strip the path
# and emit a valid crates.io dependency.
computeruse_core = { version = "2.0.0", path = "../../crates/computeruse", package = "computeruse-rs" }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
pyo3-stub-gen = "0.9"
serde_json = { workspace = true }
serde = { workspace = true }
base64 = { workspace = true }
tokio = { workspace = true }

[[bin]]
name = "stub_gen"
doc = false
test = false
