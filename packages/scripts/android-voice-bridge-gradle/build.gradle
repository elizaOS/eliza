import org.gradle.jvm.toolchain.JavaLanguageVersion

buildscript {
    repositories {
        google()
        maven {
            url = uri('https://maven-central.storage-download.googleapis.com/maven2/')
        }
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.2.20'
    }
}

ext {
    androidGradlePluginVersion = '8.13.0'
    kotlinVersion = '2.2.20'
    kotlin_version = '2.2.20'
    mavenCentralMirrorUrl = 'https://maven-central.storage-download.googleapis.com/maven2/'
    minSdkVersion = 26
    compileSdkVersion = 36
    targetSdkVersion = 35
    androidxActivityVersion = '1.8.0'
    androidxAppCompatVersion = '1.7.1'
    androidxCoordinatorLayoutVersion = '1.3.0'
    androidxCoreVersion = '1.12.0'
    androidxFragmentVersion = '1.6.2'
    coreSplashScreenVersion = '1.2.0'
    androidxWebkitVersion = '1.9.0'
    androidxJunitVersion = '1.3.0'
    androidxEspressoCoreVersion = '3.7.0'
    cordovaAndroidVersion = '10.1.1'
    coroutinesVersion = '1.10.2'
    junitVersion = '4.13.2'
}

allprojects {
    repositories {
        google()
        maven {
            url = uri(rootProject.ext.mavenCentralMirrorUrl)
        }
        mavenCentral()
    }
}

subprojects { subproject ->
    subproject.afterEvaluate {
        subproject.tasks.withType(JavaCompile).configureEach { task ->
            task.javaCompiler = subproject.javaToolchains.compilerFor {
                languageVersion = JavaLanguageVersion.of(21)
            }
        }
    }
}
