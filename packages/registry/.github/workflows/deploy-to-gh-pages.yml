name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      eliza_ref:
        description: elizaOS ref used to generate built-in packages
        required: false
        default: main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout registry
        uses: actions/checkout@v4
        with:
          path: registry

      - name: Checkout elizaOS
        uses: actions/checkout@v4
        with:
          repository: elizaos/eliza
          ref: ${{ github.event.inputs.eliza_ref || 'main' }}
          path: eliza

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: registry/site/pnpm-lock.yaml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate registry data
        run: npm run generate-registry
        working-directory: registry
        env:
          ELIZA_REPO_ROOT: ${{ github.workspace }}/eliza

      - name: Install site dependencies
        run: pnpm install --frozen-lockfile
        working-directory: registry/site

      - name: Build site
        run: pnpm run build
        working-directory: registry/site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: registry/site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
