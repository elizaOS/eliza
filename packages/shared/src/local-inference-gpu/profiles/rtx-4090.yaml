# RTX 4090 — Ada Lovelace, 24 GiB GDDR6X, sm_89, 1008 GB/s, FP8 supported.
#
# Per-bundle recommended llama-server flags. Source of truth for the runtime
# is `packages/shared/src/local-inference/gpu-profiles.ts`; this file extends
# those card-level defaults with per-bundle overrides + TPS expectations.
#
# All TPS numbers are *estimates* — they have not been measured on real
# hardware. They feed the verification scripts' 10% tolerance check, which
# compares against `llama-bench` output. See `docs/eliza-1-gpu-tier.md`
# for the canonical card-level table and the underlying assumptions.

gpu_id: rtx-4090
gpu_arch: sm_89
vram_gb: 24
mem_bandwidth_gbps: 1008
fp8_supported: true
fp4_supported: false
nvlink: false

bundle_recommendations:
  eliza-1-0_8b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 16
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: turbo3_0
    kv_cache_v: turbo4_0
    flash_attention: true
    estimated_decode_tps: 520
    estimated_prefill_tps: 22000
    notes: "Bandwidth-bound at tiny weights; FP8 path unused (model is INT4-class)."
  eliza-1-2b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 8
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: turbo3_0
    kv_cache_v: turbo4_0
    flash_attention: true
    estimated_decode_tps: 310
    estimated_prefill_tps: 11000
    notes: "Phone-class default; trivially fits."
  eliza-1-4b:
    n_gpu_layers: -1
    ctx_size: 65536
    parallel: 8
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 210
    estimated_prefill_tps: 6500
    notes: "QJL+Polar KV at 64k; weights ~2.8 GiB + KV ~1.8 GiB."
  eliza-1-9b:
    n_gpu_layers: -1
    ctx_size: 131072
    parallel: 4
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 110
    estimated_prefill_tps: 3500
    notes: "9B at 128k — recommended default for voice latency on the 4090."
  eliza-1-27b:
    # 27B Q4 (~16.8 GiB) fits at 24 GiB with KV at 32k — tight but feasible.
    # The catalog default is 128k context; we down-size here for the 4090.
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 2
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 38
    estimated_prefill_tps: 900
    notes: "Tight on 24 GiB at 32k. Pick 9B for voice; 27B here for higher-quality offline batch."

dflash:
  enabled: true
  draft_min: 4
  draft_max: 24
  draft_gpu_layers: -1

verify_recipe:
  build_target: linux-x64-cuda
  cuda_arch: 89
  cmake_flags:
    - "-DGGML_CUDA=ON"
    - "-DCMAKE_CUDA_ARCHITECTURES=89"
    - "-DGGML_CUDA_F16=ON"
    - "-DGGML_CUDA_FA_ALL_QUANTS=ON"
  expected_kernels:
    - turbo3
    - turbo4
    - turbo3_tcq                 # sm_89 has the tensor-core Q kernel
    - qjl_full
    - polarquant
    - dflash
  unavailable_kernels: []
  smoke_bundle: eliza-1-9b
  tolerance_pct: 10
