# RTX 5090 — Blackwell, 32 GiB GDDR7, sm_120, ~1792 GB/s, FP8 + FP4.
#
# Per-bundle recommended llama-server flags. Source of truth for the runtime
# is `packages/shared/src/local-inference/gpu-profiles.ts`; this file extends
# those card-level defaults with per-bundle overrides + TPS expectations.
#
# All TPS numbers are *estimates* — they have not been measured on real
# hardware. The 5090's compute capability sm_120 is new enough that not every
# kernel in the buun fork has a pre-built variant yet; the verify script
# checks `CAPABILITIES.json` before declaring the card production-ready.
# See `docs/eliza-1-gpu-tier.md` for assumptions.

gpu_id: rtx-5090
gpu_arch: sm_120
vram_gb: 32
mem_bandwidth_gbps: 1792
fp8_supported: true
fp4_supported: true                # future: KV in FP4 once the kernel lands
nvlink: false

bundle_recommendations:
  eliza-1-0_6b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 32
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: turbo3_0
    kv_cache_v: turbo4_0
    flash_attention: true
    estimated_decode_tps: 720
    estimated_prefill_tps: 38000
    notes: "Bandwidth-bound; ~1.8x 3090 throughput from the GDDR7 jump."
  eliza-1-1_7b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 16
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: turbo3_0
    kv_cache_v: turbo4_0
    flash_attention: true
    estimated_decode_tps: 460
    estimated_prefill_tps: 18000
    notes: "Trivially fits; more parallel slots than the 4090 thanks to 32 GiB."
  eliza-1-4b:
    n_gpu_layers: -1
    ctx_size: 131072
    parallel: 8
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 320
    estimated_prefill_tps: 11000
    notes: "4B at 128k — KV ~3 GiB + weights ~2.8 GiB; fits comfortably in 32 GiB."
  eliza-1-9b:
    n_gpu_layers: -1
    ctx_size: 131072
    parallel: 8
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 170
    estimated_prefill_tps: 6200
    notes: "9B at 128k. Card's value tier — quality and headroom for higher --parallel."
  eliza-1-27b:
    # 27B Q4 (~16.8 GiB) + KV at 32k fits in 32 GiB with healthy headroom.
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 4
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 62
    estimated_prefill_tps: 1700
    notes: "Best non-server fit for the 27B bundle — fully on-GPU at 32k."
  eliza-1-27b-256k:
    # 256k context KV with QJL+Polar quant is ~20 GiB. Weights + KV > 32 GiB;
    # we partial-offload some layers to CPU and accept the throughput hit.
    n_gpu_layers: 48
    ctx_size: 262144
    parallel: 2
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 22
    estimated_prefill_tps: 600
    notes: "256k on 32 GiB requires partial offload; throughput drops vs 32k. H200 is the right home for this bundle."

dflash:
  enabled: true
  draft_min: 4
  draft_max: 24
  draft_gpu_layers: -1

verify_recipe:
  build_target: linux-x64-cuda
  cuda_arch: 120                    # sm_120 — verify CUDA toolkit >= 12.8
  cmake_flags:
    - "-DGGML_CUDA=ON"
    - "-DCMAKE_CUDA_ARCHITECTURES=120"
    - "-DGGML_CUDA_F16=ON"
    - "-DGGML_CUDA_FA_ALL_QUANTS=ON"
  expected_kernels:
    - turbo3
    - turbo4
    - turbo3_tcq
    - qjl_full
    - polarquant
    - dflash
  unavailable_kernels: []
  # Blackwell-specific: the verify script must probe `CAPABILITIES.json`
  # because some FP4 / FP8 fast paths may not be ported yet. The script
  # warns (not fails) when a kernel is absent — runtime falls back.
  warn_on_kernel_absent: true
  smoke_bundle: eliza-1-4b
  tolerance_pct: 15                 # wider tolerance — first-class kernels still maturing on Blackwell
