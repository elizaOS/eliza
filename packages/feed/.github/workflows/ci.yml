name: CI - Test All (Manual Legacy)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  CI: true

jobs:
  # Build, typecheck, and lint job
  build-and-check:
    name: Build, Type Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          # Increase PostgreSQL limits for large migrations with 76 tables
          POSTGRES_INITDB_ARGS: "--encoding=UTF8"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=1gb
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Setup environment variables
        env:
          # Use CI test database for build
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          # For fork PRs, GitHub does not expose secrets; use a CI-only dummy app id.
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET || '' }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL || '' }}
          PRIVY_TEST_PHONE: ${{ secrets.PRIVY_TEST_PHONE || '' }}
          PRIVY_TEST_OTP: ${{ secrets.PRIVY_TEST_OTP || '' }}
          PRIVY_TEST_PASSWORD: ${{ secrets.PRIVY_TEST_PASSWORD || '' }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          FAL_KEY: ${{ secrets.FAL_KEY || '' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'test-cron-secret' }}
          WALLET_SEED_PHRASE: ${{ secrets.WALLET_SEED_PHRASE || '' }}
          WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD || '' }}
        run: bash scripts/ci/prepare-env.sh
      
      - name: Setup Database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          set -euo pipefail
          # Use the setup script for consistent database initialization
          bash scripts/setup-test-db.sh 2>&1 | sed -E 's/(Datasource|ep-soft-wildflower|neondb|@[^[:space:]]*\.neon\.tech)/[REDACTED]/g'

      - name: Clean stale .next types before typecheck
        run: rm -rf .next/types
      
      - name: Type Check
        run: bun run typecheck
      
      - name: Lint
        run: bun run lint
      
      - name: Build Production
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          set -euo pipefail
          echo "🏗️ Building production..."
          bunx turbo build 2>&1 | sed -E 's/(Datasource|ep-soft-wildflower|neondb|@[^[:space:]]*\.neon\.tech)/[REDACTED]/g'
          echo "✅ Build complete"
      
      - name: Verify build artifacts exist
        run: |
          if [ -d apps/web/.next ]; then
            echo "✅ Build completed successfully"
            du -sh apps/web/.next
          else
            echo "❌ Build failed - apps/web/.next directory does not exist"
            exit 1
          fi

      - name: Check for placeholder values in deployment artifacts
        run: |
          echo "🔍 Checking for placeholder values that should not reach production..."
          FAILED=false

          # assetlinks.json — TWA domain verification will silently fail
          # if the SHA-256 fingerprint placeholder is still present.
          if [ -f apps/web/public/assetlinks.json ]; then
            if grep -q 'PLACEHOLDER' apps/web/public/assetlinks.json; then
              echo "⚠️  apps/web/public/assetlinks.json contains PLACEHOLDER value"
              echo "   Replace sha256_cert_fingerprints with the actual signing key fingerprint."
              echo "   Run: keytool -list -v -keystore <your.keystore> | grep SHA256"
              FAILED=true
            else
              echo "✅ assetlinks.json has no placeholder values"
            fi
          fi

          if [ "$FAILED" = true ]; then
            echo ""
            echo "❌ Deployment artifacts contain placeholder values."
            echo "   This is a warning in CI — these MUST be replaced before production deployment."
          else
            echo "✅ No placeholder values found in deployment artifacts"
          fi
