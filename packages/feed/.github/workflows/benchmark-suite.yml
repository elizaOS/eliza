name: Benchmark Suite

on:
  # Run after training workflow completes
  workflow_run:
    workflows: ["Feed RL Training"]
    types:
      - completed

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Specific scenario to run'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'bull-market'
          - 'bear-market'
          - 'scandal-unfolds'
          - 'pump-and-dump'
      baseline:
        description: 'Baseline strategy'
        required: false
        default: 'random'
        type: choice
        options:
          - 'random'
          - 'momentum'
      archetype:
        description: 'Archetype to test'
        required: false
        default: 'trader'
        type: choice
        options:
          - 'trader'
          - 'degen'
          - 'scammer'
          - 'researcher'
          - 'social-butterfly'
      quick:
        description: 'Quick mode (faster but less thorough)'
        required: false
        default: false
        type: boolean

  # Nightly full benchmark
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  benchmark:
    if: ${{ vars.ENABLE_BENCHMARK_SUITE == 'true' }}
    name: Run Benchmark Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate benchmark scenarios
        id: scenarios
        run: |
          SCENARIO_DIR="packages/training/data/benchmarks/scenarios"
          COUNT=$(find "$SCENARIO_DIR" -maxdepth 1 -type f -name '*.json' | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No scenario JSON files found in $SCENARIO_DIR."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Found $COUNT benchmark scenario files."
          fi

      - name: Run benchmark suite
        id: benchmark
        if: steps.scenarios.outputs.skip != 'true'
        run: |
          ARGS=()
          
          # Add scenario if specified (skip if 'all' to run full suite)
          SCENARIO="${{ github.event.inputs.scenario }}"
          if [ -n "$SCENARIO" ] && [ "$SCENARIO" != "all" ]; then
            ARGS+=(--scenario "$SCENARIO")
          fi
          
          # Add baseline
          BASELINE="${{ github.event.inputs.baseline || 'random' }}"
          ARGS+=(--baseline "$BASELINE")
          
          # Add archetype
          ARCHETYPE="${{ github.event.inputs.archetype || 'trader' }}"
          ARGS+=(--archetype "$ARCHETYPE")
          
          # Add quick flag if specified
          if [ "${{ github.event.inputs.quick }}" = "true" ]; then
            ARGS+=(--quick)
          fi
          
          # Set output directory
          OUTPUT_DIR="benchmark-results/ci-${{ github.run_id }}"
          ARGS+=(--output "$OUTPUT_DIR")
          
          echo "Running benchmark suite with output: $OUTPUT_DIR"
          bun run packages/training/scripts/run-benchmark-suite.ts "${ARGS[@]}"
          
          # Export output directory for artifact upload
          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always() && steps.scenarios.outputs.skip != 'true'
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark-results/ci-${{ github.run_id }}/
          retention-days: 30

      - name: Post summary to PR
        # Only runs when triggered by workflow_run from a PR
        if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' && steps.scenarios.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const outputDir = '${{ steps.benchmark.outputs.output_dir }}';
            const reportPath = path.join(outputDir, 'report.txt');
            
            // Get PR number from workflow_run event
            const prs = context.payload.workflow_run?.pull_requests || [];
            if (prs.length === 0) {
              console.log('No associated PR found for workflow_run');
              return;
            }
            const prNumber = prs[0].number;
            
            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## 📊 Benchmark Results\n\n\`\`\`\n${report}\n\`\`\``
              });
            }

      - name: Check benchmark verdict
        if: steps.scenarios.outputs.skip != 'true'
        run: |
          REPORT_JSON="benchmark-results/ci-${{ github.run_id }}/report.json"
          
          if [ -f "$REPORT_JSON" ]; then
            VERDICT=$(jq -r '.summary.overallVerdict' "$REPORT_JSON")
            
            echo "Benchmark verdict: $VERDICT"
            
            if [ "$VERDICT" = "regression" ]; then
              echo "::error::Benchmark shows regression - model performance is worse than baseline"
              exit 1
            elif [ "$VERDICT" = "deploy" ]; then
              echo "::notice::Benchmark passed - model ready for deployment"
            else
              echo "::warning::Benchmark shows mixed results - continue training"
            fi
          else
            echo "::warning::No benchmark report found"
          fi

      - name: Skip notice
        if: steps.scenarios.outputs.skip == 'true'
        run: echo "Benchmark suite skipped because no scenario fixtures are available."

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: benchmark
    if: failure()

    steps:
      - name: Post failure notification
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // TODO: Implement real notification - create issue, post to Slack/Discord, etc.
            // For now, just log the failure context
            console.log('Benchmark failed - would notify team here');
            console.log(`Run ID: ${context.runId}`);
            console.log(`Ref: ${context.ref}`);
