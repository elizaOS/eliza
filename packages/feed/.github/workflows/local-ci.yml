# Local CI workflow optimized for act (local GitHub Actions runner)
# Run with: bun run test (or: act -W .github/workflows/local-ci.yml)
#
# This workflow uses Drizzle ORM - pure TypeScript, no native binaries.
# Works reliably on all platforms including Apple Silicon with act.
#
# NOTE: This workflow is designed to run locally via act. Services are accessed
# via Docker's internal networking using service names (postgres, redis).

name: Local CI

on:
  workflow_dispatch:
  push:
    branches: [local-test]

env:
  NODE_ENV: test
  CI: true

jobs:
  local-ci:
    name: Local CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          POSTGRES_INITDB_ARGS: "--encoding=UTF8"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --shm-size=512mb
        ports:
          - 5444:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6391:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Determine service hosts
        id: services
        run: |
          # act uses host networking for the job container on macOS
          # Services expose ports to the host via port mapping (5444:5432, 6391:6379)
          # Use host.docker.internal (Docker Desktop) or localhost (GitHub Actions)
          if [ "$ACT" = "true" ]; then
            echo "Using act (local) networking"
            # On macOS with Docker Desktop, host.docker.internal reaches the host
            # Services are port-mapped to the host
            PG_HOST="host.docker.internal"
            PG_PORT="5444"
            REDIS_HOST="host.docker.internal"
            REDIS_PORT="6391"
          else
            echo "Using GitHub Actions networking - localhost"
            PG_HOST="localhost"
            PG_PORT="5444"
            REDIS_HOST="localhost"
            REDIS_PORT="6391"
          fi
          echo "PG_HOST=$PG_HOST" >> $GITHUB_OUTPUT
          echo "REDIS_HOST=$REDIS_HOST" >> $GITHUB_OUTPUT
          echo "DATABASE_URL=postgresql://postgres:postgres@${PG_HOST}:${PG_PORT}/test_db" >> $GITHUB_OUTPUT
          echo "REDIS_URL=redis://${REDIS_HOST}:${REDIS_PORT}" >> $GITHUB_OUTPUT
          echo "Service hosts: PG=$PG_HOST:$PG_PORT, Redis=$REDIS_HOST:$REDIS_PORT"

      - name: Setup test environment
        env:
          DATABASE_URL: ${{ steps.services.outputs.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ steps.services.outputs.DATABASE_URL }}
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REDIS_URL: ${{ steps.services.outputs.REDIS_URL }}
          SKIP_E2E_CHECKS: true
        run: |
          echo "📋 Setting up test environment..."
          echo "   DATABASE_URL: $DATABASE_URL"
          echo "   REDIS_URL: $REDIS_URL"
          if [ -f scripts/ci/prepare-env.sh ]; then
            bash scripts/ci/prepare-env.sh
          else
            echo "NODE_ENV=test" > .env.test
            echo "CI=true" >> .env.test
            echo "DATABASE_URL=$DATABASE_URL" >> .env.test
            echo "DIRECT_DATABASE_URL=$DIRECT_DATABASE_URL" >> .env.test
            echo "REDIS_URL=$REDIS_URL" >> .env.test
          fi

      - name: Setup Database
        env:
          DATABASE_URL: ${{ steps.services.outputs.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ steps.services.outputs.DATABASE_URL }}
        run: |
          echo "🗄️ Setting up database with Drizzle..."
          echo "   DATABASE_URL: $DATABASE_URL"
          bunx --bun drizzle-kit push --force --config=packages/db/drizzle.config.ts

      - name: Type Check
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          echo "📝 Running type check..."
          bun run typecheck

      - name: Lint
        run: |
          echo "✨ Running linter..."
          bun run lint

      - name: Build
        if: ${{ env.ACT != 'true' }}
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: ${{ steps.services.outputs.DATABASE_URL }}
        run: |
          echo "🏗️ Building project..."
          bun run build
      
      - name: Skip Build (act)
        if: ${{ env.ACT == 'true' }}
        run: |
          echo "⏭️ Skipping build in act (memory-intensive in emulation)"
          echo "   Build is verified separately via 'bun run build'"

      - name: Run Unit Tests
        env:
          DATABASE_URL: ${{ steps.services.outputs.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ steps.services.outputs.DATABASE_URL }}
          REDIS_URL: ${{ steps.services.outputs.REDIS_URL }}
        run: |
          echo "🧪 Running unit tests..."
          bun test packages/testing/unit/ --preload ./packages/testing/unit/preload.ts

      - name: Run Integration Tests
        env:
          DATABASE_URL: ${{ steps.services.outputs.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ steps.services.outputs.DATABASE_URL }}
          REDIS_URL: ${{ steps.services.outputs.REDIS_URL }}
          TEST_API_URL: http://localhost:3000
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🔗 Running integration tests..."
          bun test packages/testing/integration/ --preload ./packages/testing/integration/preload.ts

      - name: Summary
        run: |
          echo ""
          echo "================================"
          echo "✅ Local CI Pipeline Complete!"
          echo "================================"
          echo ""
          echo "Using Drizzle ORM - no native binaries required"
