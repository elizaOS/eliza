name: CI - Unit & Integration (Manual Legacy)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  CI: true

jobs:
  # Python training pipeline tests
  python-training-tests:
    name: Python Training Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: babylon_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: babylon_test
        options: >-
          --health-cmd "pg_isready -U babylon_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'packages/training/python/requirements-ci.txt'

      - name: Install Python dependencies
        working-directory: packages/training/python
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e . --no-deps

      - name: Run Python unit tests
        working-directory: packages/training/python
        run: |
          echo "🧪 Running Python unit tests..."
          pytest tests/ -v --ignore=tests/integration/ --ignore=tests/e2e/ -x
        env:
          PYTHONPATH: src

      - name: Run Python integration tests (JSON mode)
        working-directory: packages/training/python
        run: |
          echo "🧪 Running Python JSON mode integration tests..."
          pytest tests/integration/test_json_mode_integration.py -v -x
        env:
          PYTHONPATH: src

      - name: Run Python integration tests (DB mode)
        working-directory: packages/training/python
        run: |
          echo "🧪 Running Python DB integration tests..."
          pytest tests/integration/test_db_integration.py -v -x
        env:
          PYTHONPATH: src
          DATABASE_URL: postgresql://babylon_test:test_password@localhost:5434/babylon_test

  test-unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          # Increase PostgreSQL limits for large migrations with 76 tables
          # Using environment variable to pass server options
          POSTGRES_INITDB_ARGS: "--encoding=UTF8"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=1gb
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Clear build caches
        run: |
          echo "🧹 Clearing Turborepo and Bun caches..."
          bunx turbo clean
          rm -rf node_modules/.cache
          echo "✅ Cache cleanup complete"

      - name: Setup test environment
        env:
          # Use CI test database directly
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          # For fork PRs, GitHub does not expose secrets; use a CI-only dummy app id.
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET || '' }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL || '' }}
          PRIVY_TEST_PHONE: ${{ secrets.PRIVY_TEST_PHONE || '' }}
          PRIVY_TEST_OTP: ${{ secrets.PRIVY_TEST_OTP || '' }}
          PRIVY_TEST_PASSWORD: ${{ secrets.PRIVY_TEST_PASSWORD || '' }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          FAL_KEY: ${{ secrets.FAL_KEY || '' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'test-cron-secret' }}
          WALLET_SEED_PHRASE: ${{ secrets.WALLET_SEED_PHRASE || '' }}
          WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD || '' }}
          REDIS_URL: redis://localhost:6379
        run: bash scripts/ci/prepare-env.sh

      - name: Setup Database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          set -euo pipefail
          # Use the setup script for consistent database initialization
          bash scripts/setup-test-db.sh 2>&1 | sed -E 's/(Datasource|ep-soft-wildflower|neondb|@[^[:space:]]*\.neon\.tech)/[REDACTED]/g'

      - name: Build for tests
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          set -euo pipefail
          echo "🏗️ Building project for tests..."
          bunx turbo build 2>&1 | sed -E 's/(Datasource|ep-soft-wildflower|neondb|@[^[:space:]]*\.neon\.tech)/[REDACTED]/g'
          echo "✅ Build complete"

      - name: Run Unit Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: |
          echo "🧪 Running unit tests with database connection..."
          echo "📊 Database URL configured: ${DATABASE_URL:0:30}..."
          bun test packages/testing/unit/ --preload ./packages/testing/unit/preload.ts --coverage
        continue-on-error: false

      - name: Start Next.js dev server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          PORT: 3000
          # Privy configuration for server
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET || '' }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL || '' }}
          PRIVY_TEST_PASSWORD: ${{ secrets.PRIVY_TEST_PASSWORD || '' }}
        run: |
          echo "🚀 Starting Next.js dev server for integration tests..."
          SKIP_ENV_VALIDATION=1 bunx --bun next dev apps/web -p 3000 > /tmp/next-server.log 2>&1 &
          echo $! > /tmp/next-server.pid
          echo "📝 Server PID: $(cat /tmp/next-server.pid)"

          # Wait for server to be ready (max 60s)
          echo "⏳ Waiting for server to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do echo -n "."; sleep 1; done' || {
            echo "❌ Server failed to start. Logs:"
            cat /tmp/next-server.log
            exit 1
          }
          echo ""
          echo "✅ Next.js dev server is ready"

      - name: Setup Playwright authentication for integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET || '' }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL || '' }}
          PRIVY_TEST_PASSWORD: ${{ secrets.PRIVY_TEST_PASSWORD || '' }}
        run: |
          echo "🔐 Setting up Playwright authentication for integration tests..."
          # First run E2E auth setup
          cd packages/testing && bunx playwright test --project=setup || {
            echo "⚠️  E2E auth setup failed, but continuing..."
          }
          # Then run integration auth setup to extract tokens
          cd packages/testing && bunx playwright test --project=setup-integration-auth || {
            echo "⚠️  Integration auth setup failed, but continuing..."
          }
          echo "✅ Playwright authentication setup complete"

      - name: Run Integration Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          TEST_API_URL: http://localhost:3000
          NODE_ENV: test
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          # Privy test credentials for authentication
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET || '' }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL || '' }}
          PRIVY_TEST_PASSWORD: ${{ secrets.PRIVY_TEST_PASSWORD || '' }}
          # Test user credentials for settings page tests
          # NOTE: These need to be added as GitHub Secrets:
          # - TEST_USER_ID: The Privy user ID (e.g., "privy:xxxxx" or internal user ID)
          # - TEST_ACCESS_TOKEN: A valid Privy access token for that user
          # To get these values:
          # 1. Authenticate with PRIVY_TEST_EMAIL/PRIVY_TEST_PASSWORD in your app
          # 2. Get the user ID from the authenticated user object
          # 3. Get the access token from Privy (via getAccessToken() or from localStorage)
          # 4. Add both as secrets in GitHub Settings > Secrets and variables > Actions
          TEST_USER_ID: ${{ secrets.TEST_USER_ID || vars.TEST_USER_ID || '' }}
          TEST_ACCESS_TOKEN: ${{ secrets.TEST_ACCESS_TOKEN || vars.TEST_ACCESS_TOKEN || '' }}
          # Agent0 SDK Configuration for integration tests
          # NOTE: Add these secrets in GitHub Settings > Secrets and variables > Actions
          # Required for agent0-sdk.integration.test.ts to run (currently skipped without config)
          # Get free Ethereum Sepolia RPC: https://www.alchemy.com/ or https://infura.io/
          # Use a dedicated test wallet - NEVER use mainnet wallet with funds!
          AGENT0_ENABLED: ${{ secrets.AGENT0_ENABLED || 'false' }}
          AGENT0_NETWORK: ${{ secrets.AGENT0_NETWORK || 'sepolia' }}
          AGENT0_RPC_URL: ${{ secrets.AGENT0_RPC_URL || '' }}
          AGENT0_PRIVATE_KEY: ${{ secrets.AGENT0_PRIVATE_KEY || '' }}
          AGENT0_IPFS_PROVIDER: ${{ secrets.AGENT0_IPFS_PROVIDER || 'pinata' }}
          PINATA_JWT: ${{ secrets.PINATA_JWT || '' }}
          AGENT0_SUBGRAPH_URL: ${{ secrets.AGENT0_SUBGRAPH_URL || '' }}
        run: |
          bun test packages/testing/integration/ --preload ./packages/testing/integration/preload.ts
          bun test packages/engine/src/__tests__/
        continue-on-error: false

      - name: Stop Next.js dev server
        if: always()
        run: |
          if [ -f /tmp/next-server.pid ]; then
            echo "🛑 Stopping Next.js dev server..."
            kill $(cat /tmp/next-server.pid) || true
            rm /tmp/next-server.pid
          fi
          # Show last 50 lines of server logs if they exist
          if [ -f /tmp/next-server.log ]; then
            echo "📝 Server logs (last 50 lines):"
            tail -50 /tmp/next-server.log
          fi
