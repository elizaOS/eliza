name: CI - Tests

on:
  pull_request:
    branches: [production, staging]
  push:
    branches: [production, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  CI: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Format & lint (Biome)
        run: bunx biome check .

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit
        env:
          TEST_CONCURRENCY: 8

  test-all:
    name: Run All Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HAS_PRIVY_E2E_SECRETS: ${{ (secrets.PRIVY_TEST_EMAIL != '' && secrets.PRIVY_TEST_PASSWORD != '' && (secrets.NEXT_PUBLIC_PRIVY_APP_ID != '' || secrets.PRIVY_APP_ID != '')) && 'true' || 'false' }}
      HAS_CHROMA_SECRETS: ${{ (secrets.WALLET_SEED_PHRASE != '' && secrets.WALLET_PASSWORD != '' && secrets.PRIVY_TEST_EMAIL != '' && secrets.PRIVY_TEST_PASSWORD != '' && (secrets.NEXT_PUBLIC_PRIVY_APP_ID != '' || secrets.PRIVY_APP_ID != '')) && 'true' || 'false' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          # Increase PostgreSQL limits for large migrations with 76 tables
          POSTGRES_INITDB_ARGS: "--encoding=UTF8"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=1gb
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Debug - Check secret availability
        env:
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL }}
        run: |
          echo "🔐 Checking GitHub secrets availability..."
          echo ""
          echo "Secret Status:"
          if [ -n "$NEXT_PUBLIC_PRIVY_APP_ID" ]; then
            echo "  ✅ NEXT_PUBLIC_PRIVY_APP_ID: SET (${#NEXT_PUBLIC_PRIVY_APP_ID} chars, starts with '${NEXT_PUBLIC_PRIVY_APP_ID:0:5}')"
          else
            echo "  ❌ NEXT_PUBLIC_PRIVY_APP_ID: NOT SET"
          fi
          
          if [ -n "$PRIVY_APP_ID" ]; then
            echo "  ✅ PRIVY_APP_ID: SET (${#PRIVY_APP_ID} chars, starts with '${PRIVY_APP_ID:0:5}')"
          else
            echo "  ❌ PRIVY_APP_ID: NOT SET"
          fi
          
          if [ -n "$PRIVY_TEST_EMAIL" ]; then
            echo "  ✅ PRIVY_TEST_EMAIL: SET"
          else
            echo "  ❌ PRIVY_TEST_EMAIL: NOT SET"
          fi
          
          echo ""
          if [ -z "$NEXT_PUBLIC_PRIVY_APP_ID" ] && [ -z "$PRIVY_APP_ID" ]; then
            echo "⚠️  WARNING: Neither NEXT_PUBLIC_PRIVY_APP_ID nor PRIVY_APP_ID is set!"
            echo "   E2E tests will fail without Privy authentication."
            echo ""
            echo "   To fix this:"
            echo "   1. Go to: ${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions"
            echo "   2. Add a secret named NEXT_PUBLIC_PRIVY_APP_ID or PRIVY_APP_ID"
            echo "   3. Set the value to your Privy App ID (starts with 'cl...')"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Clear build caches
        run: |
          echo "🧹 Clearing Turborepo and Bun caches..."
          bunx turbo clean
          rm -rf node_modules/.cache
          echo "✅ Cache cleanup complete"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Start Anvil
        run: |
          anvil --host 0.0.0.0 --port 8545 &
          echo "Waiting for Anvil..."
          timeout 30 bash -c 'until curl -s -H "Content-Type: application/json" -X POST --data "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}" http://localhost:8545; do sleep 1; done' || {
            echo "❌ Anvil failed to start"
            exit 1
          }
          echo "✅ Anvil is running"

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Setup test environment
        env:
          # Use CI test database directly
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          # For fork PRs, GitHub does not expose secrets; use a CI-only dummy app id.
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET || '' }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL || '' }}
          PRIVY_TEST_PHONE: ${{ secrets.PRIVY_TEST_PHONE || '' }}
          PRIVY_TEST_OTP: ${{ secrets.PRIVY_TEST_OTP || '' }}
          PRIVY_TEST_PASSWORD: ${{ secrets.PRIVY_TEST_PASSWORD || '' }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          FAL_KEY: ${{ secrets.FAL_KEY || '' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'test-cron-secret' }}
          WALLET_SEED_PHRASE: ${{ secrets.WALLET_SEED_PHRASE || '' }}
          WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD || '' }}
        run: bash scripts/ci/prepare-env.sh

      - name: Setup Database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          set -euo pipefail
          # Use the setup script for consistent database initialization
          bash scripts/setup-test-db.sh 2>&1 | sed -E 's/(Datasource|ep-soft-wildflower|neondb|@[^[:space:]]*\.neon\.tech)/[REDACTED]/g'

      - name: Build production
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          # CRITICAL: NEXT_PUBLIC_* variables must be set at BUILD TIME (not runtime)
          # Next.js embeds these values into the JavaScript bundle during build
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
        run: |
          set -euo pipefail
          echo "🏗️ Building production..."
          
          # Clear any existing Next.js cache to ensure fresh build
          echo "🧹 Clearing Next.js cache..."
          rm -rf .next
          
          # Debug: Show which secrets are available (without revealing values)
          echo "📋 Secret availability check:"
          echo "   NEXT_PUBLIC_PRIVY_APP_ID: ${NEXT_PUBLIC_PRIVY_APP_ID:+SET (${#NEXT_PUBLIC_PRIVY_APP_ID} chars, starts with '${NEXT_PUBLIC_PRIVY_APP_ID:0:5}')}${NEXT_PUBLIC_PRIVY_APP_ID:-NOT SET}"
          
          # Also show what's in .env files
          echo "📄 Checking .env files for NEXT_PUBLIC_PRIVY_APP_ID:"
          grep -h "NEXT_PUBLIC_PRIVY_APP_ID" .env .env.local .env.test 2>/dev/null | head -3 || echo "   (not found in .env files)"
          
          if [ -z "$NEXT_PUBLIC_PRIVY_APP_ID" ]; then
            echo "❌ ERROR: NEXT_PUBLIC_PRIVY_APP_ID is not set or empty!"
            echo "Please ensure the GitHub secret NEXT_PUBLIC_PRIVY_APP_ID or PRIVY_APP_ID is configured."
            exit 1
          fi
          
          # Verify the value looks like a valid Privy app ID (should start with "cl")
          if [[ ! "$NEXT_PUBLIC_PRIVY_APP_ID" =~ ^cl ]]; then
            echo "⚠️  WARNING: NEXT_PUBLIC_PRIVY_APP_ID doesn't appear to be a valid Privy App ID"
            echo "   Expected: starts with 'cl'"
            echo "   Got: starts with '${NEXT_PUBLIC_PRIVY_APP_ID:0:5}'"
          else
            echo "✅ NEXT_PUBLIC_PRIVY_APP_ID format looks valid (starts with 'cl')"
          fi
          
          # CRITICAL: Update .env files to ensure Next.js picks up the correct value
          # Next.js reads env vars from: process.env (shell) > .env.local > .env
          # But there can be precedence issues, so we explicitly update the files
          echo "📝 Ensuring .env files have correct NEXT_PUBLIC_PRIVY_APP_ID..."
          for envfile in .env .env.local .env.test; do
            if [ -f "$envfile" ]; then
              # Remove any existing NEXT_PUBLIC_PRIVY_APP_ID line and add the correct one
              grep -v "^NEXT_PUBLIC_PRIVY_APP_ID=" "$envfile" > "$envfile.tmp" || true
              echo "NEXT_PUBLIC_PRIVY_APP_ID=$NEXT_PUBLIC_PRIVY_APP_ID" >> "$envfile.tmp"
              mv "$envfile.tmp" "$envfile"
              echo "   Updated $envfile"
            fi
          done
          
          # Verify the update
          echo "📄 After update, .env contains:"
          grep "NEXT_PUBLIC_PRIVY_APP_ID" .env | head -1 || echo "   (not found)"
          
          echo "🔨 Running build..."
          bunx turbo build 2>&1 | sed -E 's/(Datasource|ep-soft-wildflower|neondb|@[^[:space:]]*\.neon\.tech)/[REDACTED]/g'
          
          # Verify the build includes the Privy App ID by checking the actual value
          echo "🔍 Verifying Privy App ID is embedded in build..."
          if grep -rq "${NEXT_PUBLIC_PRIVY_APP_ID:0:10}" .next 2>/dev/null; then
            echo "✅ Build verified: Privy App ID value found in build output"
          else
            echo "❌ WARNING: Could not find Privy App ID in build output!"
            echo "   This likely means the build didn't pick up the env var correctly"
            echo "   Checking for privy-related content in build..."
            grep -r "privy" .next/static 2>/dev/null | head -5 || echo "   No privy references found in static"
          fi
          
          echo "✅ Build complete"

      - name: Start production server
        run: |
          echo "🚀 Starting production server..."
          echo "🔑 Verifying NEXT_PUBLIC_PRIVY_APP_ID is available (length: ${#NEXT_PUBLIC_PRIVY_APP_ID})"
          SKIP_ENV_VALIDATION=1 bun scripts/validation/check-environment.ts || echo "⚠️  Environment check skipped in CI"
          (cd apps/web && bunx --bun next start -p 3000) > /tmp/prod-server.log 2>&1 &
          echo $! > /tmp/prod-server.pid
          echo "📝 Server PID: $(cat /tmp/prod-server.pid)"

          echo "⏳ Waiting for server to be ready..."
          timeout 360 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 2; done' || {
            echo "❌ Server failed to respond within 360s. Logs:"
            if [ -f /tmp/prod-server.log ]; then
              tail -n 200 /tmp/prod-server.log
            else
              echo "⚠️  No server log file found."
            fi
            exit 1
          }
          echo "✅ Production server is ready"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          # Set DEPLOYMENT_ENV=localnet to skip strict testnet/mainnet validation in CI
          DEPLOYMENT_ENV: localnet
          # NODE_ENV=test so integration tests can use x-dev-user-id headers
          NODE_ENV: test
          PORT: 3000
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          # NEXT_PUBLIC_* variables are embedded at build time, but ensure they're available
          # at runtime for any server-side rendering or API routes that might need them
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          CI_ADMIN_TOKEN: ci-integration-test-admin-token

      - name: Run Integration Tests
        continue-on-error: true
        timeout-minutes: 10
        run: |
          echo "🧪 Running integration tests..."
          bun test packages/testing/integration/ \
            --preload ./packages/testing/integration/preload.ts \
            --timeout 30000
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          TEST_API_URL: http://localhost:3000
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET || '' }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'test-cron-secret' }}
          CI_ADMIN_TOKEN: ci-integration-test-admin-token
          NODE_ENV: test
          CI: true
          LLM_TIMEOUT_MS: '30000'

      - name: Run Integration Tests
        continue-on-error: true
        timeout-minutes: 10
        run: |
          echo "🧪 Running integration tests..."
          bun test packages/testing/integration/ \
            --preload ./packages/testing/integration/preload.ts \
            --timeout 30000 \
            2>&1 | tee /tmp/integration-results.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "📊 Integration test summary:"
          grep -cE "^\(pass\)" /tmp/integration-results.log | xargs -I{} echo "  Passed: {}"
          grep -cE "^\(fail\)" /tmp/integration-results.log | xargs -I{} echo "  Failed: {}"
          grep -cE "^\(skip\)" /tmp/integration-results.log | xargs -I{} echo "  Skipped: {}"
          tail -5 /tmp/integration-results.log
          exit $EXIT_CODE
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          TEST_API_URL: http://localhost:3000
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID || secrets.NEXT_PUBLIC_PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET || '' }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || secrets.PRIVY_APP_ID || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'cl_ci_fork_dummy') || '' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'test-cron-secret' }}
          NODE_ENV: test
          CI: true
          LLM_TIMEOUT_MS: '30000'

      - name: Run Chroma E2E Tests
        if: ${{ env.HAS_CHROMA_SECRETS == 'true' }}
        run: cd tools/chroma && bunx playwright test --config=playwright.config.ts --reporter=list,json
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          WALLET_SEED_PHRASE: ${{ secrets.WALLET_SEED_PHRASE || '' }}
          WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD || '' }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL || '' }}
          PRIVY_TEST_PHONE: ${{ secrets.PRIVY_TEST_PHONE || '' }}
          PRIVY_TEST_OTP: ${{ secrets.PRIVY_TEST_OTP || '' }}
          PRIVY_TEST_PASSWORD: ${{ secrets.PRIVY_TEST_PASSWORD || '' }}
          CI: true
          NODE_ENV: test

      - name: Run E2E Tests (Standard)
        if: ${{ (success() || failure()) && env.HAS_PRIVY_E2E_SECRETS == 'true' }}
        run: cd packages/testing && bunx playwright test e2e --reporter=list,json
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL || '' }}
          PRIVY_TEST_PASSWORD: ${{ secrets.PRIVY_TEST_PASSWORD || '' }}
          CI: true
          NODE_ENV: test

      - name: Stop production server
        if: always()
        run: |
          if [ -f /tmp/prod-server.pid ]; then
            PID=$(cat /tmp/prod-server.pid)
            echo "🛑 Stopping production server (PID: $PID)..."
            kill "$PID" || true
            wait "$PID" || true
            rm /tmp/prod-server.pid
          else
            echo "ℹ️  No production server PID file found."
          fi

          if [ -f /tmp/prod-server.log ]; then
            echo "📝 Production server logs (last 100 lines):"
            tail -n 100 /tmp/prod-server.log || true
          else
            echo "ℹ️  No production server log file found."
          fi
