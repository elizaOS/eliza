name: Python Scam Defense Validation

on:
  pull_request:
    branches: [production, staging]
    paths:
      - 'packages/training/python/**'
      - '.github/workflows/python-scam-defense-validation.yml'
  push:
    branches: [production, staging]
    paths:
      - 'packages/training/python/**'
      - '.github/workflows/python-scam-defense-validation.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-scam-defense-python:
    name: Validate Scam Defense Python Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'packages/training/python/requirements-ci.txt'

      - name: Install Python dependencies
        working-directory: packages/training/python
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e . --no-deps

      - name: Run scam-defense pipeline tests
        working-directory: packages/training/python
        run: |
          rc=0
          pytest -q \
            tests/test_assemble_scam_defense_hf_dataset.py \
            tests/test_retained_security_source_materialization.py \
            tests/test_deduplicate_training_data.py \
            tests/test_build_scam_defense_release.py \
            tests/test_manage_scam_defense_release.py \
            tests/test_check_scam_defense_release_health.py \
            tests/test_check_rlvr_pipeline_health.py \
            tests/test_manage_rlvr_release.py \
            tests/test_verify_prompt_injection_dataset_coverage.py \
            || rc=$?
          # Exit code 5 = no tests collected (all skipped). Treat as success.
          if [ "$rc" -eq 5 ]; then echo "All tests skipped (scripts not yet present) - OK"; exit 0; fi
          exit $rc

      - name: Audit pinned Python dependencies
        working-directory: packages/training/python
        run: |
          if [ -f scripts/audit_prod_dependencies.py ]; then
            python scripts/audit_prod_dependencies.py
          else
            echo "audit_prod_dependencies.py not yet present - skipping"
          fi
