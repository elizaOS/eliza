// documents.proto - Document types for elizaOS
syntax = "proto3";

package eliza.v1;

import "eliza/v1/memory.proto";
import "eliza/v1/primitives.proto";

// Represents a single document stored by the agent.
message DocumentRecord {
  // Unique identifier for the document item (UUID string).
  string id = 1;
  // Content of the document item.
  Content content = 2;
  // Optional metadata associated with this document item.
  optional MemoryMetadata metadata = 3;
}

// Directory-based document source configuration.
message DocumentDirectoryItem {
  // Path to a directory containing document files.
  string directory = 1;
  // Whether these documents are shared across characters.
  optional bool shared = 2;
}
