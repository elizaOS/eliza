server:
  listen: "127.0.0.1:4356"

database:
  url: "sqlite:/data/bitrouter.db"

providers:
  bitrouter: {}
  openai: {}
  anthropic: {}
  google: {}
  groq: {}
  cerebras:
    api_base: "https://api.cerebras.ai/v1"
    api_key: "${BITROUTER_CEREBRAS_API_KEY}"
    api_protocol: openai
    models:
      gpt-oss-120b:
        name: "GPT OSS 120B"
        max_input_tokens: 131072
        max_output_tokens: 40960
        input_modalities:
          - text
        output_modalities:
          - text
        pricing:
          input_tokens:
            no_cache: 0.35
            cache_read: 0.35
            cache_write: 0.35
          output_tokens:
            text: 0.75
            reasoning: 0
      zai-glm-4.7:
        name: "ZAI GLM 4.7"
        max_input_tokens: 131072
        max_output_tokens: 40960
        input_modalities:
          - text
        output_modalities:
          - text
        pricing:
          input_tokens:
            no_cache: 2.25
            cache_read: 2.25
            cache_write: 2.25
          output_tokens:
            text: 2.75
            reasoning: 0

models:
  gpt-oss-120b:
    endpoints:
      - provider: cerebras
        service_id: gpt-oss-120b
    pricing:
      input_tokens:
        no_cache: 0.35
        cache_read: 0.35
        cache_write: 0.35
      output_tokens:
        text: 0.75
        reasoning: 0
  "cerebras:gpt-oss-120b":
    endpoints:
      - provider: cerebras
        service_id: gpt-oss-120b
    pricing:
      input_tokens:
        no_cache: 0.35
        cache_read: 0.35
        cache_write: 0.35
      output_tokens:
        text: 0.75
        reasoning: 0
  zai-glm-4.7:
    endpoints:
      - provider: cerebras
        service_id: zai-glm-4.7
    pricing:
      input_tokens:
        no_cache: 2.25
        cache_read: 2.25
        cache_write: 2.25
      output_tokens:
        text: 2.75
        reasoning: 0
  "cerebras:zai-glm-4.7":
    endpoints:
      - provider: cerebras
        service_id: zai-glm-4.7
    pricing:
      input_tokens:
        no_cache: 2.25
        cache_read: 2.25
        cache_write: 2.25
      output_tokens:
        text: 2.75
        reasoning: 0

inherit_defaults: true
