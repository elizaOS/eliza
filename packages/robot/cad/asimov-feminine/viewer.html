<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASIMOV-1 Feminine Design Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; }
#canvas-container { position: absolute; top: 0; left: 0; right: 280px; bottom: 0; }
#ui { position: absolute; top: 0; right: 0; width: 280px; bottom: 0; background: #111118; border-left: 1px solid #2a2a4a; overflow-y: auto; padding: 12px; }
canvas { display: block; width: 100%; height: 100%; }
h1 { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #222; }
h2 { font-size: 10px; color: #556; text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 6px; }
.row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
.row label { font-size: 11px; flex: 1; color: #aaa; }
input[type=checkbox] { accent-color: #f80; cursor: pointer; }
input[type=range] { width: 80px; accent-color: #f80; cursor: pointer; }
.val { font-size: 10px; color: #f80; width: 32px; text-align: right; }
.stat { font-size: 10px; color: #666; margin: 2px 0; }
.stat b { color: #888; }
button { background: #1a1a2e; border: 1px solid #333; color: #aaa; padding: 4px 8px; font-size: 10px; cursor: pointer; border-radius: 2px; margin: 2px; }
button:hover { border-color: #f80; color: #f80; }
button.active { border-color: #f80; color: #f80; background: #1a1408; }
#status { position: absolute; top: 8px; left: 8px; font-size: 10px; color: #666; pointer-events: none; }
.group-head   { color: #88aaff; }
.group-torso  { color: #ff8844; }
.group-arm    { color: #44cc88; }
.group-leg    { color: #cc88ff; }
</style>
</head>
<body>
<div id="canvas-container"><canvas id="c"></canvas></div>
<div id="status">Loading...</div>
<div id="ui">
  <h1>ASIMOV-1 · Feminine Edit</h1>

  <h2>Layers</h2>
  <div class="row"><input type="checkbox" id="showAsimov" checked> <label>ASIMOV-1 (STL)</label></div>
  <div class="row"><label style="padding-left:16px">Opacity</label> <input type="range" id="asimovOpacity" min="0" max="100" value="85"> <span class="val" id="asimovOpacityVal">85</span></div>
  <div class="row"><input type="checkbox" id="showGLB" checked> <label>Saffron Sentinel (GLB)</label></div>
  <div class="row"><label style="padding-left:16px">Opacity</label> <input type="range" id="glbOpacity" min="0" max="100" value="40"> <span class="val" id="glbOpacityVal">40</span></div>
  <div class="row"><input type="checkbox" id="showWire"> <label>Wireframe</label></div>

  <h2>GLB Scale & Position</h2>
  <div class="row"><label>Scale</label> <input type="range" id="glbScale" min="20" max="200" value="90"> <span class="val" id="glbScaleVal">0.90×</span></div>
  <div class="row"><label>Vertical offset</label> <input type="range" id="glbOffsetZ" min="-100" max="100" value="0"> <span class="val" id="glbOffsetZVal">0mm</span></div>

  <h2>Body Parts</h2>
  <div class="row"><input type="checkbox" id="showHead" checked> <label class="group-head">Head / Neck</label></div>
  <div class="row"><input type="checkbox" id="showTorso" checked> <label class="group-torso">Torso / Pelvis</label></div>
  <div class="row"><input type="checkbox" id="showArms" checked> <label class="group-arm">Arms</label></div>
  <div class="row"><input type="checkbox" id="showLegs" checked> <label class="group-leg">Legs</label></div>

  <h2>View</h2>
  <div>
    <button id="viewFront">Front</button>
    <button id="viewSide">Side</button>
    <button id="viewTop">Top</button>
    <button id="view3d">3D</button>
  </div>

  <h2>Stats</h2>
  <div id="stats"></div>

  <h2>Links Loaded</h2>
  <div id="linkList" style="font-size:9px;color:#444;max-height:200px;overflow-y:auto"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const canvas = document.getElementById('c');
const container = document.getElementById('canvas-container');
const statusEl = document.getElementById('status');
const statsEl = document.getElementById('stats');
const linkListEl = document.getElementById('linkList');

// ── Renderer ──────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

// ── Scene ─────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 8, 20);

// Grid
const grid = new THREE.GridHelper(4, 20, 0x1a1a2e, 0x111118);
grid.rotation.x = Math.PI / 2; // Z-up convention: grid in XY plane
scene.add(grid);

// Lights
const ambient = new THREE.AmbientLight(0x223366, 0.8);
scene.add(ambient);
const key = new THREE.DirectionalLight(0xffeedd, 2.0);
key.position.set(2, -2, 3);
key.castShadow = true;
scene.add(key);
const fill = new THREE.DirectionalLight(0x334466, 0.6);
fill.position.set(-2, 1, 1);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffa844, 0.4);
rim.position.set(0, 2, -1);
scene.add(rim);

// ── Camera ────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 50);
camera.up.set(0, 0, 1); // Z-up

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0.7);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

function setView(name) {
  const tgt = controls.target.clone();
  if (name === 'front')  { camera.position.set(0, -3.5, 0.7); }
  if (name === 'side')   { camera.position.set(3.5, 0, 0.7); }
  if (name === 'top')    { camera.position.set(0, 0, 4.5); camera.up.set(0, 1, 0); }
  if (name === '3d')     { camera.position.set(2, -2.5, 1.2); camera.up.set(0, 0, 1); }
  controls.update();
}
setView('front');

// ── Groups ────────────────────────────────────────────────────────
const asimovGroup = new THREE.Group();
const glbGroup = new THREE.Group();
scene.add(asimovGroup);
scene.add(glbGroup);

// ── Part color map ────────────────────────────────────────────────
const GROUPS = {
  head:  ['NECK_YAW.STL', 'NECK_PITCH.STL'],
  torso: ['IMU_ORIGIN.STL', 'WAIST_YAW.STL'],
  arm:   ['LEFT_SHOULDER_PITCH.STL', 'LEFT_SHOULDER_ROLL.STL', 'LEFT_SHOULDER_YAW.STL',
          'LEFT_ELBOW.STL', 'LEFT_WRIST_YAW.STL',
          'RIGHT_SHOULDER_PITCH.STL', 'RIGHT_SHOULDER_ROLL.STL', 'RIGHT_SHOULDER_YAW.STL',
          'RIGHT_ELBOW.STL', 'RIGHT_WRIST_YAW.STL'],
  leg:   ['LEFT_HIP_PITCH.STL', 'LEFT_HIP_ROLL.STL', 'LEFT_HIP_YAW.STL',
          'LEFT_KNEE.STL', 'LEFT_ANKLE_A.STL', 'LEFT_ANKLE_B.STL', 'LEFT_TOE.STL',
          'RIGHT_HIP_PITCH.STL', 'RIGHT_HIP_ROLL.STL', 'RIGHT_HIP_YAW.STL',
          'RIGHT_KNEE.STL', 'RIGHT_ANKLE_A.STL', 'RIGHT_ANKLE_B.STL', 'RIGHT_TOE.STL'],
};
const GROUP_COLORS = { head: 0x6688ff, torso: 0xff7733, arm: 0x33cc77, leg: 0xbb66ff };
const PART_GROUP = {};
for (const [g, parts] of Object.entries(GROUPS)) parts.forEach(p => PART_GROUP[p] = g);

// Track mesh objects by group
const meshByGroup = { head: [], torso: [], arm: [], leg: [] };

// ── Load ASIMOV-1 ─────────────────────────────────────────────────
const stlLoader = new STLLoader();
let loadedCount = 0;
let totalLinks = 0;

fetch('./kinematic_tree.json')
  .then(r => r.json())
  .then(tree => {
    totalLinks = tree.links.filter(l => l.stl).length;
    updateStatus(`Loading 0/${totalLinks} links...`);

    for (const link of tree.links) {
      if (!link.stl) continue;
      const stlUrl = tree.mesh_dir + link.stl;
      const group = PART_GROUP[link.stl] || 'leg';
      const color = GROUP_COLORS[group] || 0x888888;

      stlLoader.load(stlUrl, (geometry) => {
        geometry.computeVertexNormals();
        const mat = new THREE.MeshStandardMaterial({
          color,
          roughness: 0.6,
          metalness: 0.3,
          transparent: true,
          opacity: 0.85,
        });
        const mesh = new THREE.Mesh(geometry, mat);
        mesh.userData.stl = link.stl;
        mesh.userData.group = group;
        mesh.userData.linkName = link.name;

        // Apply world transform from MJCF (Z-up, already correct)
        const pos = link.world_pos;
        mesh.position.set(pos[0], pos[1], pos[2]);

        // Rotation matrix from MJCF (row-major 3x3 → Three.js Matrix4)
        if (link.world_rot) {
          const r = link.world_rot;
          const m4 = new THREE.Matrix4();
          m4.set(
            r[0][0], r[0][1], r[0][2], 0,
            r[1][0], r[1][1], r[1][2], 0,
            r[2][0], r[2][1], r[2][2], 0,
            0, 0, 0, 1
          );
          mesh.setRotationFromMatrix(m4);
        }

        asimovGroup.add(mesh);
        meshByGroup[group] = meshByGroup[group] || [];
        meshByGroup[group].push(mesh);

        loadedCount++;
        updateStatus(`Loaded ${loadedCount}/${totalLinks} links`);
        if (loadedCount === totalLinks) {
          onAsimovLoaded();
        }

        const li = document.createElement('div');
        li.textContent = `✓ ${link.name}`;
        li.style.color = '#' + color.toString(16).padStart(6, '0');
        linkListEl.appendChild(li);
      }, undefined, (e) => {
        loadedCount++;
        const li = document.createElement('div');
        li.textContent = `✗ ${link.stl}`;
        li.style.color = '#664444';
        linkListEl.appendChild(li);
        if (loadedCount === totalLinks) onAsimovLoaded();
      });
    }
  });

function onAsimovLoaded() {
  updateStatus('ASIMOV-1 loaded. Loading GLB...');
  // Compute bounding box
  const box = new THREE.Box3().setFromObject(asimovGroup);
  const size = box.getSize(new THREE.Vector3());
  statsEl.innerHTML = `<div class="stat"><b>Height:</b> ${(size.z * 1000).toFixed(0)}mm</div>
<div class="stat"><b>Width:</b> ${(size.x * 1000).toFixed(0)}mm</div>
<div class="stat"><b>Depth:</b> ${(size.y * 1000).toFixed(0)}mm</div>
<div class="stat"><b>Links:</b> ${loadedCount}</div>`;
}

// ── Load Saffron Sentinel GLB ─────────────────────────────────────
const gltfLoader = new GLTFLoader();
let glbModel = null;
let asimovHeight = 1.27; // estimate, updated after ASIMOV loads

gltfLoader.load('./saffron_sentinel.glb', (gltf) => {
  glbModel = gltf.scene;

  // Override materials with semi-transparent gold/orange
  glbModel.traverse(child => {
    if (child.isMesh) {
      child.material = new THREE.MeshStandardMaterial({
        color: 0xffa020,
        roughness: 0.3,
        metalness: 0.7,
        transparent: true,
        opacity: 0.4,
      });
    }
  });

  // GLB is Y-up, MJCF/scene is Z-up → rotate 90° around X
  glbModel.rotation.x = Math.PI / 2;

  // Compute GLB bounding box
  const box = new THREE.Box3().setFromObject(glbModel);
  const size = box.getSize(new THREE.Vector3());
  const glbHeight = Math.max(size.x, size.y, size.z); // after rotation, height is in Y or Z

  // Actually after rotation.x = PI/2, Y becomes Z in Three.js
  // GLB native Y was height → now it's Three.js Z
  const glbHeightNative = 1.8983; // from inspector
  const targetHeight = asimovHeight;
  const initialScale = targetHeight / glbHeightNative;

  glbModel.scale.setScalar(initialScale);

  // Center horizontally and place at ground level
  const box2 = new THREE.Box3().setFromObject(glbModel);
  glbModel.position.set(
    -box2.getCenter(new THREE.Vector3()).x,
    -box2.getCenter(new THREE.Vector3()).y,
    -box2.min.z,
  );

  glbGroup.add(glbModel);
  updateStatus('Ready. Drag to rotate, scroll to zoom.');

  // Update scale slider to match initial
  const pct = Math.round(initialScale * 100);
  document.getElementById('glbScale').value = Math.min(200, Math.max(20, pct));
  document.getElementById('glbScaleVal').textContent = initialScale.toFixed(2) + '×';
}, undefined, (e) => {
  updateStatus('GLB load error: ' + e.message);
  console.error(e);
});

// ── UI Controls ───────────────────────────────────────────────────
function bindCheck(id, fn) {
  document.getElementById(id).addEventListener('change', e => fn(e.target.checked));
}
function bindRange(id, valId, fmt, fn) {
  const el = document.getElementById(id);
  const valEl = document.getElementById(valId);
  el.addEventListener('input', () => { valEl.textContent = fmt(el.value); fn(Number(el.value)); });
}

bindCheck('showAsimov', v => { asimovGroup.visible = v; });
bindCheck('showGLB', v => { glbGroup.visible = v; });
bindCheck('showWire', v => {
  asimovGroup.traverse(c => { if (c.isMesh) c.material.wireframe = v; });
});
bindCheck('showHead', v => { (meshByGroup.head||[]).forEach(m => m.visible = v); });
bindCheck('showTorso', v => { (meshByGroup.torso||[]).forEach(m => m.visible = v); });
bindCheck('showArms', v => { (meshByGroup.arm||[]).forEach(m => m.visible = v); });
bindCheck('showLegs', v => { (meshByGroup.leg||[]).forEach(m => m.visible = v); });

bindRange('asimovOpacity', 'asimovOpacityVal', v => v + '%', v => {
  asimovGroup.traverse(c => { if (c.isMesh) { c.material.opacity = v/100; c.material.transparent = v < 100; } });
});
bindRange('glbOpacity', 'glbOpacityVal', v => v + '%', v => {
  glbGroup.traverse(c => { if (c.isMesh) { c.material.opacity = v/100; c.material.transparent = true; } });
});
bindRange('glbScale', 'glbScaleVal', v => (v/100).toFixed(2) + '×', v => {
  if (glbModel) {
    glbModel.scale.setScalar(v / 100);
    const box = new THREE.Box3().setFromObject(glbModel);
    glbModel.position.set(
      -box.getCenter(new THREE.Vector3()).x,
      -box.getCenter(new THREE.Vector3()).y,
      -box.min.z + Number(document.getElementById('glbOffsetZ').value) / 1000,
    );
  }
});
bindRange('glbOffsetZ', 'glbOffsetZVal', v => v + 'mm', v => {
  if (glbModel) glbModel.position.z = -new THREE.Box3().setFromObject(glbModel).min.z + v/1000;
});

['Front','Side','Top','3d'].forEach(name => {
  document.getElementById('view' + name).addEventListener('click', () => {
    setView(name.toLowerCase());
    camera.up.set(0, 0, 1);
    if (name === 'Top') camera.up.set(0, 1, 0);
    controls.update();
  });
});

// ── Resize ────────────────────────────────────────────────────────
function resize() {
  const w = container.offsetWidth;
  const h = container.offsetHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── Render loop ───────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

function updateStatus(msg) {
  statusEl.textContent = msg;
}
</script>
</body>
</html>
