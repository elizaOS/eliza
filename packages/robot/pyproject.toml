[project]
name = "eliza-robot"
version = "2.0.0b0"
description = "Python robotics stack for elizaOS: MuJoCo sim, Brax-PPO RL, websocket bridge, perception, and trajectory DB. Profile-driven for multi-robot support; first profile is Hiwonder AiNex."
readme = "README.md"
requires-python = ">=3.11,<3.13"

dependencies = [
  # Simulation
  "mujoco>=3.2",
  "mujoco-mjx>=3.2",
  # Differentiable physics + RL training (Brax-PPO). JAX is the substrate;
  # local development uses JAX_PLATFORMS=cpu, training runs offload to GPU.
  "jax>=0.4.30",
  "jaxlib>=0.4.30",
  "brax>=0.10",
  # numpy<2 keeps us compatible with the brax/mujoco/jax wheel matrix that
  # has not yet finished the numpy 2.x ABI migration. Revisit when brax
  # publishes numpy>=2 wheels.
  "numpy<2",
  # Schema + transport
  "pydantic>=2",
  "websockets>=12",
  # Perception
  "opencv-python-headless>=4.10",
  "Pillow>=10",
  "sentence-transformers>=3",
  "onnxruntime>=1.18",
  # CLI / DX
  "rich>=13",
  "typer>=0.12",
  # Tests + lint
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "ruff>=0.6",
  "roslibpy>=2.0.0",
]

[project.scripts]
# Placeholders — implementations land in later waves.
eliza-robot-sim = "eliza_robot.cli.sim:main"
eliza-robot-bridge = "eliza_robot.cli.bridge:main"
eliza-robot-train = "eliza_robot.cli.train:main"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  ".git",
  ".venv",
  "build",
  "checkpoints",
  "data",
  "out",
  "generated",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]

[tool.uv]
package = false
