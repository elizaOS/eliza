schema: eliza.dvfs_table.v1
status: placeholder_release_blocked
corner: tt
process_temperature_c: 25
release_use: prohibited_until_external_review
claim_boundary: >
  This file is a format placeholder for the typical-typical (TT) corner DVFS
  table. Values are planning estimates derived from
  docs/architecture-optimization/soc-optimized-operating-point.yaml and
  docs/pd/rail-plan-2028.yaml. They are not silicon characterization data and
  are not release-grade. Replace with STA-corner-bin output before signoff.
source_artifacts:
  - docs/pd/rail-plan-2028.yaml
  - docs/architecture-optimization/soc-optimized-operating-point.yaml
rails:
  VDD_CPU_BIG:
    operating_points:
      - frequency_hz: 800000000
        nominal_code: 0x60
