        max_code: 0x68
      - frequency_hz: 1600000000
        nominal_code: 0x78
        min_code: 0x70
        max_code: 0x80
      - frequency_hz: 2400000000
        nominal_code: 0x90
        min_code: 0x88
        max_code: 0x98
      - frequency_hz: 3200000000
        nominal_code: 0xB0
        min_code: 0xA8
        max_code: 0xC0
