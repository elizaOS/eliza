# Canonical comparison: the E1 cluster vs the best open-source RISC-V cores.
#
# Purpose: give E1 and the open RISC-V state of the art a single, claim-tagged,
# machine-checkable comparison frame. The benchmark goal behind this file:
# "benchmark our chip against the best open RISC-V chip; compare in every
# respect; if we are not beating it, review why and how to beat it."
#
# HONESTY CONTRACT (enforced by scripts/check_open_core_comparison.py):
#   Every numeric cell is a mapping with a `value` and a `claim`. The claim is
#   one of:
#     measured  - produced by a real run of code in THIS repo; must carry an
#                 `evidence` path that exists on disk.
#     published - an external vendor/academic figure; must carry a `source`.
#     modeled   - an architectural model/projection; must carry a `claim_level`
#                 from docs/benchmarks/claim-ladder.md.
#     target    - a design target, not an observation; must carry a `claim_level`.
#     blocked   - not obtainable yet; must carry a `blocker`.
#   No silicon performance numbers are asserted for E1: it has no silicon.
schema: eliza.open_riscv_core_comparison.v1
generated_at_utc: "2026-05-21T16:30:00Z"

description: >-
  E1 is a heterogeneous 1+3+4 cluster that ADOPTS best-in-class open RISC-V
  cores per tier rather than designing every core from scratch: the little
  core (e1-pro) IS the CVA6/Ariane core, the mid core (e1-premium) is XiangShan
  Kunminghu, and the big core (e1-ultra) is Tenstorrent Ascalon. The single
  highest-performance open core in existence is XiangShan Kunminghu; the most
  mature, silicon-proven open in-order core is CVA6/Ariane. This file compares
  E1 (per role) against that open cohort on every axis, then renders the
  E1-vs-Ariane verdict per axis.

claim_legend:
  measured: Real run of repo code; evidence file on disk.
  published: External vendor/academic figure; source cited.
  modeled: Architectural model/projection at the stated claim level.
  target: Design target, not an observation, at the stated claim level.
  blocked: Not obtainable yet; blocker stated.

units:
  coremark_per_mhz: CoreMark score per MHz (frequency-independent integer throughput).
  dmips_per_mhz: Dhrystone MIPS per MHz.
  specint2006_per_ghz: SPECint2006 points per GHz.
  ipc: Instructions retired per cycle (workload-dependent; note workload).
  mpki_geomean: Branch mispredicts per kilo-instruction, geometric mean over the trace set.
  frequency_ghz: Clock frequency.

# ---------------------------------------------------------------------------
# Cohort: E1 roles + the best open RISC-V cores. Proprietary cores (Ventana
# Veyron, and Ascalon's closed RTL) are listed only where E1 selects them, and
# flagged open_source:false.
# ---------------------------------------------------------------------------
cores:

  e1_pro:
    label: "E1 e1-pro (little core, x4)"
    role: little
    is_e1: true
    vendor: OpenHW (adopted by E1)
    open_source: true
    identical_to: cva6
    note: >-
      e1-pro IS the CVA6 RV64GC core (docs/evidence/cpu_ap/core-selection.json,
      little_core_e1_pro selected via the CVA6 wrapper). Its scalar performance
      equals CVA6 by construction; E1 does not try to "beat" Ariane here, it
      adopts it as the correct open in-order design point.
    isa: RV64GC
    microarch:
      pipeline_stages: 6
      ordering: in-order
      decode_width: 1
      issue_width: 1
      rob_entries: 0
    branch_predictor: "CVA6 BHT(128 x 2-bit) + BTB(32, indirect only) + RAS(2)"
    cache:
      l1i: 16-32 KiB
      l1d: 16-32 KiB
      l2: shared 256 KiB (cluster)
    frequency:
      target_ghz: {value: 2.2, claim: target, claim_level: L1_RTL_FULL_SOC}
    metrics:
      coremark_per_mhz: {value: 2.83, claim: published, source: "OpenHW CVA6 user manual; e1-pro == CVA6"}
      dmips_per_mhz: {value: 1.65, claim: published, source: "arXiv:1904.05442 (CVA6 GF22 silicon)"}
      coremark_functional_insns_per_iter: {value: 406456.76, claim: measured, evidence: docs/evidence/cpu_ap/cva6-coremark-qemu.json}
    silicon_status: "Silicon-proven as CVA6 (1.7 GHz GF22FDX); not yet taped out as e1-pro."
    verification_maturity: "Inherits CVA6 core-v-verif maturity upstream; E1 integration RVFI not yet wired."

  e1_premium:
    label: "E1 e1-premium (mid core, x3)"
    role: mid
    is_e1: true
    vendor: ICT/XiangShan (adopted by E1)
    open_source: true
    identical_to: xiangshan_kunminghu
    note: >-
      e1-premium is XiangShan Kunminghu (mid_core_e1_premium, "selected pending
      chipyard or standalone integration"). Not yet generated/integrated in E1
      RTL, so all E1-side numbers are target/blocked, not measured.
    isa: RV64GCB + V + H
    microarch:
      pipeline_stages: 13
      ordering: out-of-order
      decode_width: 6
      issue_width: 6
      rob_entries: 256
    branch_predictor: "E1 BPU: TAGE-SC-L + ITTAGE + FTB(2048) + RAS + SC + loop"
    cache:
      l1i: 32-64 KiB
      l1d: 32-64 KiB
      l2: 512 KiB private
      l3: shared cluster LLC
    frequency:
      target_ghz: {value: 3.4, claim: target, claim_level: L2_ARCH_SIM}
    metrics:
      coremark_per_mhz: {value: 10.0, claim: modeled, claim_level: L2_ARCH_SIM}
      specint2006_per_ghz: {value: 15.0, claim: published, source: "XiangShan Kunminghu KMHv2, RISC-V Summit Europe 2025 (>15/GHz)"}
    silicon_status: "Blocked until Chipyard/standalone integration + tapeout."
    verification_maturity: "XiangShan has XS-GEM5 (>95% RTL-correlated) + DiffTest upstream; E1 integration pending."

  e1_ultra:
    label: "E1 e1-ultra (big core, x1)"
    role: big
    is_e1: true
    vendor: Tenstorrent (adopted by E1)
    open_source: false
    open_source_note: "Ascalon RTL is IP-licensed, not open. E1 selects it but the slot is BLOCKED on license + procurement."
    identical_to: tenstorrent_ascalon
    isa: RVA23 + V + Zfh + Zvfh + Zvbb + Zvkt + Zicbom + Zicboz + Zicond + Sv57
    microarch:
      pipeline_stages: null
      ordering: out-of-order
      decode_width: 8
      issue_width: 8
      rob_entries: 480
    branch_predictor: "E1 BPU: TAGE-SC-L + ITTAGE + FTB(2048) + RAS + SC + loop"
    cache:
      l1i: 64 KiB
      l1d: 64 KiB
      l2: 1 MiB private
    frequency:
      target_ghz: {value: 4.3, claim: target, claim_level: L2_ARCH_SIM}
    metrics:
      coremark_per_mhz: {value: 10.0, claim: target, claim_level: L2_ARCH_SIM}
      specint2006_per_ghz: {value: 22.0, claim: published, source: "Tenstorrent Ascalon (>22 SPECint2006/GHz)"}
    silicon_status: {value: 0, claim: blocked, blocker: "Tenstorrent Ascalon-D8 license + procurement; generators/chipyard/eliza-ascalon-manifest.json"}
    verification_maturity: "N/A until licensed."

  cva6:
    label: "CVA6 / Ariane (OpenHW)"
    role: reference_in_order
    is_e1: false
    vendor: OpenHW Group / PULP
    open_source: true
    note: >-
      The realistic, best-tooled, silicon-proven open in-order RISC-V core, and
      the user-named benchmark target ("Ariane"). It is ALSO E1's little core.
    isa: RV64GC
    microarch:
      pipeline_stages: 6
      ordering: in-order
      decode_width: 1
      issue_width: 1
      rob_entries: 0
    branch_predictor: "BHT(128 x 2-bit) + BTB(32, indirect only) + RAS(2)"
    cache:
      l1i: 16-32 KiB
      l1d: 16-32 KiB
      l2: configurable
    frequency:
      achieved_ghz: {value: 1.7, claim: published, source: "arXiv:1904.05442 (GF22FDX silicon)"}
    metrics:
      coremark_per_mhz: {value: 2.83, claim: published, source: "OpenHW CVA6 user manual"}
      dmips_per_mhz: {value: 1.65, claim: published, source: "arXiv:1904.05442"}
      mpki_geomean: {value: 18.63896, claim: measured, evidence: docs/evidence/cpu_ap/bpu-vs-cva6-mpki.json}
    silicon_status: "Silicon-proven; boots Linux on FPGA today."
    verification_maturity: "Industry-grade: core-v-verif, riscv-dv, Spike step-and-compare, RVFI, formal."

  cva6s_plus:
    label: "CVA6S+ (superscalar CVA6, 2025)"
    role: reference_in_order_superscalar
    is_e1: false
    vendor: OpenHW / ETH Zurich
    open_source: true
    isa: RV64GC
    microarch:
      pipeline_stages: 6
      ordering: in-order
      decode_width: 2
      issue_width: 2
      rob_entries: 0
    branch_predictor: "BHT + BTB + RAS (CVA6-class)"
    metrics:
      coremark_per_mhz: {value: 3.69, claim: published, source: "arXiv:2505.03762 (+30.2% over CVA6)"}
      ipc_uplift_vs_cva6_pct: {value: 43.5, claim: published, source: "arXiv:2505.03762"}
    area_note: "Only ~6-9% area over CVA6; leads area-efficiency (GOPS/mm^2) among the open cores."
    silicon_status: "GF22 FDX, ~0.96-1.1 GHz."
    verification_maturity: "Inherits CVA6 core-v-verif."

  rocket:
    label: "Rocket (Chipyard)"
    role: reference_in_order
    is_e1: false
    vendor: UC Berkeley / Chipyard
    open_source: true
    isa: RV64GC
    microarch:
      pipeline_stages: 5
      ordering: in-order
      decode_width: 1
      issue_width: 1
      rob_entries: 0
    branch_predictor: "BTB + BHT + RAS (configurable)"
    metrics:
      coremark_per_mhz: {value: 2.94, claim: published, source: "Comparative survey CF'21"}
      dmips_per_mhz: {value: 1.71, claim: published, source: "Comparative survey CF'21"}
      ipc: {value: 0.33, claim: published, source: "Comparative survey CF'21", workload: "survey aggregate"}
    silicon_status: "Many tapeouts; the baseline scalar reference."
    verification_maturity: "Chipyard CI; riscv-tests."

  sonicboom:
    label: "SonicBOOM (BOOMv3)"
    role: reference_ooo
    is_e1: false
    vendor: UC Berkeley
    open_source: true
    isa: RV64GC
    microarch:
      ordering: out-of-order
      decode_width: 4
      issue_width: 4
      rob_entries: 128
    branch_predictor: "TAGE-L"
    metrics:
      coremark_per_mhz: {value: 6.2, claim: published, source: "SonicBOOM CARRV 2020"}
    silicon_status: "ASIC-proven; de-facto open OoO reference (Tenstorrent Ocelot derives from it)."
    verification_maturity: "Chipyard + RISCV-DV; riscv-tests."

  xuantie_c910:
    label: "XuanTie C910 (T-Head, open)"
    role: reference_ooo
    is_e1: false
    vendor: T-Head / Alibaba
    open_source: true
    isa: RV64GC
    microarch:
      ordering: out-of-order
      decode_width: 3
      issue_width: 3
    branch_predictor: "Vendor OoO predictor"
    metrics:
      coremark_per_mhz: {value: 7.1, claim: published, source: "Comparative survey; T-Head"}
      specint2006_per_ghz: {value: 6.11, claim: published, source: "Cheshire 22nm study"}
    silicon_status: "Shipping silicon (~2.5 GHz, 12nm)."
    verification_maturity: "Open RTL; vendor verification."

  xiangshan_kunminghu:
    label: "XiangShan Kunminghu (ICT) - best open core"
    role: reference_ooo_ceiling
    is_e1: false
    vendor: ICT CAS / Beijing Institute of Open Source Chip
    open_source: true
    note: "The highest-performance fully open-source RISC-V core in existence."
    isa: RV64GCBSUHV
    microarch:
      pipeline_stages: 13
      ordering: out-of-order
      decode_width: 6
      issue_width: 6
      rob_entries: 256
    branch_predictor: "TAGE-SC-L + ITTAGE + FTB + RAS + loop (the family E1's BPU is derived from)"
    cache:
      l2: "<=1 MiB private"
      l3: "16 MiB shared"
    frequency:
      target_ghz: {value: 2.0, claim: published, source: "Hot Chips 2024 (14nm-class)"}
    metrics:
      specint2006_per_ghz: {value: 15.0, claim: published, source: "RISC-V Summit Europe 2025 (KMHv2 >15/GHz; KMHv3 target ~20)"}
    silicon_status: "Taped out (gen1 Yanqihu 28nm 1.3 GHz); KMH RTL with XS-GEM5 >95% correlated."
    verification_maturity: "XS-GEM5, DiffTest, large continuous-integration regression."

# ---------------------------------------------------------------------------
# Per-axis comparison and the explicit E1-vs-Ariane verdict.
# verdict in {win, parity, loss, unproven}:
#   win      - E1 is better, with evidence or sound architecture.
#   parity   - E1 equals Ariane (often because E1 adopts the CVA6 core).
#   loss     - Ariane is currently better.
#   unproven - E1 should be better but has no evidence yet (no silicon/integration).
# ---------------------------------------------------------------------------
comparison_axes:
  - id: branch_prediction
    title: "Branch prediction accuracy (MPKI)"
    runnable_today: true
  - id: scalar_integer_throughput
    title: "Scalar integer throughput (CoreMark/MHz, DMIPS/MHz)"
    runnable_today: partial
  - id: peak_single_thread
    title: "Peak single-thread performance (SPECint2006/GHz, OoO width)"
    runnable_today: false
  - id: silicon_proven_frequency
    title: "Silicon-proven frequency"
    runnable_today: false
  - id: verification_maturity
    title: "Verification maturity"
    runnable_today: false
  - id: linux_boot_readiness
    title: "Linux-boot readiness"
    runnable_today: false
  - id: area_energy_efficiency
    title: "Area / energy efficiency of the in-order design point"
    runnable_today: false
  - id: vector_ai
    title: "Vector / AI extensions"
    runnable_today: false

e1_vs_ariane_verdict:
  branch_prediction:
    verdict: win
    evidence: docs/evidence/cpu_ap/bpu-vs-cva6-mpki.json
    reason: >-
      Measured (L2 behavioural model, both predictors on identical 20-trace set):
      E1 BPU geomean MPKI 3.55 vs CVA6-baseline 18.64 -> 5.24x fewer mispredicts
      (pooled 1.58 vs 6.02 -> 3.80x). E1 adds TAGE-SC-L + ITTAGE + FTB + loop +
      SC; CVA6 has only BHT(128)+BTB(32)+RAS(2).
  scalar_integer_throughput:
    verdict: parity
    reason: >-
      E1's little core IS CVA6, so e1-pro CoreMark/MHz == CVA6 (2.83) by
      construction. CoreMark CRC-validated functionally (406,457 insns/iter,
      cva6-coremark-qemu.json); cycle-accurate CoreMark/MHz is blocked pending
      the CVA6 Verilator build. E1 only exceeds this with the OoO mid/big cores.
  peak_single_thread:
    verdict: unproven
    reason: >-
      E1's mid/big cores (Kunminghu 6-wide, Ascalon 8-wide) target 15-22
      SPECint2006/GHz vs CVA6's in-order ~1 IPC, so architecturally E1 wins big -
      but neither is generated/integrated/taped out, so this is unproven, not won.
  silicon_proven_frequency:
    verdict: loss
    reason: >-
      CVA6 is silicon-proven at 1.7 GHz (GF22FDX). E1 has zero silicon. Ariane
      wins this axis outright until E1 tapes out.
  verification_maturity:
    verdict: loss
    reason: >-
      CVA6 has core-v-verif, riscv-dv, Spike step-and-compare, RVFI, and formal.
      E1's verify/ tree is cocotb unit tests + BMC depth 8-24 and the CVA6
      wrapper's RVFI is not wired. Ariane wins; see ariane-cva6-gap-analysis.md.
  linux_boot_readiness:
    verdict: loss
    reason: >-
      CVA6 boots Linux on FPGA today. E1's cluster RTL is a lite-tieoff wrapper;
      no full-SoC Linux boot yet. Ariane wins until E1 closes bring-up.
  area_energy_efficiency:
    verdict: loss
    reason: >-
      CVA6S+ leads area-efficiency (GOPS/mm^2) among open cores at the in-order
      point. E1's headline cores are large OoO designs; per-core efficiency is
      worse and unmeasured. The little core matches CVA6 only because it is CVA6.
  vector_ai:
    verdict: unproven
    reason: >-
      E1 mid/big cores target RVV 1.0 + crypto/bf16; CVA6 base has no vector.
      Architecturally E1 wins, but the vector datapath is not integrated/measured.
