schema: eliza.npu_2028_target.v1
as_of: 2026-05-17
target_year: 2028
target_class: performance_heavy_android_phone_ap
positioning: >
  Best-in-class mobile NPU target for a large-battery Android phone AP.
  These are architectural targets and validation gates, not completion claims.
  Peak TOPS alone is not accepted as evidence; measured workload latency,
  sustained power, fallback percentage, bandwidth, and operator coverage are
  required for every performance claim.

source_anchors:
  - vendor: Qualcomm
    product: Snapdragon 8 Elite Gen 5
    source_url: https://www.qualcomm.com/smartphones/products/8-series/snapdragon-8-elite-gen-5
    observed_claims:
      - 37% faster Hexagon NPU performance
      - 16% better NPU performance per watt
      - INT2 and FP8 precision support
      - fused AI accelerator architecture with scalar, tensor, and vector paths
  - vendor: MediaTek
    product: Dimensity 9500
    source_url: https://www.mediatek.com/products/smartphones/mediatek-dimensity-9500
    observed_claims:
      - MediaTek NPU 990
      - up to 56% reduced peak power use
      - over 2x faster token generation
      - CIM-based Super Efficient NPU
  - vendor: Samsung
    product: Exynos 2600
    source_url: https://semiconductor.samsung.com/processor/mobile-processor/exynos-2600/
    observed_claims:
      - 113% higher generative-AI performance than predecessor
      - lower power consumption and latency
      - larger on-device model execution
      - ExecuTorch deployment support
  - vendor: Qualcomm
    product: Snapdragon X2 Elite family
    source_url: https://www.qualcomm.com/laptops/products/snapdragon-x-elite
    observed_claims:
      - 80 TOPS laptop-class NPU
      - up to 152 GB/s LPDDR5x memory bandwidth
  - vendor: Apple
    product: A19 Pro
    source_url: https://support.apple.com/en-us/125090
    observed_claims:
      - 16-core Neural Engine
      - GPU Neural Accelerators alongside the neural engine

extrapolation_model:
  method: pseudo_moore_with_mobile_thermal_cap
  assumptions:
    - SOTA mobile NPU progress is now driven by lower precision, memory locality,
      compiler coverage, and sustained thermals more than raw process scaling.
    - A performance-heavy phone can spend more area and burst power than a thin
      flagship, but it still needs phone-safe sustained skin temperature.
    - 2028 should target roughly 1.8x to 2.5x the 2026 flagship mobile AI
      workload capability, and should be able to approach 2026 laptop-class
      NPU peak numbers inside a phone burst envelope.
    - Marketing TOPS must be discounted unless the benchmark reports precision,
      sparsity, clocks, thermal state, power, memory bandwidth, and CPU fallback.

numeric_targets:
  dense_int8_peak_tops_min: 160
  dense_int8_sustained_tops_min: 80
  sparse_int4_peak_tops_min: 512
  sparse_int4_sustained_tops_min: 200
  int2_bitnet_peak_tops_min: 900
  fp8_peak_tflops_min: 80
  sustained_perf_per_w_int8_tops_min: 18
  burst_npu_power_w_max: 8
  sustained_npu_power_w_max: 4.5
  local_sram_mib_min: 64
  local_sram_bandwidth_tbps_min: 20
  shared_system_cache_mib_min: 32
  external_memory_bandwidth_gbps_min: 180
  command_queue_depth_min: 1024
  concurrent_contexts_min: 8
  cpu_fallback_percent_max: 1
  unsupported_operator_percent_max: 1

precision_requirements:
  required:
    - int8
    - int4
    - int2
    - fp8
    - bf16
    - fp16
    - int32_accumulate
  optional:
    - fp32_accumulate
    - mixed_1_58_bit

microarchitecture_targets:
  topology: tiled_matrix_vector_npu
  tiles:
    count_range: [8, 16]
    int8_mac_units_per_tile_min: 4096
    local_sram_mib_per_tile_min: 4
  engines:
    - systolic_matrix
    - vector_activation
    - scalar_control
    - dma_copy
    - layout_transform
    - sparsity_decode
  dataflow:
    - weight_stationary
    - output_stationary
    - streaming_attention_decode
    - im2col_free_convolution
  memory_system:
    - multi_bank_local_sram
    - compression_aware_dma
    - iommu_isolated_command_buffers
    - cache_coherent_cpu_submission
    - QoS_for_camera_display_audio_modem
  reliability:
    - ecc_or_parity_on_sram
    - command_timeout
    - per_context_fault_isolation
    - thermal_throttle_counters
    - performance_counter_virtualization

software_targets:
  android:
    - NNAPI_or_successor_runtime_delegate
    - AIDL_HAL
    - VTS_tests
    - CTS_no_regression
    - SELinux_fail_closed_policy
  compiler:
    - MLIR_pipeline
    - StableHLO_import
    - TFLite_delegate
    - ExecuTorch_or_PyTorch_export_path
    - IREE_or_TVM_backend
  evidence:
    - MLPerf_Mobile_or_equivalent_closed_loop
    - tflite_benchmark_model_with_accelerator_name
    - unsupported_operator_report
    - CPU_fallback_report
    - power_trace
    - thermal_trace

workload_targets:
  llm_3b_int4_tokens_per_second_sustained_min: 100
  llm_7b_int4_tokens_per_second_sustained_min: 30
  multimodal_encoder_latency_ms_max: 30
  image_generation_1024_latency_s_max: 5
  camera_ai_4k30_concurrent: true
  always_on_micro_npu_power_mw_max: 20

current_repo_classification:
  level: L0_RTL_UNIT
  current_block: rtl/npu/e1_npu.sv
  implemented_now:
    - scalar_integer_ops
    - DOT4_S8
    - DOT8_S4
    - bounded_MMIO_scratchpad_GEMM_S8
    - completion_irq
    - basic_performance_counters
  explicit_gaps:
    - no_tensor_command_queue
    - no_DMA_fed_scratchpad
    - no_large_local_SRAM
    - no_systolic_array
    - no_sparse_INT4_GEMM
    - no_INT2_or_FP8_execution
    - no_compiler_backend
    - no_NNAPI_delegate
    - no_power_or_area_model
    - no_sustained_benchmark_evidence

next_implementation_steps:
  - Add packed low-precision primitive coverage in RTL and cocotb.
  - Replace scalar GEMM prototype with a parameterized INT8/INT4 tile model.
  - Add descriptor-ring command ABI and DMA-fed scratchpad staging.
  - Add cycle-accurate performance model for tile count, SRAM, and DRAM bandwidth.
  - Add compiler/runtime smoke path that maps one TFLite/StableHLO matmul to the NPU ABI.
