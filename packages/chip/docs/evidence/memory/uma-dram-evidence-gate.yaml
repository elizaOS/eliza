claim_rules:
  - The scaffold may be described only as SRAM-backed DMA containment evidence.
  - Reset ROM and boot SRAM work may be described only as scaffold planning until OpenSBI handoff and DRAM discovery transcripts exist.
  - AXI-Lite checks must not be described as AXI4, TileLink, coherent fabric, or production interconnect evidence.
  - Non-coherent DMA is blocked unless a Linux-visible cacheability and cache-maintenance ABI is documented and tested.
  - Android, AI-throughput, display-smoothness, memory-bandwidth, and tapeout claims require all blocked_real_claims to be unblocked by executable evidence.
  - Passing this gate must not be interpreted as real DRAM, UMA coherency, IOMMU/SMMU, or QoS evidence.
  - Any future checker that promotes this file beyond scaffold_only_real_claims_blocked must require executable RTL, software, and measurement artifacts for every blocked_real_claims entry.
  - Host benchmark results may exercise parsers, but cannot satisfy phone_2028_target_profile.
  - A cache-maintenance ABI is a correctness requirement, not a substitute for coherent hardware unless the Android shared-buffer tests prove the required synchronization contract.
  - Linux/Android readiness also requires CLINT/PLIC access map dependencies and page fault reporting evidence; the current interrupt scaffold is not sufficient.

next_commands:
  local_static_gate: make memory-uma-claim-gate
  memory_evidence_template_check: python3 scripts/check_memory_evidence_templates.py
  rtl_elaboration: make rtl-check
  local_contract_sim: make cocotb-contract
  benchmark_parser_dry_run: make benchmarks-dry-run
  inspect_generated_ap_memory_map: make chipyard-generated-linux-contract-check
  capture_payload_preflight: make chipyard-linux-payload-check
  future_lpddr_evidence_placeholder: make memory-uma-claim-gate

sku_split_decision:
  status: SKU_SPLIT_REQUIRED
  reconciles:
    optimized_point: docs/architecture-optimization/soc-optimized-operating-point.yaml
    sub_report: docs/architecture-optimization/sota-2028/memory-subsystem.md
    phy_procurement: docs/spec-db/lpddr-phy-procurement-shortlist.yaml
    phy_evidence_gate: docs/evidence/memory/lpddr-phy-procurement.yaml
  reason: >
    The 240 GB/s sustained number in
    docs/architecture-optimization/soc-optimized-operating-point.yaml
    cannot be delivered by any 64-bit LPDDR5X-10667 SKU (max 85.3 GB/s
    peak). The closest tracked phone AI SKU is LPDDR6-14400 on a 96-bit
    bus at 172.8 GB/s peak, which still misses the
    phone_2028_target_profile 180 GB/s peak gate while satisfying the
    120 GB/s sustained gate target. The repository keeps both SKUs and
    the stricter target profile in parallel rather than silently lowering
    or raising either number.
  baseline_sku:
    standard: LPDDR5X-10667
    bus_width_bits: 64
    channels: 4
    bits_per_channel: 16
    peak_bandwidth_gbps: 85.3
    sustained_target_gbps_min: 70
    capacity_gib_skus: [12, 16]
    note: >
      Matches Snapdragon 8 Elite Gen 5 (~84.8 GB/s peak) and Dimensity
      9500 (~85.3 GB/s peak). Does NOT satisfy the
      phone_2028_target_profile's 180 GB/s peak / 120 GB/s sustained
      requirement; baseline SKUs are below those thresholds by design.
  ai_sku:
    standard: LPDDR6-14400
    bus_width_bits: 96
    channels: 4
    bits_per_channel: 24
    peak_bandwidth_gbps: 172.8
    sustained_target_gbps_min: 140
    capacity_gib_skus: [24]
    note: >
      This is the closest tracked SKU for the existing
      phone_2028_target_profile thresholds. It satisfies the 120 GB/s
      sustained target but does not satisfy the 180 GB/s peak gate
      without a wider bus, faster data rate, or a revised target profile.
      The optimizer's 240 GB/s figure remains as a guardband headroom
      number, not as a per-SKU sustained gate.
  closed_ip_blocker:
    description: >
      LPDDR5X-10667 and LPDDR6-14400 PHYs are closed third-party IP.
      Vendor shortlist and procurement decision are tracked in
      docs/spec-db/lpddr-phy-procurement-shortlist.yaml and the
      fail-closed gate in
      docs/evidence/memory/lpddr-phy-procurement.yaml. No phone-class
      bandwidth claim may be promoted while that gate is BLOCKED.
  policy_implications:
    - The phone_2028_target_profile thresholds remain stricter than the current tracked AI SKU peak bandwidth.
    - The baseline SKU has its own bandwidth expectations (~70 GB/s sustained) and shares the same RTL but a different LPDDR PHY data rate and bus width.
    - Reports filed against this gate must declare which SKU they pertain to.
    - The 240 GB/s optimizer guardband is not a per-SKU sustained gate and must not be quoted as one.
