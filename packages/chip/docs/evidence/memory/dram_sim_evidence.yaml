jedec_sanity_check:
  description: >
    Simulated sustained bandwidth must stay strictly below the JEDEC
    peak for each SKU. Simulated sustained / peak utilisation is
    documented for context; high utilisation would indicate an
    unrealistic model.
  results:
    - sku: lpddr5x_10667
      peak_gbps: 85.336
      best_sustained_gbps: 22.41
      best_sustained_workload: microbench
      sustained_over_peak_ratio: 0.263
      passes_sanity: true
    - sku: lpddr6_14400
      peak_gbps: 172.8
      best_sustained_gbps: 27.65
      best_sustained_workload: pointer_chase
      sustained_over_peak_ratio: 0.160
      passes_sanity: true

claim_rules:
  - All DRAMSim3 results are simulator_only and never satisfy
    docs/evidence/memory/uma-dram-evidence-gate.yaml
    phone_2028_target_profile thresholds.
  - DRAMSim3 reports are controller-side timing approximations only;
    the LPDDR5X/LPDDR6 PHY itself remains BLOCKED on closed-IP
    procurement per docs/evidence/memory/lpddr-phy-procurement.yaml.
  - Sustained bandwidth in this evidence reflects DRAMSim3's
    TraceBasedCPU + controller queue depth and is materially below
    JEDEC peak. Real silicon evidence is required to claim any
    higher utilisation.
  - These numbers must not be quoted as phone-class measurements,
    real-target sustained bandwidth, or post-silicon timing.

