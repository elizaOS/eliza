context: >
  The DRAMSim3 wrapper drives the academic DRAMSim3 controller model
  with the LPDDR5X-10667 and LPDDR6-14400 SKU geometries and reports
  controller-side bandwidth and latency. DRAMSim3 ships LPDDR4 as its
  highest LPDDR protocol class, so the SKU .ini files are
  LPDDR4-protocol approximations: bus width, channel count, and tCK
  match the SKU data rate, but LPDDR5/6 features (bank-group reorg,
  link/on-die ECC, sub-channels, WCK split) are not modeled.

  This evidence is behavioural-simulator-only. It exercises the
  controller-side timing of a single representative trace generator
  and never satisfies the phone-class bandwidth gate in
  docs/evidence/memory/uma-dram-evidence-gate.yaml. The LPDDR PHY
  itself remains closed-IP BLOCKED per
  docs/evidence/memory/lpddr-phy-procurement.yaml.

simulator_limitations:
  - DRAMSim3 protocol class is LPDDR4 with scaled tCK; LPDDR5X/6
    bank-group reorg, link ECC, on-die ECC, sub-channel splitting,
    and refresh-management commands are not modeled.
  - TraceBasedCPU is single-threaded; the maximum issue rate is one
    transaction per command cycle across all channels, so simulated
    sustained bandwidth tracks DRAMSim3's queue depth (cmd_queue_size,
    trans_queue_size) rather than the PHY's peak. The built-in
    `-s stream` StreamCPU mode produces similar utilisation in this
    configuration.
  - Modeled aperture is 16 GiB for both SKUs (4 channels x 4096 MiB
    per DRAMSim3 LPDDR4 capacity math). The LPDDR6 AI SKU's 24 GiB
    density is documented in lpddr6_14400.ini but cannot be modeled
    without changing protocol geometry.
  - LPDDR6 .ini widens the system bus from 24 to 32 bits to satisfy
    DRAMSim3's LPDDR4 lane legality check; per-pin data rate is
    preserved via tCK.
  - All numbers are controller-side; no PHY training, vref, ZQ, or
    duty-cycle adjustment is in the loop. The DRAM-controller stub
    in rtl/memory/dram_ctrl/e1_dram_ctrl.sv is verified separately
    via docs/evidence/memory/dram_ctrl_evidence.yaml.

build_provenance:
  upstream_url: https://github.com/umd-memsys/DRAMsim3
  upstream_commit: 29817593b3389f1337235d63cac515024ab8fd6e
  clone_command: git clone --depth 1 https://github.com/umd-memsys/DRAMsim3.git external/dramsim3
  build_command: cmake -S external/dramsim3 -B external/dramsim3/build -DCMAKE_BUILD_TYPE=Release && cmake --build external/dramsim3/build --target dramsim3main -j
  built_binary: external/dramsim3/build/dramsim3main
  build_dependencies:
    - cmake (>=3.0)
    - g++ (C++17)
    - jsoncpp headers (vendored under external/dramsim3/ext)

sweep:
  cycle_budget: 500000
  workloads:
    - microbench
    - stream_copy
    - stream_scale
    - stream_add
    - stream_triad
    - pointer_chase
  trace_generator: compiler/runtime/dramsim_wrap/trace_gen.py
  trace_record_format: "<hex_addr> <READ|WRITE> <cycle>"
  access_granularity_bytes: 64
  stream_elements_per_kernel: 200000
  pointer_chase_transactions: 60000
  bytes_per_dramsim3_access: 32

