schema: eliza.cpu_ap_linux_boot_evidence_gate.v1
status: blocked_on_verilator_wall_clock_to_userspace
claim_boundary: >
  Linux boot evidence gate for the e1 CPU AP. The current local DUT cannot
  satisfy this gate; the gate ingests a transcript captured by
  scripts/run_linux_smoke.sh against the Chipyard-generated Rocket
  Verilator binary (or, when later DUTs exist, against the Kunminghu
  big/mid wrappers).
target_dut_path: generators/chipyard/eliza-rocket-manifest.json
target_dut_fallback: |
  When the big-core or mid-core wrappers exist, the same gate validates
  their transcripts. The marker set is uarch-independent.
transcript_path: build/evidence/cpu_ap/eliza_e1_linux_boot.log
evidence_summary_path: docs/evidence/cpu_ap/linux-boot.json
required_markers:
  - "OpenSBI v"
  - "Booting Linux on physical CPU"
  - "Linux version"
  - "Run /init"
  - "Welcome to"
  - "console-uart"
gate_command: make linux-boot-check
gate_command_strict: python3 scripts/check_linux_boot.py --require
harness_command: scripts/run_linux_smoke.sh
prerequisites:
  - scripts/bootstrap_chipyard.sh
  - scripts/run_chipyard_eliza_verilator.sh
  - E1_LINUX_PAYLOAD env var pointing at fw_payload.elf (OpenSBI + Linux + initramfs)
fail_closed_until:
  - build/chipyard/eliza_rocket/simulator exists
  - scripts/run_linux_smoke.sh produced a transcript
  - All required_markers above appear in the transcript

# ---------------------------------------------------------------------
# Round-3 state of the build chain (2026-05-19).
#
# Each prerequisite below records whether the dependency is satisfied
# locally. The whole gate stays BLOCKED until the Verilator simulator
# runs long enough on a real host (multi-hour Linux boot) to emit every
# required marker into the canonical transcript. The local dev host has
# the simulator + payload + verilator in place; the missing piece is
# only the simulator wall-clock budget needed to reach userspace.
# ---------------------------------------------------------------------
round3_dependency_status:
  chipyard_checkout:
    status: present
    path: external/chipyard/generators/rocket-chip
    chipyard_commit: 69eba860a352343e4ac6b6df0f3638a79a86ec78
  chipyard_generator_manifest:
    status: pass
    command: make chipyard-generator-check
  verilator_binary:
    status: present
    path: external/oss-cad-suite/bin/verilator
    version: "5.049-devel"
    next_command_to_make_discoverable: 'export PATH=$PWD/external/oss-cad-suite/bin:$PATH'
  generated_verilator_simulator:
    status: present
    path: build/chipyard/eliza_rocket/simulator/simulator-chipyard.harness-ElizaRocketConfig
    fallback_path: external/chipyard/sims/verilator/simulator-chipyard.harness-ElizaRocketConfig
  opensbi_payload:
    status: present
    payload_path: external/chipyard/software/firemarshal/images/firechip/br-base/br-base-bin
    payload_sha256: 1b3457fa364c407e2443bd8e8fbe85944d91acbcce31c9f6f8b5a2a70f61cf13
    payload_kind: opensbi_v1_2_linux_6_6_0_initramfs
    linux_version: "6.6.0-00004-g67bc4513761f"
    opensbi_version: "v1.2"
  opensbi_external_clone:
    status: present
    path: external/opensbi/opensbi
    tag: v1.5
    commit: 455de672dd7c2aa1992df54dfb08dc11abbc1b1a
    note: |
      Standalone v1.5 clone is present per pin manifest. The br-base
      firemarshal payload still bundles OpenSBI v1.2 because that is
      what the chipyard firemarshal workflow generates today. Upgrading
      the firemarshal payload to OpenSBI v1.5 is an independent step
      tracked on docs/spec-db/opensbi-version-uplift.yaml (TBD).
  dramsim2_ini:
    status: present
    path: external/chipyard/generators/testchipip/src/main/resources/dramsim2_ini
  cva6_rtl_for_cocotb_positive_path:
    status: blocked
    reason: chipyard cva6 wrapper present but recursive submodule (CVA6 RTL) not fetched
    next_command: git -C external/chipyard submodule update --init --recursive generators/cva6
    cocotb_env_switches:
      - E1_REQUIRE_REAL_CSR_DUT
      - E1_REQUIRE_REAL_MMU_DUT
  verilator_full_boot_transcript:
    status: blocked
    blocking_dependency: verilator simulator wall-clock budget under host contention
    reason: |
      Empirical throughput on this host is ~38 us simulated / s wall, i.e.
      ~19K cycles/s under heavy sister-agent CPU load (24-core machine,
      observed 1-min load average >35). A Rocket Verilator full boot of
      OpenSBI v1.2 + Linux 6.6 to "Run /init" needs ~300-500 ms simulated
      time, which on this contended host is ~2-4 hours of wall time. A
      bounded run earlier this round captured the OpenSBI v1.2 banner +
      "Linux ver" line in build/evidence/cpu_ap/eliza_e1_opensbi_boot.log
      at 200M cycles, but did not reach a Linux command-line prompt
      because the earlier br-base/linux-poweroff-quiet kernel was built
      with `mem=64M` which panics in `memory_present()` against the
      generated DT memory map at 0x80000000 + 0x10000000 (256 MiB).
      The kernel/payload has since been rebuilt with `mem=192M` which is
      consistent with the DT; the next full-wall-time smoke needs to
      capture a transcript with all required_markers above.
    payload_at_rebuild:
      br_base_bin: external/chipyard/software/firemarshal/images/firechip/br-base/br-base-bin
      linux_poweroff_quiet_bin_nodisk: external/chipyard/software/firemarshal/images/firechip/linux-poweroff-quiet/linux-poweroff-quiet-bin-nodisk
      linux_cmdline_post_rebuild: "console=ttyS0 console=ttySIF0,3686400 earlycon quiet loglevel=4 mem=192M"
    next_command: |
      E1_LINUX_TIMEOUT_S=14400 E1_LINUX_MAX_CYCLES=2000000000 \
        E1_LINUX_PAYLOAD=external/chipyard/software/firemarshal/images/firechip/br-base/br-base-bin \
        scripts/run_linux_smoke.sh
    suggested_offload: |
      Run scripts/run_linux_smoke.sh on a dedicated host (Nebius H200
      runbook or any Linux x86_64 build host) for >= 2 hours of wall
      time with the host CPU otherwise idle, and stage the resulting
      transcript into build/evidence/cpu_ap/eliza_e1_linux_boot.log,
      then run `make linux-boot-check-strict`. FireSim FPGA acceleration
      (sims/firesim) is the realistic acceleration path to bring full
      boot under 1 minute; submodule is already initialized.
