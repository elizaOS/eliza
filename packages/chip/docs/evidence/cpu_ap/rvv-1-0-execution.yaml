schema: eliza.cpu_ap_rvv_1_0_execution_gate.v1
status: partial_real_elementwise_alu_subset_plus_functional_iss_evidence
claim_boundary: >
  RVV 1.0 execution gate. CSR file (rtl/cpu/rvv/rvv_csr.sv), a real
  element-wise integer/logic ALU subset (rtl/cpu/rvv/rvv_alu_subset.sv,
  cocotb-verified against a reference model), and the dispatch-boundary
  stub for unsupported ops (rtl/cpu/rvv/rvv_unit_stub.sv) are in place.
  Full vector load/store, gather/scatter, reductions, narrowing, widening,
  fixed-point, floating-point, masking, and permutation are NOT yet in
  RTL. ISA-level functional evidence (RVV 1.0 executes end to end with a
  measured scalar-vs-vector dynamic instruction reduction) is recorded in
  e1-rvv-vector.json at claim_level "functional"; this is NOT a cycle-
  accurate or silicon perf claim. No RTL vector perf or full-conformance
  claim is allowed until a complete vector backend (forked from Saturn,
  Ara, Vicuna, or XiangShan, or a from-scratch extension of the subset
  ALU) lands and passes the riscv-arch-test RVV 1.0 subset.
present:
  - rtl/cpu/rvv/rvv_csr.sv         # vstart/vxsat/vxrm/vcsr/vl/vtype/vlenb
  - rtl/cpu/rvv/rvv_alu_subset.sv  # REAL element-wise int/logic ALU subset
  - rtl/cpu/rvv/rvv_unit_stub.sv   # dispatch boundary for unsupported ops
  - verify/cocotb/cpu/test_rvv_alu_subset.py  # reference-model check, 4 tests
  - docs/evidence/cpu_ap/e1-rvv-vector.json   # functional ISS evidence
  - docs/arch/rvv-integration-plan.md         # roadmap to full RTL backend
real_rtl_subset_implemented:
  - vadd.vv vsub.vv vand.vv vor.vv vxor.vv
  - vsll.vv vsrl.vv vsra.vv
  - vminu.vv vmin.vv vmaxu.vv vmax.vv
  - vmul.vv (OPMVV) and the .vx scalar-operand forms
  - vmv.v.v / vmv.v.x
  - element widths E8/E16/E32/E64, vl, vstart prefix, vta tail policy, vill
functional_iss_evidence:
  substrate: qemu-user rva23u64 (RVV 1.0), vlen=256
  metric: dynamic instruction count, scalar rv64gc vs vector rv64gcv
  claim_level: functional
  reproduce: scripts/run_e1_rvv_vector.sh
missing:
  - vector load/store interaction with LSU/cache (RTL)
  - reductions, permutations, slides, gather/scatter (RTL)
  - narrowing / widening / fixed-point saturation (RTL)
  - floating-point vector ops (RTL)
  - mask-producing compares and masked (vm=0) execution (RTL)
  - Zvbb / Zvfh / Zvkt extension subroutines
  - exception precise reporting
  - riscv-arch-test RVV 1.0 conformance pass on RTL
candidate_upstreams:
  - name: Saturn
    repo: https://github.com/ucb-bar/saturn-vectors
    license: BSD-3-Clause
  - name: Ara
    repo: https://github.com/pulp-platform/ara
    license: Solderpad-Hardware-License-2.1
  - name: Vicuna
    repo: https://github.com/vproc/vicuna
    license: ISC
  - name: XiangShan vector backend
    repo: https://github.com/OpenXiangShan/XiangShan (subset)
    license: Mulan-PSL-v2
fail_closed_until:
  - one candidate upstream forked under external/, OR
  - the rvv_alu_subset is extended (or a from-scratch backend in
    rtl/cpu/rvv/ added) to cover memory + reductions + masking and passes
    the riscv-arch-test RVV 1.0 subset and the riscv-dv vector smoke
