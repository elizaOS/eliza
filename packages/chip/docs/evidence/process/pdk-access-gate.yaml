schema: eliza.process_pdk_access_gate.v1
status: blocked_until_foundry_agreement
scope:
  - TSMC N2P (primary 2028 production target)
  - TSMC A14 (stretch 2028 production target)
  - Intel 14A (strategic 2nd source 2028)
  - Samsung SF2P (backup 2028)
claim_boundary:
  allowed:
    - Document the selected 2028 process shortlist.
    - Document procurement preconditions for each option.
    - Run open-PDK methodology lanes (Sky130 + GF180 + IHP SG13G2).
    - Produce ASAP7 predictive PPA shapes (projection_only).
  blocked:
    - Any advanced-node signoff artifact.
    - Any advanced-node PPA number marked as measured / signoff / release.
    - Any commercial-NDA library / Liberty / SRAM / PHY / GDS / LEF file.

