    status: blocked_until_foundry_agreement
    nre_usd_low: 250000000
    nre_usd_high: 400000000
    wafer_usd_low: 30000
    wafer_usd_high: 33000
    next_action_checklist:
      - id: tsmc_oip_conversation_open
        action: Open TSMC Open Innovation Platform conversation at N2P with Customer Success
        status: not_started
        owner: project_principal
        evidence_required: signed_nda_under_docs_evidence_process
      - id: tsmc_n2p_nda_executed
        action: Execute TSMC OIP NDA at N2P (covers PDK, libraries, methodology)
        status: not_started
        owner: project_principal
        evidence_required: signed_nda_document_under_docs_evidence_process
      - id: hard_ip_licenses_quoted
        action: Obtain LPDDR5X PHY + USB / MIPI / PLL / SRAM compiler license quotes
        status: not_started
        owner: project_principal
        evidence_required: vendor_quotes_under_docs_evidence_process
      - id: mpw_slot_query
        action: Query TSMC for MPW or risk-production slot availability inside 2027Q3-2028Q4
        status: not_started
        owner: project_principal
        evidence_required: foundry_allocation_response_email_under_docs_evidence_process
      - id: commercial_eda_seat_quote
        action: Obtain Cadence Innovus + Tempus + Voltus + Pegasus seat quotes
        status: not_started
        owner: project_principal
        evidence_required: vendor_quotes_under_docs_evidence_process
