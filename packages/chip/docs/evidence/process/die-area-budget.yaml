schema: eliza.process_die_area_budget.v1
status: envelope_target_subject_to_n2p_or_a14_density_scaling
scope:
  - Mobile-AP die-area envelope at TSMC N2P / A14 class density.
  - Per-block sub-budgets sized from die-shot calibration of 2025-2026 flagships.

claim_boundary:
  allowed:
    - Document the 100-130 mm² envelope target.
    - Document per-block sub-budgets and the source die-shots.
  blocked:
    - Claim the design has hit the envelope until post-route area is in.

envelope:
  total_die_area_mm2_min: 100
  total_die_area_mm2_max: 130
  reticle_limit_n2_a14_mm2: 858
  basis: flagship_mobile_AP_2025_2026_cohort

reference_cohort:
  - chip: Apple A19 Pro
    process: N3P
    die_area_mm2: 98.68
    source: TechPowerUp die-shot analysis
  - chip: Apple A19
    process: N3P
    die_area_mm2: 81.9
    source: TechPowerUp die-shot analysis
  - chip: Snapdragon 8 Elite Gen 5
    process: N3P
    die_area_mm2: 126.2
    source: Notebookcheck die-shot
  - chip: Dimensity 9500
    process: N3P
    die_area_mm2: unspec_die_shot
    source: AnandTech / chipsandcheese / Locuza

per_block_sub_budgets_at_n2_density:
  big_core_ultra_with_l2_mm2:
    low: 2.0
    high: 3.5
    basis: A19_Pro_P_core_2_97_mm2_at_N3P_scaled_by_n3_to_n2_density_1_45
  premium_mid_core_with_l2_mm2:
    low: 0.7
    high: 1.0
    basis: C1_Premium_class_scaled_to_N2
  pro_little_core_with_l2_mm2:
    low: 0.20
    high: 0.30
    basis: C1_Pro_class_scaled_to_N2
  l3_cluster_8_to_16_MB_mm2:
    low: 4
    high: 8
    basis: 38_1_Mb_per_mm2_HD_macro_at_N2
  slc_16_to_32_MB_mm2:
    low: 8
    high: 16
    basis: 38_1_Mb_per_mm2_HD_macro_at_N2
  npu_compute_logic_plus_8_MiB_local_mm2:
    low: 8
    high: 12
    basis: scaled_C1_NPU_class
  npu_local_sram_64_MiB_naive_flat_mm2_forbidden:
    value: 110
    rule: NPU memory hierarchy required; flat 64 MiB is infeasible inside envelope
  lpddr_phy_4x16bit_mm2:
    low: 6
    high: 10
    basis: PHY_does_not_scale_with_logic
  gpu_mm2:
    low: 6
    high: 10
    basis: Imagination_or_RISCV_SIMT
  modem_isp_codecs_aon_mm2:
    low: 6
    high: 12
    basis: aggregated_from_2025_flagship_die_shots

calibration:
  apple_a19_pro_p_core_n3p_mm2: 2.97
  apple_a19_pro_p_core_n2_projection_mm2: 2.04
  density_ratio_n3p_to_n2: 1.45
  calibration_source: benchmarks/pd/die-shot-calibration.yaml

forbidden_claims_until_signoff:
  - measured_die_area
  - signoff_die_area
  - tapeout_clean_die_area

next_commands:
  envelope_check: make die-area-budget-check
  calibration: cat benchmarks/pd/die-shot-calibration.yaml
