schema: eliza.process_ppa_projection.v1
status: projection_only_never_signoff
scope:
  - Map open-PDK PPA results to N2P / A14 envelope via published vendor scaling factors.
  - Map ASAP7 predictive shape to N2P / A14 envelope via published vendor scaling factors.

claim_boundary:
  allowed:
    - Project PPA shape from open-PDK or ASAP7 to N2P / A14 envelope.
    - Document projection assumptions, scaling factors, and source citations.
  blocked:
    - Cite projected PPA as signoff.
    - Cite projected PPA as measured silicon evidence.
    - Skip the foundry-PDK gate.

projection_pipeline:
  inputs:
    - open_pdk_run: pd/openlane/runs/RUN_2026-05-19_05-08-54/final/metrics.json
    - asap7_shape: docs/evidence/process/asap7/*.json   # produced by pd/asap7/Makefile
  generator: scripts/project_ppa_to_n2p.py
  output: docs/evidence/process/ppa-projection.json
  output_marker: projection_only_never_signoff

scaling_factors:
  density:
    sky130_to_n5: 32.0
    n5_to_n3e: 1.6
    n3e_to_n2: 1.45
    n2_to_n2p: 1.0
    n2_to_a14: 1.2
    a14_to_a14p_density: 1.05
    intel_18a_to_intel_14a_density: 1.15
    samsung_sf2_to_sf2p_density: 1.05
    # Cross-node bridges from the Intel and Samsung roadmaps. Used by the
    # projection script to target Intel 14A and Samsung SF2P without going
    # through the TSMC family.
    n3e_to_intel_14a: 1.45     # rough parity assumption to N2 logic density
    n3e_to_samsung_sf2p: 1.30  # SF2P trails N2P on logic density
  perf_iso_power:
    n5_to_n3e: 1.10
    n3e_to_n2: 1.10
    n2_to_n2p: 1.03
    n2_to_a14: 1.15
    intel_18a_to_intel_14a_perf: 1.175
    samsung_sf3p_to_sf2p_perf: 1.05
    n3e_to_intel_14a_perf: 1.20
    n3e_to_samsung_sf2p_perf: 1.10
  power_iso_perf:
    n5_to_n3e: 0.80
    n3e_to_n2: 0.75
    n2_to_n2p: 0.95
    n2_to_a14: 0.70
    intel_18a_to_intel_14a_power: 0.725
    samsung_sf3p_to_sf2p_power: 0.75
    n3e_to_intel_14a_power: 0.65
    n3e_to_samsung_sf2p_power: 0.78
  sram_macro_mb_per_mm2:
    n5: 27.3
    n3e: 28.5
    n2: 38.1
    n2p: 38.1
    a14: 39.5
    intel_18a: 35
    intel_14a: 38
    samsung_sf2p: 32

# Public-disclosure uncertainty bands per factor. Used by the projection
# script's Monte Carlo to emit p10/p50/p90 bands instead of a single point.
# Values are 1-sigma fractional uncertainty for each factor.
uncertainty_bands:
  density:
    n3e_to_n2: 0.08          # TSMC public disclosure
    n2_to_n2p: 0.05
    n2_to_a14: 0.10
    n3e_to_intel_14a: 0.15   # Intel public roadmap, less disclosed
    n3e_to_samsung_sf2p: 0.15
  perf_iso_power:
    n3e_to_n2: 0.05
    n2_to_n2p: 0.03
    n2_to_a14: 0.08
    n3e_to_intel_14a_perf: 0.10
    n3e_to_samsung_sf2p_perf: 0.10
  power_iso_perf:
    n3e_to_n2: 0.05
    n2_to_n2p: 0.05
    n2_to_a14: 0.08
    n3e_to_intel_14a_power: 0.10
    n3e_to_samsung_sf2p_power: 0.10

source_citations:
  - source: TSMC Tech Symposium 2025
    use: density and perf/power scaling N3E -> N2 -> N2P -> A14
  - source: TSMC A14 announcement
    use: A14 +15% perf @ iso-power vs N2; +20% logic density
  - source: WikiChip N3 SRAM stall + N2 38.1 Mb/mm² macro
    use: SRAM macro density floor at N2/N2P
  - source: Intel Foundry roadmap 18A -> 14A
    use: 14A +15-20% perf @ iso-power vs 18A
  - source: Samsung Foundry SF2 / SF2P roadmap
    use: SF2P +25% power efficiency @ iso-clock vs SF3P

forbidden_uses:
  - cite_projection_as_tsmc_n2p_signoff
  - cite_projection_as_tsmc_a14_signoff
  - cite_projection_as_intel_14a_signoff
  - cite_projection_as_samsung_sf2p_signoff
  - cite_projection_as_measured_silicon_evidence

next_commands:
  run: make ppa-projection
  preflight: make pdk-portability-check
