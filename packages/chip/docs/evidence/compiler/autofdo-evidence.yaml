schema: eliza.compiler.autofdo_evidence.v1
as_of: 2026-05-19
claim_boundary: |
  AutoFDO + Propeller + BOLT pipeline recipe committed; no executable
  evidence is accepted until the canonical container build produces the
  end-to-end roundtrip on a benchmark (CoreMark or equivalent).

blocked_until:
  - build/llvm-stage2/bin/clang exists
  - perf + create_llvm_prof or llvm-profgen available in the canonical container
  - build/reports/compiler/coremark-baseline.json measured
  - build/reports/compiler/coremark-autofdo.json measured
  - build/reports/compiler/coremark-autofdo-propeller.json measured
  - build/reports/compiler/coremark-autofdo-propeller-bolt.json measured
  - measured uplift (autofdo+propeller+bolt vs baseline) >= 5% after Spectre

required_artifacts:
  - path: compiler/autofdo-harness/capture.sh
    purpose: perf record + create_llvm_prof / llvm-profgen wrapper
  - path: compiler/autofdo-harness/apply.sh
    purpose: clang rebuild with -fprofile-sample-use
  - path: compiler/propeller-harness/relink.sh
    purpose: lld relink with Propeller symbol order
  - path: compiler/bolt-harness/optimize.sh
    purpose: llvm-bolt post-link
  - path: docs/toolchain/autofdo-propeller-bolt.md
    purpose: pipeline documentation

verification_commands:
  - AUTOFDO_BINARY=build/coremark-rva23 AUTOFDO_WORKLOAD=scripts/run_coremark.sh scripts/run_autofdo_capture.sh
  - compiler/autofdo-harness/apply.sh --profile build/reports/compiler/autofdo.prof --source benchmarks/coremark/core_main.c --output build/coremark-autofdo.o
  - compiler/propeller-harness/relink.sh --inputs build/coremark-autofdo.o --symbol-order build/reports/compiler/propeller-order.txt --output build/coremark-autofdo-propeller
  - compiler/bolt-harness/optimize.sh --binary build/coremark-autofdo-propeller --workload scripts/run_coremark.sh --output build/coremark-autofdo-propeller-bolt

forbidden_claims_without_required_evidence:
  - "AutoFDO/Propeller/BOLT measured uplift"
  - "5-10% net system-image perf gain"
