  - path: compiler/iree-eliza-npu/runtime/eliza_npu_runtime.h
    purpose: C ABI for descriptor submission
  - path: compiler/iree-eliza-npu/runtime/eliza_npu_runtime.c
    purpose: reference C implementation
  - path: compiler/iree-eliza-npu/tests/test_descriptor_parity.py
    purpose: 290-case parity test against the Python oracle
  - path: build/iree/install/bin/iree-compile
    purpose: IREE compiler with elizanpu backend selectable
  - path: build/iree/install/bin/elizanpu-opt
    purpose: standalone dialect opt tool
  - path: build/reports/compiler/elizanpu-opt-roundtrip.log
