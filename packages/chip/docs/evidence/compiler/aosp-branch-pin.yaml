as_of: 2026-05-19
blocked_reason: 'Google removed RISC-V from the Android Common Kernel as primary branch
  in

  April 2024, reinstated as Tier 1 late 2025; no major OEM has shipped

  Android RISC-V at Pixel scale; CTS coverage on RVA23 silicon is

  incomplete. As of 2026-05-19 a probe of

  https://android.googlesource.com/platform/manifest finds NO branch matching

  `refs/heads/.*riscv.*`. A separate kernel branch

  `refs/heads/android-mainline-riscv64` exists on the AOSP common kernel at

  https://android.googlesource.com/kernel/common (HEAD 365b87b792fed44f4306abcea6f0c9c245a79b04

  observed 2026-05-19), but that is the kernel only; userland CTS support is

  still missing.

  '
blocked_until:
- Google publishes an `android-1[6-9]\\..*-riscv64` platform manifest branch with
  passing CTS
- that branch SHA is pinned in compiler/aosp/manifest.xml
- compiler/aosp/manifest.xml lists at least the AOSP build-tools, libcore, bionic,
  art, and external/llvm-project projects with explicit sha1
- scripts/check_rva23_compliance.py reports `PASS rva23.aosp_branch_pin`
claim_boundary: 'AOSP RISC-V branch SHA pin is mandatory before any Android boot claim.

  As of 2026-05-19 no single AOSP RISC-V branch with stable Tier 1 CTS is

  safe to pin; the placeholder is rejected by

  scripts/check_rva23_compliance.py.

  '
forbidden_claims_without_required_evidence:
- Android RISC-V boot reproducible
- AOSP RVA23 image pinned
- Cuttlefish RISC-V image bootable
