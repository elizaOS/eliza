schema: eliza.compiler.aosp_branch_pin.v1
as_of: 2026-05-19
status: BLOCKED
claim_boundary: |
  AOSP RISC-V branch SHA pin is mandatory before any Android boot claim.
  As of 2026-05-19 no single AOSP RISC-V branch with stable Tier 1 CTS is
  safe to pin; the placeholder is rejected by
  scripts/check_rva23_compliance.py.

blocked_reason: |
  Google removed RISC-V from the Android Common Kernel as primary branch in
  April 2024, reinstated as Tier 1 late 2025; no major OEM has shipped
  Android RISC-V at Pixel scale; CTS coverage on RVA23 silicon is
  incomplete.

blocked_until:
  - Google publishes an `android-15.0.0_r*-riscv64` branch with passing CTS
  - that branch SHA is pinned in compiler/aosp/manifest.xml
  - compiler/aosp/manifest.xml lists at least the AOSP build-tools, libcore,
    bionic, art, and external/llvm-project projects with explicit sha1
  - scripts/check_rva23_compliance.py reports `PASS rva23.aosp_branch_pin`

required_artifacts:
  - path: compiler/aosp/manifest.xml
    purpose: pinned `repo` manifest with branch SHA and per-project sha1
  - path: docs/toolchain/android-rva23-prebuilts.md
    purpose: human-readable refresh procedure

verification_commands:
  - scripts/check_rva23_compliance.py --strict

forbidden_claims_without_required_evidence:
  - "Android RISC-V boot reproducible"
  - "AOSP RVA23 image pinned"
  - "Cuttlefish RISC-V image bootable"
