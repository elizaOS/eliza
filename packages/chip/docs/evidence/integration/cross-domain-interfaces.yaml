# Cross-domain interfaces evidence gate
#
# Verifies that every cross-domain edge documented in
# docs/arch/soc-integration.md is wired through `e1_soc_integrated`.
# Fail-closed on any edge that the cocotb harness cannot exercise.

contract:
  module: e1_soc_integrated
  testbench: e1_soc_integrated_tb
  cocotb_dir: verify/cocotb/integration
  cocotb_module: test_cross_domain_interfaces
  expected_tests:
    - bpu_pmu_strobe_increments_zihpm_counter
    - bpu_resolve_does_not_increment_unrelated_event
    - cluster_lite_tieoff_drives_axi_to_quiet
    - iommu_fault_count_initially_zero
    - pmc_mailbox_roundtrips_telemetry
    - ftq_l1i_shim_emits_prefetch_on_taken_target
    - bpu_vector_redirect_lanes_are_soc_visible
    - bpu_fetch_stream_backpressures_soc_ftq_pop
    - bpu_fetch_stream_drives_soc_l1i_demand_lanes
    - bpu_fetch_stream_fills_integrated_l1i_l2_slc_dram_path
    - ftq_l1i_shim_flushes_on_misprediction
    - test_iommu_programmed_fault
    - test_slc_passthrough
    - test_dram_ctrl_dfi_traffic
    - display_scanout_reads_fabric_dram
    - test_cva6_executes_from_bootrom
  expected_pass_count: 16
  expected_fail_count: 0

edges:
  - name: bpu_to_zihpm
    description: BPU PMU strobes → bpu_to_zihpm_remap → zihpm event bus
    wired_at: rtl/top/e1_soc_integrated.sv
    tested_by:
      - bpu_pmu_strobe_increments_zihpm_counter
      - bpu_resolve_does_not_increment_unrelated_event
    status: WIRED

  - name: bpu_to_l1i_prefetch
    description: BPU FTQ entry → ftq_to_l1i_shim → SoC L1I prefetch port
    wired_at: rtl/top/e1_soc_integrated.sv
    tested_by:
      - ftq_l1i_shim_emits_prefetch_on_taken_target
      - ftq_l1i_shim_flushes_on_misprediction
    status: WIRED

  - name: bpu_to_l1i_demand
    description: >
      BPU ordered fetch stream → fetch_stream_to_l1i_demand → SoC lane-0/lane-1
      L1I IFU demand ports and integrated L1I/L2/SLC/CHI/DRAM cache-memory
      path with FTQ, segment, and branch-kind provenance
    wired_at: rtl/top/e1_soc_integrated.sv
    tested_by:
      - bpu_vector_redirect_lanes_are_soc_visible
      - bpu_fetch_stream_backpressures_soc_ftq_pop
      - bpu_fetch_stream_drives_soc_l1i_demand_lanes
      - bpu_fetch_stream_fills_integrated_l1i_l2_slc_dram_path
    status: WIRED

  - name: cluster_to_fabric
    description: >
      e1_cluster_top 8 AXI4 masters → e1_axi4_interconnect fabric
      masters[3..10], with CVA6 slot-0 proof traffic routed separately
      through fabric master[2]
    wired_at: rtl/top/e1_soc_integrated.sv
    tested_by:
      - cluster_lite_tieoff_drives_axi_to_quiet
      - test_cva6_executes_from_bootrom
      - test_cva6_starts_fetching
      - test_cva6_executes_four_instructions
      - test_cva6_dram_store
      - test_cva6_dram_load
      - test_cva6_boots_through_soc_slot0
      - test_cva6_executes_store_load_in_soc
      - single_beat_64_to_128_write_then_read
      - single_beat_high_lane_address_uses_strb_offset
      - multi_beat_write_burst_increments_lane
      - multi_beat_read_burst_returns_all_beats
      - partial_wstrb_preserves_unwritten_bytes
      - burst_length_passthrough
      - back_to_back_writes_single_inflight
      - reset_quiesces_outputs
    status: WIRED
    in_band_soc_verified: true
    in_band_soc_verified_by:
      adapter: rtl/top/adapters/e1_axi4_width_converter.sv
      memory_model: rtl/memory/dram_ctrl/e1_dram_ctrl.sv via fabric slave[0]
      cocotb_module: verify/cocotb/integration/test_cva6_boots_in_soc.py
      cocotb_makefile: verify/cocotb/integration/Makefile.cva6-soc
      cocotb_target: cocotb-cva6-soc
      tests_pass: 2
      tests_fail: 0
      proof: |
        Under `+define+E1_HAVE_CVA6 +define+E1_CLUSTER_SLOT0_CVA6` the
        `u_soc.u_cva6_slot0` instance drives a 64-bit AXI4 master through
        `e1_axi4_width_converter` into 128-bit, 8-bit-ID fabric master[2],
        through `e1_axi4_interconnect`, and into fabric slave[0] /
        `e1_dram_ctrl`.
        The test preloads the shared DRAM controller at 0x8000_0000 via
        `+E1_DRAM_PRELOAD_HEX=boot_rom.hex`.  Two cocotb tests assert:
          - CVA6 issues an AR + receives an R beat at the downstream
            (128-bit) side after reset, proving the wrapper→adapter→
            converter→fabric→DRAM-controller chain propagates a fetch
            end-to-end.
          - CVA6 retires the 8-instruction store/load program: ≥1 AW,
            ≥1 W, ≥1 B handshake (the SD instruction) and ≥2 AR + ≥2 R
            beats (initial fetch line + the LD instruction).
    width_converter:
      adapter: rtl/top/adapters/e1_axi4_width_converter.sv
      cocotb_module: verify/cocotb/axi4/test_width_converter.py
      cocotb_target: cocotb-axi4-width-converter
      tests_pass: 8
      tests_fail: 0
      configurations_supported:
        - passthrough        # UPSTREAM_DATA_W == DOWNSTREAM_DATA_W
        - upsize             # narrow upstream  -> wider downstream  (AXI4 A8.4.1)
        - downsize           # wider  upstream  -> narrower downstream (AXI4 A8.4.2)
      spec_reference: |
        AXI4 IHI 0022, section A8.4 ("Data bus width conversion"):
          - A8.4.1 Upsizing: master AxSIZE smaller than slave bus width;
            AxLEN/AxSIZE pass through unchanged, beat data placed on the
            lane selected by address[byte_offset_w +: lane_select_w],
            WSTRB replicated on that lane only.  This is the path
            exercised at the SoC top (CVA6 64-bit master -> 128-bit
            slot-0 net).
          - A8.4.2 Downsizing: each upstream beat serialised into
            RATIO = UPSTREAM_DATA_W / DOWNSTREAM_DATA_W downstream
            beats; new AxLEN+1 = (old AxLEN+1) * RATIO when AxSIZE
            matches the wider bus, else AxLEN/AxSIZE pass through.
            R-side collects RATIO sub-beats back into one upstream beat.
        Inflight model: one outstanding AW and one outstanding AR at a
        time, sufficient for CVA6 cv64a6 (which sets
        AxiBurstWriteEn=0 and issues at most one cache-fill read in
        flight per id).
    verilator_full_conversion: PASS
    verilator_full_conversion_resolved_by: |
      The Verilator 5.049 V3Delayed `Unexpected LHS form` crash on the
      whole-array NBA at `btb.sv:188` (and the identical pattern at
      `bht.sv:122`) is resolved by two local patches:
        - patches/cva6/btb-v3delayed-workaround.patch
        - patches/cva6/bht-v3delayed-workaround.patch
      Both patches replace `btb_q <= btb_d;` / `bht_q <= bht_d;` (a
      whole-array NBA to a 2D unpacked struct array) with an explicit
      per-element nested `for` loop.  The two forms are semantically
      equivalent, but the per-element form exercises the supported
      per-element NBA lowering path.  The patches are applied
      idempotently by `scripts/apply_cva6_patches.sh`, which is run
      automatically by the `cocotb-cva6-cpu-*` Makefile targets before
      invoking Verilator.  Confirmed: Verilator 5.049 elaborates and
      lowers the full CVA6 v5.3.0 source tree end-to-end with the
      patches applied (no internal error).
    notes: |
      The CVA6 wrapper (`rtl/cpu/e1_cva6_wrapper.sv`) instantiates the
      OpenHW Group CVA6 v5.3.0 API
      (`cva6 #(.CVA6Cfg(build_config_pkg::build_config(
      cva6_config_pkg::cva6_cfg)))`) and bridges its `noc_req_t` /
      `noc_resp_t` structs to flat AXI4 master signals via the
      `rtl/top/adapters/e1_cva6_to_e1axi4.sv` adapter.  Both files
      elaborate cleanly under verilator-strict --lint-only with the
      full v5.3.0 source tree linked (185 modules, ~275 MB of CVA6
      sources via `external/cva6/cva6/core/Flist.cva6`, zero errors),
      and Verilator lowers and builds them end-to-end (see
      `verilator_full_conversion_resolved_by` above).

      Four cocotb tests under the dedicated `e1_cva6_unit_tb` harness
      cover the wrapper-level execution path (`make
      cocotb-cva6-cpu-bootrom` and `make cocotb-cva6-cpu-dram`):
      `test_cva6_starts_fetching`, `test_cva6_executes_four_instructions`,
      `test_cva6_dram_store`, `test_cva6_dram_load` — all four PASS.
      Structural proof: CVA6 issues an AR handshake against the
      boot-ROM region, the icache mem path returns the line, the
      8-instruction store/load program executes, fires an AW + W + B
      sequence against the DRAM region, and a follow-on AR + R for
      the load.

      SoC integration: at the SoC top
      (`rtl/top/e1_soc_integrated.sv`) under
      `+define+E1_CLUSTER_SLOT0_CVA6` the CVA6 wrapper's 64-bit AXI4
      master flows through `e1_axi4_width_converter` into 128-bit fabric
      master[2], then through `e1_axi4_interconnect` to `e1_dram_ctrl`.
      The default `e1_cluster_top` instance's eight production-shape AXI4
      master ports use the full 8-bit cluster ID width and are attached
      to fabric masters[3..10]; the cross-domain quiet test elaborates
      and samples those lite-mode ports through the widened fabric.
      The converter is exercised by eight cocotb tests under
      `verify/cocotb/axi4/test_width_converter.py` (all
      passing) covering both single-beat and multi-beat write/read
      bursts, partial-WSTRB, lane mux on both low and high address
      lanes, AxLEN/AxSIZE pass-through, single-inflight FSM, and
      reset quiescence.

      Root cause of the historical `WIRED_PARTIAL` block (resolved
      in this round):

        1. TB boot vector was `0x1000`, which sits in CVA6's cv64a6
           *non-executable* PMA window (`ExecuteRegionAddrBase =
           {0x8000_0000, 0x1_0000, 0x0}`, `ExecuteRegionLength =
           {0x40000000, 0x10000, 0x1000}` → executable regions are
           `[0, 0x1000)`, `[0x1_0000, 0x2_0000)`, and the DRAM range).
           CVA6 raised `INSTR_ACCESS_FAULT` during the cv64a6 PMP /
           PMA check at the very first speculative fetch before the
           icache could issue any AR.  The standalone unit TB still uses
           the 0x1_0000 executable ROM window; the in-band SoC proof now
           boots at 0x8000_0000 so the fetch is served by the shared
           DRAM-controller path instead of a private slot-0 ROM model.

        2. The boot-ROM preload via `dut.boot_rom[i].value = ...`
           silently no-op'd: Verilator does not register a writable
           cocotb-GPI handle for every element of an unpacked
           `logic [63:0]` array.  Fixed by switching the preload to
           `$readmemh` from a `boot_rom.hex` file written by the
           cocotb tests at module-import time (before sim start),
           and re-exporting `boot_rom[0..2]` plus `dram_mem[0]` as
           flat-port mirrors so the tests can assert preload success
           after the TB's `initial` block runs.

        3. The dram-test program had a typo in the LUI encoding
           (`0x000CAFEC | 0x37 = 0x000CAFFF`), which was supposed
           to encode `lui x1, 0xCAFEC = 0xCAFEC0B7`.  Without the
           correct LUI, x1 never held a meaningful payload and the
           store never reached the AXI4 master.  Fixed in
           `verify/cocotb/integration/test_cva6_dram_read_write.py`.
    cluster_fabric_geometry:
      fabric_masters: 11
      fabric_id_width: 8
      cluster_master_range: fabric masters[3..10]
      cluster_axi_id_width: 8
      cva6_slot0_fabric_master: fabric master[2]
      cva6_id_adapter: zero-pad 4-bit CVA6 IDs to the 8-bit fabric ID contract
      verification: make cocotb-cross-domain

  - name: chi_to_axi4_bridge
    description: TL-C → CHI → AXI4 cache south-side bridge
    wired_at: rtl/top/e1_soc_integrated.sv
    tested_by:
      - test_slc_passthrough
      - test_dram_ctrl_dfi_traffic
    status: WIRED
    notes: |
      A single SLC slice (`u_slc`, SIZE_BYTES=65536, WAYS=4, BANKS=2)
      is instantiated in the integrated top.  Its `dram_acq` line
      transactions drive the line-shim adapter
      (`rtl/top/adapters/e1_slc_to_chi_line_shim.sv`), which in turn
      drives the `e1_chi_to_axi4_bridge` request side.  A small MMIO
      fixture at 0x1008_0000 lets cocotb trigger a single line read /
      write so the CHI → AXI4 path traverses end-to-end:

        SLC client (MMIO fixture)
          → e1_slc.dram_acq_*
            → e1_slc_to_chi_line_shim
              → e1_chi_to_axi4_bridge (CHI request side)
                → fabric master[0]
                  → fabric slave[0]
                    → e1_dram_ctrl
                      → e1_axi4_dram_model

      `test_slc_passthrough` proves a single round-trip; the response
      data latched into `slc_fix_grant_lo` equals the cold-DRAM value
      (zero).  `test_dram_ctrl_dfi_traffic` proves back-to-back line
      reads at distinct addresses interleave correctly with the DRAM
      controller's refresh / ZQ scheduler.
    id_adapter:
      bridge_id_width: 6
      fabric_id_width: 8
      policy: zero-pad bridge request IDs to 8 bits and slice responses back to 6 bits

  - name: iommu_translation
    description: IOMMU upstream masters → translation → fabric master[1]
    wired_at: rtl/top/e1_soc_integrated.sv
    tested_by:
      - iommu_fault_count_initially_zero
      - test_iommu_programmed_fault
    status: WIRED
    notes: |
      The IOMMU's AXI-Lite MMIO slave is bridged onto the v0 32-bit
      debug aperture at base 0x1006_0000 (4 KiB window).  Each 64-bit
      IOMMU register is reached by a write-low / write-high pair:
      writing `addr[2]==0` stashes the low 32 bits, writing
      `addr[2]==1` launches the AXI-Lite write with `{wdata, stash}`
      and `araddr = {addr[11:3], 3'h0}`.  Reads launch an AR on every
      4-byte access and latch the low half of the IOMMU's 64-bit
      response into `iommu_mmio_latched_rdata[31:0]`.

      A second MMIO fixture at 0x1007_0000 (256 B) drives one IOMMU
      upstream master with a single-beat AXI4 transaction so cocotb can
      trigger an unauthorised DMA without instantiating a full NPU /
      DMA engine.  Programmer registers IOVA / CTRL / STATUS / DEV_ID
      map to the IOMMU's `u_a*_devid[0]` / `u_a*_pasid[0]` /
      `u_a*addr[0]` ports.

      `test_iommu_programmed_fault` programs DDTP to a translating
      mode, sets DEV_ID = 0xBAD (not in the allowlist), and triggers a
      read.  The IOMMU grants the master, the device-id check fails,
      and a `CAUSE_DDT_ENTRY_NOT_VALID` fault record is pushed.  The
      SoC boundary surfaces `fault_irq` + `fault_count`; the FQT
      register also advances and is observable via the MMIO bridge.
    id_adapter:
      downstream_id_width: 6
      fabric_id_width: 8
      policy: zero-pad downstream request IDs to 8 bits and slice responses back to 6 bits

  - name: pmc_mailbox
    description: PMC AON Ibex mailbox ↔ main-rail MMIO bridge
    wired_at: rtl/top/e1_soc_integrated.sv
    tested_by:
      - pmc_mailbox_roundtrips_telemetry
    status: WIRED

  - name: dram_south
    description: fabric → e1_dram_ctrl → e1_axi4_dram_model
    wired_at: rtl/top/e1_soc_integrated.sv
    tested_by:
      - test_slc_passthrough
      - test_dram_ctrl_dfi_traffic
      - display_scanout_reads_fabric_dram
    status: WIRED
    notes: |
      AXI4 traffic from the SLC fixture (MMIO-controlled) flows
      through the line shim → CHI bridge → fabric master[0] → fabric
      slave[0] → `e1_dram_ctrl` → `e1_axi4_dram_model`.  Both the
      single-line passthrough and the back-to-back two-line case are
      exercised at the integration level; burst-level DRAM scheduler
      behaviour stays verified under
      `verify/cocotb/axi4/test_axi4_burst.py`.

      The cluster-driven path (see `cluster_to_fabric`) is now WIRED
      with all four `e1_cva6_unit_tb` cocotb tests passing — CVA6
      issues AR/AW/W/B handshakes through the wrapper-to-AXI4 adapter
      end-to-end.  The evidence here proves the DRAM north port for the
      exercised SLC fixture, CVA6 adapter, and production display-scanout
      paths that reach `fab_s[0]`; it is not a universal SoC-top or phone
      integration proof.

  - name: display_scanout_to_fabric
    description: e1_display_scanout AXI4 read master → width converter → fabric master[11] → DRAM
    wired_at: rtl/top/e1_soc_integrated.sv
    tested_by:
      - display_scanout_reads_fabric_dram
    status: WIRED
    notes: |
      The integrated display aperture at 0x1003_0000 now instantiates
      `e1_display_scanout`, a production-shape framebuffer scanout engine
      with a real AXI4 read master.  The scanout engine emits 32-bit read
      beats, `e1_axi4_width_converter` upsizes the read channel to the
      128-bit SoC fabric, and fabric master[11] routes the traffic into
      `e1_dram_ctrl` at the main DRAM aperture.  The remaining display
      production dependencies are the DSI host/PHY boundary, panel DCS init,
      async pixel-clock CDC, DTS/software binding, and HIL or bandwidth trace
      evidence.

  - name: dfi_phy_south
    description: DRAM controller DFI 5.0 → licensed PHY
    wired_at: rtl/memory/dram_ctrl/e1_dram_ctrl.sv
    tested_by: []
    status: BLOCKED
    blocked_reason: |
      LPDDR5X / LPDDR6 PHY is closed IP — see
      docs/evidence/memory/lpddr-phy-procurement.yaml.  The controller
      models the DFI 5.0 north side and forwards to the behavioural
      DRAM model in simulation.

command:
  invoke: "make cocotb-cross-domain"
  result_xml: "verify/cocotb/results/e1_soc_integrated_tb_test_cross_domain_interfaces.xml"

gate:
  fail_closed_when_missing: true
  blocked_reason: |
    If any of the cross-domain edges with status `WIRED` is not exercised
    by a passing cocotb test, the gate fails.  Edges with status
    TIED_OFF / BLOCKED / WIRED_STRUCTURAL_ONLY / WIRED_OBSERVABILITY_ONLY
    / WIRED_PARTIAL are documented above with a blocked_reason and do
    not flip the gate.  `WIRED_PARTIAL` is reserved for edges where one
    structural adapter (e.g. a width converter) is implemented and
    exercised in isolation by cocotb but the end-to-end integration
    still requires a separate upstream blocker to clear.

last_known_pass:
  date: 2026-05-27
  verilator_version: "5.049 devel rev v5.048-46-g7c5069c7d (mod)"
  cocotb_version: "1.9.2"
  pass_count: 16
  fail_count: 0
