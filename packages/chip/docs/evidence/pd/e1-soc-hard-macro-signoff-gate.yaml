blocker:
  kind: rtl_systemverilog_frontend_incompatibility
  tool: LibreLane 3.0.3 Yosys read_verilog frontend (no slang/surelog plugin in image)
  symptom: |
    /work/rtl/top/e1_soc_top.sv:28: ERROR: syntax error, unexpected TOK_ID,
    expecting '(' or ';' or '#'
  root_cause: |
    Yosys read_verilog does not support the ANSI module-header package import
    form `module M import pkg::*; (...)`, nor the body-statement form
    `import pkg::*;`. It DOES support package definitions and fully-scoped
    references like `pkg::SYMBOL`. The slang frontend that would accept the
    import is not installed in the efabless openlane2 image
    (plugins/slang.so missing).
  offending_rtl_read_only_for_ws2:
    - file: rtl/top/e1_soc_top.sv
      line: 28
      statement: "import e1_soc_pkg::*;"
      direct_package_symbol_use_in_this_module: false
    - file: rtl/memory/e1_behavioral_dram.sv
      line: 18
      statement: "import e1_soc_pkg::*;"
      direct_package_symbol_use_in_this_module: true
      symbols: [DRAM_WORDS, DRAM_INDEX_BITS]

required_rtl_fix_for_lead:
  description: |
    RTL is READ-ONLY for ws2. The lead (or the RTL owner) must apply the
    following two edits. Both have been verified to compile cleanly in the
    LibreLane image Yosys read_verilog frontend (see proof_commands below).
  edits:
    - file: rtl/top/e1_soc_top.sv
      action: delete_line_28_header_import
      detail: |
        Remove `    import e1_soc_pkg::*;` from the module header. The module
        instantiates package consumers but does not itself reference any
        e1_soc_pkg symbol, so no replacement is needed.
    - file: rtl/memory/e1_behavioral_dram.sv
      action: delete_header_import_and_use_scoped_refs
      detail: |
        Remove the line-18 `    import e1_soc_pkg::*;` and replace bare
        DRAM_WORDS / DRAM_INDEX_BITS references (the `dram_mem [0:DRAM_WORDS-1]`
        declaration and the `[DRAM_INDEX_BITS-1:0]` word-index wires) with the
        fully-scoped `e1_soc_pkg::DRAM_WORDS` / `e1_soc_pkg::DRAM_INDEX_BITS`.
  alternative_fix:
    description: |
      Alternatively, enable a slang/surelog Yosys frontend that accepts the
      import. This requires building/installing the slang plugin into the
      LibreLane Yosys, which is a toolchain change outside ws2 ownership and
      heavier than the two-line RTL fix above.

second_rtl_frontend_blocker:
  discovered: 2026-05-22
  status: fix_identified_and_proven_rtl_read_only_for_ws2
  kind: rtl_systemverilog_frontend_incompatibility
  tool: LibreLane 2.4.0.dev1 / openlane2 Yosys read_verilog (Verilog-2005 frontend, no slang plugin)
  run: pd/openlane/runs/RUN_2026-05-22_19-39-13
  symptom: |
    Step 05-yosys-jsonheader, file 10 of the read list:
    /work/rtl/bootrom/e1_bootrom.sv:24: ERROR: syntax error, unexpected TOK_ID,
    expecting ',' or '=' or ')'
    After fixing line 24, a second error surfaces at:
    /work/rtl/bootrom/e1_bootrom.sv:40: ERROR: syntax error, unexpected TOK_ID
  root_cause: |
    Yosys's read_verilog Verilog-2005 frontend (no slang plugin in the image)
    does not accept the SystemVerilog `string` data type. e1_bootrom.sv uses it
    in two places:
      (1) module-header parameter type: `parameter string ROM_HEX = "..."`
          (line 24) — `string` is lexed as a bare TOK_ID, so the next token
          ROM_HEX is unexpected.
      (2) initial-block local: `string rom_path;` (line 40), used only to hold a
          $value$plusargs("BOOT_ROM_HEX=%s", rom_path) sim-time override path.
    This is purely an unsynthesizable sim-only construct; nothing about the
    synthesized boot-ROM aperture depends on `string`.
  offending_rtl_read_only_for_ws2:
    - file: rtl/bootrom/e1_bootrom.sv
      line: 24
      statement: 'parameter string ROM_HEX = "build/boot-rom/e1_secure_boot_rom.hex"'
    - file: rtl/bootrom/e1_bootrom.sv
      line: 40
      statement: "string rom_path;  (+ the $value$plusargs override block, lines 40-49)"
  required_rtl_fix_for_lead:
    description: |
      RTL is READ-ONLY for ws2. The lead (or RTL owner) must apply BOTH edits
      below to rtl/bootrom/e1_bootrom.sv. Both have been proven to make the
      entire 20-file config.sky130.json VERILOG_FILES list parse clean in the
      actual openlane2 image Yosys read_verilog frontend (see proof below: 20x
      "Successfully finished Verilog frontend.", zero errors).
    edits:
      - file: rtl/bootrom/e1_bootrom.sv
        line: 24
        action: drop_string_type_keyword_on_parameter
        from: 'parameter string ROM_HEX = "build/boot-rom/e1_secure_boot_rom.hex"'
        to: 'parameter ROM_HEX = "build/boot-rom/e1_secure_boot_rom.hex"'
        detail: |
          A bare untyped parameter initialized with a string literal is accepted
          by the Yosys frontend and is functionally identical for $readmemh.
      - file: rtl/bootrom/e1_bootrom.sv
        lines: 40-49
        action: remove_string_local_and_plusarg_override_read_rom_hex_directly
        detail: |
          The $value$plusargs("BOOT_ROM_HEX=%s", rom_path) path is simulator-only
          and unsynthesizable. Replace the `string rom_path;` declaration and the
          plusarg if/else block with a direct `$readmemh(ROM_HEX, mem);`. Concretely,
          replace lines 40-49 (the `string rom_path;` decl, the zero-fill loop is
          kept, the plusarg if/else, and `$readmemh(rom_path, mem);`) with:
            for (int i = 0; i < WORDS; i++) begin
                mem[i] = 32'h0000_0000;
            end
            $readmemh(ROM_HEX, mem);
          This drops only the sim-time plusarg override (testbenches can override
          the ROM_HEX parameter directly instead), preserving all synthesized
          behaviour and the published header overlay.
  alternative_fix:
    description: |
      Same slang-plugin alternative as the original blocker: install a
      slang/surelog Yosys frontend that accepts the `string` data type. Heavier
      than the two-line bootrom RTL fix and outside ws2 ownership.
  proof_commands:
    prove_full_list_compiles_with_fix: |
      # ws2 proved the fix without editing the read-only RTL by bind-mounting a
      # patched copy over the file inside the container. After the lead lands the
      # fix in-tree, the bind-mount is unnecessary — read_verilog of the real
      # VERILOG_FILES list parses clean.
      FILES=$(python3 -c "import json; d=json.load(open('pd/openlane/config.sky130.json')); \
        print(' '.join('/work/'+f.replace('dir::../../','') for f in d['VERILOG_FILES']))")
      docker run --rm -v "$PWD":/work -w /work ghcr.io/efabless/openlane2:2.4.0.dev1 \
        yosys -p "read_verilog -sv -DE1_PD_SMALL_DRAM -DE1_HAVE_HARD_SRAM $FILES" \
        2>&1 | grep -c "Successfully finished Verilog frontend."
      # expect: 20  (and zero ERROR lines)
    proof_result_2026_05_22: |
      With both bootrom edits applied (proven via bind-mounted patched copy):
      20x "Successfully finished Verilog frontend.", zero ERROR lines, across the
      full config.sky130.json VERILOG_FILES list. The package-import blocker is
      gone and the bootrom `string` blocker is the only remaining frontend issue.

proof_commands:
  macro_files_present: |
    ls -l external/pdks/volare/sky130/versions/c6d73a35f524070e85faff4a6a9eef49553ebc2b/sky130A/libs.ref/sky130_sram_macros/{lef,lib,gds}/sky130_sram_2kbyte_1rw1r_32x512_8*
  reproduce_blocker: |
    source tools/env.sh
    PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
      PDK_ROOT="$PWD/external/pdks" scripts/run_openlane.sh --release
    # fails at 05-yosys-jsonheader with the TOK_ID syntax error
  prove_rtl_fix_compiles: |
    # After applying the two RTL edits, the read_verilog frontend is clean:
    docker run --rm -v "$PWD":/work -w /work ghcr.io/efabless/openlane2:2.4.0.dev1 \
      yosys -p "read_verilog -sv -DE1_PD_SMALL_DRAM -DE1_HAVE_HARD_SRAM \
        /work/rtl/top/e1_soc_pkg.sv /work/rtl/memory/e1_behavioral_dram.sv \
        /work/rtl/top/e1_soc_top.sv"
    # expect: three "Successfully finished Verilog frontend." with no ERROR

resume_command:
  description: |
    Once the two RTL edits land, replay the full SoC signoff. The native Yosys
    on this host lacks the pyosys (-y) frontend LibreLane 3.x requires, so the
    documented Docker fallback (efabless openlane2 image, present locally) is
    the correct signoff path here. Hiding the chip tool shims from PATH makes
    the wrapper select that fallback.
  command: |
    source tools/env.sh
    rm -rf .openlane-run.lock
    PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
      PDK_ROOT="$PWD/external/pdks" scripts/run_openlane.sh --release
  post_signoff_label_commands: |
    # After final/ exists for the SoC run, normalize + validate the label:
    python3 scripts/ai_eda/parse_openlane_metrics_to_flow_run.py \
      --metrics-json "$(ls -dt pd/openlane/runs/RUN_*/final/metrics.json | head -1)"
    python3 scripts/ai_eda/check_openlane_flow_labels.py \
      --report "$(ls -dt build/ai_eda/openlane_flow_labels/*/label-parse-report.json | head -1)"

label_provenance_warning:
  description: |
    parse_openlane_metrics_to_flow_run.py auto-selects the latest
    pd/openlane/runs/RUN_*/final/metrics.json. Today the only completed final/
    run is the macro-less smoke top (e1_pd_smoke_top, macro_count=0), NOT the
    SoC carrying the hard SRAM macro. The parser/check scripts were hardened to
    record source_design and macro_count so a smoke run can no longer be
    silently mistaken for the SoC-with-hard-macro objective. Until a SoC run
    reaches final/, downstream surrogates must treat any auto-selected label as
    smoke provenance, not SoC-with-macro PPA.
