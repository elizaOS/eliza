schema: eliza.pmic_procurement.v1
status: path_selected_blocked
release_use: prohibited_until_external_review
claim_boundary: >
  Records the PMIC procurement decision and outstanding work to convert the
  decision into a buildable BOM. The 2028 v0 path is catalog daughtercard
  (Path A in docs/pd/pmic-selection.md). Closed-IP and custom-analog paths
  are deferred to v1/v2.
source_artifacts:
  - docs/pd/pmic-selection.md
  - docs/pd/rail-plan-2028.yaml
  - docs/pd/power-management-firmware.md
  - board/kicad/e1-pmic-daughtercard/README.md
  - board/kicad/e1-pmic-daughtercard/bom-planning.csv
  - external/ibex/pin-manifest.json
  - external/opensbi/pin-manifest.json
selected_path: catalog_daughtercard_v0
candidate_vendors:
  - Renesas_mobile_buck_family
  - Texas_Instruments_TPS6594x_family
  - Maxim_MAX77xxx_family
  - MPS_MP8869_family
  - MIPI_SPMI_v2_master_specification
opensbi_release_pin:
  status: candidate_pinned_blocked_until_clone
  candidate_tag: v1.5
  pin_manifest: external/opensbi/pin-manifest.json
  rationale: >
    OpenSBI v1.5 (Oct 2024) is the first release with merged SBI MPxy +
    RPMI proxy support. v1.6 is acceptable; older releases do not expose
    the required mailbox transport.
ibex_pmc_pin:
  status: candidate_pinned_blocked_until_clone
  candidate_tag: ibex-2024-12-stable
  pin_manifest: external/ibex/pin-manifest.json
  rationale: >
    lowRISC Ibex (Apache-2.0) is the AON PMC core. Pin the 2024-12 stable
    drop until silicon characterization indicates a newer release. The
    config target is RV32IMC with no I$ / no branch predictor / no
    writeback stage (declared in the pin manifest config_target field).
required_artifacts:
  - id: catalog_bom
    status: planning_only_csv_present
    artifact: board/kicad/e1-pmic-daughtercard/bom-planning.csv
    checker: scripts/check_pmic_daughtercard_bom.py
    note: 16 rails covered by 16 catalog rows; KiCad schematic still missing.
  - id: spmi_master_implementation
    status: skeleton_only
    artifact: fw/pmc/src/spmi.c
  - id: i2c_fallback_implementation
    status: skeleton_only
    artifact: fw/pmc/src/i2c.c
  - id: pmic_per_rail_register_map
    status: planning_only
    artifact: fw/pmc/src/pmic_sequencer.c
  - id: qualification_package_imports
    status: missing
    artifact_glob: "pd/signoff/si-pi/package-models/pmic/**/*"
release_blockers:
  - KiCad schematic for daughtercard not authored (board/kicad/e1-pmic-daughtercard/ has README + BOM only).
  - Specific catalog part numbers not selected; BOM is planning-only.
  - SPMI v2.0 master firmware skeleton only.
  - Qualification package import (IBIS/SPICE/thermal) not landed.
  - OpenSBI release tag candidate pinned; clone + commit hash not yet recorded.
  - Ibex release tag candidate pinned; clone + commit hash not yet recorded.
