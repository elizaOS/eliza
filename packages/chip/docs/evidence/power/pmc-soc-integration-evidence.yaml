schema: eliza.power.soc_integration_evidence.v1
ip_name: pmc_soc_integration
ip_role: opensbi_mpxy_to_aon_ibex_pmc_rpmi_shmem_roundtrip
status: opensbi_built_with_pmc_dts_cocotb_roundtrip_blocked_on_shmem_routing
release_use: prototype_only
claim_boundary: >
  Records the executable result of integrating OpenSBI v1.8.1 with the
  Eliza E1 PMC RPMI shared-memory mailbox device-tree fragment and the
  AON Ibex PMC firmware against the cocotb integration testbench
  `e1_soc_integrated_tb`. Proof points:
    - `dts/eliza-rocket-pmc.dts(i)` compiles cleanly with `dtc -O dtb`
      and embeds a `riscv,rpmi-shmem-mbox` node with the four queue
      regions (a2p-req, p2a-ack, p2a-req, a2p-ack) + a2p-doorbell
      that match the offsets in `fw/pmc/include/rpmi_shmem_layout.h`,
    - OpenSBI v1.8.1 (pinned commit `74434f25...`) rebuilds the
      `generic` platform with `FW_FDT_PATH=<eliza-rocket-pmc.dtb>` and
      the resulting `fw_dynamic.elf` exposes the embedded DTB at
      `fw_fdt_bin` symbol (in .rodata), with the PMC mailbox compatible
      string + reg-names visible via `strings(1)`,
    - the cocotb roundtrip test
      `verify/cocotb/integration/test_opensbi_mpxy_to_pmc_rpmi.py`
      drives a spec-compliant RPMI v1.0 frame into A2P_REQ slot 0 and
      polls P2A_ACK tail, but currently reports `BLOCKED` because three
      remaining RTL/firmware bindings have not yet been authored
      (see `mpxy_rpmi_roundtrip.remaining_bindings` below),
    - the existing 54 baseline integration cocotb tests pass unchanged
      with `PMC_INSTANTIATE_IBEX` left off (default).
  Boot of OpenSBI on real silicon or in QEMU + RPMI control flow over
  the SBI MPxy mailbox is not exercised here; that requires either the
  cocotb shmem routing landing (next milestone) or a virt platform
  emulating the AON Ibex mailbox, neither of which is in scope.
