schema: eliza.power.external_pin_evidence.v1
ip_name: opensbi
ip_role: m_mode_sbi_implementation_with_mpxy_rpmi_proxy
status: pin_resolved_and_rv64_generic_built
release_use: prototype_only_until_mpxy_lands_upstream
claim_boundary: >
  Records the executable result of running scripts/bootstrap_opensbi.sh and
  then building OpenSBI v1.5 against the `generic` platform with the host
  RISC-V cross compiler. Proof points:
    - external/opensbi/opensbi checkout exists at the pinned SHA,
    - scripts/check_opensbi_pin.py reports PASS,
    - OpenSBI builds clean for the generic platform under RV64 ilp64
      (the default toolchain configuration on this host),
    - the RV32 ilp32 build path is blocked by upstream OpenSBI's hard
      requirement on the RISC-V `A` (atomics) extension which the PMC
      Ibex (RV32IMC) intentionally omits.
  Boot of OpenSBI on an application core is not exercised here; this
  evidence covers source pin + buildable artifact only.
pin_manifest: external/opensbi/pin-manifest.json
upstream_repo: https://github.com/riscv-software-src/opensbi.git
upstream_tag: v1.5
upstream_commit_pinned: 455de672dd7c2aa1992df54dfb08dc11abbc1b1a
upstream_commit_message: "include: Bump-up version to 1.5"
upstream_commit_timestamp: "2024-06-30T14:03:26+05:30"
license: BSD-2-Clause-Patent
toolchain:
  cross_compiler: external/riscv64-linux-gnu/usr/bin/riscv64-linux-gnu-gcc
  cross_compiler_version: "riscv64-linux-gnu-gcc (Ubuntu 13.3.0-6ubuntu2~24.04.1) 13.3.0"
  ld_library_path: external/riscv64-linux-gnu/usr/lib/x86_64-linux-gnu
  notes: >
    The xPack riscv-none-elf-gcc 15.2.0 toolchain refuses `-pie` links
    (`ld: -pie not supported`), which OpenSBI requires for its
    relocatable firmware. The riscv64-linux-gnu cross is used instead;
    its as/ld need LD_LIBRARY_PATH set to the bundled
    libopcodes/libbfd-2.42-riscv64.so to function.
bootstrap_run:
  command: scripts/bootstrap_opensbi.sh
  exit_status: 0
  outcome: HEAD resolved to v1.5 tag commit; manifest rewrite is a no-op when pin already matches.
pin_check_run:
  command: scripts/check_opensbi_pin.py
  exit_status: 0
  outcome: "STATUS: PASS power.opensbi_pin - HEAD=455de67 matches manifest pin"
rv64_generic_build:
  command: >
    make PLATFORM=generic CROSS_COMPILE=riscv64-linux-gnu- -j$(nproc)
  exit_status: 0
  artifacts:
    - path: external/opensbi/opensbi/build/platform/generic/firmware/fw_dynamic.bin
      bytes: 272504
      sha256: c9dd56d9289de72835fcff26f90e24157b6adad4abc75f0120b9664ccd54f18c
    - path: external/opensbi/opensbi/build/platform/generic/firmware/fw_dynamic.elf
      bytes: 1367816
      sha256: ff8e60209429b979b30eb4875d87700b47e4fda46b6c2e72ff69ccffccbfbace
    - path: external/opensbi/opensbi/build/platform/generic/firmware/fw_jump.bin
      bytes: 272464
      sha256: 1dd834205a4c954bf8c7623fec4418c621f37b203ddcb069bf830b932c283e80
    - path: external/opensbi/opensbi/build/platform/generic/firmware/fw_payload.bin
      bytes: 2105656
      sha256: 9e36be1c7e773194e04abf1127633bf237b6c443b33606e6bb66a3fe945e2776
rv32_generic_build_blocked:
  attempted_command: >
    make PLATFORM=generic CROSS_COMPILE=riscv64-linux-gnu-
    PLATFORM_RISCV_XLEN=32 PLATFORM_RISCV_ABI=ilp32
    PLATFORM_RISCV_ISA=rv32imc_zicsr_zifencei
  exit_status: 2
  root_cause: >
    OpenSBI emits `#error "opensbi strongly relies on the A extension of
    RISC-V"` from lib/sbi/riscv_atomic.c when rv32imc is targeted without
    `_a`. Adding `_a` would diverge from the Ibex PMC manifest config
    (RV32IMC, no A). This is architecturally consistent: OpenSBI runs on
    the application cores (which include A), not on the AON PMC Ibex.
    The PMC firmware lives at fw/pmc/ and is cross-built separately under
    rv32imc_zicsr (see ibex-pin-evidence.yaml and fw/pmc cross-build run).
mpxy_status_unchanged:
  in_tree_at_v1_5: false
  manifest_assertion: external/opensbi/opensbi/include/sbi/sbi_mpxy.h absent in v1.5
  resolution: bump upstream_tag_pinned when MPxy merges upstream (tracked in pin manifest).
release_blockers_unchanged:
  - MPxy + RPMI proxy not merged in v1.5; v1.6 ships v1.6 of the spec but MPxy land is still tracked downstream.
  - SBI v3.0 kernel-facing contract pending upstream sbi_mpxy.{h,c}.
