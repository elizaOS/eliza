schema: eliza.benchmarks.mlperf_inference_harness_evidence.v1
as_of: 2026-05-22
dossier_item: G-7
claim_boundary: modeled_preSilicon_not_official_submission_and_not_measured_power
claim_boundary_long: |
  A LoadGen-style MLPerf Inference harness (SingleStream + Offline) that
  drives a tiny INT8 MLP through the real E1 NPU behavioral simulator
  (E1NpuRuntime.gemm_s8 over E1NpuMmioSim). It produces functional
  accuracy, latency percentiles, throughput, and a MODELED
  energy_joules_per_inference (the G-7 schema field) derived from the
  architecture scale model.

  This is MODELED, pre-silicon evidence. It is NOT an official MLCommons
  submission and it does NOT measure silicon power. Functional accuracy
  is real (NPU sim byte-exact vs the reference oracle); latency and
  throughput are HOST wall-clock of the Python simulator and describe the
  harness, not silicon query latency; energy is modeled, not measured.

evidence_class: modeled_loadgen_harness_python_npu_sim_only

harness:
  loadgen: benchmarks/mlperf/loadgen.py
  sut: benchmarks/mlperf/sut.py
  model: benchmarks/mlperf/model.py
  energy: benchmarks/mlperf/energy.py
  runner: benchmarks/mlperf/run_mlperf_inference.py
  tests: benchmarks/mlperf/test_mlperf_inference.py
  gate: scripts/check_mlperf_inference.py
  report_schema: eliza.mlperf_inference.v1
  generated_report: benchmarks/results/mlperf-inference-modeled.json   # gitignored, regenerated by the gate

workload:
  name: tiny_int8_mlp_2layer
  precision: int8
  topology: 3->relu->3 two-layer MLP (two M=1 GEMM_S8 tiles + host bias/relu/argmax)
  npu_ops_per_inference: [GEMM_S8, GEMM_S8]
  host_ops_per_inference: [bias_add, int8_saturating_relu, argmax]
  macs_per_inference: 18
  model_class: modeled_representative_small_classifier_not_mlperf_mobile_model
  rationale: |
    The MLPerf Mobile reference models (MobileNetEdge, MOSAIC, ...) are
    not vendored offline, and the E1 NPU MMIO datapath caps a single GEMM
    tile at M,N <= 3 and K <= 7 (64-byte scratchpad). The tiny two-layer
    INT8 MLP already exercised by test_e1_npu_tiny_mlp_e2e.py lets the
    harness drive the real NPU runtime/sim datapath end to end while
    staying honest about what it is.

mlperf_fidelity:
  status: PASS
  implemented:
    - SingleStream one-query-at-a-time issue, p90 query latency (nearest-rank)
    - Offline all-samples-at-once issue, throughput (samples/second)
    - accuracy scored against the reference oracle (SUT output vs reference)
    - latency percentiles p50/p90/p99 by nearest-rank
  not_implemented:
    - official MLCommons C++ LoadGen binary (scheduler reimplemented in Python)
    - Server and MultiStream scenarios
    - LoadGen min-duration / min-query-count statistical convergence (fixed query_count instead)
    - separate MLPerf accuracy and performance modes (single pass)

energy_joules_per_inference:   # G-7 schema field, wired end to end
  status: PASS
  provenance: simulator
  source: compiler/runtime/e1_npu_scale_model.py
  units: J_per_inference
  calibration: blocked-no-calibrated-assets
  note: |
    Modeled NPU GEMM energy summed over the two M=1 GEMM tiles of one
    forward pass. Reported with provenance simulator and a fail-closed
    calibration block; the harness never fabricates a measured value.

blocked_axes:
  - axis: measured_silicon_power
    blocker_id: mlperf-power-closed
    release_blocking: false
    reason: |
      Power-per-inference (the MLPerf Power axis) requires a Joulescope or
      Monsoon power-rail integration on fabricated silicon. Pre-silicon
      this is impossible; the modeled energy above is the closest
      pre-silicon proxy and is explicitly labeled modeled, not measured.
    resolution: Integrate rail energy on the E1 dev-board / silicon post-tapeout.
  - axis: official_mlcommons_submission
    blocker_id: mlperf-official-submission
    release_blocking: false
    reason: |
      No MLCommons loadgen binary, submission checker, or reference model
      checkpoint is vendored offline; the harness is a faithful subset,
      not an auditable MLCommons submission.
    resolution: Link MLCommons loadgen + reference models once silicon/FPGA targets exist.

verification:
  - command: python3 scripts/check_mlperf_inference.py
    result: PASS
  - command: python3 -m pytest benchmarks/mlperf/test_mlperf_inference.py
    result: PASS (8 tests)
