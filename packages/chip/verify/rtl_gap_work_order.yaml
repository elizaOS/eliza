version: 2
owner_scope: rtl_verification
fail_closed_required: true
last_review: 2026-05-17
audit_doc: docs/project/rtl-soc-critical-gap-audit.md
allowed_statuses:
  - open
required_gap_fields:
  - id
  - status
  - category
  - severity
  - affected_paths
  - current_evidence
  - blocking_gate
  - closure_evidence
  - work_order
areas:
  cpu:
    current_posture: executable_tiny_riscv_contract_model
    local_closures:
      - tiny CPU fetch/execute path drives the AXI-Lite contract wrapper in cocotb
      - unsupported instructions, fetch errors, and unaligned word memory requests halt locally
    fail_closed:
      - unsupported_opcodes_halt
      - fetch_error_halts
      - unaligned_lw_sw_halt_before_bus_request
    checks:
      - make cocotb-cpu
    critical_gaps:
      - id: cpu-real-core-integration
        status: open
        category: rtl_stub
        severity: critical
        affected_paths:
          - rtl/cpu/e1_tiny_cpu_contract.sv
          - rtl/cpu/e1_cpu_subsystem_stub.sv
          - rtl/interconnect/e1_linux_soc_contract.sv
          - verify/cocotb/e1_tiny_cpu_contract_tb.sv
          - verify/cocotb/test_tiny_cpu_execution.py
        partial_closure_evidence:
          - docs/rtl/cpu-config-selection.md (Chipyard Rocket RV64GC + SV39 + L1 I/D selection, wrapper layout under rtl/wrappers/, pin TODO)
        current_evidence: Tiny single-issue RV contract model now lives under the production-neutral module/file name rtl/cpu/e1_tiny_cpu_contract.sv. It supports only a small unprivileged instruction subset and halts on unsupported opcodes, fetch errors, and unaligned word accesses. The legacy rtl/cpu/e1_cpu_subsystem_stub.sv name is a thin compatibility alias only. Selected v0 CPU config is documented in docs/rtl/cpu-config-selection.md; generated RTL not yet imported.
        blocking_gate: Linux-capable SoC, bootable firmware, and product claims must remain blocked while this stub is present.
        closure_evidence: Production RV64 integration with privileged mode, reset/interrupt/timer path, boot ROM handoff, memory map, generated DTS, and executable boot smoke evidence.
        work_order: Replace the tiny contract model with a production RV64 core integration and privileged boot path.
      - id: cpu-privileged-boot-contract
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - rtl/cpu/e1_tiny_cpu_contract.sv
          - rtl/cpu/e1_cpu_subsystem_stub.sv
          - rtl/bootrom/e1_bootrom.sv
          - scripts/run_qemu.sh
          - scripts/run_renode.sh
        partial_closure_evidence:
          - docs/arch/boot-rom-spec.md (reset vector, OTP layout, secure-boot stub algorithm, OpenSBI handoff ABI, debug-lock policy)
          - fw/boot-rom/reset.S (executable RV64 reset stub jumping to OpenSBI entry)
          - fw/boot-rom/Makefile (tools-checked build rule producing e1_boot_rom.bin/.hex/.dump)
          - fw/boot-rom/linker.ld (4 KiB ROM aperture at 0x0000_1000)
          - verify/cocotb/test_clint_timer_irq.py (CLINT timer/software-irq scaffold, skipped until CLINT lands)
        current_evidence: Boot ROM exposes fixed readable words and a boot-vector contract; the executable reset stub now exists in fw/boot-rom/ and the OpenSBI handoff ABI is specified in docs/arch/boot-rom-spec.md. Pad-level RTL still has no CLINT, PLIC-compatible target, MMU, cache, UART console, or live firmware entry path.
        blocking_gate: QEMU/Renode semantic checks must not be treated as e1-chip boot validation.
        closure_evidence: Firmware ELF boots through the RTL-equivalent address map in simulation or emulation and emits a checked serial transcript.
        work_order: Define and verify a bootable CPU, timer, interrupt, memory, and console contract before claiming OS bring-up.
      - id: cpu-legacy-stub-module-name
        status: open
        category: misleading_pass_gate
        severity: medium
        affected_paths:
          - rtl/cpu/e1_tiny_cpu_contract.sv
          - rtl/cpu/e1_cpu_subsystem_stub.sv
          - Makefile
          - scripts/run_rtl_check.sh
        partial_closure_evidence:
          - rtl/cpu/e1_tiny_cpu_contract.sv (primary tiny executable CPU contract implementation)
          - rtl/cpu/e1_cpu_subsystem_stub.sv (thin compatibility alias wrapping e1_tiny_cpu_contract)
          - verify/cocotb/e1_tiny_cpu_contract_tb.sv (testbench instantiates e1_tiny_cpu_contract directly)
        current_evidence: The executable tiny CPU contract has been renamed to e1_tiny_cpu_contract and the legacy e1_cpu_subsystem_stub module is only a compatibility wrapper. Normal RTL/cocotb source lists include the primary module before the alias. This resolves the misleading primary module name, but it is still not a production CPU/AP wrapper.
        blocking_gate: Passing lint/synthesis must not imply that a production CPU subsystem exists; e1_tiny_cpu_contract remains a non-Linux-capable contract model.
        closure_evidence: Real production CPU/AP wrapper with privileged mode, MMU/cache/timer/interrupt evidence, boot ROM handoff, generated DTS, and executable boot transcript.
        work_order: Mitigated for the misleading-name risk; keep the legacy e1_cpu_subsystem_stub wrapper as compatibility-only and do not promote e1_tiny_cpu_contract beyond scaffold status. Replace the tiny contract with the selected production CPU/AP wrapper when generated RTL lands.
  interconnect:
    current_posture: axi_lite_contract_fabric
    local_closures:
      - CPU-side AXI-Lite decode reaches DRAM, interrupt-controller, and DMA-control windows
      - DMA master shares the DRAM target with CPU-side traffic in the contract wrapper
    fail_closed:
      - unmapped_cpu_reads_return_decerr
      - unmapped_cpu_writes_return_decerr
      - dma_memory_errors_propagate_to_status
    checks:
      - make cocotb-contract
    critical_gaps:
      - id: interconnect-full-soc-routing
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - rtl/top/e1_soc_top.sv
          - rtl/interconnect/e1_axi_lite_interconnect.sv
          - rtl/interconnect/e1_linux_soc_contract.sv
          - verify/cocotb/test_cpu_mem_intc_contract.py
        partial_closure_evidence:
          - verify/cocotb/test_mmio_decode_error.py (unmapped-address DECERR sweep for reads/writes and post-DECERR liveness)
          - verify/cocotb/test_reset_domain_cleanup.py (post-reset register defaults and handshake-signal idle)
        current_evidence: Debug-MMIO top routes fixed device windows and a small internal DRAM array; Linux contract fabric routes DRAM, interrupt-controller, DMA MMIO, NPU MMIO, and display MMIO windows. Unmapped-MMIO DECERR sweep, reset-domain idle checks, CPU-side NPU/display MMIO round trips, and DMA-to-NPU/display no-side-effect containment are covered by cocotb contract scaffolds.
        blocking_gate: Full SoC routing, ordering, coherency, and multi-master claims remain blocked.
        closure_evidence: Address map generated from the platform contract with protocol assertions, backpressure coverage, error response tests, and arbitration coverage across all masters.
        work_order: Add complete SoC address routing, ordering, and arbitration coverage beyond the current contract windows.
      - id: interconnect-display-npu-linux-mmio
        status: open
        category: incomplete_subsystem
        severity: high
        affected_paths:
          - rtl/interconnect/e1_axi_lite_interconnect.sv
          - rtl/interconnect/e1_linux_soc_contract.sv
          - rtl/display/e1_display.sv
          - rtl/npu/e1_npu.sv
          - verify/cocotb/test_cpu_mem_intc_contract.py
          - docs/arch/memory-map.md
          - docs/arch/interconnect.md
          - scripts/check_platform_contract.py
          - scripts/test_platform_contract_linux_decode.py
        current_evidence: Mitigated for Linux-contract MMIO exposure. The AXI-Lite scaffold decodes 0x1002_0000 NPU control and 0x1003_0000 display control windows, instantiates e1_npu/e1_display MMIO target wrappers, and covers both paths in verify/cocotb/test_cpu_mem_intc_contract.py (`linux_contract_npu_mmio`, `linux_contract_display_mmio`, `dma_npu_display_mmio_no_side_effect`). `make platform-contract-check` now also verifies the Linux AXI-Lite decoder bases against the generated CPU-variant platform contract and carries a stale-NPU-base regression. NPU descriptor-master traffic still fails closed and display framebuffer reads are not routed through production DRAM.
        blocking_gate: Full Linux device coverage still requires production NPU/display memory-fabric paths, IOMMU/coherency policy, and QoS/bandwidth evidence.
        closure_evidence: NPU and display AXI-Lite target wrappers are routed, tested for decode errors, and checked against generated software headers.
        work_order: Mitigated for AXI-Lite MMIO routing and generated-artifact address drift; keep production device coverage blocked until memory-fabric and IOMMU/coherency evidence lands.
      - id: interconnect-axi-lite-proof-coverage
        status: open
        category: proof_gap
        severity: high
        affected_paths:
          - verify/formal/e1_soc_top_formal.sv
          - scripts/yosys_formal_top_structural.ys
          - scripts/run_formal.sh
          - verify/formal/e1_axi_lite_dram.sby
          - verify/formal/e1_axi_lite_dram_bind.sv
          - verify/formal/e1_axi_lite_interconnect.sby
          - verify/formal/e1_axi_lite_interconnect_bind.sv
        partial_closure_evidence:
          - verify/properties/axi_lite_protocol.sv (parametric AXI-Lite property pack ready for bind to debug bridge, interconnect, DRAM, DMA master, and interrupt-controller paths)
          - verify/properties/README.md (bind usage and SymbiYosys harness instructions)
          - verify/properties/dma_axil_bind.sv + verify/properties/dma_axil.sby (first concrete bind targeting the DMA master)
          - verify/formal/e1_axi_lite_dram_bind.sv + verify/formal/e1_axi_lite_dram.sby (AXI-Lite property bind for the DRAM target)
          - verify/formal/e1_axi_lite_interconnect_bind.sv + verify/formal/e1_axi_lite_interconnect.sby (AXI-Lite property bind for the CPU-facing interconnect path, updated for NPU/display target ports)
        current_evidence: Top formal still proves a few structural facts with shallow BMC or Yosys check fallback. `make formal` now includes SBY AXI-Lite property tasks for DMA, DRAM, and the CPU-facing interconnect path when SymbiYosys is available, and the formal manifest tracks those jobs separately; fallback manifests label the AXI-Lite SBY jobs as blocked rather than equivalent.
        blocking_gate: Formal pass must be reported as shallow structural coverage only.
        closure_evidence: AXI-Lite assume/assert coverage for valid-ready stability, response liveness under bounded fairness, unmapped DECERR paths, and independent read/write channel stalls.
        work_order: Add reusable AXI-Lite properties and bind them to debug bridge, interconnect, DRAM, DMA master, and interrupt-controller paths.
  dma:
    current_posture: word_copy_engine_with_error_status
    fail_closed:
