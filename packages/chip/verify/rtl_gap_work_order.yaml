version: 2
owner_scope: rtl_verification
fail_closed_required: true
last_review: 2026-05-17
audit_doc: docs/project/rtl-soc-critical-gap-audit.md
allowed_statuses:
  - open
required_gap_fields:
  - id
  - status
  - category
  - severity
  - affected_paths
  - current_evidence
  - blocking_gate
  - closure_evidence
  - work_order
areas:
  cpu:
    current_posture: executable_tiny_riscv_contract_model
    local_closures:
      - tiny CPU fetch/execute path drives the AXI-Lite contract wrapper in cocotb
      - unsupported instructions, fetch errors, and unaligned word memory requests halt locally
    fail_closed:
      - unsupported_opcodes_halt
      - fetch_error_halts
      - unaligned_lw_sw_halt_before_bus_request
    checks:
      - make cocotb-cpu
    critical_gaps:
      - id: cpu-real-core-integration
        status: open
        category: rtl_stub
        severity: critical
        affected_paths:
          - rtl/cpu/e1_cpu_subsystem_stub.sv
          - rtl/interconnect/e1_linux_soc_contract.sv
          - verify/cocotb/e1_tiny_cpu_contract_tb.sv
          - verify/cocotb/test_tiny_cpu_execution.py
        partial_closure_evidence:
          - docs/rtl/cpu-config-selection.md (Chipyard Rocket RV64GC + SV39 + L1 I/D selection, wrapper layout under rtl/wrappers/, pin TODO)
        current_evidence: Tiny single-issue RV contract model supports only a small unprivileged instruction subset and halts on unsupported opcodes, fetch errors, and unaligned word accesses. Selected v0 CPU config is documented in docs/rtl/cpu-config-selection.md; generated RTL not yet imported.
        blocking_gate: Linux-capable SoC, bootable firmware, and product claims must remain blocked while this stub is present.
        closure_evidence: Production RV64 integration with privileged mode, reset/interrupt/timer path, boot ROM handoff, memory map, generated DTS, and executable boot smoke evidence.
        work_order: Replace the tiny contract model with a production RV64 core integration and privileged boot path.
      - id: cpu-privileged-boot-contract
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - rtl/cpu/e1_cpu_subsystem_stub.sv
          - rtl/bootrom/e1_bootrom.sv
          - scripts/run_qemu.sh
          - scripts/run_renode.sh
        partial_closure_evidence:
          - docs/arch/boot-rom-spec.md (reset vector, OTP layout, secure-boot stub algorithm, OpenSBI handoff ABI, debug-lock policy)
          - fw/boot-rom/reset.S (executable RV64 reset stub jumping to OpenSBI entry)
          - fw/boot-rom/Makefile (tools-checked build rule producing e1_boot_rom.bin/.hex/.dump)
          - fw/boot-rom/linker.ld (4 KiB ROM aperture at 0x0000_1000)
          - verify/cocotb/test_clint_timer_irq.py (CLINT timer/software-irq scaffold, skipped until CLINT lands)
        current_evidence: Boot ROM exposes fixed readable words and a boot-vector contract; the executable reset stub now exists in fw/boot-rom/ and the OpenSBI handoff ABI is specified in docs/arch/boot-rom-spec.md. Pad-level RTL still has no CLINT, PLIC-compatible target, MMU, cache, UART console, or live firmware entry path.
        blocking_gate: QEMU/Renode semantic checks must not be treated as e1-chip boot validation.
        closure_evidence: Firmware ELF boots through the RTL-equivalent address map in simulation or emulation and emits a checked serial transcript.
        work_order: Define and verify a bootable CPU, timer, interrupt, memory, and console contract before claiming OS bring-up.
      - id: cpu-legacy-stub-module-name
        status: open
        category: misleading_pass_gate
        severity: medium
        affected_paths:
          - rtl/cpu/e1_cpu_subsystem_stub.sv
          - Makefile
          - scripts/run_rtl_check.sh
        partial_closure_evidence:
          - docs/rtl/cpu-config-selection.md (integration step 7 schedules the rename to e1_tiny_cpu_contract with a one-release alias)
        current_evidence: The executable model is still named as a stub and is included in normal RTL and synthesis source lists; rename plan now documented but not yet executed.
        blocking_gate: Passing lint/synthesis must not imply that a production CPU subsystem exists.
        closure_evidence: Production-named CPU wrapper with any compatibility alias clearly documented as non-product scaffolding.
        work_order: Preserve the legacy e1_cpu_subsystem_stub wrapper only as a compatibility alias once a production-named CPU wrapper exists.
  interconnect:
    current_posture: axi_lite_contract_fabric
    local_closures:
      - CPU-side AXI-Lite decode reaches DRAM, interrupt-controller, and DMA-control windows
      - DMA master shares the DRAM target with CPU-side traffic in the contract wrapper
    fail_closed:
      - unmapped_cpu_reads_return_decerr
      - unmapped_cpu_writes_return_decerr
      - dma_memory_errors_propagate_to_status
    checks:
      - make cocotb-contract
    critical_gaps:
      - id: interconnect-full-soc-routing
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - rtl/top/e1_soc_top.sv
          - rtl/interconnect/e1_axi_lite_interconnect.sv
          - rtl/interconnect/e1_linux_soc_contract.sv
          - verify/cocotb/test_cpu_mem_intc_contract.py
        partial_closure_evidence:
          - verify/cocotb/test_mmio_decode_error.py (unmapped-address DECERR sweep for reads/writes and post-DECERR liveness)
          - verify/cocotb/test_reset_domain_cleanup.py (post-reset register defaults and handshake-signal idle)
        current_evidence: Debug-MMIO top routes fixed device windows and a small internal DRAM array; Linux contract fabric routes only DRAM, DMA MMIO, and interrupt-controller windows. Unmapped-MMIO DECERR sweep and reset-domain idle checks added as cocotb scaffolds.
        blocking_gate: Full SoC routing, ordering, coherency, and multi-master claims remain blocked.
        closure_evidence: Address map generated from the platform contract with protocol assertions, backpressure coverage, error response tests, and arbitration coverage across all masters.
        work_order: Add complete SoC address routing, ordering, and arbitration coverage beyond the current contract windows.
      - id: interconnect-display-npu-linux-mmio
        status: open
        category: incomplete_subsystem
        severity: high
        affected_paths:
          - rtl/interconnect/e1_linux_soc_contract.sv
          - rtl/display/e1_display.sv
          - rtl/npu/e1_npu.sv
        current_evidence: Linux-capable contract wrapper does not expose display and NPU target wrappers under the software-visible routing policy.
        blocking_gate: Linux scaffold cannot claim complete device coverage.
        closure_evidence: NPU and display AXI-Lite target wrappers are routed, tested for decode errors, and checked against generated software headers.
        work_order: Add AXI-Lite target wrappers for display and NPU under the Linux-capable contract map once the software-visible routing policy is frozen.
      - id: interconnect-axi-lite-proof-coverage
        status: open
        category: proof_gap
        severity: high
        affected_paths:
          - verify/formal/e1_soc_top_formal.sv
          - scripts/yosys_formal_top_structural.ys
          - scripts/run_formal.sh
        partial_closure_evidence:
          - verify/properties/axi_lite_protocol.sv (parametric AXI-Lite property pack ready for bind to debug bridge, interconnect, DRAM, DMA master, and interrupt-controller paths)
          - verify/properties/README.md (bind usage and SymbiYosys harness instructions)
          - verify/properties/dma_axil_bind.sv + verify/properties/dma_axil.sby (first concrete bind targeting the DMA master)
        current_evidence: Top formal proves a few structural facts with shallow BMC or Yosys check fallback; it does not use an AXI-Lite property set.
        blocking_gate: Formal pass must be reported as shallow structural coverage only.
        closure_evidence: AXI-Lite assume/assert coverage for valid-ready stability, response liveness under bounded fairness, unmapped DECERR paths, and independent read/write channel stalls.
        work_order: Add reusable AXI-Lite properties and bind them to debug bridge, interconnect, DRAM, DMA master, and interrupt-controller paths.
  dma:
    current_posture: word_copy_engine_with_error_status
    fail_closed:
      - unaligned_programming_sets_error
      - memory_response_errors_set_error
    checks:
      - make cocotb-contract
      - make formal
    critical_gaps:
      - id: dma-real-memory-system
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - rtl/dma/e1_dma.sv
          - rtl/top/e1_soc_top.sv
          - rtl/interconnect/e1_linux_soc_contract.sv
          - verify/cocotb/test_cpu_mem_intc_contract.py
          - verify/formal/e1_dma_formal.sv
        partial_closure_evidence:
          - verify/cocotb/dma/test_dma_long_transfer.py (1 KiB transfer, partial-tail byte strobes, unaligned-programming error, completion IRQ, SLVERR propagation; not yet wired into make cocotb)
        current_evidence: DMA is a word-copy AXI-Lite master with status/error counters; pad-level top connects it to a 4 KiB internal DRAM array, not a production memory hierarchy.
        blocking_gate: DMA throughput, coherency, burst, cache interaction, and software-driver performance claims remain blocked.
        closure_evidence: Verified production memory target, long transfer tests, partial-beat behavior, backpressure permutations, coherency policy, interrupt completion, and error injection coverage.
        work_order: Verify DMA against the production memory hierarchy, coherency policy, and long burst behavior.
      - id: dma-proof-depth-and-protocol
        status: open
        category: proof_gap
        severity: high
        affected_paths:
          - verify/formal/e1_dma_formal.sv
          - verify/formal/e1_dma.sby
          - scripts/yosys_formal_dma.ys
        partial_closure_evidence:
          - verify/properties/axi_lite_protocol.sv (reusable AXI-Lite property pack: VALID/payload stability, response legality, bounded liveness, outstanding-transaction balance)
          - verify/properties/dma_axil_bind.sv (bind harness wrapping e1_dma master ports)
          - verify/properties/dma_axil.sby (SymbiYosys bmc depth 32 + prove depth 16 tasks)
        current_evidence: Formal depth is 12 and checks basic status and signal relationships, but not full transfer completion, liveness, backpressure stability, or all response/error interleavings.
        blocking_gate: Formal pass must not be described as full DMA correctness.
        closure_evidence: Bounded and induction-style proofs or exhaustive constrained tests for transfer progress, no double issue, response matching, error propagation, and clear/restart sequencing.
        work_order: Extend DMA formal coverage with protocol properties and longer transfer invariants.
  npu:
    current_posture: mmio_datapath_and_small_scratch_gemm
    fail_closed:
      - unsupported_opcode_sets_error
      - invalid_gemm_config_sets_error
    checks:
      - make cocotb
      - make verilator
      - make formal
    critical_gaps:
      - id: npu-production-accelerator
        status: open
        category: rtl_stub
        severity: critical
        affected_paths:
          - rtl/npu/e1_npu.sv
          - verify/cocotb/test_e1_npu.py
          - verify/verilator/test_npu_gemm.cpp
          - verify/formal/e1_npu_formal.sv
        partial_closure_evidence:
          - docs/arch/npu-microarch.md (Gemmini v0 selection, MMIO map, 64-byte descriptor format, tensor memory ABI, v0 op set, IRQ/error registers, CPU fallback contract, validated envelope)
          - verify/cocotb/npu/test_npu_queue_stress.py (skipped scaffolds for descriptor queue stress, completion IRQ, unsupported-op status pending e1_npu_gemmini_wrapper RTL)
        current_evidence: NPU is an MMIO datapath with scalar ops and bounded scratch GEMM registers; it has no queue, descriptor fetch, tensor memory interface, backpressure, or integration with a production accelerator.
        blocking_gate: AI accelerator, throughput, model execution, and software fallback percentage claims remain blocked.
        closure_evidence: Selected accelerator microarchitecture or wrapped IP with descriptor ABI, memory interface, tensor layout, interrupts, driver contract, performance counters, and coverage reports.
        work_order: Replace the bounded scratch GEMM path with the selected accelerator microarchitecture and system memory interface.
      - id: npu-test-coverage-accounting
        status: open
        category: test_gap
        severity: high
        affected_paths:
          - verify/cocotb/test_e1_npu.py
          - verify/verilator/test_npu_gemm.cpp
          - docs/three-week-prototype-workstreams.md
        current_evidence: Tests exercise selected operations and a small GEMM case but do not publish opcode, shape, saturation, invalid-programming, or fallback coverage summaries.
        blocking_gate: Passing cocotb/verilator must be interpreted as smoke and directed contract coverage.
        closure_evidence: Machine-readable coverage summary for all exposed opcodes, dimensions, status bits, IRQ paths, invalid configs, and software fallback cases.
        work_order: Add coverage accounting and require it in CI before expanding NPU pass claims.
  display:
    current_posture: timing_generator_with_top_level_sram_framebuffer_fetch
    local_closures:
      - e1_soc_top connects display scanout reads to the debug-visible SRAM-backed DRAM aperture
      - out-of-aperture framebuffer addresses deassert ready and increment display underflow status
    fail_closed:
      - disabled_display_keeps_vsync_low
      - unsupported_pixel_format_write_is_ignored
      - out_of_aperture_framebuffer_reads_underflow
    checks:
      - make cocotb
    critical_gaps:
      - id: display-real-framebuffer-path
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - rtl/display/e1_display.sv
          - rtl/top/e1_soc_top.sv
          - verify/cocotb/test_e1_display.py
        partial_closure_evidence:
          - arch/display.md "v0 reference panel" section (720x1280 MIPI-DSI selection and DCS init sequence summary)
          - verify/cocotb/display/test_display_timing.py (hsync/vsync cadence under perfect framebuffer; fetched+underflow invariant under backpressuring framebuffer)
        current_evidence: Display has timing registers and a top-level SRAM-backed framebuffer read path, but no panel PHY, DSI bridge, format conversion pipeline, production underflow policy, or real panel init path.
        blocking_gate: Display subsystem pass must not imply real panel bring-up or production scanout bandwidth.
        closure_evidence: Framebuffer fetch with production memory QoS, underflow detection, pixel format coverage, mode programming, panel init, timing validation, and hardware-in-loop or cycle-accurate trace evidence.
        work_order: Replace the SRAM-backed scanout path with a production framebuffer client covering bandwidth, outstanding reads, format conversion, and underflow policy.
      - id: display-proof-gap
        status: open
        category: proof_gap
        severity: high
        affected_paths:
          - rtl/display/e1_display.sv
          - verify/formal/e1_soc_top_formal.sv
          - scripts/run_formal.sh
        partial_closure_evidence:
          - verify/cocotb/display/test_display_timing.py (starved-framebuffer underflow counter check drives UNDERFLOW_COUNT to exactly active_pixels)
        current_evidence: Display behavior is covered by cocotb smoke tests and top structural formal only; no dedicated formal properties constrain timing, coordinates, IRQ cadence, or read handshakes.
        blocking_gate: Formal pass does not cover display correctness.
        closure_evidence: Assertions for hsync/vsync cadence, active window bounds, framebuffer address monotonicity, disabled-state behavior, unsupported formats, and read-ready stalls.
        work_order: Add display-specific formal or property-driven cocotb coverage.
  bootrom:
    current_posture: identity_contract_rom_plus_executable_reset_scaffold
    local_closures:
      - ROM words expose magic, contract version, and the current handoff address for debug smoke tests
      - fw/boot-rom contains a minimal RV64 reset vector that sets mtvec, disables machine interrupts, and jumps to the current DRAM handoff address
    fail_closed:
      - unmapped_bootrom_words_read_zero
      - bootrom_check_blocks_or_builds_reset_artifact
    checks:
      - make bootrom-check
      - make cocotb
      - make platform-contract-check
    critical_gaps:
      - id: bootrom-firmware-handoff
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - fw/boot-rom/reset.S
          - fw/boot-rom/linker.ld
          - fw/boot-rom/check_boot_rom.py
          - rtl/bootrom/e1_bootrom.sv
          - sw/bootrom/e1_qemu_firmware.S
          - scripts/run_qemu.sh
        partial_closure_evidence:
          - docs/arch/boot-rom-spec.md (reset vector, OTP layout, signature-verification stub algorithm, OpenSBI handoff ABI, debug-lock policy)
          - fw/boot-rom/reset.S (executable RV64 reset stub: hart parking, CSR cleanup, trap shim, jr to OpenSBI entry)
          - fw/boot-rom/linker.ld (ROM aperture at architectural reset vector 0x0000_1000)
          - fw/boot-rom/Makefile (riscv64 cross-build with fail-closed tools-check)
        current_evidence: Contract ROM still returns identity/version words. An executable v0 reset stub now exists under fw/boot-rom/, with build rule and a documented OpenSBI handoff ABI. The stub is not yet wired into any CPU wrapper or exercised under simulation.
        blocking_gate: Firmware and OS boot gates remain blocked.
        closure_evidence: Executable reset ROM initializes machine state, validates handoff address, and is covered by RTL or emulator boot transcript checks.
        work_order: Replace the identity contract ROM with executable reset code that initializes M-mode state and hands off to OpenSBI or equivalent firmware.
  dram:
    current_posture: small_sram_backed_dram_aperture
    local_closures:
      - word-aligned byte-strobed reads and writes are exercised through debug MMIO, DMA, CPU contract, and display scanout paths
    fail_closed:
      - unaligned_axi_lite_accesses_return_slverr
      - out_of_model_axi_lite_accesses_return_slverr
    checks:
      - make cocotb-contract
      - make cocotb-cpu
      - make cocotb
    critical_gaps:
      - id: dram-controller-and-capacity
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - rtl/memory/e1_axi_lite_dram.sv
          - rtl/top/e1_soc_top.sv
          - rtl/interconnect/e1_linux_soc_contract.sv
        current_evidence: DRAM is modeled as a small AXI-Lite SRAM aperture, with no controller, PHY, refresh, timing, ECC, or large-capacity behavior.
        blocking_gate: Memory bandwidth, Linux memory sizing, and production DRAM claims remain blocked.
        closure_evidence: Real controller boundary or verified external memory model, capacity discovery, latency/backpressure coverage, error policy, and boot-time memory tests.
        work_order: Replace the SRAM model with a real DRAM controller boundary, larger capacity, latency/backpressure modeling, and boot-time memory discovery.
  pass_gates:
    current_posture: scaffold_checks_are_named_but_some_pass_without_real_tools_or_boot
    fail_closed:
      - stub_audit_requires_open_gap_manifest
      - qemu_and_renode_report_blocked_without_executable_smoke
      - formal_can_require_sby_with_REQUIRE_SBY
    checks:
      - make stub-audit
      - make formal
      - make qemu-check
      - make renode-check
    critical_gaps:
      - id: formal-yosys-fallback-is-not-equivalent
        status: open
        category: misleading_pass_gate
        severity: high
        affected_paths:
          - scripts/run_formal.sh
          - scripts/yosys_formal_top_structural.ys
          - scripts/yosys_formal_npu_structural.ys
          - scripts/yosys_formal_dma.ys
          - scripts/check_mvp_status.py
          - scripts/pipeline_check.py
        current_evidence: When SymbiYosys is missing, run_formal.sh can pass using Yosys structural/SAT fallback and generated fallback logs.
        blocking_gate: Release or signoff CI must set REQUIRE_SBY=1 and, where needed, REQUIRE_DEEP_FORMAL=1.
        closure_evidence: CI distinguishes structural checks from property proofs and records solver, depth, status, and covered modules per proof.
        work_order: Keep fallback labeled as fallback and prevent it from satisfying deep formal signoff gates.
      - id: qemu-renode-scaffold-pass-risk
        status: open
        category: misleading_pass_gate
        severity: high
        affected_paths:
          - scripts/run_qemu.sh
          - scripts/run_renode.sh
          - docs/three-week-prototype-workstreams.md
        current_evidence: Current checks can validate scaffold semantics or tool presence, but they are not executable e1-chip boot validation.
        blocking_gate: Boot/OS readiness must remain blocked without checked firmware image and serial transcript evidence.
        closure_evidence: Real QEMU/Renode run under timeout against a contract-compatible model or explicit non-e1 reference target, with transcript and exit-status checks.
        work_order: Split scaffold checks from boot-validation checks in status reporting and release archives.
