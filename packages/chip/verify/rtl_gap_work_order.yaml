          - verify/cocotb/npu/test_npu_queue_stress.py (skipped scaffolds for descriptor queue stress, completion IRQ, unsupported-op status pending e1_npu_gemmini_wrapper RTL)
        current_evidence: NPU is an MMIO datapath with scalar ops and bounded scratch GEMM registers; it has no queue, descriptor fetch, tensor memory interface, backpressure, or integration with a production accelerator.
        blocking_gate: AI accelerator, throughput, model execution, and software fallback percentage claims remain blocked.
        closure_evidence: Selected accelerator microarchitecture or wrapped IP with descriptor ABI, memory interface, tensor layout, interrupts, driver contract, performance counters, and coverage reports.
        work_order: Replace the bounded scratch GEMM path with the selected accelerator microarchitecture and system memory interface.
      - id: npu-test-coverage-accounting
        status: open
        category: test_gap
        severity: high
        affected_paths:
          - verify/cocotb/test_e1_npu.py
          - verify/verilator/test_npu_gemm.cpp
          - docs/three-week-prototype-workstreams.md
          - scripts/check_npu_coverage_summary.py
          - build/reports/npu_cocotb_coverage.json
          - build/reports/npu_coverage_summary.json
        current_evidence: >-
          `make cocotb-npu` now runs 21 directed RTL tests, the focused
          runtime fallback pytest, and `scripts/check_npu_coverage_summary.py`;
          the generated summary records all exposed opcode IDs,
          GEMM_S8/GEMM_S4/vector shapes, status/error bits, IRQ clear/assert
          paths, invalid-programming bins, descriptor read/write accounting,
          counter bins, and software fallback boundary coverage.
        blocking_gate: >-
          Passing cocotb/verilator is still only directed local RTL/runtime
          coverage; NPU production accelerator, NNAPI, model throughput, power,
          and phone-class claims remain blocked by `npu-production-accelerator`
          and `npu-formal-engine-coverage`.
        closure_evidence: >-
          Machine-readable coverage summary for all exposed opcodes,
          dimensions, status bits, IRQ paths, invalid configs, and software
          fallback cases at `build/reports/npu_coverage_summary.json`.
        work_order: Mitigated for coverage accounting; keep production accelerator claims blocked until the microarchitecture/formal gaps close.
      - id: npu-formal-engine-coverage
        status: open
        category: proof_gap
        severity: high
        affected_paths:
          - verify/formal/e1_npu_formal.sv
          - verify/formal/e1_npu.sby
          - verify/properties/npu_axil_bind.sv
          - rtl/npu/e1_npu.sv
        current_evidence: >-
          The addr<8 ceiling and the assume(!start) constraint are removed
          (dossier §5.6.5). The harness now drives the full MMIO map and free
          AXI-Lite slave responses, so the GEMM tile loop, the vector engine,
          the packed scalar datapath, and the descriptor-ring FSM all run under
          BMC depth 12, converging to PASS on smtbmc z3 (and independently on
          bitwuzla) with the engine-agreement gate green. Proven, non-vacuous,
          port-observable properties (reachability confirmed by anti-cover BMC
          on the rdata interface): descriptor empty-flag soundness and
          empty/busy exclusivity and reserved-bit zeroing via DESC_STATUS
          (6'h13); monotonicity of DESC_BYTES_READ/WRITTEN (6'h19/6'h1a),
          PERF_STALL_CYCLES (6'h1d) and PERF_SCRATCH_BYTES (6'h1e) absent the
          documented clears; thermal-throttle no-downward-step (6'h1f) absent a
          clear; STATUS_AUX reserved-bit zeroing; scalar mirror coverage; and
          the AXI-Lite protocol property pack bound to the NPU master port
          (verify/properties/npu_axil_bind.sv, master-side proof with
          AXIL_PROTO_ASSUME_LIVENESS).
        blocking_gate: >-
          NPU formal pass now covers the software-visible (rdata-port and
          AXI-master) contract of the descriptor/GEMM/vector engines, but NOT
          the internal-only tile-address datapath (see remaining_gap). It must
          not be read as full GEMM/vector address-generation closure.
        remaining_gap: >-
          The internal-only GEMM/vector properties from §5.6.5 — gemm tile
          scratchpad write/read index bounds, INT4 nibble-mode address widening,
          gemm_acc width/overflow, and the vector cursor windows
          (vec_src_base+vec_len<=64 / vec_dst_base+vec_len<=64) — depend on nets
          (gemm_c_addr, gemm_a_addr, gemm_cfg_ok, vec_i, gemm_l, gemm_acc, ...)
          that are not module ports. The native Yosys SystemVerilog frontend
          used by this flow reads BOTH cross-module hierarchical references
          (dut.<net>) AND bind-port connections to a submodule's internal
          regs/wires as free, disconnected wires: a bind-connected
          perf_thermal_throttle proves "always 0" while the same counter read
          back through the rdata port is provably nonzero, and bind-read
          gemm_cfg_ok evaluates true with gemm_m==0 (impossible per the RTL
          combinational definition). Any assertion written against those taps is
          therefore unsound/vacuous and was deliberately not shipped (a false
          proof is worse than no proof). These properties also are not
          observable through the rdata register map (the tile addresses are not
          exposed). The desc_timeout>=128 exit edge and the thermal wrap at
          2^32 likewise need depth>=128 / count-near-2^32 to witness and are not
          reachable at the depth-12 BMC budget.
        closure_evidence: >-
          Either (a) a toolchain that resolves SystemVerilog bind/hierarchical
          taps into submodule internal nets (e.g. a different Verilog frontend
          or a Verific-based flow), then add the internal GEMM tile bounds /
          INT4 widening / gemm_acc-overflow and vector-cursor assertions with a
          verified converging PASS and engine agreement; or (b) expose the tile
          addresses / accumulator through a debug/observability MMIO window in
          rtl/npu/e1_npu.sv and prove the bounds through that port. Add
          k-induction (mode prove) or depth>=128 to witness the desc_timeout
          firing edge and a near-2^32 thermal saturation case.
        work_order: >-
          Follow-up to dossier §5.6.5. The MMIO/AXI-observable engine contract
          is closed at depth 12 with engine agreement. The internal tile-address
          datapath remains blocked on the Yosys-frontend internal-net
          observability limitation above; close it via a bind-capable frontend
          or a debug observability port, not by asserting against the
          free-wire taps. Routine make formal runs e1_npu.sby single-engine
          (z3) so the agreement gate stays green and the run_formal.sh
          status/logfile copy contract is preserved; bitwuzla parity was
          verified out of band.
  display:
    current_posture: timing_generator_with_top_level_sram_framebuffer_fetch
    local_closures:
      - e1_soc_top connects display scanout reads to the debug-visible SRAM-backed DRAM aperture
      - out-of-aperture framebuffer addresses deassert ready and increment display underflow status
    fail_closed:
      - disabled_display_keeps_vsync_low
      - unsupported_pixel_format_write_is_ignored
      - out_of_aperture_framebuffer_reads_underflow
    checks:
      - make cocotb
    critical_gaps:
      - id: display-real-framebuffer-path
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - rtl/display/e1_display.sv
          - rtl/display/e1_display_scanout.sv
          - rtl/top/e1_soc_top.sv
          - verify/cocotb/test_e1_display.py
          - verify/cocotb/display/test_display_scanout.py
        partial_closure_evidence:
          - arch/display.md "v0 reference panel" section (720x1280 MIPI-DSI selection and DCS init sequence summary)
          - rtl/display/e1_display_scanout.sv (production AXI4 read master + line FIFO + byte-assembly format unpack + register-programmed mode timing + DPI/DSI boundary, lint-clean under verilator --lint-only)
          - verify/cocotb/display/test_display_scanout.py (XR24/RGB565/packed-RGB888 framebuffer scanout matches backing DRAM; mode timing matches programmed porches; forced underflow sets the status bit and recovers; disabled state, unsupported formats, AR stride monotonicity, AXI error status, and DCS/IRQ vsync cadence are property-checked) via scripts/check_display_scanout.py
        current_evidence: >-
          A production scanout controller (rtl/display/e1_display_scanout.sv)
          models the buildable subset — AXI4 read master with QoS=DISPLAY_RT,
          INCR bursts, multiple outstanding reads, a line FIFO with
          backpressure, a fail-closed underflow policy (defined fill colour +
          sticky status + counter), byte-assembly pixel-format unpack
          (RGB565/packed RGB888/XRGB8888), register-programmed H/V mode
          timing, and the digital controller->PHY DPI/DSI boundary. It is now
          wired into e1_soc_integrated at the 0x1003_0000 display aperture:
          its 32-bit AXI4 read master is upsized to the 128-bit fabric and
          attached as fabric master[11], with display_scanout_reads_fabric_dram
          proving reads through e1_axi4_interconnect into e1_dram_ctrl. The
          legacy e1_soc_top path still uses e1_display.sv for v0 smoke
          compatibility. The DSI analog PHY, D-PHY serializers, panel DCS init,
          DTS/software binding, async pixel-clock CDC, and HIL/bandwidth trace
          evidence remain physical/product dependencies.
        blocking_gate: Display subsystem pass must not imply real panel bring-up, the DSI analog PHY, DTS/software integration, or e1_soc_top v0-path replacement.
        closure_evidence: DTS binding, panel DCS init at the DSI-host boundary, async pixel-clock CDC, e1_soc_top v0-path replacement or formal deprecation of that path, and hardware-in-loop or cycle-accurate scanout-bandwidth trace evidence.
        work_order: Add the DTS node + DSI-host command boundary, close the async pixel-clock CDC, and either replace e1_soc_top's legacy SRAM-backed display path or formally deprecate that top in favor of e1_soc_integrated.
      - id: display-proof-gap
        status: open
        category: proof_gap
        severity: high
        affected_paths:
          - rtl/display/e1_display.sv
          - rtl/display/e1_display_scanout.sv
          - verify/formal/e1_soc_top_formal.sv
          - scripts/run_formal.sh
        partial_closure_evidence:
          - verify/cocotb/display/test_display_scanout.py (property-driven cocotb coverage — framebuffer-match per format, programmed-mode hsync/vsync/de cadence, DCS/IRQ vsync cadence, disabled-state quiescence, unsupported-format rejection, AR address monotonicity/stride alignment, AXI error status accounting, and forced-underflow status+recovery) via scripts/check_display_scanout.py
          - scripts/check_display_scanout.py (requires the 10 named scanout/property tests and resolves the vendored OSS CAD Suite Verilator when it is not on PATH)
        current_evidence: >-
          The scanout controller now has property-driven cocotb coverage in
          addition to directed KATs. The standalone display gate requires 10
          tests: format-correct framebuffer match for XR24/RGB565/packed
          RGB888, programmed hsync/vsync/de timing, forced underflow
          status+recovery, disabled-state quiescence, unsupported-format
          rejection, framebuffer AR monotonicity and stride alignment, AXI
          SLVERR/DECERR status accounting, and DCS/IRQ vsync cadence.
          Dedicated SVA/formal display proofs remain a follow-on; current
          closure is cocotb property coverage plus lint.
        blocking_gate: Formal pass still does not cover display correctness; report this as directed/property cocotb coverage, not full formal display proof.
        closure_evidence: Optional SVA/formal assertions for the same hsync/vsync cadence, active window bounds, framebuffer address monotonicity, disabled-state behavior, unsupported formats, read-ready stalls, and AXI error accounting.
        work_order: Add display-specific SVA/formal coverage if this subsystem needs formal signoff beyond the current property-driven cocotb gate.
  bootrom:
    current_posture: identity_contract_rom_plus_executable_reset_scaffold
    local_closures:
      - ROM words expose magic, contract version, and the current handoff address for debug smoke tests
