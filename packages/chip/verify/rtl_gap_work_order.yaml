    critical_gaps:
      - id: dma-real-memory-system
        status: open
        category: incomplete_subsystem
        severity: critical
        affected_paths:
          - rtl/dma/e1_dma.sv
          - rtl/top/e1_soc_top.sv
          - rtl/interconnect/e1_linux_soc_contract.sv
          - verify/cocotb/test_cpu_mem_intc_contract.py
          - verify/cocotb/dma/test_dma_long_transfer.py
          - verify/cocotb/dma/Makefile
          - scripts/check_dma_long_transfer_coverage.py
          - scripts/test_dma_long_transfer_coverage.py
          - Makefile
          - verify/formal/e1_dma_formal.sv
        partial_closure_evidence:
          - verify/cocotb/dma/test_dma_long_transfer.py (1 KiB transfer, partial-tail byte strobes, unaligned-programming error, completion IRQ, SLVERR propagation; now wired into make cocotb-dma)
          - scripts/check_dma_long_transfer_coverage.py (fails closed unless the machine-readable long-transfer coverage artifact includes every required contract and its non-production boundary)
          - build/reports/dma_long_transfer_cocotb_coverage.json (machine-readable long-transfer coverage contracts)
        current_evidence: DMA is a word-copy AXI-Lite master with status/error counters. `make cocotb-dma` now runs both the randomized standalone DMA suite and the long-transfer suite, then validates the long-transfer coverage artifact for 1 KiB transfers, partial-tail byte strobes, unaligned-programming error, completion IRQ, and read-SLVERR propagation. Pad-level top still connects DMA to a 4 KiB internal DRAM array, not a production memory hierarchy.
        blocking_gate: DMA throughput, coherency, burst, cache interaction, and software-driver performance claims remain blocked.
        closure_evidence: Verified production memory target, long transfer tests, partial-beat behavior, backpressure permutations, coherency policy, interrupt completion, and error injection coverage.
        work_order: Verify DMA against the production memory hierarchy, coherency policy, and long burst behavior.
      - id: dma-proof-depth-and-protocol
        status: open
        category: proof_gap
        severity: high
        affected_paths:
          - verify/formal/e1_dma_formal.sv
          - verify/formal/e1_dma.sby
          - scripts/yosys_formal_dma.ys
        partial_closure_evidence:
          - verify/properties/axi_lite_protocol.sv (reusable AXI-Lite property pack: VALID/payload stability, response legality, bounded liveness, outstanding-transaction balance)
          - verify/properties/dma_axil_bind.sv (bind harness wrapping e1_dma master ports)
          - verify/properties/dma_axil.sby (SymbiYosys bmc depth 32 + prove depth 16 tasks)
        current_evidence: Formal depth is 12 and checks basic status and signal relationships, but not full transfer completion, liveness, backpressure stability, or all response/error interleavings.
        blocking_gate: Formal pass must not be described as full DMA correctness.
        closure_evidence: Bounded and induction-style proofs or exhaustive constrained tests for transfer progress, no double issue, response matching, error propagation, and clear/restart sequencing.
        work_order: Extend DMA formal coverage with protocol properties and longer transfer invariants.
  npu:
    current_posture: mmio_datapath_and_small_scratch_gemm
