derived_values:
  - name: vddcore_voltage
    value: 1.8 V
    source: pd/openlane/runs/RUN_2026-05-18_05-41-42/resolved.json VDD_PIN_VOLTAGE
  - name: post_route_total_power_nom_tt_025C_1v80
    value: 0.005554067902266979 W
    source: pd/openlane/runs/RUN_2026-05-18_05-41-42/final/metrics.json power__total
  - name: post_route_core_current_nominal
    value: 0.0030855932790372104 A
    source: power__total / 1.8 V
  - name: local_2x_margin_core_current
    value: 0.006171186558074421 A
    source: post_route_core_current_nominal * 2
  - name: vpwr_worst_ir_drop_nom_tt_025C_1v80
    value: 0.0000876137 V
    source: pd/openlane/runs/RUN_2026-05-18_05-41-42/final/metrics.json design_powergrid__drop__worst__net:VPWR
  - name: vgnd_worst_bounce_nom_tt_025C_1v80
    value: 0.00010598 V
    source: pd/openlane/runs/RUN_2026-05-18_05-41-42/final/metrics.json design_powergrid__drop__worst__net:VGND
  - name: npu_arch_model_min_observed_tops_reference_only
    value: 47.66254545454546 TOPS
    source: benchmarks/results/npu-arch-sim-open-2028/report.json metrics.min_observed_tops
  - name: invalid_cross_substrate_tops_per_w_reference_only
    value: 8581.556130253872 to 8849.729759324306 TOPS/W
    source: benchmarks/power/local-estimates/e1-npu-openlane-npu-estimates.json cross_substrate_arithmetic; prohibited for release use
rails:
  - name: VDDCORE
    board_net: +1V8
    voltage: 1.8 V
    local_post_route_current_nominal: 3.086 mA
    local_budget_with_2x_margin: 6.172 mA
    first_article_current_limit_recommendation: 25 mA until bench characterization replaces local estimate
    status: local_estimate_only
  - name: VDDIO
    board_net: +3V3
    voltage: 3.3 V
    local_post_route_current_nominal: unavailable
    first_article_current_limit_recommendation: 25 mA until IO pad model and board load are released
    status: missing_io_power_model
release_blockers:
  - Power is from OpenLane metrics only, not workload-calibrated vector or silicon data.
  - OpenLane power and modeled NPU TOPS do not share a substrate, workload, or measurement window; any TOPS/W arithmetic is invalid for release.
  - IR-drop evidence covers only local OpenROAD nominal analysis, not release corners.
  - EM evidence is not archived.
  - VDDIO current is not derived because IO pad and board load models are missing.
  - Board regulator, fuse, thermal, sustained-run, and first-article current-limit review is not archived.
