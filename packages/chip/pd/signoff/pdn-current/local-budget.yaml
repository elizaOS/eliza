selected_run: pd/openlane/runs/RUN_2026-05-18_05-41-42
source_artifacts:
  - pd/openlane/runs/RUN_2026-05-18_05-41-42/final/metrics.json
  - pd/openlane/runs/RUN_2026-05-18_05-41-42/final/metrics.csv
