    price_usd_10k: 8.20
    price_usd_100k: 7.00
    confidence: med
    notes: >
      Unisoc does not publish chip pricing; T606 ships in $60-class budget phones
      where bill-of-materials reverse-engineering pegs the SoC at $7-9. Direct
      Unisoc rep / SoM channel quotes for T606/T616 in 10k volumes cluster
      around $8 with ~15% drop into 100k volumes. T616 trades roughly +$0.40.

