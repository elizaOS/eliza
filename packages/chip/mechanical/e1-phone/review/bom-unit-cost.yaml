schema: eliza.e1_phone_bom_unit_cost.v1
date: 2026-05-20
status: sourcing_estimate_not_release_bom
claim_boundary: >
  Unit-cost analysis assembled from public Alibaba/AliExpress/LCSC/Made-in-China
  listings, distributor pages, and trade-press articles (May 2026 context).
  Prices below are sourcing analysts' working estimates for budgetary modelling.
  They are NOT signed supplier quotes and they do not constitute an AVL,
  purchase order, or production-release BOM. Items marked confidence=estimate
  use a cited analog as the price proxy; all such cases are flagged.
volume_assumptions:
  - 10000
  - 100000
currency: USD
incoterms_assumption: EXW Shenzhen, components landed at CM, no VAT
target_phone:
  envelope_mm: [78.0, 153.6, 9.6]
  battery_wh: 17.33
  display_in: 5.5
  region: global / China-domestic first

