schema: eliza.e1_phone_mechanical_intake_template_manifest.v1
date: "2026-05-22"
status: blocked_templates_only_no_release_evidence
claim_boundary: >-
  Mechanical intake templates are checked in so routed-board, supplier,
  validation, and factory evidence can be captured consistently. Blank
  templates do not prove enclosure fit, routed-board release, supplier CAD
  acceptance, physical validation, or production readiness.
review_dir: packages/chip/mechanical/e1-phone/review
required_release_evidence_absent:
  - routed_board_step_with_component_models
  - supplier_returned_step_and_2d_drawings
  - full_cad_boolean_interference_results
  - physical_fit_first_article_results
  - process_validation_results
templates:
