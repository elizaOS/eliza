    gate: routed_board_step_intake
    required_before_release: true
  - path: mechanical/e1-phone/review/routed-board-clearance-results-template.csv
    gate: routed_board_clearance
    required_before_release: true
  - path: mechanical/e1-phone/review/supplier-response-template.csv
    gate: supplier_return_evidence
    required_before_release: true
  - path: mechanical/e1-phone/review/full-cad-boolean-interference-results-template.csv
    gate: full_cad_clearance
    required_before_release: true
  - path: mechanical/e1-phone/review/gdt-fai-template.csv
    gate: first_article_inspection
    required_before_release: true
  - path: mechanical/e1-phone/review/acoustic-results-template.csv
    gate: acoustic_validation
    required_before_release: true
  - path: mechanical/e1-phone/review/camera-results-template.csv
    gate: camera_validation
    required_before_release: true
  - path: mechanical/e1-phone/review/display-results-template.csv
