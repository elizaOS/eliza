device:
  name: E1 phone EVT0 mechanical concept
  revision: evt0-mechanical-cad-swell-camera-seal
  envelope_mm: [78.0, 153.6, 12.7]
  corner_radius_mm: 7.5
  plastic_color: hard safety orange
  wall_thickness_mm: 1.15
  back_face: fully flush flat back; no camera bump, no protruding lens ring; rear camera and torch buried under flat back wall behind flush internal windows
  target_mass_g: 185
  ship_target_mass_g: 168
  design_language: hard orange phone-like slab with teenage-engineering/rabbit-r1 influence

display:
  candidate: Chenghao CH550FH01A-CT class 5.5 inch MIPI LCD + CTP
  ctp_outline_mm: [77.1, 151.77, 3.39]
  tft_outline_mm: [70.78, 129.17, 1.7]
  active_area_mm: [68.04, 120.96]
  cover_glass_mm: [77.1, 151.77, 0.7]
  adhesive_width_mm: 1.0
  adhesive_thickness_mm: 0.18
  compression_target_pct: 25
  fpc_connector_mm: [19.0, 3.2, 1.15]
  fpc_bend_radius_mm: 1.0
  z_from_front_mm: 0.35
  source_url: https://www.chenghaolcd.com/doc/26717023/5-5-inch-ltps-tft-lcd-module-1080-1920-resolution-mipi-lcd-screen.pdf

pcb:
  source: board/kicad/e1-phone/pcb/e1-phone-mainboard-concept.kicad_pcb
  outline_mm: [64.0, 132.0, 0.8]
  z_center_mm: -2.1
  edge_clearance_mm: 2.5

battery:
  candidate: LiPol LP566487 class 3.85 V 5727 mAh 22.05 Wh thick pouch
  envelope_mm: [64.0, 87.0, 5.6]
  z_center_mm: -1.8
  capacity_mah: 5727
  energy_wh: 22.05
  nominal_voltage_v: 3.85
  battery_swell_gap_mm: 0.6
  swell_gap_basis: >-
    LiPo pouch cells swell ~8-10 percent in thickness over life; for a 5.6 mm
    cell that is ~0.45-0.56 mm. The device thickness was raised from 11.8 to
    12.7 mm purely to open a defined >=0.6 mm swell void on the battery BACK
    face (toward the back shell, away from the display) so swell never pushes
    the display. The void is a real air gap between the battery back face
    (Z=-4.6 mm) and the back inner wall (Z=-5.2 mm); a compressible foam pad
    may occupy it without preloading the cell. The display-side gap stays the
    static 0.15 mm minimum so the cell cannot crack the panel under swell.
  capacity_basis: 4500 mAh baseline at 4.4 mm scaled linearly by pouch thickness (5.6/4.4); cell thickness unchanged at 5.6 mm so capacity stays 5727 mAh while the added device depth becomes swell void plus camera-burial clearance
  clearance_basis: front face at Z=+1.0 mm keeps 0.15 mm static gap below display_lcm back face (+1.15 mm); back face at Z=-4.6 mm keeps 0.6 mm swell gap to back inner wall (-5.2 mm) at the 12.7 mm device thickness

components:
  usb_c:
    candidate: GCT USB4105 USB2 Type-C receptacle, reinforced shell
    envelope_mm: [8.94, 7.8, 3.25]
    insertion_keepout_mm: [12.5, 10.5, 5.0]
    cycles: 20000
    source_url: https://gct.co/files/specs/usb4105-spec.pdf
    distributor_url: https://www.digikey.com/en/products/detail/gct/USB4105-GF-A/11198510
  speaker_bottom:
    candidate: 1115 micro speaker module with rear acoustic chamber
    envelope_mm: [15.0, 11.0, 3.5]
  earpiece:
    candidate: 1206 earpiece receiver behind glass slot/gasket
    envelope_mm: [12.0, 6.0, 2.5]
  microphone_bottom:
    candidate: bottom MEMS microphone with molded sound tunnel
    envelope_mm: [3.5, 2.65, 1.0]
  microphone_top:
    candidate: noise-cancel MEMS microphone
    envelope_mm: [3.5, 2.65, 1.0]
  haptic:
    candidate: compact 0612 X-axis linear resonant actuator
    envelope_mm: [6.0, 12.0, 2.5]
    source_note: commodity Shenzhen compact LRA class; exact vendor drawing required
  sim_tray:
    candidate: nano-SIM service tray or eSIM-only blocker placeholder
    envelope_mm: [12.3, 18.0, 1.2]
    keepout_mm: [14.5, 22.0, 2.0]
  rear_camera_glass:
    candidate: flush internal sapphire/glass insert set into the flat back wall, no proud ring
    envelope_mm: [9.2, 9.2, 0.55]
    mounting: internal-only window, outer face coplanar with the flat back outer surface (flush, not proud)
  rear_camera:
    candidate: single OV13855/OV13850 class 13 MP simple-AF MIPI module, single lens, buried under flush back wall
    module_mm: [10.0, 10.0, 5.1]
    lens_diameter_mm: 6.8
    lens_count: 1
    array: single
    burial_clearance_mm: 0.45
    burial_basis: >-
      Module back face sits 0.45 mm inside the back inner wall (was a marginal
      0.25-0.30 mm). The 12.7 mm device depth gives the 5.1 mm module a healthy
      >=0.4 mm burial under the flush flat back with the lens window coplanar
      with the back outer plane.
  rear_flash_led:
    candidate: OSRAM CEYW class 1.0x1.0x0.6 white flash LED
    driver: Awinic AW36515 I2C flash driver
    second_source: Everlight 1.0x1.0 flash LED
    seat_mm: [1.0, 1.0]
    envelope_mm: [1.0, 1.0, 0.7]
    window_mm: [1.6, 1.6, 0.5]
    emit_direction: -Z (out the flat back, through a flush light pipe/window)
    seat_match_note: 1.0x1.0 mm seat now matches a 1.0x1.0 mm-class emitter (replaces Lumileds LXCL-PWF1 1.64x0.90 mm mismatch flagged by optical review)
  rear_flash_camera_septum:
    candidate: thin opaque PC stray-light septum wall between rear flash light-pipe and rear camera baffle column
    thickness_mm: 0.6
    offset_from_camera_center_mm: 5.8
    color: dark opaque PC
    purpose: blocks stray flash light into the camera baffle because both windows are coplanar in one flat back wall with no bump-edge to break stray light
    seat_note: molded into the orange back shell inner wall as a 0-gap face seat; rises from the back-glass plane up to one min-gap below the main PCB bottom face, covering the full back-glass stray-light coupling region while clearing the camera module (X offset) and the PCB box (Z extent).
  front_camera:
    candidate: single 5-8 MP fixed-focus MIPI module behind cover glass, single lens
    module_mm: [6.5, 6.5, 3.2]
    lens_diameter_mm: 3.4
    lens_count: 1
    array: single
  power_button:
    candidate: XKB TS-1187A-B-A-B side-push tactile switch, 3.5x2.9x1.7 mm
    standardized_part: XKB TS-1187A-B-A-B
    standardized_mpn_primary: XKB TS-1187A-B-A-B
    standardized_mpn_alternate: Panasonic EVQ-P7A01P
    lcsc_part: C318884
    travel_mm: 0.2
    force_n: 1.57
    cap_mm: [2.0, 12.0, 1.1]
    cap_proud_mm: 0.30
    travel_basis: 0.20 mm datasheet travel; cap proud 0.30 mm > 0.20 mm hard stop so tactile actuation occurs before bottom-out, no rest preload
    source_url: https://www.lcsc.com/product-detail/Tactile-Switches_XKB-Connection-TS-1187A-B-A-B_C318884.html
  volume_button:
    candidate: XKB TS-1187A-B-A-B side-push tactile switch, 3.5x2.9x1.7 mm
    standardized_part: XKB TS-1187A-B-A-B
    standardized_mpn_primary: XKB TS-1187A-B-A-B
    standardized_mpn_alternate: Panasonic EVQ-P7A01P
    lcsc_part: C318884
    travel_mm: 0.2
    force_n: 1.57
    cap_mm: [2.0, 21.0, 1.1]
    cap_proud_mm: 0.30
    travel_basis: 0.20 mm datasheet travel; cap proud 0.30 mm > 0.20 mm hard stop so tactile actuation occurs before bottom-out, no rest preload
    source_url: https://www.lcsc.com/product-detail/Tactile-Switches_XKB-Connection-TS-1187A-B-A-B_C318884.html

radio:
  cellular:
    candidate: Quectel RG255C RedCap LGA module
    envelope_mm: [29.0, 32.0, 2.4]
    mass_g: 5.2
    source_url: https://www.quectel.com/product/5g-redcap-rg255c-series/
    antenna_keepout_mm: [62.0, 6.0, 2.0]
  wifi_bt:
    candidate: Murata Type 2EA Wi-Fi 6E + Bluetooth module
    source_url: https://www.murata.com/en-us/products/connectivitymodule/wi-fi-bluetooth/overview/lineup/type2ea
    antenna_keepout_mm: [34.0, 5.0, 2.0]

manufacturing:
  process: low-volume CNC or soft-tool injection molding first, hard-tool injection molding later
  plastic: PC+ABS or glass-filled PC/ABS, molded orange
  nominal_draft_deg: 2.0
  min_internal_radius_mm: 0.6
  min_boss_wall_ratio: 0.6
  screw_boss_outer_diameter_mm: 4.2
  screw_boss_core_diameter_mm: 1.8
  rib_thickness_mm: 0.75
  snap_hook_count: 8
  screw_boss_count: 6
  gate_strategy: two submarine gates into back cover long edge, fan gate alternate for color consistency
  sprue_diameter_mm: 4.0
  runner_diameter_mm: 2.2
  gate_thickness_mm: 0.85
  ejector_pin_count: 8
  ejector_pin_diameter_mm: 2.0
  cooling_channel_diameter_mm: 4.0
  cooling_channel_clearance_mm: 8.0
  vent_slot_count: 10
  vent_slot_width_mm: 4.0
  vent_slot_depth_mm: 0.04
  vent_slot_land_mm: 0.8
  parting_line: mid-plane around orange back shell perimeter

validation:
  tolerance:
    screen_xy_allowance_mm: 0.3
    pcb_edge_clearance_mm: 2.5
    usb_shell_to_aperture_clearance_mm: 0.15
    battery_to_pcb_gap_mm: 0.5
    button_pressure_limit_n_per_mm2: 0.2

tolerances:
  process_class: hard_tool_class_101_with_alignment_fixtures
  evidence_class: cad_estimate_for_evt_planning, not_measured_hardware
  process_contributors:
    plastic_shrink_pct: 0.07
    mold_dimension_tolerance_mm: 0.025
    adhesive_cure_variance_mm: 0.02
    assembly_placement_mm: 0.05
    component_datasheet_typical_mm: 0.05
    solder_reflow_connector_float_mm: 0.03
  process_rationale:
    plastic_shrink_pct: "Hard-tool 1.2738 P20+Ni cavity, PC+ABS controlled lot, CMM FAI validated by toolmaker"
    mold_dimension_tolerance_mm: "Class 101 toolmaker, CMM machine repeatability <= +/-0.013 mm"
    adhesive_cure_variance_mm: "Controlled cure rate on fixed cure jig"
    assembly_placement_mm: "Alignment-pin fixtures (front_camera_alignment_pin, rear_camera_alignment_pin, screen_bond_clamp_frame)"
    component_datasheet_typical_mm: "Vendor-controlled per published component datasheets"
  cosmetic_targets:
    display_gap_to_bezel_mm: { nominal: 0.15, tolerance: 0.15 }
    power_button_cap_proud_mm: { nominal: 0.30, tolerance: 0.10 }
    usb_c_aperture_clearance_mm: { nominal: 0.20, tolerance: 0.10 }
    rear_camera_window_flush_to_back_mm: { nominal: 0.0, tolerance: 0.05 }
  environmental_targets:
    drop_height_m: 1.0
    ingress_target: IP54 design intent only
    ingress_features:
      button_seal:
        - power_button_labyrinth_upper_rail
        - power_button_labyrinth_lower_rail
        - power_button_elastomer_gasket
        - volume_button_labyrinth_upper_rail
        - volume_button_labyrinth_lower_rail
        - volume_button_elastomer_gasket
      usb_c_seal:
        - usb_c_molded_drip_break_lip
        - usb_c_internal_drain_shelf
        - usb_c_perimeter_gasket_top
        - usb_c_perimeter_gasket_bottom
        - usb_c_perimeter_gasket_left
        - usb_c_perimeter_gasket_right
      basis: IP54 design intent derives from the button cap labyrinth rails plus elastomer gasket and the USB-C drip-break lip, internal drain shelf, and four-sided perimeter gaskets; all parts exist in the CAD assembly
    max_skin_temp_c: 43
    acoustic_leakage_status: requires sample test
    rf_pre_scan_status: requires antenna simulation and chamber pre-scan
