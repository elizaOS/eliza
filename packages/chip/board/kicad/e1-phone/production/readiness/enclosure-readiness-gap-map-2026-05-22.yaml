- id: enclosure_drawing_pack
  deliverable: production enclosure drawing pack with datums, GD&T, material, finish, color, texture,
    and inspection plan
  expected_path: board/kicad/e1-phone/production/enclosure/drawing-pack.yaml
  owner: mechanical_release
  required_action: collect supplier/toolmaker drawing pack, verify datums/GD&T/material/finish/color/texture/inspection
    content, and record approval signature
  validation_command: python3 scripts/check_e1_phone_enclosure_mechanical_content.py
  required_fields:
  - supplier
  - drawing_revision
  - datum_scheme
  - gd_t_callouts
  - material_spec
  - finish_spec
  - color_texture_spec
  - inspection_plan
  - approval_signature
  status: missing
  release_credit: false
- id: toolmaker_dfm_pack
  deliverable: toolmaker DFM markup, mold-flow plan, gate/runner/ejector strategy, and critical-to-fit
    dimensions
  expected_path: board/kicad/e1-phone/production/enclosure/toolmaker-dfm-pack.yaml
  owner: toolmaker_dfm
  required_action: capture toolmaker DFM response with mold-flow plan, gate/runner/ejector strategy, critical-to-fit
    dimensions, open issues, and approval signature
  validation_command: python3 scripts/check_e1_phone_enclosure_mechanical_content.py
  required_fields:
  - toolmaker
  - dfm_markup_revision
