release_gates:
  schematic:
    status: missing
    required_evidence:
      - KiCad hierarchical schematic with every major block in placement-interface-matrix.yaml.
      - Block netlist in board/kicad/e1-phone/block-netlist.yaml converted
        into real KiCad schematic nets.
      - Exact supplier connector pinouts for display, cameras, side-key flex,
        USB-C, battery, speakers, microphones, antennas, SIM/eSIM, and test.
      - ERC clean or justified waivers.
  routed_pcb:
    status: missing
    required_evidence:
      - Routed release output manifest in board/kicad/e1-phone/routed-release-plan.yaml
        closed with every release-required output present.
      - Routed KiCad PCB with footprints, nets, differential-pair constraints,
        keepouts, copper pours, test points, fiducials, and mounting features.
      - Routing constraints in board/kicad/e1-phone/routing-constraints.yaml
        assigned to KiCad net classes and verified after route.
      - DRC clean or justified waivers.
      - Computed board utilization from real component courtyards and no-route
        zones, replacing the concept-only gr_rect report in
        board/kicad/e1-phone/layout-utilization.yaml.
  enclosure:
    status: missing
    required_evidence:
      - STEP assembly with board, display, battery, camera modules, USB-C,
        side buttons, speaker chambers, antennas, and midframe/rear cover.
      - Tolerance stack proving the 9.6 mm thickness target.
      - USB-C insertion load and side-button load path review.
  power_thermal:
    status: missing
    required_evidence:
      - Rail-by-rail schematic review, PI simulation, regulator load steps,
        thermal simulation, and measured first-article power logs.
  rf_si:
    status: missing
    required_evidence:
      - MIPI/USB/PCIe/SDIO SI review.
      - Cellular/Wi-Fi/GNSS/NFC antenna and matching review.
      - VNA, conducted, coexistence, and SAR pre-scan evidence.
  manufacturing:
    status: missing
    required_evidence:
      - Production BOM/AVL, Gerber X2 or IPC-2581, drill files, pick-and-place,
        assembly drawing, STEP, test plan, DFM/DFA review, and fab quote.

verification_commands:
  structural_check: python3 scripts/check_e1_phone_board_package.py
  render_check: make kicad-phone-render
  preview_check: make kicad-phone-preview-check

forbidden_claims_while_status_blocked:
  - board_fabrication_ready
  - enclosure_ready
  - production_bom_ready
  - rf_ready
  - power_thermal_ready
  - end_to_end_phone_ready
