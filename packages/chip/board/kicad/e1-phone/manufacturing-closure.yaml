manufacturing_requirements:
  - routed KiCad PCB with real symbols, footprints, net classes, zones, and DRC evidence
  - Gerber X2 or IPC-2581 fabrication package
  - NC drill files and board stackup drawing
  - pick-and-place file with side, rotation, and centroid convention documented
  - production BOM or AVL with lifecycle, MOQ, substitute, and MPN data
  - assembly drawing including polarity, do-not-populate, shield, and connector notes
  - board STEP and enclosure STEP alignment review
  - DFM/DFA review from the selected fabricator and assembler
  - fab quote tied to layer count, impedance stackup, finish, HDI, and tolerance assumptions
  - stencil, reflow, AOI, X-ray, and cleaning requirements
  - bed-of-nails or flying-probe test plan with power-rail, USB-C, radio, display, camera, audio, and
    button coverage
  - split-board interconnect inspection and continuity coverage across top and bottom mating connectors
  - first-article limits for impedance coupons, rail power-up, thermal, RF conducted checks, and functional
    smoke
selected_hardware_manufacturing_replacement_gate:
  status: blocked_until_selected_hardware_placeholders_are_replaced_by_supplier_footprints_bom_step_and_fixture_evidence
  function_count: 5
  functions:
    - function: display_touch
      selected_hardware: CH550FH01A-CT
      source_artifact: board/kicad/e1-phone/display-envelope-downselect.yaml
      placeholder_groups: [display_support_placeholders]
      required_output_keys: [bom_csv_or_ibom, pick_and_place, step, assembly_drawing]
      required_nets: [DSI_CLK_P, DSI_D0_P, DISP_AVDD_5V5, DISP_RESET_N, TOUCH_I2C_SCL]
      status: blocked_display_placeholders_not_replaced_by_supplier_footprints_bom_step_or_fixture_evidence
    - function: rear_front_cameras
      selected_hardware: Sincere_First_OV13855_rear_and_GC5035_front
      source_artifact: board/kicad/e1-phone/camera-module-fit-downselect.yaml
      placeholder_groups: [camera_support_placeholders]
      required_output_keys: [bom_csv_or_ibom, pick_and_place, step, assembly_drawing]
      required_nets: [CAM0_CSI_CLK_P, CAM1_CSI_CLK_P, CAM_AVDD_2V8, CAM0_RESET_N, CAM1_RESET_N]
      status: blocked_camera_placeholders_not_replaced_by_supplier_footprints_bom_step_or_fixture_evidence
    - function: usb_c_power_sidekeys
      selected_hardware: GCT_USB4105_TPS65987DDH_MAX77860_Panasonic_EVQ-P7_EVQ-P3_EVQ-9P7
      source_artifact: board/kicad/e1-phone/usb-sidekey-selection-wiring-decision.yaml
      placeholder_groups: [usb_c_protection_placeholders, usb_c_signal_test_placeholders, side_key_support_placeholders, power_management_support_placeholders]
      required_output_keys: [bom_csv_or_ibom, pick_and_place, step, assembly_drawing, dfm_dfa_report]
      required_nets: [VBUS, USB_CC1, USB_CC2, USB_DP, USB_DN, PWR_KEY_N, VOL_UP_N, VOL_DOWN_N]
      status: blocked_usb_power_sidekey_placeholders_not_replaced_by_supplier_footprints_bom_step_or_fixture_evidence
    - function: cellular
      selected_hardware: Quectel_RG255C_or_RM255C_RedCap_reference
      source_artifact: board/kicad/e1-phone/radio-module-selection-wiring-decision.yaml
      placeholder_groups: [rf_matching_placeholders, rf_conducted_test_placeholders, identity_sensor_support_placeholders]
      required_output_keys: [bom_csv_or_ibom, pick_and_place, step, assembly_drawing, dfm_dfa_report]
      required_nets: [CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF, CELL_USB2_DP, CELL_USB2_DN, USIM_IO, ESIM_IO]
      status: blocked_cellular_placeholders_not_replaced_by_supplier_footprints_bom_step_or_fixture_evidence
    - function: wifi_bluetooth
      selected_hardware: Murata_LBEE5XV2EA-802
      source_artifact: board/kicad/e1-phone/radio-module-selection-wiring-decision.yaml
      placeholder_groups: [rf_matching_placeholders, rf_conducted_test_placeholders]
      required_output_keys: [bom_csv_or_ibom, pick_and_place, step, assembly_drawing, dfm_dfa_report]
      required_nets: [WIFI_BT_RF0, WIFI_BT_RF1, WIFI_PCIE_TX_P, WIFI_PCIE_RX_P]
      status: blocked_wifi_bt_placeholders_not_replaced_by_supplier_footprints_bom_step_or_fixture_evidence
release_blockers:
  - routed KiCad PCB
  - Gerber X2 or IPC-2581
  - drill files
  - pick-and-place
  - BOM
  - STEP
  - DFM/DFA
  - fab quote
  - first article
  - selected display, camera, USB-C/power/side-key, cellular, and Wi-Fi/Bluetooth placeholders are not replaced by supplier manufacturing evidence
  - split-board interconnect continuity and assembly inspection
forbidden_claims:
  - manufacturing_ready
  - fabrication_ready
  - dfm_ready
  - assembly_ready
  - test_ready
  - enclosure_ready
