schema: eliza.e1_phone_production_factory_release_execution.v1
status: blocked_requires_routed_release_supplier_packs_fab_assembly_fixture_and_first_article
date: '2026-05-21'
claim_boundary: Production/factory release execution matrix only. This is not a Gerber, IPC-2581,
  pick-and-place file, BOM/AVL, fab quote, DFM/DFA approval, fixture release, first-article result,
  routed PCB, or enclosure-ready evidence.
source_artifacts:
  - board/kicad/e1-phone/production-readiness.yaml
  - board/kicad/e1-phone/manufacturing-closure.yaml
  - board/kicad/e1-phone/factory-production-acceptance-checklist.yaml
  - board/kicad/e1-phone/routed-release-plan.yaml
  - board/kicad/e1-phone/factory-probe-map.yaml
  - board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
  - board/kicad/e1-phone/routed-pcb-implementation-execution.yaml
upstream_status:
  production_readiness_status: blocked_requires_routed_board_supplier_data_and_factory_quotes
  manufacturing_status: blocked_manufacturing_requires_routed_pcb_and_fab_outputs
  factory_production_acceptance_status: blocked_factory_production_acceptance_requires_routed_outputs_fixture_limits_quotes_and_first_article
  routed_release_status: blocked_routed_release_requires_real_route_and_supplier_outputs
  factory_probe_status: blocked_requires_routed_board_fixture_and_first_article_limits
  supplier_evidence_status: blocked_supplier_evidence_not_ready_for_kicad_capture
  routed_pcb_implementation_status: blocked_requires_supplier_footprints_schematic_erc_trial_route_drc_outputs_and_routed_step
execution_policy:
  release_revision: EVT1-routed-first-article
  fabrication_output_generation_requires_routed_pcb: true
  assembly_output_generation_requires_supplier_avl_and_bom: true
  fixture_release_requires_probe_coordinates_from_routed_pcb: true
  factory_limits_require_first_article_measurements: true
  enclosure_release_requires_routed_board_step_with_supplier_models: true
  all_outputs_fail_closed_until_present: true
release_output_execution:
  - id: schematic_erc_report
    owner: ee
    expected_path: board/kicad/e1-phone/production/reports/erc.json
    release_required: true
    present: false
    acceptance_item: fabrication_outputs_gerber_ipc_drill
  - id: pcb_drc_report
    owner: layout
    expected_path: board/kicad/e1-phone/production/reports/drc.json
    release_required: true
