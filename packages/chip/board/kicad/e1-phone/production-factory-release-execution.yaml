    routed_release_output: gerber_x2
  - id: ipc_2581
    routed_release_output: ipc_2581_or_odbpp
  - id: drill
    routed_release_output: nc_drill_slots
  - id: bom_csv_or_ibom
    routed_release_output: production_bom_avl
  - id: pick_and_place
    routed_release_output: position_file
  - id: step
    routed_release_output: board_step_with_supplier_models
  - id: schematic_pdf
    routed_release_output: schematic_erc_report
  - id: layout_pdf
    routed_release_output: pcb_drc_report
  - id: assembly_drawing
    routed_release_output: assembly_drawing
  - id: dfm_dfa_report
    routed_release_output: fab_assembler_quote
  - id: fab_quote
    routed_release_output: fab_assembler_quote
factory_fixture_execution:
  fixture_outputs_required:
    - board/kicad/e1-phone/production/test/factory-test-limits.yaml
    - board/kicad/e1-phone/production/test/probe-coordinates.csv
    - board/kicad/e1-phone/production/test/ict-or-flying-probe-program
    - board/kicad/e1-phone/production/test/rf-calibration-procedure.pdf
    - board/kicad/e1-phone/production/test/first-article-test-transcript.json
  probe_domains_blocked:
    - power_rails
    - usb_c
    - display_touch
    - cameras
    - radios
    - audio_haptics
    - split_board_interconnect
    - buttons_sensors_nfc
    - compute_storage_debug
cross_checks:
  all_routed_release_outputs_tracked: true
  all_manufacturing_outputs_mapped_to_release_outputs: true
  all_factory_probe_domains_blocked: true
  fixture_outputs_match_factory_probe_policy: true
  output_presence_matches_routed_release_plan: true
  no_output_marked_present_before_real_artifact: true
  ready_flags_remain_false: true
release_blockers:
  - routed KiCad PCB, ERC, DRC, zones, and route reports are missing
  - supplier response packs, signed drawings, pinouts, footprints, STEP models, and AVL are missing
  - fabrication, assembly, stackup, impedance, DFM/DFA, and quote outputs are missing
  - fixture coordinates, factory limits, RF calibration procedure, and first-article transcript are missing
  - routed board STEP and enclosure clearance rerun are missing
forbidden_claims:
  - production_factory_release_ready
  - fabrication_ready
  - assembly_ready
  - factory_test_ready
  - first_article_ready
  - enclosure_ready
  - end_to_end_phone_ready
