<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #102033; }
      .title { font-size: 34px; font-weight: 700; }
      .note { font-size: 18px; fill: #4b5563; }
      .silk { fill: #f8fafc; font-size: 18px; font-weight: 700; }
      .small { font-size: 13px; fill: #e5edf5; }
      .board { fill: #0f6b4f; stroke: #06382b; stroke-width: 5; }
      .edge { fill: none; stroke: #0b2f26; stroke-width: 9; }
      .copper { fill: #d6a13a; stroke: #7a5818; stroke-width: 2; }
      .mask { fill: #145f49; stroke: #0d4335; stroke-width: 2; }
      .keepout { fill: #ede7dc; stroke: #b7aa97; stroke-width: 4; stroke-dasharray: 14 10; }
      .module { stroke: #101820; stroke-width: 3; rx: 8; ry: 8; }
      .rf { fill: #e9a838; }
      .compute { fill: #67aecd; }
      .power { fill: #d85f56; }
      .io { fill: #91b85b; }
      .media { fill: #a978c8; }
      .connector { fill: #c9cdd2; stroke: #535b66; stroke-width: 3; }
      .route { fill: none; stroke-width: 5; stroke-linecap: round; opacity: .85; }
      .usb { stroke: #79c0ff; }
      .mipi { stroke: #e6d36a; }
      .rfline { stroke: #ffd166; stroke-dasharray: 12 8; }
      .powerline { stroke: #ff8a80; }
      .via { fill: #f4d35e; stroke: #5f4700; stroke-width: 1.5; }
    </style>
  </defs>
  <rect width="1400" height="1100" fill="#f8fafc"/>
  <text x="70" y="72" class="title">Eliza E1 Phone Mainboard PCB Concept Render</text>
  <text x="70" y="108" class="note">64 x 132 mm top-side placement preview around a 5.5 inch FHD MIPI display. Not routed fabrication data.</text>

  <g transform="translate(90 165)">
    <rect x="0" y="0" width="1090" height="790" rx="30" class="board"/>
    <rect x="22" y="22" width="1046" height="746" rx="22" class="edge"/>
    <rect x="310" y="250" width="515" height="330" rx="12" class="keepout"/>
    <text x="497" y="420" class="note">battery keepout</text>
    <text x="505" y="454" class="note">45 x 72 mm class</text>

    <rect x="55" y="45" width="215" height="145" class="module rf"/>
    <text x="76" y="104" class="silk">5G REDCAP</text>
    <text x="80" y="136" class="small">USB3/PCIe + SIM/eSIM</text>

    <rect x="315" y="48" width="200" height="138" class="module compute"/>
    <text x="360" y="105" class="silk">E1 SoC</text>
    <text x="347" y="137" class="small">LPDDR adjacent</text>

    <rect x="548" y="48" width="122" height="94" class="module power"/>
    <text x="576" y="104" class="silk">PMIC</text>

    <rect x="700" y="48" width="120" height="94" class="module io"/>
    <text x="735" y="104" class="silk">UFS</text>

    <rect x="850" y="45" width="190" height="116" class="module media"/>
    <text x="878" y="102" class="silk">CAMERA FFC</text>

    <rect x="850" y="190" width="190" height="88" class="module media"/>
    <text x="890" y="245" class="silk">DISPLAY</text>

    <rect x="548" y="172" width="230" height="82" class="module rf"/>
    <text x="590" y="223" class="silk">Wi-Fi 6E / BT</text>

    <rect x="800" y="300" width="170" height="86" class="module rf"/>
    <text x="846" y="355" class="silk">GNSS</text>

    <rect x="72" y="245" width="118" height="58" class="module io"/>
    <text x="100" y="282" class="silk">VOL+</text>

    <rect x="72" y="322" width="118" height="58" class="module io"/>
    <text x="100" y="359" class="silk">VOL-</text>

    <rect x="72" y="399" width="118" height="72" class="module io"/>
    <text x="104" y="443" class="silk">PWR</text>

    <rect x="72" y="492" width="118" height="63" class="module io"/>
    <text x="94" y="533" class="silk">FLEX</text>

    <rect x="78" y="630" width="160" height="82" class="module media"/>
    <text x="117" y="684" class="silk">MICS</text>

    <rect x="275" y="630" width="180" height="82" class="module media"/>
    <text x="318" y="684" class="silk">AUDIO</text>

    <rect x="505" y="630" width="155" height="82" class="module io"/>
    <text x="535" y="684" class="silk">HAPTIC</text>

    <rect x="710" y="630" width="225" height="82" class="module media"/>
    <text x="765" y="684" class="silk">SPEAKER</text>

    <rect x="470" y="740" width="150" height="34" class="connector"/>
    <text x="497" y="765" class="silk">USB-C</text>

    <rect x="45" y="24" width="1000" height="24" class="copper"/>
    <rect x="45" y="742" width="1000" height="24" class="copper"/>
    <text x="480" y="42" class="small">top antenna keepout / RF edge</text>
    <text x="455" y="790" class="small">bottom antenna keepout / RF edge</text>

    <path d="M290 120 C345 135 365 160 392 190" class="route rfline"/>
    <path d="M550 120 C610 148 650 170 700 212" class="route powerline"/>
    <path d="M820 210 C875 210 912 224 944 234" class="route mipi"/>
    <path d="M595 770 C595 650 470 580 445 196" class="route usb"/>
    <path d="M930 354 C1005 310 1070 185 1110 48" class="route rfline"/>

    <g>
      <circle cx="40" cy="40" r="10" class="via"/><circle cx="1140" cy="40" r="10" class="via"/>
      <circle cx="40" cy="780" r="10" class="via"/><circle cx="1140" cy="780" r="10" class="via"/>
      <circle cx="330" cy="215" r="7" class="via"/><circle cx="365" cy="215" r="7" class="via"/>
      <circle cx="400" cy="215" r="7" class="via"/><circle cx="435" cy="215" r="7" class="via"/>
      <circle cx="620" cy="275" r="7" class="via"/><circle cx="655" cy="275" r="7" class="via"/>
      <circle cx="690" cy="275" r="7" class="via"/><circle cx="725" cy="275" r="7" class="via"/>
    </g>
  </g>

  <g transform="translate(70 1030)">
    <text x="0" y="0" class="note">Verified render target: SVG and PNG preview only. KiCad PCB source still must be authored under board/kicad/e1-phone/pcb/.</text>
  </g>
</svg>
