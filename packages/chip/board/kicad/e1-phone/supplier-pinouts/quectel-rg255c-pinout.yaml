notes: |
  RG255C-EAB is the EU/Asia band SKU of the RG255C 5G RedCap LGA family. The
  vendor product page and series specification PDF confirm the LGA package and
  high-level interface list, but the per-pad pad-map is published only in the
  Quectel RG255C Hardware Design manual, which is gated behind the Quectel
  Partner Portal (NDA/registration). Per-pin entries below are marked
  fetch_required and reference the exact retrieval channel.

  Verified public facts from the vendor product page and spec PDF:
    - peak DL 223 Mbps / UL 123 Mbps (Rel-17 RedCap)
    - LGA module, surface-mount
    - includes USB 2.0 host/device interface
    - includes (e)SIM (1 or 2 depending on SKU)
    - includes PCM/I2S audio, UART debug, multiple GPIO
    - supports antenna ports: main, aux/diversity, GNSS
    - 3GPP Rel-17 5G NR Sub-6 band coverage (region-specific in EAB)
interfaces_verified_public:
  power:
    - VBAT (module main supply, typical 3.3-4.2 V)
    - VBAT_BB (baseband supply rail per HW guide)
    - VDD_EXT (host-IO reference, typically 1.8 V)
    - GND (multiple)
  digital:
    - USB 2.0 HS (USB_DP / USB_DM / USB_VBUS)
    - 2x UART (main + debug)
    - PCM/I2S (PCM_CLK, PCM_SYNC, PCM_IN, PCM_OUT)
    - I2C (SCL, SDA)
    - SDIO (optional, on some SKUs)
    - multiple GPIO / status (STATUS, NET_STATUS, WAKEUP, RESET_N, PWRKEY)
  sim:
    - SIM1 (VDD, RST, CLK, DATA, DET)
    - eSIM/SIM2 on selected SKUs
  rf:
    - ANT_MAIN
    - ANT_DIV / ANT_AUX
    - ANT_GNSS (where applicable)
  rf_calibration:
    - RF test pads per HW design guide
pad_count_estimated: 250
pins:
  - pin: ALL
    name: fetch_required
    function: full_lga_pad_map
    direction: unknown
    voltage_v: null
    notes: |
      Per-pad pinout is in Quectel RG255C Hardware Design manual. Retrieve via
      Quectel Partner Portal (https://www.quectel.com/contact/), then capture
      under board/kicad/e1-phone/production/sourcing/cellular/pinout-or-pad-map.csv
      and re-emit this YAML with full per-pin entries before pinout review signoff.
