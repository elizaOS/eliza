nda_gated_pinouts: []

compute_blocker_resolution:
  status: resolved_buildable_from_public_data_via_som
  resolved_date: '2026-05-21'
  summary: >
    The former sole NDA-gated line (bare Unisoc T606 BGA ball-map) is retired.
    Compute is now sourced as the Firefly Core-3566JD4 RK3566 SoM, whose 260-pin
    SODIMM connector pinout is published in a public datasheet (captured in
    compute-som-pinout.yaml). The e1-phone is buildable today from public data.
  chosen_som:
    mpn: Core-3566JD4
    vendor: Firefly (T-chip Intelligent Technology)
    soc: Rockchip RK3566
    public_pinout_doc: https://download.t-firefly.com/Spec/CoreBorads/Core-3566JD4_Specification_EN.pdf
    buyable: ~$49 single-qty (2GB/32GB), MOQ 1, IndustryPC / Firefly Store / Alibaba
  nda_optional_cost_down_path:
    description: >
      Moving from the SoM to a bare SoC on the e1-phone PCB at high volume is an
      optional cost-down, NOT a blocker. It still requires the SoC vendor NDA for
      the production BGA ball-map.
    candidate_socs: [Rockchip RK3566 (public TRM + HW design guide, more openly mirrored), Unisoc T606/T616 (RDK behind NDA)]
    unblock_procedure:
      - contact the SoC vendor via an authorized distributor (Rockchip distributor for RK3566; Arrow/WPG/Tier-1 ODM for Unisoc)
      - sign vendor NDA + Design-In Agreement and request the SoC Hardware Design Guide / Reference Design Kit
      - mirror ball-map CSV to board/kicad/e1-phone/production/sourcing/soc/pinout-or-pad-map.csv
      - emit <vendor>-<soc>-pinout.yaml with evidence_class nda_supplier_datasheet
    owner: hardware_procurement_lead
cross_checks:
  total_captured: 11
  total_nda_gated: 0
  compute_buildable_from_public_data: true
  every_captured_file_present_on_disk: true
  every_captured_file_cites_public_url: true
  captured_files_evidence_class: [public_supplier_datasheet, public_som_connector_pinout]
  pinout_footprint_freeze_yaml_untouched: true
  supplier_to_kicad_evidence_map_yaml_untouched: true
  preliminary_bom_yaml_untouched: true
forbidden_claims:
  - production_release_evidence_ready
  - pinout_reviews_complete
  - symbols_ready
  - footprints_ready
  - bare_soc_bga_ball_map_captured_without_nda
release_blockers_unchanged:
  - per-pad detail for Quectel, Murata, TI, ADI parts still requires binary-PDF or partner-portal pull
  - all production-release reports (pinout-review, symbol-review, footprint-review, footprint-3d-binding) still blocked per supplier-to-kicad-evidence-map.yaml
compute_blocker_change:
  before: Unisoc T606/T616 bare-SoC BGA ball-map behind NDA was the sole un-unblockable public-data line
  after: compute sourced as public-pinout RK3566 SoM (Core-3566JD4); no NDA-gated lines block a public-data build; bare-SoC+NDA retained as optional cost-down
