nda_gated_pinouts:
  - part: Unisoc T606 / T616 (UMS9230)
    manufacturer: Unisoc Communications
    function: application_processor_soc
    package: BGA ~600-ball
    status: nda_gated_unblock_path_documented
    unblock_procedure:
      - contact Unisoc through an authorized regional distributor (Arrow, WPG/WT, or Unisoc-named Tier-1 ODM)
      - sign Unisoc Mutual NDA and Design-In Agreement for the T606 / T616 platform
      - request the T606 (or T616) Reference Design Kit (RDK) which includes the SoC Hardware Design Guide, full BGA ball-map, reference schematic, and reference PCB stack-up
      - mirror ball-map CSV to board/kicad/e1-phone/production/sourcing/soc/pinout-or-pad-map.csv
      - emit unisoc-t606-pinout.yaml with evidence_class nda_supplier_datasheet
    blocker_owner: hardware_procurement_lead
cross_checks:
  total_captured: 10
  total_nda_gated: 1
  every_captured_file_present_on_disk: true
  every_captured_file_cites_public_url: true
  every_captured_file_evidence_class_public_supplier_datasheet: true
  pinout_footprint_freeze_yaml_untouched: true
  supplier_to_kicad_evidence_map_yaml_untouched: true
  preliminary_bom_yaml_untouched: true
forbidden_claims:
  - production_release_evidence_ready
  - pinout_reviews_complete
  - symbols_ready
  - footprints_ready
  - soc_pinout_captured
release_blockers_unchanged:
  - Unisoc T606/T616 BGA ball-map remains behind Unisoc NDA + Design-In Agreement
  - per-pad detail for Quectel, Murata, TI, ADI parts still requires binary-PDF or partner-portal pull
  - all production-release reports (pinout-review, symbol-review, footprint-review, footprint-3d-binding) still blocked per supplier-to-kicad-evidence-map.yaml
