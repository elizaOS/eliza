schema: eliza.e1_phone_supplier_rfq_transmittal_draft.v1
status: draft_not_sent_not_supplier_evidence
date: '2026-05-21'
claim_boundary: Draft RFQ transmittal package only. These drafts are not sent RFQs, supplier responses, approved
  quotes, samples, signed drawings, pinouts, footprints, STEP evidence, or authorization to route or fabricate the
  PCB.
draft:
  draft_id: e1_phone_battery_pack_rfq_2026-05-21
  function: battery_pack
  status: draft_not_sent_not_supplier_evidence
  primary_candidate: 4500mAh_17p3Wh_64x87x5p3mm_pouch_class
  package_binding: package/battery/e1-phone-17p3wh-pack.yaml
  source_basis:
    - Alibaba and Made-in-China 4500 mAh pouch-class public listings
  verified_public_source_ids: []
  recipient_candidates: []
  request:
    quote_quantities:
      - 10
      - 100
      - 1000
    minimum_sample_lot: 5
    response_due_date: '2026-06-04'
    required_response_format: supplier_signed_pdf_or_native_cad_plus_machine_readable_summary
    accepted_document_languages:
      - english
      - bilingual_supplier_original_plus_english
    required_supplier_artifacts:
      - signed pack drawing with cell, PCM, tab, connector, and adhesive datums
      - NTC beta curve, pack ID resistor, protection limits, and cell datasheet
      - swelling, drop, puncture, UN38.3, IEC/UL, and shipping documentation
      - mating connector MPN, connector pinout, harness polarity drawing, and cable exit datum
      - STEP model for pouch, PCM, connector, cable tail, adhesive, and swelling envelope
      - charge profile limits and fuel-gauge characterization data
      - sample lot capacity, IR, and dimensional inspection report
    board_dependency:
      - 64 x 87 mm battery cavity and 9.6 mm device thickness target
      - VBAT, BAT_NTC, BAT_ID, GND connector and pack swelling clearance
  acceptance_gate_before_kicad_use:
    orderable_mpn_received: false
    signed_2d_drawing_received: false
    pinout_or_pad_map_received: false
    recommended_land_pattern_received: false
    step_or_brep_model_received: false
    sample_received_and_inspected: false
    compliance_pack_received: false
    pinout_symbol_footprint_reviews_complete: false
  planned_archive_paths_after_send:
    draft: board/kicad/e1-phone/sourcing-drafts/battery_pack/rfq-transmittal.yaml
    release_archive: board/kicad/e1-phone/production/sourcing/battery_pack/rfq-transmittal.yaml
    supplier_response_pack: board/kicad/e1-phone/production/sourcing/battery_pack/rfq-response-pack.yaml
forbidden_claims:
  - rfq_sent
  - supplier_response_received
  - supplier_approved
  - pinouts_frozen
  - footprints_frozen
  - step_models_bound
  - production_archive_complete
  - routed_pcb_ready
  - enclosure_ready
