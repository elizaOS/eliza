    primary_candidate: CH550FH01A-CT
    package_binding: package/display/v0-dsi-720x1280.yaml
    draft_path: board/kicad/e1-phone/sourcing-drafts/display_touch/rfq-transmittal.yaml
    planned_response_pack: board/kicad/e1-phone/production/sourcing/display_touch/rfq-response-pack.yaml
    public_source_ids:
      - display_primary_chenghao_ch550fh01a_ct
      - display_primary_chenghao_ch550fh01a_ct_public_pdf
      - display_alternate_alibaba_meta_055wu01
    expected_supplier_return:
      exact_fpc_pin_count_required: true
      display_cover_lens_datums_required: true
      mating_connector_mpn_required: true
      panel_init_sequence_required: true
      ctp_driver_and_i2c_address_required: true
      display_stack_step_required: true
    routing_unlocks_blocked:
      - DSI lane order and polarity
      - touch I2C/reset/IRQ assignment
