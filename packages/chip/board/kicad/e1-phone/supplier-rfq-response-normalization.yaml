normalization_outputs:
  expected_response_pack_count: 10
  present_response_pack_count: 0
  missing_response_pack_count: 10
  every_planned_response_pack_absent: true
  blocks_before_response_packs:
    - KiCad connector symbols and pad numbering
    - supplier footprints and STEP bindings
    - routed layout and DRC/SI/PI/RF signoff
    - factory first article and enclosure fit

cross_checks:
  mirrors_rfq_intake_function_set: true
  mirrors_supplier_sample_release_function_set: true
  display_camera_sources_include_2026_05_21_revalidation: true
  quote_quantities_match_intake_policy: true
  response_fields_include_quote_drawing_pinout_footprint_step_sample_compliance: true
  all_records_blocked_until_response_pack: true
  no_planned_response_pack_present: true
  public_sources_not_used_as_release_evidence: true
  routing_and_enclosure_unlocks_defined_per_function: true

release_blockers:
  - no supplier RFQ has been sent or returned as production evidence
  - normalized response packs for all 10 supplier functions are missing
  - orderable MPNs, signed drawings, pinouts, land patterns, STEP models, samples, lifecycle, lead time, and price breaks are missing
  - schematic capture, routing, factory release, and enclosure fit must remain blocked until response packs and reviews close

forbidden_claims:
  - rfq_responses_received
  - supplier_quotes_approved
  - orderable_mpns_approved
  - supplier_pinouts_ready
  - supplier_footprints_ready
  - supplier_step_models_bound
  - kicad_capture_ready
  - routed_layout_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
