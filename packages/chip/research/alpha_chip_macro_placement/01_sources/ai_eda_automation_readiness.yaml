      - build/ai_eda/compiler_autotuning_targets/validation/targets_report.json
    next_gate: python3 scripts/check_compiler_versions.py
    critical_review: >
      Compiler ML, schedule search, RVV intrinsic generation, agentic
      accelerator-kernel optimization, optimization-memory reuse, formal
      RISC-V semantics, and profile-guided binary optimization can directly
      improve E1 software and NPU kernels, but they also directly change
      shipped code and binaries. E1 needs pinned toolchains, corpus
      provenance, target adapters, generated-kernel quarantine,
      simulator/runtime correctness, semantic-equivalence evidence, benchmark
      calibration, and review before generated schedules, profiles,
      intrinsics, kernels, compiler models, optimization memories, or binaries
      can affect source or claims.
