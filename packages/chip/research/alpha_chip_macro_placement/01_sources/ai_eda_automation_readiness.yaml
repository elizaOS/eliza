      - verilog-eval
      - cvdp
      - openrtlset
      - mg-verilog
      - deepcircuitx
      - metrex
      - circuitnet-3
      - veriforge-deepseek-coder
      - llm-eda-opencores
      - hardware-verilogeval-v2-hf
      - llm4verilog-dataset
      - chipcraftx-rtlgen-7b
      - circuitnet
      - zigzag
      - assertllm
      - rtlmul
    local_lane: p1-external-source-metadata-probe
    current_artifacts:
      - scripts/ai_eda/probe_external_ai_eda_sources.py
      - build/ai_eda/external_source_probe/validation/source_probe_report.json
    next_gate: python3 scripts/check_ai_eda_source_inventory.py
    critical_review: >
      Metadata probing helps prioritize real integrations, but license hints
      from APIs are advisory until a human review pins exact versions.
  - id: external_model_corpus_intake
    rating: READY_DRY_RUN
    source_ids:
      - openrtlset
      - mg-verilog
      - metrex
      - circuitnet-3
      - veriforge-deepseek-coder
      - llm-eda-opencores
      - hardware-verilogeval-v2-hf
      - llm4verilog-dataset
      - siliconmind-v1
      - chipcraftx-rtlgen-7b
      - chipseek
      - circuitmind-tcbench
      - rtlseek
      - qimeng-codev-r1
      - evolve-verilog
      - veriagent
      - safetune-rtl-poisoning
      - trojanloc
      - codev-sva
      - radai-wm811k-wafer-defect-model
    local_lane: p1-external-model-corpus-intake-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_external_model_corpus_intake_targets.py
      - build/ai_eda/external_model_corpus_intake_targets/validation/targets_report.json
    next_gate: python3 scripts/ai_eda/probe_external_ai_eda_sources.py --run-id validation
    critical_review: >
      HuggingFace and GitHub now contain useful RTL models, Verilog corpora,
      repository-level RTL/PPA datasets, RTL RL/code/model artifacts,
      multi-agent gate-level generation frameworks and benchmarks,
      metric-reasoning datasets, CircuitNet-style PD corpora, SVA datasets, and
      wafer-defect models. E1 should treat them as metadata-only candidates
      until exact revisions, licenses, file manifests, contamination checks,
      quarantine paths, deterministic local gates, and reviewer dispositions
      exist; no weights, datasets, training, inference, or generated source are
      allowed by this lane.
  - id: benchmark_evaluation_hygiene
    rating: READY_DRY_RUN
    source_ids:
      - vericontaminated
      - verilog-eval
      - rtllm
      - cvdp
      - protocolllm
      - openrtlset
      - mg-verilog
      - llm-eda-opencores
      - hardware-verilogeval-v2-hf
      - llm4verilog-dataset
      - qimeng-codev-r1
      - evolve-verilog
      - safetune-rtl-poisoning
      - trojanloc
      - harmchip
      - llmsanitize
      - min-k-prob-contamination
    local_lane: p1-benchmark-evaluation-hygiene-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_benchmark_evaluation_hygiene_targets.py
      - build/ai_eda/benchmark_evaluation_hygiene_targets/validation/targets_report.json
    next_gate: python3 scripts/ai_eda/capture_benchmark_evaluation_hygiene_targets.py --run-id validation
    critical_review: >
      Public HDL benchmarks and external RTL corpora are useful for measuring
      tool direction, but benchmark pass rates can be contaminated by training
      overlap, mirror drift, prompt leakage, evaluator version drift, and
      syntax-only success. E1 needs held-out task hashes, non-overlap review,
      exact benchmark revisions, simulator/synthesis/formal logs, and reviewer
      disposition before any public or private benchmark score can influence
      source, claims, or release decisions.
  - id: spec_traceability_and_requirement_coverage
    rating: READY_DRY_RUN
    source_ids:
      - incrertl
      - llm-fsm
      - spec2assertion
      - coverassert
      - qimeng-codev-sva
      - assertionforge
      - sangam-sva
      - codev-sva
      - protocolllm
      - vericontaminated
    local_lane: p1-spec-traceability-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_spec_traceability_targets.py
      - build/ai_eda/spec_traceability_targets/validation/targets_report.json
    next_gate: python3 scripts/ai_eda/capture_spec_traceability_targets.py --run-id validation
    critical_review: >
      Requirements-to-RTL traceability is the safest path for AI to help E1
      evolve: it can connect docs, spec-db contracts, RTL modules, assertions,
      tests, and work orders before generating changes. It is still not design
      evidence by itself. E1 needs stable requirement IDs, source hashes,
      non-overlap review, generated-output quarantine, formal/cocotb/synthesis
      gates, vacuity checks, and reviewer disposition before any AI-generated
      trace matrix, RTL, assertion, spec edit, or patch can affect source or
      release claims.
  - id: ip_register_contract_automation
    rating: READY_DRY_RUN
    source_ids:
      - systemrdl-standard
      - peakrdl
      - peakrdl-ipxact
      - opentitan-reggen
      - ip-xact-standard
      - fusesoc
      - edalize
      - bender
      - siliconcompiler
      - rggen
    local_lane: p1-ip-register-contract-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_ip_register_contract_targets.py
      - build/ai_eda/ip_register_contract_targets/validation/targets_report.json
    next_gate: python3 scripts/ai_eda/capture_ip_register_contract_targets.py --run-id validation
    critical_review: >
      Register-map, IP packaging, and platform-contract generators can reduce
      ABI drift across RTL, docs, Linux/Buildroot/AOSP, and tests. AI is useful
      only as review assistance here: the source of truth must be a pinned
      structured contract or generator input. E1 must not import external IP,
      generate registers, or alter memory maps, headers, device trees, drivers,
      or RTL until revisions, licenses, file manifests, generated artifacts,
      platform gates, software gates, RTL gates, and reviewer disposition exist.
  - id: local_backend_readiness
    rating: READY_DRY_RUN
