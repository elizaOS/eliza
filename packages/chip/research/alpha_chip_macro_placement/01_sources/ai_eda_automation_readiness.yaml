schema: eliza.ai_eda_automation_readiness.v1
updated: 2026-05-19
scope: >
  Stage-by-stage readiness scorecard for AI/EDA automation in the E1 chip
  package. Readiness describes safe integration maturity, not general research
  excitement.
rating_scale:
  READY_DRY_RUN: Local dry-run artifacts and checker coverage exist.
  READY_ADVISORY: Local evidence can guide human prioritization only.
  BLOCKED_NEEDS_EVIDENCE: Sources exist but local gates, labels, or tool inputs are missing.
  RESEARCH_ONLY: Interesting source, not currently actionable for E1.
policy:
  ai_output_is_not_evidence: true
  source_promotion_requires_human_review: true
  signoff_requires_existing_deterministic_gates: true
stages:
  - id: agentic_eda_orchestration
    rating: READY_DRY_RUN
    source_ids:
      - agentic-eda-survey-2512-23189v2
      - autoeda-mcp
      - chateda
      - orassistant
    local_lane: p1-local-eda-rag-log-triage
    current_artifacts:
      - scripts/ai_eda/build_local_eda_rag_index.py
      - build/ai_eda/rag_index/source_manifest.json
    next_gate: python3 scripts/check_ai_eda_source_inventory.py
    critical_review: >
      Agents are useful for context retrieval and run triage, but write-capable
      tool agents need typed command schemas and archived logs.
  - id: external_source_provenance
    rating: READY_DRY_RUN
    source_ids:
      - rtl-coder
      - verilog-eval
      - cvdp
      - chipcraftx-rtlgen-7b
      - circuitnet
      - zigzag
      - assertllm
      - rtlmul
    local_lane: p1-external-source-metadata-probe
    current_artifacts:
      - scripts/ai_eda/probe_external_ai_eda_sources.py
      - build/ai_eda/external_source_probe/validation/source_probe_report.json
    next_gate: python3 scripts/check_ai_eda_source_inventory.py
    critical_review: >
      Metadata probing helps prioritize real integrations, but license hints
      from APIs are advisory until a human review pins exact versions.
  - id: local_backend_readiness
    rating: READY_DRY_RUN
    source_ids:
      - zigzag
      - timeloop-accelergy
      - rtlmul
      - llm4dv
      - assertllm
      - fault-dft
    local_lane: p1-local-ai-eda-backend-preflight
    current_artifacts:
      - scripts/ai_eda/preflight_ai_eda_backends.py
      - build/ai_eda/backend_preflight/validation/backend_preflight_report.json
    next_gate: python3 scripts/check_ai_eda_source_inventory.py
    critical_review: >
      Local availability is only an integration-readiness signal; present tools
      still need version pinning, license review, and executed local evidence.
  - id: rtl_generation
    rating: READY_DRY_RUN
    source_ids:
      - rtl-coder
      - chipcraftx-rtlgen-7b
      - openllm-rtl
      - verilog-eval
      - cvdp
    local_lane: p2-rtl-model-evaluation-harness
    current_artifacts:
      - scripts/ai_eda/evaluate_rtl_model.py
      - build/ai_eda/rtl_model_eval/validation/eval_report.json
    next_gate: make rtl-check
    critical_review: >
      Public RTL models and benchmarks are useful for candidate generation, but
      generated RTL remains outside source until lint, simulation, synthesis,
      and review pass.
  - id: rtl_repository_completion
    rating: BLOCKED_NEEDS_EVIDENCE
    source_ids:
      - rtl-repocoder
      - eda-corpus
    local_lane: p1-local-eda-rag-log-triage
    current_artifacts:
      - build/ai_eda/rag_index/source_manifest.json
    next_gate: make rtl-check
    critical_review: >
      Repository-aware completion is plausible for E1 conventions, but needs
      stale-context detection and source promotion rules before execution.
  - id: rtl_ppa_rewrite
    rating: READY_DRY_RUN
    source_ids:
      - symrtlo
      - rtlrewriter-bench
      - formalrtl
      - rtl-timing-metamorphosis
      - openabc-d
      - rocketppa
    local_lane: p1-rtl-rewrite-equivalence-target-capture
    current_artifacts:
      - research/alpha_chip_macro_placement/05_experiments/e1_rtl_model_eval_plan.md
      - scripts/ai_eda/capture_rtl_rewrite_equivalence_targets.py
      - build/ai_eda/rtl_rewrite_equivalence_targets/validation/targets_report.json
    next_gate: make formal
    critical_review: >
      RTL rewrite remains too risky for source changes, but E1 can now capture
      the exact equivalence, simulation, synthesis, and before/after PPA gates
      needed before any generated rewrite is even evaluated. SymRTLO,
      FormalRTL, and related benchmarks show SOTA direction, while timing-logic
      metamorphosis highlights that clocked/control RTL is especially unsafe
      without formal and regression evidence.
  - id: verification_stimulus
    rating: READY_ADVISORY
    source_ids:
      - llm4dv
      - cvdp
      - verilog-eval
    local_lane: p1-llm4dv-cocotb-stimulus-loop
    current_artifacts:
      - verify/ai_eda/coverage_bins/e1_npu_descriptor_queue.yaml
      - build/ai_eda/cocotb_stimulus/validation/coverage_report.json
    next_gate: make cocotb-npu
    critical_review: >
      This is one of the safest near-term lanes because candidate ideas are
      accepted only by deterministic cocotb regressions.
  - id: assertion_generation
    rating: BLOCKED_NEEDS_EVIDENCE
    source_ids:
      - assertllm
      - assertionforge
      - codev-sva
    local_lane: p1-assertion-candidate-review
    current_artifacts:
      - verify/ai_eda/assertion_candidates/e1_npu_descriptor.yaml
    next_gate: make formal
    critical_review: >
      Assertion-generation SOTA is improving quickly, but generated SVAs can
      check the wrong property; keep them as reviewed candidates first.
  - id: verification_debug_and_planning
    rating: READY_DRY_RUN
    source_ids:
      - pro-v
      - saarthi-formal-verification
      - sangam-sva
      - fvdebug
      - siliconmind-v1
    local_lane: p1-verification-debug-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_verification_debug_targets.py
      - build/ai_eda/verification_debug_targets/validation/targets_report.json
    next_gate: make formal
    critical_review: >
      Agentic verification planners and formal-debug assistants are useful for
      triage, but root-cause narratives, generated testbenches, generated SVAs,
      and proposed RTL fixes are all unsafe until tied to local traces, RTL
      hashes, deterministic regressions, equivalence/synthesis where needed,
      and human review.
  - id: physical_design_prediction
    rating: READY_ADVISORY
    source_ids:
      - circuitnet
      - circuitnet-2
      - routeplacer
    local_lane: p2-e1-pd-predictor-dataset
    current_artifacts:
      - scripts/ai_eda/capture_openroad_ml_snapshot.py
      - build/ai_eda/pd_predictor_dataset/validation/snapshot_manifest.json
    next_gate: make openlane-run-preflight-check
    critical_review: >
      Predictors can prioritize runs after local label capture, but are not
      signoff and currently lack held-out E1 validation.
  - id: circuit_foundation_models
    rating: READY_DRY_RUN
    source_ids:
      - circuit-foundation-model-survey
      - chipnemo
      - geneda
      - nettag
      - deepgate4
      - chiplingo
    local_lane: p1-circuit-foundation-model-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_circuit_foundation_model_targets.py
      - build/ai_eda/circuit_foundation_model_targets/validation/targets_report.json
    next_gate: python3 scripts/check_ai_eda_source_inventory.py
    critical_review: >
      Circuit foundation models and domain-adapted EDA LLMs are useful as
      representation and assistant infrastructure, but embeddings, aligned
      latent spaces, and benchmark scores are not chip evidence. E1 needs
      corpus governance, license review, paired RTL/netlist/layout/log hashes,
      held-out local tasks, and deterministic verification/PD gates before any
      model output can influence design decisions.
  - id: dfm_yield_lithography
    rating: READY_DRY_RUN
    source_ids:
      - litho-aware-ml-hotspot
      - dlhsd-hotspot-detection
      - lithohod
      - torchlitho
      - openilt
      - diffopc
      - radai-wm811k-wafer-defect-model
      - pegasus-lpa
    local_lane: p1-dfm-yield-lithography-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_dfm_yield_lithography_targets.py
      - build/ai_eda/dfm_yield_lithography_targets/validation/targets_report.json
    next_gate: make pd-contract-check
    critical_review: >
      ML hotspot detectors, differentiable lithography, ILT/OPC optimizers, and
      wafer-defect classifiers are potentially useful after physical design is
      real, but they are not signoff. E1 currently lacks final layout, foundry
      decks, lithography kernels, mask rules, local hotspot labels, wafer maps,
      and manufacturing inspection evidence, so the lane only captures targets
      and blockers.
  - id: cpu_microarchitecture_ai
    rating: READY_DRY_RUN
    source_ids:
      - agentic-architect
      - perfvec
      - concorde-cpu-performance-model
      - champsim
      - branchnet
      - llbp
      - pythia-prefetcher
      - mockingjay-cache-replacement
      - drishti-cache-replacement
    local_lane: p1-cpu-microarchitecture-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_cpu_microarchitecture_targets.py
      - build/ai_eda/cpu_microarchitecture_targets/validation/targets_report.json
    next_gate: make branch-prediction-check
    critical_review: >
      Agentic microarchitecture search and ML performance models can eventually
      help choose branch predictor, cache replacement, and prefetch policies,
      but E1 needs pinned simulators, trace provenance, held-out workloads,
      before/after RTL evidence, and synthesis/formal/cocotb gates before any
      generated policy can affect source or product claims.
  - id: placement_optimization
    rating: BLOCKED_NEEDS_EVIDENCE
    source_ids:
      - google-circuit-training
      - tilos-macroplacement
      - autodmp
      - dreamplace
    local_lane: p1-openroad-openlane-autotune
    current_artifacts:
      - scripts/ai_eda/run_openroad_autotune_e1.sh
      - build/ai_eda/openroad_autotuner/validation/autotune_manifest.json
    next_gate: make openlane-run-preflight-check
    critical_review: >
      Placement AI can reduce search time, but E1 is blocked until OpenLane
      baseline runs complete and routed QoR is archived.
  - id: npu_architecture_dse
    rating: READY_DRY_RUN
    source_ids:
      - zigzag
      - timeloop-accelergy
      - dosa
      - diffaxe
    local_lane: p1-zigzag-npu-dse
    current_artifacts:
      - compiler/runtime/ai_eda/zigzag/e1_npu_current.yaml
      - build/ai_eda/zigzag/validation/dse_report.yaml
    next_gate: make npu-runtime-contract-check
    critical_review: >
      Analytical and learned DSE can guide simulator experiments, but estimates
      require calibration before product claims.
  - id: software_bsp_and_firmware
    rating: READY_DRY_RUN
    source_ids:
      - agentic-eda-survey-2512-23189v2
      - llm-firmware-validation
      - eok-riscv-kernel-optimization
      - intrintrans-rvv
      - opensbi
      - u-boot
      - mcp4eda
    local_lane: p1-software-bsp-firmware-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_software_bsp_firmware_targets.py
      - build/ai_eda/software_bsp_firmware_targets/validation/targets_report.json
    next_gate: make software-bsp-check
    critical_review: >
      LLM firmware validation, RISC-V kernel optimization, and intrinsic
      translation work can help prioritize boot/BSP and runtime experiments,
      but E1 lacks an RTL-equivalent Linux boot transcript, pinned external
      firmware/BSP trees, QEMU/Renode evidence tied to the device tree, and a
      reviewed patch workflow. Keep this lane as target capture until generated
      patches are checked by static analysis, simulator transcripts, BSP gates,
      and human review.
  - id: simulator_benchmark_optimization
    rating: READY_DRY_RUN
    source_ids:
      - zigzag
      - timeloop-accelergy
      - dosa
      - diffaxe
      - rtlmul
    local_lane: p1-simulator-benchmark-optimization
    current_artifacts:
      - scripts/ai_eda/capture_simulator_optimization_targets.py
      - build/ai_eda/simulator_optimization/validation/targets_report.json
    next_gate: make benchmark-sim-metrics
    critical_review: >
      AI/DSE can prioritize simulator workloads and target metrics, but
      benchmark claims require executed benchmark logs and calibration.
  - id: rtl_ppa_advisory_prediction
    rating: READY_DRY_RUN
    source_ids:
      - rtlmul
      - verilog-eval
      - cvdp
    local_lane: p1-rtlmul-ppa-advisory
    current_artifacts:
      - scripts/ai_eda/run_rtlmul_ppa_advisory.py
      - build/ai_eda/rtlmul_ppa/validation/ppa_advisory_report.json
    next_gate: make synth
    critical_review: >
      RTLMUL-style PPA prediction is useful only as a target-capture and
      validation-planning lane until model revision, license review, and
      held-out E1 error analysis exist; no prediction is generated by default.
  - id: hls_accelerator_automation
    rating: READY_DRY_RUN
    source_ids:
      - hlsfactory
      - hls-eval
      - idse-hls
      - secda-dse
    local_lane: p1-hls-accelerator-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_hls_accelerator_targets.py
      - build/ai_eda/hls_accelerator_targets/validation/targets_report.json
    next_gate: make npu-runtime-contract-check
    critical_review: >
      HLS and LLM-guided HLS DSE can speed accelerator experiments, but E1 must
      first capture bounded runtime/spec tasks and keep generated HLS/RTL out of
      source until C-sim, HLS synthesis, RTL simulation, synthesis, and review
      evidence exist.
  - id: timing_closure_automation
    rating: READY_DRY_RUN
    source_ids:
      - timingpredict
      - e2eslack
      - timingllm
      - fluxeda
      - openroad-resizer
      - ir-aware-eco-rl
    local_lane: p1-timing-closure-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_timing_closure_targets.py
      - build/ai_eda/timing_closure_targets/validation/targets_report.json
    next_gate: python3 scripts/check_pd_closure.py
    critical_review: >
      Timing-prediction, report-triage, and ECO-search methods can prioritize
      closure work, but they cannot waive STA. E1 must keep outputs advisory
      until before/after OpenSTA/OpenLane and signoff evidence exists.
  - id: analog_mixed_signal_automation
    rating: READY_DRY_RUN
    source_ids:
      - align-analoglayout
      - autockt
      - genie-asi
      - acdc-analog-llm
      - ado-llm
      - analoggenie
      - masala-chai
      - limca
    local_lane: p2-analog-mixed-signal-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_analog_mixed_signal_targets.py
      - build/ai_eda/analog_mixed_signal_targets/validation/targets_report.json
    next_gate: make padframe-check
    critical_review: >
      Analog/AMS AI tools can help size, classify, and lay out circuits, but E1
      currently lacks local SPICE specs, foundry pad cells, extracted models,
      and SI/PI evidence. Keep this as target capture until deterministic analog
      and package gates exist.
  - id: memory_interconnect_automation
    rating: READY_DRY_RUN
    source_ids:
      - archgym
      - ai-noc-dse
      - booksim2
      - ramulator2
      - dramsim3
      - dramsys
      - gem5-aladdin
      - gem5-accesys
    local_lane: p1-memory-interconnect-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_memory_interconnect_targets.py
      - build/ai_eda/memory_interconnect_targets/validation/targets_report.json
    next_gate: make memory-interconnect-contract-check
    critical_review: >
      Architecture DSE, NoC simulation, and DRAM simulation can guide future
      memory/fabric work, but E1 currently has an AXI-Lite SRAM-backed scaffold
      without cache coherence, IOMMU/SMMU, QoS, LPDDR, or real contention
      evidence. Keep this lane as target capture until local simulator and
      memory-contract gates define the design space.
  - id: dft_and_manufacturing_test
    rating: READY_DRY_RUN
    source_ids:
      - fault-dft
      - deeptpi
      - deft-atpg
      - lite-scan-instrumentation
      - drl-atpg
      - atpg-via-ai-survey
      - atpg-toolkit
      - nn-for-atpg
    local_lane: p1-dft-atpg-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_dft_atpg_targets.py
      - build/ai_eda/dft_atpg_targets/validation/targets_report.json
    next_gate: make synth
    critical_review: >
      Open DFT tooling and AI-assisted ATPG/testability methods can improve
      scan, pattern generation, hard-to-detect faults, and test-point ranking,
      but E1 still needs a scan architecture, fault model, pinned ATPG backend,
      tester interface, and downstream timing/signoff evidence before any DFT
      insertion or fault-coverage claim.
  - id: power_thermal_prediction
    rating: READY_DRY_RUN
    source_ids:
      - deepoheat
      - thermal-generative-ai
      - thermedge-iredge
      - waca-unet-ir-drop
      - ir-drop-predictor
      - eda-irdrop-prediction
      - openpdn
      - aieda
      - rtlmul
    local_lane: p1-power-thermal-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_power_thermal_targets.py
      - build/ai_eda/power_thermal_targets/validation/targets_report.json
    next_gate: make power-thermal-evidence-check
    critical_review: >
      ML thermal, IR-drop, PDN, and RTL power predictors can screen hotspots,
      power-integrity risk, and PDN template choices, but E1 still lacks
      calibrated rail power traces, thermal traces, package/board thermal
      models, activity-aligned power maps, and repeated PDNSim/signoff labels.
      Keep this lane as target capture until measured or deterministic labels
      exist.
  - id: hardware_security_ai
    rating: READY_DRY_RUN
    source_ids:
      - hardware-trojan-ml
      - pearl-trojan-llm
      - trojansaint
      - gnn-mff
      - securerag-rtl
      - trojanwhisper
      - trojangym
      - ghost-benchmarks
    local_lane: p1-hardware-security-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_hardware_security_targets.py
      - build/ai_eda/hardware_security_targets/validation/targets_report.json
    next_gate: make no-hardware-action-check
    critical_review: >
      AI Trojan detection, LLM/RAG vulnerability triage, and adversarial
      Trojan-generation benchmarks can help review generated or imported RTL,
      but E1 lacks local clean/dirty labels, a pinned security taxonomy, a
      reviewed scanner workflow, and reviewer disposition rules. Keep this lane
      as target capture until findings can be tied to RTL hashes, deterministic
      regressions, and human security review.
  - id: cdc_rdc_automation
    rating: READY_DRY_RUN
    source_ids:
      - accellera-cdc-rdc-standard
      - formal-cdc-msi
      - questa-cdc-rdc-assist
      - opencdc
      - mcp4eda
    local_lane: p1-cdc-rdc-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_cdc_rdc_targets.py
      - build/ai_eda/cdc_rdc_targets/validation/targets_report.json
    next_gate: make rtl-check
    critical_review: >
      CDC/RDC automation is signoff-critical and distinct from ordinary RTL
      lint or STA. Accellera standardization and commercial ML assist show
      current SOTA direction, but E1 lacks explicit clock/reset intent, local
      CDC/RDC reports, waiver policy, and labeled findings. Keep this lane as
      target capture until deterministic RTL, formal, cocotb, and reviewer
      gates exist.
  - id: board_package_fpga_automation
    rating: READY_DRY_RUN
    source_ids:
      - pcbschemagen
      - pcb-bench
      - pcbagent
      - neurpcb
      - pcb-migrator
      - pcb-pr-app
      - freerouting
      - dreamplacefpga
      - rapidwright-dreamplacefpga
      - deeppcb-defect-dataset
    local_lane: p1-board-package-fpga-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_board_package_fpga_targets.py
      - build/ai_eda/board_package_fpga_targets/validation/targets_report.json
    next_gate: make package-cross-probe-check
    critical_review: >
      PCB schematic/placement/routing AI, autorouters, FPGA placers, and PCB
      inspection datasets can help plan future board and prototype workflows,
      but E1 lacks release-clean package vendor data, KiCad ERC/DRC/fab
      evidence, SI/PI/DFM review, RF/regulatory evidence, and FPGA hardware
      bring-up. Keep this lane as target capture until all board, package,
      manufacturing, and FPGA gates define a safe promotion path.
  - id: low_power_intent_automation
    rating: READY_DRY_RUN
    source_ids:
      - ieee-1801-upf
      - ieee-upf-open-source
      - yosys-clockgate
      - codmas-rtlopt
      - prompting-for-power
      - poet-rtl-ppa
      - rtl-ppa-sog
      - openroad-two-phase-clock
    local_lane: p1-low-power-intent-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_low_power_intent_targets.py
      - build/ai_eda/low_power_intent_targets/validation/targets_report.json
    next_gate: make platform-contract-check
    critical_review: >
      Low-power automation is more than power prediction: UPF, power domains,
      retention, isolation, level shifting, clock gating, DVFS, and idle states
      can all change functional behavior and signoff scope. E1 currently lacks
      a power-state table, always-on partition, supply-set map, UPF source,
      power-aware verification backend, and before/after low-power PPA corpus.
      Keep this lane as target capture until generated power intent and
      clock-gating edits can be checked by RTL, formal, synthesis, DFT, CDC/RDC,
      power/thermal, and physical-design gates.
  - id: post_silicon_validation_automation
    rating: READY_DRY_RUN
    source_ids:
      - symbolic-qed
      - soc-trace-protocol-debug
      - riscv-dv
      - riscof
      - riscv-arch-test
      - opentitan-chip-tests
      - ml-boot-failure-debug
      - llm4sechw-debug
    local_lane: p1-post-silicon-validation-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_post_silicon_validation_targets.py
      - build/ai_eda/post_silicon_validation_targets/validation/targets_report.json
    next_gate: make real-world-gates-check
    critical_review: >
      Post-silicon and lab automation is essential but cannot be simulated into
      existence. RISC-V compliance tests, riscv-dv, QED-style tests,
      trace-debug methods, cross-target on-device tests, and ML boot-failure
      triage can guide future bring-up, but E1 currently has no silicon, no lab
      trace corpus, no executed compliance suite, and no approved hardware
      action workflow. Keep this lane as target capture until QEMU/Renode,
      FPGA, board/package, manufacturing, real-world, benchmark, and lab
      evidence exists.
