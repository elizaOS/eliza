      - build/ai_eda/dfm_yield_lithography_targets/validation/targets_report.json
    next_gate: make pd-contract-check
    critical_review: >
      TCAD/DTCO agents, ML hotspot detectors, differentiable lithography,
      ILT/OPC optimizers, and wafer-defect classifiers are potentially useful
      after physical design and process authority are real, but they are not
      signoff. E1 currently lacks final layout, foundry decks, TCAD decks,
      simulator licenses, lithography kernels, mask rules, calibrated
      process/device labels, local hotspot labels, wafer maps, and manufacturing
      inspection evidence, so the lane only captures targets and blockers.
