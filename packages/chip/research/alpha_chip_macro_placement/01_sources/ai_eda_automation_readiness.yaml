    next_gate: make openlane-run-preflight-check
    critical_review: >
      Placement AI can reduce search time, but E1 is blocked until OpenLane
      baseline runs complete and routed QoR is archived.
  - id: placement_legalization_automation
    rating: READY_DRY_RUN
    source_ids:
      - openroad-gpl
      - openroad-dpl
