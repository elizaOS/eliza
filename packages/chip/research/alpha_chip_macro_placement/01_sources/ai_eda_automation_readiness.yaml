      - build/ai_eda/pd_predictor_dataset/validation/snapshot_manifest.json
    next_gate: make openlane-run-preflight-check
    critical_review: >
      Predictors can prioritize runs after local label capture, but are not
      signoff and currently lack held-out E1 validation.
  - id: routing_congestion_automation
    rating: READY_DRY_RUN
    source_ids:
      - circuitnet
      - circuitnet-2
      - routeplacer
      - openroad-fastroute
      - openroad-tritonroute
      - cugr
      - dr-cu
    local_lane: p1-routing-congestion-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_routing_congestion_targets.py
      - build/ai_eda/routing_congestion_targets/validation/targets_report.json
    next_gate: make pd-signoff-manifest-check
    critical_review: >
      Routing and congestion predictors can rank risky placements or router
      settings, and open routers can provide comparison backends, but no output
      can change route guides, DEF/ODB/GDS, Tcl, or PD config until before/after
      routing, DRC, antenna, STA, power, manufacturing, and signoff evidence
      exists.
  - id: circuit_foundation_models
    rating: READY_DRY_RUN
    source_ids:
      - circuit-foundation-model-survey
      - chipnemo
      - geneda
      - nettag
      - deepgate4
      - chiplingo
