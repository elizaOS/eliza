schema: eliza.ai_eda_automation_readiness.v1
updated: 2026-05-19
scope: >
  Stage-by-stage readiness scorecard for AI/EDA automation in the E1 chip
  package. Readiness describes safe integration maturity, not general research
  excitement.
rating_scale:
  READY_DRY_RUN: Local dry-run artifacts and checker coverage exist.
  READY_ADVISORY: Local evidence can guide human prioritization only.
  BLOCKED_NEEDS_EVIDENCE: Sources exist but local gates, labels, or tool inputs are missing.
  RESEARCH_ONLY: Interesting source, not currently actionable for E1.
policy:
  ai_output_is_not_evidence: true
  source_promotion_requires_human_review: true
  signoff_requires_existing_deterministic_gates: true
stages:
  - id: agentic_eda_orchestration
    rating: READY_DRY_RUN
    source_ids:
      - agentic-eda-survey-2512-23189v2
      - autoeda-mcp
      - chateda
      - llm-eda-log-analysis
      - orassistant
      - mcp4eda
      - synopsys-ai-copilot
      - cadence-jedai
      - cadence-chipstack-ai-super-agent
      - siemens-fuse-eda-ai-agent
      - phoenix-bench
    local_lane: p1-local-eda-rag-log-triage
    current_artifacts:
      - scripts/ai_eda/build_local_eda_rag_index.py
      - build/ai_eda/rag_index/source_manifest.json
    next_gate: python3 scripts/check_ai_eda_source_inventory.py
    critical_review: >
      Agents and log-analysis assistants are useful for context retrieval and
      run triage, but write-capable tool agents need typed command schemas,
      log schemas, archived logs, deterministic replay, and reviewer
      disposition.
  - id: eda_tool_agent_interoperability
    rating: READY_DRY_RUN
    source_ids:
      - agentic-eda-survey-2512-23189v2
      - autoeda-mcp
      - chateda
      - mcp4eda
      - synopsys-ai-copilot
      - cadence-jedai
      - cadence-chipstack-ai-super-agent
      - siemens-fuse-eda-ai-agent
      - phoenix-bench
    local_lane: p1-eda-tool-agent-interop-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_eda_tool_agent_interop_targets.py
      - build/ai_eda/eda_tool_agent_interop_targets/validation/targets_report.json
    next_gate: python3 scripts/ai_eda/capture_eda_tool_agent_interop_targets.py --run-id validation
    critical_review: >
      MCP-style EDA wrappers and commercial copilots are the most direct path
      to AI orchestration across tools, but they are also the highest-risk
      automation boundary. E1 should keep them as target capture only until
      command schemas, read/write scopes, commercial license and data-handling
      review, local replay manifests, deterministic gates, and reviewer
      disposition exist; no generated Tcl, shell, constraints, waivers, source
      edits, tool runs, signoff claims, or release use are allowed by this
      lane.
