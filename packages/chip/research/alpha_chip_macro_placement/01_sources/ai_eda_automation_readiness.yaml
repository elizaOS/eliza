    next_gate: make formal
    critical_review: >
      Agentic verification planners and formal-debug assistants are useful for
      triage, but root-cause narratives, generated testbenches, generated UVM
      collateral, generated SVAs, coverage claims, and proposed RTL fixes are
      all unsafe until tied to local traces, RTL hashes, deterministic
      regressions, equivalence/synthesis where needed, and human review.
  - id: physical_design_prediction
    rating: READY_ADVISORY
    source_ids:
      - circuitnet
      - circuitnet-2
      - routeplacer
    local_lane: p2-e1-pd-predictor-dataset
    current_artifacts:
