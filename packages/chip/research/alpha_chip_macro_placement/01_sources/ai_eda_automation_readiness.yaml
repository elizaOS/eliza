    next_gate: make rtl-check
    critical_review: >
      Public RTL models, EDA-feedback RL frameworks, and benchmarks are useful
      for candidate generation, but generated RTL remains outside source until
      lint, simulation, synthesis, formal where applicable, contamination
      checks, and review pass.
  - id: rtl_repository_completion
    rating: BLOCKED_NEEDS_EVIDENCE
    source_ids:
      - rtl-repocoder
      - eda-corpus
    local_lane: p1-local-eda-rag-log-triage
    current_artifacts:
      - build/ai_eda/rag_index/source_manifest.json
    next_gate: make rtl-check
    critical_review: >
      Repository-aware completion is plausible for E1 conventions, but needs
      stale-context detection and source promotion rules before execution.
  - id: rtl_ppa_rewrite
    rating: READY_DRY_RUN
    source_ids:
      - symrtlo
      - rtlrewriter-bench
      - formalrtl
      - cktevo
      - rtl-timing-metamorphosis
      - openabc-d
      - rocketppa
    local_lane: p1-rtl-rewrite-equivalence-target-capture
    current_artifacts:
      - research/alpha_chip_macro_placement/05_experiments/e1_rtl_model_eval_plan.md
      - scripts/ai_eda/capture_rtl_rewrite_equivalence_targets.py
      - build/ai_eda/rtl_rewrite_equivalence_targets/validation/targets_report.json
    next_gate: make formal
    critical_review: >
      RTL rewrite remains too risky for source changes, but E1 can now capture
      the exact equivalence, simulation, synthesis, and before/after PPA gates
      needed before any generated rewrite is even evaluated. SymRTLO,
      FormalRTL, CktEvo, and related benchmarks show SOTA direction, while
      timing-logic metamorphosis highlights that clocked/control RTL is
      especially unsafe without formal and regression evidence.
  - id: verification_stimulus
    rating: READY_ADVISORY
    source_ids:
