      - build/ai_eda/backend_preflight/validation/backend_preflight_report.json
    next_gate: python3 scripts/check_ai_eda_source_inventory.py
    critical_review: >
      Local availability is only an integration-readiness signal; present tools
      still need version pinning, license review, and executed local evidence.
