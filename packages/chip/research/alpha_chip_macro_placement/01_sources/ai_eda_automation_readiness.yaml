      - build/ai_eda/cpu_microarchitecture_targets/validation/targets_report.json
    next_gate: make branch-prediction-check
    critical_review: >
      Agentic microarchitecture search and ML performance models can eventually
      help choose branch predictor, cache replacement, and prefetch policies,
      but E1 needs pinned simulators, trace provenance, held-out workloads,
      before/after RTL evidence, and synthesis/formal/cocotb gates before any
      generated policy can affect source or product claims.
