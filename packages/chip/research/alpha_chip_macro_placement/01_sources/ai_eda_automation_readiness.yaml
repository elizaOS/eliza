      Placement, legalization, density, and padding decisions determine the
      physical-design search space for routing, timing, antenna, DRC, and power.
      OpenROAD GPL/DPL are the deterministic local references; generative
      placement, diffusion, flow-matching, RL, and GPU placement frameworks are
      useful only as quarantined target-capture context until E1 has repeated
      completed runs, held-out local labels, exact legalizer replay, downstream
      route/STA/physical-verification/power gates, and reviewer signoff.
  - id: npu_architecture_dse
    rating: READY_DRY_RUN
    source_ids:
