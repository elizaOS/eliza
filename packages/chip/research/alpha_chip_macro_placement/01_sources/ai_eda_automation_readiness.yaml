      - tcadgpt
      - proton-em
      - emspice2
      - bti-hci-aging-models
      - sofia-soft-error-framework
      - arm-ethos-u55-soft-error
      - ibex-seu-formal
      - bec-soft-error-llvm
      - hamartia-fault-injection
      - fies-qemu-fault-injection
      - tensorfi
      - ares-dnn-fault-injection
      - caliptra-error-injection
    local_lane: p1-reliability-resilience-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_reliability_resilience_targets.py
      - build/ai_eda/reliability_resilience_targets/validation/targets_report.json
    next_gate: make process-14a-effects-check
    critical_review: >
      TCAD/DTCO process-device modeling plus aging, EM, soft-error, and
      resilience automation can eventually guide selective hardening,
      ECC/TMR/replay, derating, and PDN reliability work, but those flows are
      easy to overclaim. E1 needs process-qualified models, authorized TCAD
      decks, calibration data, activity and mission profiles, deterministic
      fault manifests, simulator or formal logs, PD/signoff evidence,
      before/after PPA, and review before any generated assumption, mitigation,
      or reliability claim can affect source or release.
  - id: placement_optimization
    rating: BLOCKED_NEEDS_EVIDENCE
    source_ids:
      - google-circuit-training
      - tilos-macroplacement
      - autodmp
      - dreamplace
    local_lane: p1-openroad-openlane-autotune
    current_artifacts:
