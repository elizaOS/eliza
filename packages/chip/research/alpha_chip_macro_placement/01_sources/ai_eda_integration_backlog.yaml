    source_ids:
      - circuitnet
      - circuitnet-2
      - routeplacer
    target_area:
      - dataset_generation
      - physical_design
      - logic_synthesis
    owner_scope: generated feature manifests and build/ai_eda predictor artifacts
    objective: >
      Capture E1 synthesis and physical-design labels for future congestion,
      timing, power, and routability predictors.
    deliverables:
      - scripts/ai_eda/capture_openroad_ml_snapshot.py
      - build/ai_eda/pd_predictor_dataset/<run-id>/snapshot_manifest.json
      - build/ai_eda/pd_predictor_dataset/<run-id>/label_report.json
    evidence_gate: >
      Snapshot manifests include source ODB/DEF/netlist hashes, tool versions,
