      - make npu-roadmap-check
    blocked_by:
      - No ZigZag invocation backend enabled
      - No calibrated E1 latency/energy labels
    acceptance_criteria:
      - Current and target manifests are hashed into the DSE report.
      - Report states estimates are unavailable in dry-run mode.
      - Product claims remain blocked.
  - id: p2-rtl-model-evaluation-harness
    title: Local RTL Model Evaluation Harness
    priority: P2
    status: IN_PROGRESS
    source_ids:
      - rtl-coder
      - openllm-rtl
      - chipcraftx-rtlgen-7b
      - rtl-repocoder
      - cvdp
      - verilog-eval
    target_area:
      - rtl_generation
      - benchmark
      - rtl_completion
    owner_scope: evaluation harness only; generated RTL does not enter source automatically
    objective: >
      Evaluate open RTL models and datasets against E1-style small-module tasks
      with lint, simulation, and synthesis checks.
    deliverables:
      - scripts/ai_eda/evaluate_rtl_model.py
      - research/alpha_chip_macro_placement/05_experiments/e1_rtl_model_eval_plan.md
      - build/ai_eda/rtl_model_eval/<run-id>/eval_report.json
    evidence_gate: >
      Evaluation report records prompts, model IDs, licenses, generated outputs,
      lint logs, simulation logs, synthesis logs, and human review status.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - make rtl-check
      - make synth
    blocked_by:
      - Per-model and per-dataset license review
      - Local inference or API backend decision
      - Executed lint, simulation, and synthesis logs for generated artifacts
    acceptance_criteria:
      - No generated RTL is committed by the evaluator.
      - Each model result is reproducible from model ID and prompt hash.
      - Noncommercial or unclear-license models are blocked from release use.
  - id: p2-rtl-ppa-rewrite
    title: RTL PPA Rewrite And Equivalence Harness
    priority: P2
    status: TODO
    source_ids:
      - symrtlo
    target_area:
      - rtl_optimization
      - ppa
