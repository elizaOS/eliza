      Before/after RTL must pass equivalence, lint, simulation, synthesis, and
      human review; generated rewrites are never direct source.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - make rtl-check
      - make synth
    blocked_by:
      - No equivalence harness for AI-rewritten RTL
      - No source-allowed rewrite workflow
    acceptance_criteria:
      - Work item remains blocked or TODO until equivalence evidence exists.
      - PPA claims require local before/after Yosys/OpenLane evidence.
  - id: p1-rtl-rewrite-equivalence-target-capture
    title: RTL Rewrite Equivalence Target Capture
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - symrtlo
      - rtlrewriter-bench
      - formalrtl
      - rtl-timing-metamorphosis
      - openabc-d
      - rocketppa
    target_area:
      - rtl_optimization
      - equivalence
      - ppa
      - formal_verification
      - logic_synthesis
    owner_scope: dry-run target capture only; no generated rewrites, equivalence runs, synthesis runs, or PPA claims
    objective: >
      Track LLM RTL rewrite, symbolic RTL optimization, formal RTL synthesis,
      metamorphic RTL optimization evaluation, synthesis datasets, and PPA
      predictors while tying any future E1 use to local lint, cocotb, formal,
      synthesis, OpenLane, and review gates.
    deliverables:
      - scripts/ai_eda/capture_rtl_rewrite_equivalence_targets.py
      - build/ai_eda/rtl_rewrite_equivalence_targets/<run-id>/targets_report.json
    evidence_gate: >
      RTL rewrite automation reports may only hash local RTL, formal, runtime,
      cocotb, and synthesis inputs; generated rewrites, equivalence claims, and
      PPA claims require before/after evidence and human review.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - python3 scripts/ai_eda/capture_rtl_rewrite_equivalence_targets.py --run-id validation
      - make rtl-check
      - make formal
      - make synth
    blocked_by:
      - No local before/after equivalence harness for AI-rewritten RTL
      - No approved source-promotion workflow for generated RTL rewrites
      - No held-out E1 RTL rewrite benchmark with functional and PPA labels
      - No deterministic synthesis/OpenLane before-after comparison corpus
      - No policy for timing-control, clock-domain, reset-domain, or protocol-sensitive rewrites
    acceptance_criteria:
      - Report hashes RTL, formal, cocotb, runtime-contract, RTL-model-eval, synthesis, and formal-script inputs.
      - Report states no generated rewrite, LLM run, equivalence run, synthesis run, PPA claim, or release use is enabled.
      - Candidate tasks list deterministic RTL, cocotb, formal, synthesis, OpenLane, PD signoff, and CDC/RDC gates.
  - id: p2-e1-pd-predictor-dataset
    title: E1 PD Predictor Dataset And Label Capture
