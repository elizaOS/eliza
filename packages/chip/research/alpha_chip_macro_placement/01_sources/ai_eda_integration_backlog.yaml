  - id: p1-eda-tool-agent-interop-target-capture
    title: EDA Tool-Agent Interoperability Target Capture
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - agentic-eda-survey-2512-23189v2
      - autoeda-mcp
      - chateda
      - mcp4eda
      - synopsys-ai-copilot
      - cadence-jedai
      - cadence-chipstack-ai-super-agent
      - siemens-fuse-eda-ai-agent
      - phoenix-bench
    target_area:
      - agentic_orchestration
      - eda_tool_control
      - commercial_eda
      - command_allowlist
      - reproducible_replay
    owner_scope: dry-run target capture only; no agent execution, MCP server startup, commercial API call, EDA tool invocation, generated Tcl/shell, source edit, PD config edit, signoff, or release use
    objective: >
      Track MCP-style open EDA wrappers, write-capable EDA agents, commercial
      copilots, and hardware-agent benchmarks while keeping every executable
      action behind typed command schemas, explicit scopes, commercial license
      review, local replay manifests, deterministic gates, and human review.
    deliverables:
      - scripts/ai_eda/capture_eda_tool_agent_interop_targets.py
      - build/ai_eda/eda_tool_agent_interop_targets/<run-id>/targets_report.json
    evidence_gate: >
      Tool-agent reports may only hash local registry, provenance, commercial
      EDA gate, no-hardware action matrix, RAG, backend preflight, and
      OpenROAD/OpenLane wrapper artifacts. Any real agent action requires an
      allowlisted typed command, exact tool version, read/write scope, input
      hashes, stdout/stderr log, output hashes, rollback path, local
      deterministic gate, and reviewer disposition.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - python3 scripts/ai_eda/capture_eda_tool_agent_interop_targets.py --run-id validation
      - python3 scripts/ai_eda/build_local_eda_rag_index.py --run-id validation
      - make no-hardware-action-check
      - make docs-check
    blocked_by:
      - No approved write-capable EDA agent command schema or command allowlist
      - No policy separating read-only RAG answers from executable Tcl, shell, simulator, synthesis, PnR, signoff, or release actions
      - No commercial Synopsys, Cadence, Siemens, Ansys, or foundry tool license and data-handling review for AI copilot output
      - No local replay harness that can reproduce AI-generated EDA actions from archived inputs, commands, logs, and output hashes
      - No accepted MCP server version, authentication model, sandbox policy, or artifact quarantine path for E1
      - No evidence that hardware-agent benchmark success transfers to E1 multi-file RTL, PD, verification, or software integration tasks
    acceptance_criteria:
      - Report hashes local inventory, provenance, external probe summary, backlog, readiness, SOTA review, commercial EDA gate, no-hardware matrix, RAG/backend scripts, OpenROAD/OpenLane wrappers, and validation reports.
      - Report states no agent, MCP server, open-source EDA, commercial EDA, external API, Tcl, shell, RTL, testbench, constraint, waiver, simulation, synthesis, PnR, signoff, source, PD config, prediction, productivity claim, PPA claim, signoff claim, or release action is enabled.
      - Candidate tasks list deterministic source inventory, RAG, no-hardware-action, docs, commercial-EDA, OpenLane preflight, physical closure, PD signoff, benchmark hygiene, RTL, formal, and cocotb gates.
