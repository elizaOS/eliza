      Prepare E1 NPU current and target architecture manifests for future
      AI-assisted architecture search without making TOPS, Android, or tapeout
      claims from estimates.
    deliverables:
      - compiler/runtime/ai_eda/zigzag/e1_npu_current.yaml
      - compiler/runtime/ai_eda/zigzag/e1_npu_target.yaml
      - scripts/ai_eda/run_zigzag_npu_dse.py
      - build/ai_eda/zigzag/<run-id>/dse_report.yaml
    evidence_gate: >
      DSE results are architecture estimates only and require runtime-contract,
