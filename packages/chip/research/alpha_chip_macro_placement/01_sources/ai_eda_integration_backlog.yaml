schema: eliza.ai_eda_integration_backlog.v1
updated: 2026-05-19
scope: >
  Checked backlog for turning AI/EDA research sources into bounded E1
  integrations. Items remain incomplete until their evidence gates pass.
status_values:
  - TODO
  - BLOCKED
  - IN_PROGRESS
  - DONE
work_items:
  - id: p0-ai-eda-critical-sota-review
    title: Critical AI/EDA SOTA Review
    priority: P0
    status: IN_PROGRESS
    source_ids:
      - agentic-eda-survey-2512-23189v2
      - autoeda-mcp
      - chateda
      - rtl-coder
      - verilog-eval
      - cvdp
      - circuitnet
      - google-circuit-training
      - autodmp
      - orassistant
      - zigzag
      - assertllm
      - fault-dft
      - deepoheat
      - hardware-trojan-ml
    target_area:
      - research
      - architecture
      - evidence_policy
    owner_scope: research notes and checked integration backlog
    objective: >
      Maintain a critical, evidence-backed map of which chip-design stages can
      be automated now, which are blocked, and which require local E1 evidence.
    deliverables:
      - research/alpha_chip_macro_placement/01_sources/ai_eda_sota_review.md
      - research/alpha_chip_macro_placement/01_sources/ai_eda_source_inventory.yaml
      - research/alpha_chip_macro_placement/01_sources/ai_eda_integration_backlog.yaml
      - research/alpha_chip_macro_placement/01_sources/ai_eda_automation_readiness.yaml
      - research/alpha_chip_macro_placement/01_sources/ai_eda_provenance_matrix.yaml
    evidence_gate: >
      Review must map each recommendation to source IDs, local deliverables,
      and named validation gates instead of broad AI capability claims.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - make docs-check
    blocked_by:
      - Ongoing literature and code search
      - License review for external code, weights, and datasets
    acceptance_criteria:
      - SOTA claims are tied to sources with URLs.
      - Recommendations distinguish advisory predictions from signoff evidence.
      - Each near-term integration has a local checker or explicit blocked gate.
      - External code, model, and dataset assets have release-use triage.
  - id: p1-local-eda-rag-log-triage
    title: Local EDA RAG And Log Triage
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - autoeda-mcp
      - orassistant
      - eda-corpus
    target_area:
      - log_analysis
      - openroad_triage
      - evidence_navigation
    owner_scope: read-only local source index and citation smoke reports
    objective: >
      Build a local, citation-required index over E1 EDA scripts, checks, and
      source registries before allowing any agent to propose tool actions.
    deliverables:
      - scripts/ai_eda/build_local_eda_rag_index.py
      - build/ai_eda/rag_index/source_manifest.json
      - build/ai_eda/rag_index/citation_smoke_report.json
    evidence_gate: >
      RAG outputs must cite local file hashes and list follow-up Make/checker
      commands; no generated answer is release evidence.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - python3 scripts/ai_eda/build_local_eda_rag_index.py --run-id validation
    blocked_by:
      - Broader source corpus selection and license review
      - No write-capable agent action schema yet
    acceptance_criteria:
      - Index manifest is reproducible from current file hashes.
      - Citation smoke report names follow-up gates for each query.
      - The index policy remains read-only.
  - id: p1-external-source-metadata-probe
    title: External AI/EDA Source Metadata Probe
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - rtl-coder
      - verilog-eval
      - cvdp
      - chipcraftx-rtlgen-7b
      - circuitnet
      - zigzag
      - assertllm
      - rtlmul
    target_area:
      - provenance
      - license_review
      - model_registry
      - code_registry
    owner_scope: metadata probe reports only; no asset import or release use
    objective: >
      Probe external GitHub and Hugging Face metadata for inventory sources so
      code/model/dataset availability and license hints are reproducible.
    deliverables:
      - scripts/ai_eda/probe_external_ai_eda_sources.py
      - build/ai_eda/external_source_probe/<run-id>/source_probe_report.json
      - research/alpha_chip_macro_placement/01_sources/ai_eda_external_source_probe_summary.yaml
    evidence_gate: >
      Probe reports are metadata only; importing code, datasets, or model
      weights remains blocked until manual license and provenance review.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - python3 scripts/ai_eda/probe_external_ai_eda_sources.py --run-id validation
    blocked_by:
      - Manual license review for each source selected for real use
      - Version pinning for cloned code or downloaded model/dataset assets
      - Local deterministic gates for any generated or predicted output
    acceptance_criteria:
      - Probe report records provider, status, license hints, and release-use block.
      - Probe policy states no model weights or external assets are imported.
      - Checker rejects probe reports that allow release use.
  - id: p1-local-ai-eda-backend-preflight
    title: Local AI/EDA Backend Preflight
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - zigzag
      - timeloop-accelergy
      - rtlmul
      - llm4dv
      - assertllm
      - fault-dft
    target_area:
      - backend_readiness
      - simulator
      - verification
      - design_for_test
    owner_scope: local availability report only; no installs, clones, or model downloads
    objective: >
      Check which high-priority AI/EDA backends are already locally runnable or
      checked out, without importing external assets or enabling release use.
    deliverables:
      - scripts/ai_eda/preflight_ai_eda_backends.py
      - build/ai_eda/backend_preflight/<run-id>/backend_preflight_report.json
    evidence_gate: >
      Backend preflight reports only local availability; a present backend still
      needs license review, version pinning, and executed local gates.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - python3 scripts/ai_eda/preflight_ai_eda_backends.py --run-id validation
    blocked_by:
      - Missing local installs or checkouts for most optional backends
      - Manual license review and version pinning
      - Executed backend-specific harnesses
    acceptance_criteria:
      - Report records commands, Python modules, and local external paths.
      - Report policy forbids installs, clones, downloads, and release use.
      - Checker rejects reports that allow release use.
  - id: p1-openroad-openlane-autotune
    title: OpenROAD/OpenLane Autotune Harness
    priority: P1
    status: BLOCKED
    source_ids:
      - autoeda-mcp
      - circuitnet
      - circuitnet-2
      - autodmp
      - routeplacer
    target_area:
      - physical_design
      - hyperparameter_optimization
      - routability_prediction
    owner_scope: dry-run autotune manifests and OpenLane evidence capture
    objective: >
      Explore AI/ML-guided OpenLane configuration search and predictor-assisted
      pruning while keeping all PPA/signoff claims gated by local EDA outputs.
    deliverables:
      - scripts/ai_eda/run_openroad_autotune_e1.sh
      - build/ai_eda/openroad_autotuner/<run-id>/autotune_manifest.json
      - build/ai_eda/pd_predictor_dataset/<run-id>/snapshot_manifest.json
    evidence_gate: >
      Any tuning result needs config hashes, input design hashes, objective
      values, OpenLane logs, and downstream signoff/preflight checker results.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - make openlane-run-preflight-check
      - make synth
    blocked_by:
      - Current OpenLane run is incomplete
      - Active OpenLane launcher lock may still be running
      - No repeated completed runs for held-out predictor validation
    acceptance_criteria:
      - Dry-run manifest explicitly blocks PPA/signoff claims.
      - Executed mode is unavailable until OpenLane preflight is unblocked.
      - Predictor outputs are advisory only.
  - id: p1-llm4dv-cocotb-stimulus-loop
    title: Coverage-Directed cocotb Stimulus Search
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - agentic-eda-survey-2512-23189v2
      - llm4dv
      - cvdp
      - verilog-eval
    target_area:
      - verification
      - cocotb
      - coverage_closure
    owner_scope: coverage bins, seed manifests, and dry-run candidate reports
    objective: >
      Use LLM/agent methods only to propose candidate tests for uncovered E1 NPU
      scenarios, then accept candidates solely through cocotb regression gates.
    deliverables:
      - verify/ai_eda/coverage_bins/e1_npu_descriptor_queue.yaml
      - verify/regression_seeds/ai_eda_npu_descriptor_queue.yaml
      - scripts/ai_eda/run_cocotb_stimulus_search.py
      - build/ai_eda/cocotb_stimulus/<run-id>/coverage_report.json
    evidence_gate: >
      Generated tests or seeds are not evidence until accepted into source and
      passing make cocotb-npu and make cocotb-contract.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - python3 scripts/ai_eda/run_cocotb_stimulus_search.py --dry-run --run-id validation
      - make cocotb-npu
    blocked_by:
      - No executed model backend
      - No measured coverage delta in dry-run mode
    acceptance_criteria:
      - Coverage bins are explicit and source-controlled.
      - Dry-run report generates no candidate tests.
      - Accepted seed list points to existing deterministic tests or scenarios.
  - id: p1-assertion-candidate-review
    title: Assertion Candidate Review Lane
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - assertllm
      - assertionforge
      - codev-sva
    target_area:
      - formal_verification
      - assertion_generation
      - specification_mining
    owner_scope: candidate assertion manifests only; no automatic RTL binding
    objective: >
      Track AI-assisted SystemVerilog assertion generation as reviewed
      candidates tied to E1 specs, signal groups, and formal/cocotb gates.
    deliverables:
      - verify/ai_eda/assertion_candidates/e1_npu_descriptor.yaml
    evidence_gate: >
      Generated or human-authored candidate assertions are not source evidence
      until mapped to signals, syntax checked, passed by formal or simulation,
      and human reviewed.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - make formal
      - make cocotb-npu
    blocked_by:
      - No executable assertion-generation backend
      - Candidate assertions not yet translated into bindable SVA files
    acceptance_criteria:
      - Candidate manifest records source specs and target signal groups.
      - No candidate is bound into RTL automatically.
      - Promotion gates include formal or cocotb evidence.
  - id: p1-verification-debug-target-capture
    title: Verification Planning And Formal Debug Target Capture
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - pro-v
      - saarthi-formal-verification
      - sangam-sva
      - fvdebug
      - siliconmind-v1
    target_area:
      - verification
      - formal_verification
      - counterexample_debug
      - testbench_generation
      - assertion_generation
    owner_scope: dry-run verification-debug target reports only; no generated patches, testbenches, or assertion bindings
    objective: >
      Capture AI-assisted verification planning, PRO-V-style testbench/oracle
      generation, SANGAM-style assertion refinement, and FVDebug-style
      counterexample triage as target tasks behind deterministic E1 gates.
    deliverables:
      - scripts/ai_eda/capture_verification_debug_targets.py
      - build/ai_eda/verification_debug_targets/validation/targets_report.json
    evidence_gate: >
      Any generated verification artifact remains non-evidence until it cites
      local RTL/spec/formal hashes and passes cocotb, formal, synthesis or
      equivalence gates plus human review as applicable.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - python3 scripts/ai_eda/capture_verification_debug_targets.py --run-id validation
      - make formal
    blocked_by:
      - No archived failing E1 formal counterexample corpus
      - No waveform or trace causal-graph parser pinned for local reports
      - No reviewer disposition schema for AI-generated root-cause reports
      - No license-reviewed PRO-V or SiliconMind model integration path
    acceptance_criteria:
      - Dry-run report forbids patch, testbench, assertion, and release claims.
      - Candidate tasks name deterministic follow-up gates.
      - Report hashes local RTL, formal, cocotb, and spec artifacts.
  - id: p1-zigzag-npu-dse
    title: ZigZag-Style NPU Architecture DSE
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - agentic-eda-survey-2512-23189v2
      - zigzag
      - timeloop-accelergy
