      local synthesis, OpenLane, and held-out error analysis.
    evidence_gate: >
      PPA predictions need model/version capture, input RTL hashes, local label
      comparison, error analysis, and review.
    risk:
      - Code-level estimates can miss physical effects and constraints.
      - Training data may not match E1 modules, libraries, or process assumptions.
