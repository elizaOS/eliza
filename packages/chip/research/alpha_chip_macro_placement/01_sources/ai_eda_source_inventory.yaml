    dataset_url: null
    license_status: review_required
    code_status: available
    model_status: no_model
    e1_fit: >
      Baseline benchmark harness for RTL model claims; useful for comparing
      local E1 task results with public pass-rate conventions.
    integration_action: >
      Add as an external benchmark reference before enabling real RTL model
      execution.
    evidence_gate: >
      Any benchmark import must record exact version, license, simulator, and
      pass/fail logs; benchmark pass rates do not promote E1 RTL by themselves.
    risk:
      - Benchmark tasks are small and may not cover SoC integration behavior.
      - Public pass rates can hide simulator/version differences.
