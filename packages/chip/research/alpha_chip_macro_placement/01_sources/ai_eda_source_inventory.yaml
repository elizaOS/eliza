      Strong SOTA direction for coupling software references with formal RTL
      synthesis, relevant to E1 runtime-contract-backed datapaths.
    integration_action: >
      Track as method reference until code and benchmark assets are available
      and E1 has executable reference/equivalence harnesses.
    evidence_gate: >
      Verified RTL generation requires reference-model hashes, formal spec
      hashes, generated RTL hashes, proof logs, simulation logs, and review.
    risk:
      - Open-source assets were not yet available in the checked source path.
      - Reference-model equivalence may not cover integration-side effects.
  - id: rtl-timing-metamorphosis
    name: Timing Logic Metamorphosis RTL Optimization Study
    kind: rtl_optimization_evaluation_method
    stage:
      - rtl_optimization
      - timing_logic
      - benchmark_evaluation
      - equivalence
    priority: P2
    source_url: https://arxiv.org/abs/2507.16808
    code_url: null
    model_url: null
    dataset_url: null
    license_status: paper_assets_review_required
    code_status: paper_or_assets_to_review
    model_status: no_model
    e1_fit: >
      Directly relevant caution for E1 because NPU, DMA, reset, and interconnect
      RTL contain timing-control and protocol-sensitive behavior.
    integration_action: >
      Use as a safety reference for blocking rewrites of timing, reset, clock,
      and protocol logic until deterministic regressions exist.
    evidence_gate: >
      Timing-sensitive rewrites need environment assumptions, before/after
      simulations, formal checks, timing reports, and reviewer signoff.
    risk:
      - LLM rewrites can appear PPA-improved while changing sequential behavior.
      - Metamorphic benchmarks may not capture all E1 integration constraints.
