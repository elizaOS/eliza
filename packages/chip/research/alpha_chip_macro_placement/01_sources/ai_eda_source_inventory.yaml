    code_url: null
    model_url: null
    dataset_url: null
    license_status: paper_assets_review_required
    code_status: paper_or_assets_to_review
    model_status: review_required
    e1_fit: >
      Directly relevant to repository-aware RTL completion for E1, where local
      interface contracts and naming conventions matter.
    integration_action: >
      Use the local read-only RAG index as the safe precursor to any
      repo-aware RTL assistant.
    evidence_gate: >
      Repository context must be cited by file hash and generated completions
      must remain artifacts until lint, simulation, synthesis, and review pass.
    risk:
      - Retrieval can leak stale or irrelevant RTL context.
      - Completion quality can degrade on package-specific interfaces.
  - id: symrtlo
