    evidence_gate: >
      Synthesis ML rows need source hashes, ABC/Yosys script hashes, technology
      library identity, output netlist hashes, and PPA labels.
    risk:
      - Dataset technology and benchmark distribution may not transfer to E1.
      - Logic-level optimization is not equivalent to RTL-level rewrite safety.
