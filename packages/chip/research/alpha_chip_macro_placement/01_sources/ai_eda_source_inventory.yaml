schema: eliza.ai_eda_source_inventory.v1
updated: 2026-05-19
scope: >
  Checked registry for AI/EDA sources that can improve E1 design,
  verification, physical-design, software/simulator, or evidence workflows.
  This file is a working registry, not proof that any AI output is design
  evidence.
policy:
  deterministic_gate_required: true
  ai_output_is_not_evidence: true
  release_claims_from_predictions: forbidden
  generated_rtl_requires_review: true
  external_api_required_for_release_gate: forbidden
priority_order:
  - P0
  - P1
  - P2
  - P3
entries:
  - id: agentic-eda-survey-2512-23189v2
    name: The Dawn of Agentic EDA
    kind: survey
    stage:
      - agentic_orchestration
      - physical_design
      - verification
      - rtl_generation
    priority: P0
    source_url: https://arxiv.org/abs/2512.23189
    code_url: null
    model_url: null
    dataset_url: null
    license_status: paper_only
    code_status: no_reference_implementation
    model_status: no_model
    e1_fit: >
      Top-level taxonomy for bounded AI/EDA integration lanes; each lane still
      needs local deterministic evidence gates.
    integration_action: >
      Maintain checked backlog lanes for PD tuning, verification stimulus, NPU
      DSE, RAG triage, RTL model evaluation, and release-claim guards.
    evidence_gate: >
      Local scripts, manifests, logs, and checker output are required before
      any integration claim; survey text alone is not evidence.
    risk:
      - Survey may describe agent concepts without reproducible code.
      - Agent output can be mistaken for engineering evidence unless gated.
  - id: autoeda-mcp
    name: AutoEDA
    kind: agent_framework
    stage:
      - agentic_orchestration
      - rtl_to_gds
      - tool_control
    priority: P1
    source_url: https://arxiv.org/abs/2508.01012
    code_url: null
    model_url: null
    dataset_url: null
    license_status: paper_assets_review_required
    code_status: paper_or_assets_to_review
    model_status: no_model
    e1_fit: >
      Relevant pattern for wrapping EDA tools behind typed microservice or MCP
      boundaries instead of letting agents issue unchecked shell commands.
    integration_action: >
      Keep local RAG and runner manifests read-only first; only expose narrow
      EDA actions after command schemas and evidence gates are checked.
    evidence_gate: >
      Any agentic tool invocation must emit a manifest with command, inputs,
      output hashes, and the named checker that accepts or blocks the result.
    risk:
      - Tool-driving agents can hallucinate Tcl or shell commands.
      - Microservice automation can hide nondeterminism unless logs are archived.
  - id: chateda
    name: ChatEDA
    kind: agent_framework
    stage:
      - agentic_orchestration
      - rtl_to_gds
      - script_generation
    priority: P2
    source_url: https://arxiv.org/abs/2308.10204
    code_url: https://github.com/wuhy68/ChatEDA
    model_url: null
    dataset_url: null
    license_status: review_required
    code_status: available_to_review
    model_status: no_model
    e1_fit: >
      Useful as a reference for script-generation agents, but E1 should keep
      generated scripts outside release paths until deterministic gates pass.
    integration_action: >
      Track as prior art for a future EDA command-agent wrapper and compare
      against the local read-only RAG/log triage lane.
    evidence_gate: >
      Generated scripts must be reviewed, archived, and followed by the same
      Make gates as hand-written scripts before any claim is made.
    risk:
      - LLM-generated EDA scripts can be syntactically plausible and wrong.
      - Published agent demos may not reproduce on the E1 OpenLane flow.
  - id: llm-eda-log-analysis
    name: LLM-Powered EDA Log Analysis for Effective Design Debugging
    kind: eda_log_analysis_method
    stage:
      - agentic_orchestration
      - log_analysis
      - synthesis
      - place_and_route
      - debug
    priority: P1
    source_url: https://www2.eecs.berkeley.edu/Pubs/TechRpts/2025/EECS-2025-48.html
    code_url: null
    model_url: null
    dataset_url: null
    license_status: paper_only
    code_status: no_reference_implementation
    model_status: no_model
    e1_fit: >
      Strong match for E1 because the repo already produces long synthesis,
      OpenLane, OpenROAD, formal, and simulator logs that need structured
      triage before any generated fix is considered.
    integration_action: >
      Use as methodology input for the local read-only RAG/log-triage lane:
      parse and cite logs, cluster issues, and name follow-up gates, but do not
      edit HDL, constraints, Tcl, or scripts from log summaries.
    evidence_gate: >
      Log-analysis outputs require log hashes, extracted-table/schema hashes,
      cited source locations, deterministic checker names, generated-fix
      quarantine, and reviewer disposition before any source change.
    risk:
      - Reported fix rates depend on private prompts/models and small teaching
        designs, not E1-scale SoC flows.
      - Log summaries can hide missing context or suggest plausible but unsafe
        HDL, constraint, or flow edits.
  - id: synopsys-ai-copilot
    name: Synopsys.ai Copilot
    kind: commercial_eda_ai_copilot
    stage:
      - agentic_orchestration
      - commercial_eda
      - rtl_to_gds
      - verification
      - signoff
    priority: P1
    source_url: https://www.synopsys.com/ai.html
    code_url: null
    model_url: null
    dataset_url: null
    license_status: commercial_tool_terms_review_required
    code_status: unavailable_commercial
    model_status: unavailable_commercial
    e1_fit: >
      Commercial SOTA context for AI-assisted EDA workflows, useful for
      understanding where vendor copilots can reduce setup and debug effort.
    integration_action: >
      Track only as capability reference until commercial tool access,
      data-handling terms, exact versions, and local replay gates exist.
    evidence_gate: >
      Any vendor copilot output requires license review, command transcript,
      input/output hashes, local deterministic replay, signoff gate mapping,
      and human review before it can affect source or claims.
    risk:
      - Proprietary models and tool integrations are not reproducible in this
        repo without vendor access and data-use review.
      - Copilot suggestions can generate unsafe Tcl or signoff assumptions.
