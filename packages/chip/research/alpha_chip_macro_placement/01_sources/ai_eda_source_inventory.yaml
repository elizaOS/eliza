      build/ai_eda until local equivalence, simulation, synthesis, and review pass.
    evidence_gate: >
      Rewrite evaluation needs before/after RTL hashes, testbench logs,
      equivalence logs, synthesis reports, and reviewer disposition.
    risk:
      - Benchmark tasks may be too small or synthetic for E1 protocol RTL.
      - Equivalence setup can miss timing, reset, or environment assumptions.
