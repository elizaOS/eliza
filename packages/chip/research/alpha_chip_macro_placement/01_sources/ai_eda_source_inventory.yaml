    evidence_gate: >
      Snapshot and label reports must include source ODB/DEF/netlist hashes,
      metrics provenance, split metadata, and advisory-only policy.
    risk:
      - External dataset distributions may not match E1 process or design style.
      - Predictor output is not signoff evidence.
