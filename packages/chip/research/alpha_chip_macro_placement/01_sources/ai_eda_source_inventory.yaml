    model_url: null
    dataset_url: https://huggingface.co/datasets/zeju-0727/DeepCirCuitX_Dataset
    license_status: review_required
    code_status: dataset_only
    model_status: no_model
    e1_fit: >
      Relevant because it preserves repository-level RTL context and includes
      annotations, synthesized netlists, and PPA metrics, which match E1's need
      for repo-aware RTL understanding and early PPA screening.
    integration_action: >
      Track as an external corpus candidate only. Do not download, import,
      train, fine-tune, infer, or benchmark with it until exact Hugging Face
      revision, source-repository licenses, file manifests, contamination
      checks, and quarantine paths are approved.
    evidence_gate: >
      Any DeepCircuitX use requires dataset commit/file hashes, source license
      audit, parser/lint statistics, non-overlap checks against E1 prompts,
      synthesized-netlist/PPA label provenance, held-out E1 error analysis, and
      reviewer disposition.
    risk:
      - Repository-level GitHub RTL can include incompatible licenses,
        duplicated code, generated code, or non-production examples.
      - Public PPA labels may not transfer to E1 process, constraints,
        hierarchy, SRAM/macros, or OpenLane/OpenROAD configuration.
