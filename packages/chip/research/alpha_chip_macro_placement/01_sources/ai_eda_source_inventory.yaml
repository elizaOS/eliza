    integration_action: >
      Keep as a blocked research lane until an equivalence-check harness exists.
    evidence_gate: >
      Any RTL rewrite must include before/after hashes, equivalence evidence,
      synthesis reports, and human review.
    risk:
      - PPA improvements can be benchmark-specific and unsafe without equivalence.
      - Tool-specific synthesis results may not transfer to E1.
