    kind: benchmark_dataset
    stage:
      - rtl_generation
      - verification
      - agentic_tasks
    priority: P1
    source_url: https://arxiv.org/abs/2506.14074
    code_url: https://github.com/NVlabs/cvdp_benchmark
    model_url: null
    dataset_url: https://huggingface.co/datasets/AbiralArch/hardware-cvdp-complete
    license_status: review_required
    code_status: available_to_review
    model_status: dataset_only
    e1_fit: >
      Stronger public task set for evaluating RTL-generation agents and
      verification agents before attempting E1-specific generated RTL.
    integration_action: >
      Track as future evaluator input for scripts/ai_eda/evaluate_rtl_model.py
      after license review.
    evidence_gate: >
      Imported tasks must be version-pinned and any generated answers must pass
      local simulator/synthesis gates before comparison claims are made.
    risk:
      - Hugging Face mirrors may not preserve upstream licensing exactly.
      - Benchmark success can overstate readiness for production RTL.
