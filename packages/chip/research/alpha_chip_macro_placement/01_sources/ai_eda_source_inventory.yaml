    source_url: https://arxiv.org/abs/2506.07945
    code_url: null
    model_url: null
    dataset_url: null
    license_status: paper_assets_review_required
    code_status: paper_assets_to_review
    model_status: no_model
    e1_fit: >
      Useful benchmark direction because protocol RTL needs timing-accurate
      behavior and waveform-level checks, closer to E1 integration risk than
      syntax-only tasks.
    integration_action: >
      Track as evaluation methodology only; E1 protocol prompts must remain
      private, held out, and tied to local waveform, cocotb, and formal gates.
    evidence_gate: >
      Any adapted protocol evaluation requires task hashes, waveform oracle,
      simulator transcript, formal or cocotb result, non-overlap review, and
      reviewer disposition.
    risk:
      - Public protocol tasks can become training data after release.
      - Waveform-level success still does not prove full SoC integration.
