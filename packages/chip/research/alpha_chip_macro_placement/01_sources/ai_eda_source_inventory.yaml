      verification agents before attempting E1-specific generated RTL.
    integration_action: >
      Track as future evaluator input for scripts/ai_eda/evaluate_rtl_model.py
      after license review.
    evidence_gate: >
      Imported tasks must be version-pinned and any generated answers must pass
      local simulator/synthesis gates before comparison claims are made.
    risk:
      - Hugging Face mirrors may not preserve upstream licensing exactly.
      - Benchmark success can overstate readiness for production RTL.
  - id: rtllm
    name: RTLLM
    kind: rtl_generation_benchmark
    stage:
      - rtl_generation
      - benchmark
      - evaluation_hygiene
    priority: P1
    source_url: https://arxiv.org/abs/2308.05345
    code_url: https://github.com/hkust-zhiyao/RTLLM
    model_url: null
    dataset_url: null
    license_status: review_required
    code_status: available_to_review
    model_status: no_model
    e1_fit: >
      Important public RTL-generation benchmark context, especially because
      later contamination analysis compares RTLLM against VerilogEval.
    integration_action: >
      Treat as benchmark metadata only until exact revision, license,
      simulator, task hashes, and non-overlap checks are archived.
    evidence_gate: >
      Any RTLLM score claim requires pinned benchmark version, prompt/task
      hashes, simulator logs, synthesis or formal follow-up where applicable,
      contamination review, and reviewer disposition.
    risk:
      - Public benchmark tasks may be present in model training data.
      - Pass rates on short tasks can hide integration and waveform failures.
  - id: vericontaminated
    name: VeriContaminated
    kind: verilog_benchmark_contamination_study
    stage:
      - rtl_generation
      - benchmark
      - evaluation_hygiene
      - corpus_governance
    priority: P0
    source_url: https://arxiv.org/abs/2503.13572
    code_url: null
    model_url: null
    dataset_url: null
    license_status: paper_assets_review_required
    code_status: paper_assets_to_review
    model_status: no_model
    e1_fit: >
      Directly relevant warning that Verilog benchmark pass rates can be
      inflated or ambiguous when training-corpus overlap is not controlled.
    integration_action: >
      Add a benchmark hygiene lane before promoting any public HDL benchmark,
      public RTL model, or E1 held-out prompt set into evidence.
    evidence_gate: >
      Evaluation claims require exact benchmark revisions, prompt and task
      hashes, model training disclosures, contamination-screening method,
      non-overlap report, tool logs, and review.
    risk:
      - Contamination detectors are imperfect and can miss paraphrased or
        semantically equivalent leakage.
      - A contamination study does not validate any E1 RTL output by itself.
  - id: protocolllm
