[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "elizaos-voice-emotion-bench"
version = "0.1.0"
description = "Voice-emotion classifier intrinsic + closed-loop fidelity bench for elizaOS Wav2Small (+ optional roberta-go-emotions text head)."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Apache-2.0" }

dependencies = [
  "httpx>=0.27.0",
  "numpy>=1.26.0",
]

[project.optional-dependencies]
audio = [
  "soundfile>=0.12.1",
]
onnx = [
  "onnxruntime>=1.20.0",
]
test = [
  "pytest>=8.0.0",
]

[project.scripts]
voice-emotion-bench = "elizaos_voice_emotion.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["elizaos_voice_emotion"]
