[project]
name = "babylon-training"
version = "0.2.0"
description = "RL Training pipeline for Babylon agents using Atropos - Continuous MMO Edition"
authors = [
    {name = "Babylon Team"}
]
requires-python = ">=3.10"
dependencies = [
    "atroposlib>=0.1.0",
    "asyncpg>=0.29.0",
    "aiohttp>=3.9.0",
    "requests>=2.31.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.0.0",
    "numpy>=1.24.0",
    "openai>=1.0.0",
    "litellm>=1.0.0",
    "PyYAML>=6.0.1",
    "tenacity>=8.2.0",
    "tabulate>=0.9.0",
    "tinker>=0.1.0",
    "vllm>=0.4.0",
    "wandb>=0.16.0",
    "transformers>=4.40.0",
    "kondo-gate>=0.1.0",
    "torch>=2.1.0",
    "apollo-torch>=1.0.3",
    "peft>=0.17.0",
    "accelerate>=1.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "pip-audit>=2.8.0",
]

[project.scripts]
train-mmo = "scripts.train_mmo:main"
check-windows = "scripts.check_windows:main"
run-migrations = "scripts.run_migrations:main"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "strict"
filterwarnings = [
    "ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning",
    "ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning",
    "ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "RUF"]
ignore = [
    "E501",    # line too long (handled by formatter)
    "E741",    # ambiguous variable name
    "RUF001",  # ambiguous unicode
    "E402",    # module import not at top
    "B007",    # unused loop variable
    "B023",    # function def in loop
    "F841",    # unused local variable (common in ML experimentation)
    "B904",    # raise from
    "UP007",   # use X | Y for union types (not all deps support 3.10 syntax)
    "RUF012",  # mutable class variables (common in dataclasses/pydantic)
    "RUF002",  # ambiguous unicode in docstrings
    "RUF003",  # ambiguous unicode in comments
    "E701",    # multiple statements on one line
    "E722",    # bare except
    "B017",    # assertRaises(Exception)
    "F821",    # undefined name (forward refs in type annotations)
    "RUF005",  # collection literal concatenation
    "RUF006",  # asyncio dangling task
    "F401",    # unused import (used for availability checks in ML code)
]

[tool.black]
line-length = 100
target-version = ["py310"]
