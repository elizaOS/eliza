[book]
title = "Babylon RL Training Pipeline"
authors = ["revlentless"]
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = true

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/BabylonSocial/babylon"
edit-url-template = "https://github.com/BabylonSocial/babylon/edit/staging/packages/training/book/{path}"
site-url = "/"
cname = ""
no-section-label = false
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
boost-hierarchy = 2

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = true
