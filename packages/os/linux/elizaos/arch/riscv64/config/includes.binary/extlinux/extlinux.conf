# elizaOS Debian RISC-V 64 — U-Boot extlinux fallback.
#
# U-Boot's `bootcmd_extlinux` (the distroboot default) looks for
# `/extlinux/extlinux.conf` on each candidate boot device. Boards that
# do not implement the UEFI path (or stages where grub-efi-riscv64 is
# not yet trusted) reach the kernel through this file instead.
#
# Kernel/initrd paths are relative to the ISO root; the live-build
# `iso-hybrid` layout stages them under /live/.

DEFAULT elizaos-live
TIMEOUT 30
PROMPT 0

LABEL elizaos-live
    MENU LABEL elizaOS Live (RISC-V 64)
    LINUX /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live components earlycon=sbi console=ttyS0,115200n8 loglevel=7

LABEL elizaos-live-verbose
    MENU LABEL elizaOS Live (RISC-V 64, verbose)
    LINUX /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live components earlycon=sbi console=ttyS0,115200n8 loglevel=7
