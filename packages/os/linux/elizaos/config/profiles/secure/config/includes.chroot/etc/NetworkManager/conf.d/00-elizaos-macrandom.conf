# elizaOS secure profile — MAC address randomization.
# Randomizes the Wi-Fi MAC during scans and per-connection, and uses a
# random (non-persistent) MAC for Ethernet. stable-id varies per boot so
# the device is not trackable across sessions.
[device]
wifi.scan-rand-mac-address=yes

[connection]
wifi.cloned-mac-address=random
ethernet.cloned-mac-address=random
connection.stable-id=${RANDOM}
