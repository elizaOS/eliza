# elizaOS Linux — boot straight into the GNOME session as the live user.
# This is a kiosk-style home OS; no password gate at the greeter. The
# username matches live-config's default account ("user"); change here and
# in the getty override (etc/systemd/system/getty@tty1.service.d) together
# if BOOTAPPEND ever sets live-config.username=.
[daemon]
AutomaticLoginEnable=true
AutomaticLogin=user
