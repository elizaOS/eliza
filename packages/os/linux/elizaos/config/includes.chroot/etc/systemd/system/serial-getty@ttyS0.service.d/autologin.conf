# elizaOS Linux — serial-console autologin (riscv64/arm64 boot with
# console=ttyS0/ttyAMA0). Same rationale as the tty1 override: agetty
# --autologin skips PAM so no "Authentication failure" on the serial line.
[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin user --keep-baud 115200,38400,9600 --noclear %I $TERM
