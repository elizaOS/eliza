[package]
name = "eliza-linux-desktop-bridge"
version = "0.1.0"
edition = "2021"
description = "Native host bridging the elizaOS Linux desktop-shell React surface to NetworkManager, UPower, PipeWire, and logind."
license = "Apache-2.0"
publish = false

[lib]
name = "eliza_linux_desktop_bridge"
path = "src/lib.rs"

[[bin]]
name = "eliza-linux-desktop-bridge"
path = "src/main.rs"

