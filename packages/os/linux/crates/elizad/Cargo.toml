[package]
name = "elizad"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "The usbeliza shell process: chat UI, agent supervisor, per-app cap-bus broker, sandbox launcher."
default-run = "elizad"

[lints]
workspace = true

[[bin]]
name = "elizad"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true
tracing-subscriber.workspace = true

# HTTP client for talking to the eliza-agent subprocess on 127.0.0.1:41337.
# rustls-tls keeps us off OpenSSL native deps; we don't reach the public
# internet from here so we don't need the system trust store.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# RFC 3339 timestamps for calibration profile writes.
time = { version = "0.3", features = ["formatting", "macros"] }

# Resolve `~/.eliza/` cross-platform without rolling our own.
directories = "6"

eliza-types.workspace = true
eliza-cap-bus = { workspace = true, features = [] }
eliza-sandbox.workspace = true

# Tauri 2.x with default features. The webview backend on Linux is webkit2gtk.
tauri = { version = "2", features = [] }
