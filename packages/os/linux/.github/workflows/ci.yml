name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust (fmt + clippy + test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: install Tauri 2 system prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            build-essential

      - name: install rust toolchain (pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustup component add clippy rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

  bun:
    name: bun (typecheck + test)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: install native-build prerequisites for transitive deps
        # `node-pty` (a transitive dep of @elizaos/agent) needs node-gyp + python
        # + g++ to rebuild its native binding when there isn't a prebuilt for
        # the runner's arch. ubuntu-24.04 has python3 + build-essential by
        # default, but `node-gyp` is its own apt package.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends node-gyp build-essential

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: bun install
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: bun test
        run: bun test

  license-headers:
    name: SPDX header check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: scripts/check-license-headers.sh
        run: ./scripts/check-license-headers.sh

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
