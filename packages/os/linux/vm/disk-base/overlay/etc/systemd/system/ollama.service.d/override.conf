#
# Bind Ollama to 127.0.0.1 only — the eliza-agent subprocess on the same
# machine talks to it over loopback. No LAN listener.

[Service]
Environment="OLLAMA_HOST=127.0.0.1:11434"
Environment="OLLAMA_KEEP_ALIVE=24h"
