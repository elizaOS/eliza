#
# Dark theme matching the Plymouth + chat-box palette (#0a0a0a bg,
# #f2f2f2 fg, gray inactive). The live-theme/theme.txt drop-in below
# is what gfxterm actually renders when splash.png is present.

set color_normal=light-gray/black
set color_highlight=white/black

if [ -e /boot/grub/splash.png ]; then
    set theme=/boot/grub/live-theme/theme.txt
else
    set menu_color_normal=light-gray/black
    set menu_color_highlight=white/black
fi
