# Eliza-branded GRUB menu for the live ISO. Hardcoded menuentry blocks —
# we do NOT use live-build's template-substitution mechanism because it
# does naive text replacement that fires on every literal occurrence of
# the token (including comments). v7 and v8 both shipped with duplicate
# menu entries from accidental literal matches. Hardcoding the entries
# is the only deterministic way to guarantee exactly two.

# Auto-advance after 2 seconds and HIDE the timeout countdown so the user
# never sees "Booting in 2..." (Apple-polish). The user can hold any key
# during boot to drop into the menu.
set timeout=2
set timeout_style=hidden

# Load the orange/black theme — splash.png + theme.txt under live-theme/.
# The theme.cfg drop-in handles the splash-present-vs-fallback branching.
source /boot/grub/theme.cfg

# Force graphical framebuffer so the splash + theme actually render.
# Without this GRUB falls back to text-mode ASCII menu (v8's first boot).
if loadfont /boot/grub/unicode.pf2 ; then
    set gfxmode=auto
    insmod all_video
    insmod gfxterm
    insmod png
    terminal_output gfxterm
fi

menuentry "Boot Eliza" --hotkey=l {
	linux	/live/vmlinuz-6.12.86+deb13-amd64 boot=live components quiet live-media=removable splash loglevel=3 rd.systemd.show_status=false vt.global_cursor_default=0 console=tty0 console=ttyS0,115200 live-config.username=eliza live-config.user-fullname=Eliza live-config.user-default-groups=audio,cdrom,video,plugdev,netdev,sudo,render,input live-config.hostname=usbeliza live-config.timezone=UTC live-config.locales=C.UTF-8 live-config.keyboard-layouts=us noeject persistence persistence-encryption=luks,none findiso=${iso_path}
	initrd	/live/initrd.img-6.12.86+deb13-amd64
}
menuentry "Boot Eliza (safe mode)" {
	linux	/live/vmlinuz-6.12.86+deb13-amd64 boot=live components memtest noapic noapm nodma nomce nosmp nosplash vga=788
	initrd	/live/initrd.img-6.12.86+deb13-amd64
}

submenu 'Utilities ...' --hotkey=u {

	source /boot/grub/theme.cfg

	if [ "${grub_platform}" = "efi" ]; then
		menuentry "UEFI Firmware Settings" --hotkey=f {
			fwsetup
		}
	fi
}
