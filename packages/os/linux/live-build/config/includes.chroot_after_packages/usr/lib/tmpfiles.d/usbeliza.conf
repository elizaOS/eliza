#
# /run is a root-owned tmpfs, so the elizad-launched cap-bus broker (running
# as the `eliza` user, uid 1000) can't mkdir /run/eliza on demand. Pre-create
# the parent at boot via systemd-tmpfiles so per-app sockets like
# /run/eliza/cap-<slug>.sock land with the right ownership.
#
# Syntax: tmpfiles.d(5). `d` = create-if-missing directory.
#
# Type Path        Mode UID   GID   Age Argument
d      /run/eliza  0750 eliza eliza -
