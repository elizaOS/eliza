#
# Eliza. The boot menu, the password prompt, the chat surface — every
# screen the user ever sees on this stick reads the same brand.
#
# Eliza-themed GRUB defaults for the usbeliza live image.
# Sourced by Debian's update-grub via /etc/default/grub.d/*.cfg.
# Note: this file shapes the *installed-system* GRUB (chroot-side
# update-grub). The live-ISO GRUB menu is themed separately under
# live-build/config/bootloaders/grub-pc/.

GRUB_DISTRIBUTOR="Eliza"
GRUB_TIMEOUT=2
GRUB_TIMEOUT_STYLE=hidden
GRUB_CMDLINE_LINUX_DEFAULT="quiet splash loglevel=3 rd.systemd.show_status=auto"
GRUB_GFXMODE=auto
GRUB_BACKGROUND=""
GRUB_DISABLE_OS_PROBER=true
GRUB_DISABLE_RECOVERY=true

# Cosmetic: text-mode fallback for ancient hardware where the
# graphical theme can't load. light-red is the closest named grub
# color to the ElizaOS accent orange (#FF6B35).
GRUB_COLOR_NORMAL="light-gray/black"
GRUB_COLOR_HIGHLIGHT="light-red/black"
