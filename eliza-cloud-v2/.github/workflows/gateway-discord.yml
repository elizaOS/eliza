name: Gateway Discord Service

on:
  push:
    branches: [main, dev]
    paths:
      - "services/gateway-discord/**"
      - "lib/services/gateway-discord/**"
      - "lib/auth/jwks.ts"
      - "lib/auth/jwt-internal.ts"
      - "lib/auth/internal-api.ts"
      - "app/api/v1/discord/**"
      - "app/api/internal/discord/**"
      - "app/api/internal/auth/**"
      - "app/api/.well-known/jwks.json/**"
      - "tests/unit/discord-connections*"
      - ".github/workflows/gateway-discord.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "services/gateway-discord/**"
      - "lib/services/gateway-discord/**"
      - "lib/auth/jwks.ts"
      - "lib/auth/jwt-internal.ts"
      - "lib/auth/internal-api.ts"
      - "app/api/v1/discord/**"
      - "app/api/internal/discord/**"
      - "app/api/internal/auth/**"
      - "app/api/.well-known/jwks.json/**"
      - "tests/unit/discord-connections*"
      - ".github/workflows/gateway-discord.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  BUN_VERSION: "1.2"
  IMAGE_NAME: gateway-discord
  REGISTRY: ghcr.io
  IMAGE_REPO: ghcr.io/elizaos/eliza-cloud-v2/gateway-discord

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install root dependencies
        run: bun install --frozen-lockfile
      - name: Install service dependencies
        run: cd services/gateway-discord && bun install --frozen-lockfile
      - name: Run service tests
        run: bun test services/gateway-discord/tests/ --timeout 60000
        env:
          SKIP_SERVER_CHECK: "true"
      - name: Run lib tests
        run: bun test lib/services/gateway-discord/__tests__/ --timeout 60000
        env:
          SKIP_SERVER_CHECK: "true"
      - name: Run Discord API unit tests
        run: bun test tests/unit/discord-connections-api.test.ts --timeout 60000
        env:
          SKIP_SERVER_CHECK: "true"

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/gateway-discord
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output digest
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "Image tags: ${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - environment: staging
            branch: refs/heads/dev
            values_file: values-staging.yaml
          - environment: production
            branch: refs/heads/main
            values_file: values-production.yaml
      fail-fast: false
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 15
    steps:
      - name: Check if deployment should run
        id: should_deploy
        run: |
          SHOULD_DEPLOY="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "${{ matrix.branch }}" ]]; then
            SHOULD_DEPLOY="true"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.environment }}" == "${{ matrix.environment }}" ]]; then
            SHOULD_DEPLOY="true"
          fi
          
          echo "should_deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
          echo "Should deploy to ${{ matrix.environment }}: $SHOULD_DEPLOY"

      - uses: actions/checkout@v4
        if: steps.should_deploy.outputs.should_deploy == 'true'

      - name: Verify image digest exists and is valid
        if: steps.should_deploy.outputs.should_deploy == 'true'
        run: |
          DIGEST="${{ needs.build.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "Error: Image digest is empty. Build may have failed to push."
            exit 1
          fi
          # Validate sha256 format (sha256: followed by 64 hex characters)
          if ! [[ "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "Error: Invalid digest format. Expected sha256:<64-hex-chars>, got: $DIGEST"
            exit 1
          fi
          echo "Image digest verified: $DIGEST"

      - name: Verify image exists in registry
        if: steps.should_deploy.outputs.should_deploy == 'true'
        run: |
          IMAGE="${{ env.IMAGE_REPO }}@${{ needs.build.outputs.digest }}"
          echo "Verifying image exists: $IMAGE"
          if ! docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Error: Image not found in registry: $IMAGE"
            exit 1
          fi
          echo "Image verified in registry"

      - name: Configure AWS credentials via OIDC
        if: steps.should_deploy.outputs.should_deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GATEWAY_AWS_ROLE_ARN }}
          aws-region: ${{ vars.GATEWAY_AWS_REGION }}

      - name: Set up kubectl
        if: steps.should_deploy.outputs.should_deploy == 'true'
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        if: steps.should_deploy.outputs.should_deploy == 'true'
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Configure kubectl for EKS
        if: steps.should_deploy.outputs.should_deploy == 'true'
        run: aws eks update-kubeconfig --name ${{ vars.GATEWAY_CLUSTER_NAME }} --region ${{ vars.GATEWAY_AWS_REGION }}

      - name: Deploy to ${{ matrix.environment }} with Helm
        if: steps.should_deploy.outputs.should_deploy == 'true'
        run: |
          echo "Deploying to ${{ matrix.environment }} with image: ${{ env.IMAGE_REPO }}@${{ needs.build.outputs.digest }}"
          helm upgrade --install gateway-discord ./services/gateway-discord/chart \
            --namespace gateway-discord \
            --create-namespace \
            -f ./services/gateway-discord/chart/values.yaml \
            -f ./services/gateway-discord/chart/${{ matrix.values_file }} \
            --set image.repository=${{ env.IMAGE_REPO }} \
            --set image.digest="${{ needs.build.outputs.digest }}" \
            --wait \
            --timeout 5m

      - name: Verify deployment
        if: steps.should_deploy.outputs.should_deploy == 'true'
        run: |
          kubectl get pods -n gateway-discord -l app=gateway-discord
          helm status gateway-discord -n gateway-discord
          kubectl describe deployment gateway-discord -n gateway-discord | grep Image
