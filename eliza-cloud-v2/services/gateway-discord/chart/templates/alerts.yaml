{{- if and .Values.prometheus.enabled .Values.prometheus.alerts.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "gateway-discord.fullname" . }}-alerts
  namespace: {{ include "gateway-discord.namespace" . }}
  labels:
    {{- include "gateway-discord.labels" . | nindent 4 }}
    prometheus: kube-prometheus
spec:
  groups:
    - name: gateway-discord.rules
      rules:
        - alert: GatewayDiscordDown
          expr: up{job="{{ include "gateway-discord.fullname" . }}"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Gateway Discord pod is down"
            description: "Gateway Discord pod {{ "{{" }} $labels.pod {{ "}}" }} has been down for more than 1 minute."

        - alert: GatewayDiscordNoBotsConnected
          expr: gateway_discord_bots_connected == 0 and gateway_discord_bots_total > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "No Discord bots connected"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has {{ "{{" }} $value {{ "}}" }} bots assigned but none connected for 5 minutes."

        - alert: GatewayDiscordHighDisconnectRate
          expr: |
            (gateway_discord_bots_total - gateway_discord_bots_connected) / gateway_discord_bots_total > 0.5
            and gateway_discord_bots_total > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High Discord bot disconnect rate"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has more than 50% bots disconnected."

        - alert: GatewayDiscordPodUnhealthy
          expr: |
            kube_pod_container_status_ready{container="gateway"} == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Gateway Discord pod not ready"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has not been ready for 2 minutes."

        - alert: GatewayDiscordHighMemory
          expr: |
            container_memory_usage_bytes{container="gateway"} / container_spec_memory_limit_bytes{container="gateway"} > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Gateway Discord high memory usage"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} memory usage is above 90%."

        - alert: GatewayDiscordHighCPU
          expr: |
            rate(container_cpu_usage_seconds_total{container="gateway"}[5m]) / container_spec_cpu_quota{container="gateway"} * 100000 > 90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Gateway Discord high CPU usage"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} CPU usage is above 90%."

        - alert: GatewayDiscordRestarting
          expr: |
            increase(kube_pod_container_status_restarts_total{container="gateway"}[1h]) > 3
          labels:
            severity: warning
          annotations:
            summary: "Gateway Discord restarting frequently"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has restarted {{ "{{" }} $value {{ "}}" }} times in the last hour."

        - alert: GatewayDiscordEventRoutingFailures
          expr: |
            rate(gateway_discord_events_routed[5m]) == 0
            and rate(gateway_discord_events_received[5m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Discord events not being routed"
            description: "Connection {{ "{{" }} $labels.connection {{ "}}" }} is receiving events but none are being routed."

        - alert: GatewayDiscordSlowStart
          expr: |
            time() - kube_pod_start_time{pod=~"gateway-discord.*"} > 300
            and kube_pod_container_status_ready{container="gateway"} == 0
          labels:
            severity: warning
          annotations:
            summary: "Gateway Discord slow to start"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has been starting for more than 5 minutes."
{{- end }}
