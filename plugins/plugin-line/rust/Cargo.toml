[package]
name = "elizaos-plugin-line"
version = "2.0.0-alpha.1"
edition = "2021"
authors = ["elizaOS"]
license = "MIT"
description = "LINE Messaging API plugin for elizaOS agents"
keywords = ["elizaos", "plugin", "line", "messaging", "japan"]
categories = ["messaging"]

[lib]
name = "elizaos_plugin_line"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1.34", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
regex = "1.10"
uuid = { version = "1.6", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
url = "2.5"
async-trait = "0.1"
tracing = "0.1"
lazy_static = "1.4"
hmac = "0.12"
sha2 = "0.10"
base64 = "0.21"

[dev-dependencies]
tokio-test = "0.4"
serde_json = "1.0"
