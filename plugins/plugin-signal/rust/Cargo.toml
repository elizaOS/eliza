[package]
name = "elizaos-plugin-signal"
version = "2.0.0-alpha.1"
edition = "2021"
description = "Signal messaging integration plugin for elizaOS agents"
license = "MIT"
repository = "https://github.com/elizaos-plugins/plugin-signal"
keywords = ["elizaos", "plugin", "signal", "messaging", "encrypted"]
categories = ["network-programming", "cryptography"]

[lib]
name = "elizaos_plugin_signal"
path = "src/lib.rs"

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }

# HTTP client
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Regex for validation
regex = "1.10"
once_cell = "1.19"

# Logging
tracing = "0.1"

# Async traits
async-trait = "0.1"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# URL handling
url = "2.5"

[dev-dependencies]
tokio-test = "0.4"
mockito = "1.2"

[features]
default = []
