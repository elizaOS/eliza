[package]
name = "elizaos-plugin-zalouser"
version = "2.0.0"
edition = "2021"
authors = ["elizaOS Contributors"]
description = "Zalo Personal Account plugin for elizaOS - Rust implementation via zca-cli"
license = "MIT"
repository = "https://github.com/elizaos/eliza"
keywords = ["ai", "agent", "zalo", "messaging", "vietnam"]
categories = ["api-bindings", "asynchronous"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["tokio/full"]

[dependencies]
# Async runtime
tokio = { version = "1.0", features = ["rt-multi-thread", "macros", "sync", "time", "process"], optional = true }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"

# UUID handling
uuid = { version = "1.19", features = ["v4", "v5", "serde"] }

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Regex for parsing
regex = "1.10"

# Environment variables
dotenvy = "0.15"

[dev-dependencies]
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }
pretty_assertions = "1.0"
tokio-test = "0.4"

[profile.release]
lto = true
opt-level = "z"
