<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>XR harness test page</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #101014; color: #eee;
        font: 16px/1.4 system-ui, sans-serif; overflow: hidden; }
      .panel { position: absolute; display: flex; align-items: center;
        justify-content: center; border-radius: 12px; user-select: none;
        background: #23232b; border: 2px solid #3a3a44; }
      [data-agent-id="title"]  { left: 540px; top: 320px; width: 200px; height: 80px;
        background: #2a2a33; }
      [data-agent-id="submit"] { left: 960px; top: 320px; width: 200px; height: 80px;
        background: #2d4a2d; }
      [data-agent-id="cancel"] { left: 120px; top: 320px; width: 200px; height: 80px;
        background: #4a2d2d; }
    </style>
  </head>
  <body>
    <!-- Minimal "XR view" surface: tagged elements at known screen positions.
         The IWER-backed harness aims a controller ray at one, reads back the
         computed hit, and fires select. XR is flat 2D DOM today (see
         WEBXR_STATUS), so these are real DOM rects, not a 3D scene. -->
    <div class="panel" data-agent-id="cancel" id="cancel">Cancel</div>
    <div class="panel" data-agent-id="title" id="title">Title</div>
    <div class="panel" data-agent-id="submit" id="submit">Submit</div>
  </body>
</html>
