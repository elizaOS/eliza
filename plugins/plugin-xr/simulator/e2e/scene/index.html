<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>XR spatial scene — harness fixture</title>
    <style>
      :root { color-scheme: dark; }
      html, body, #root { margin: 0; width: 100%; height: 100%; }

    <script src="/scene/scene-bundle.js"></script>
  </body>
