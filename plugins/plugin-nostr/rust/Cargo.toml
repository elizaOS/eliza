[package]
name = "elizaos-plugin-nostr"
version = "2.0.0-alpha.1"
edition = "2021"
authors = ["elizaOS"]
license = "MIT"
description = "Nostr decentralized messaging plugin for elizaOS agents"
keywords = ["elizaos", "plugin", "nostr", "decentralized", "nip-04"]
categories = ["messaging", "cryptography"]

[lib]
name = "elizaos_plugin_nostr"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1.34", features = ["full"] }
tokio-tungstenite = { version = "0.21", features = ["native-tls"] }
futures-util = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
regex = "1.10"
uuid = { version = "1.6", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
url = "2.5"
async-trait = "0.1"
tracing = "0.1"
lazy_static = "1.4"
bech32 = "0.11"
secp256k1 = { version = "0.28", features = ["rand", "hashes"] }
sha2 = "0.10"
aes = "0.8"
cbc = "0.1"
rand = "0.8"
base64 = "0.21"
hex = "0.4"
dashmap = "5.5"

[dev-dependencies]
tokio-test = "0.4"
