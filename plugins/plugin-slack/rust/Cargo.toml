[package]
name = "elizaos-plugin-slack"
version = "2.0.0-alpha.1"
edition = "2021"
authors = ["elizaOS <team@elizaos.dev>"]
description = "Slack integration plugin for elizaOS agents with Socket Mode support"
license = "MIT"
repository = "https://github.com/elizaos-plugins/plugin-slack"
keywords = ["elizaos", "plugin", "slack", "chat", "messaging"]
categories = ["api-bindings", "asynchronous"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
tokio = { version = "1.40", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
thiserror = "1.0"
tracing = "0.1"
regex = "1.10"
reqwest = { version = "0.12", features = ["json"] }
futures = "0.3"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.12"

[features]
default = []
