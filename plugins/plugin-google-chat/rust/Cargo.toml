[package]
name = "elizaos-plugin-google-chat"
version = "2.0.0-alpha.1"
edition = "2021"
authors = ["elizaOS <contact@elizaos.com>"]
description = "Google Chat integration plugin for elizaOS agents"
license = "MIT"
repository = "https://github.com/elizaos-plugins/plugin-google-chat"
keywords = ["elizaos", "plugin", "google-chat", "workspace", "chat"]
categories = ["network-programming", "asynchronous"]

[lib]
name = "elizaos_plugin_google_chat"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1.35", features = ["full", "sync", "time"] }
reqwest = { version = "0.11", features = ["json", "cookies"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
regex = "1.10"
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
url = "2.5"
async-trait = "0.1"
tracing = "0.1"
lazy_static = "1.4"
jsonwebtoken = "9.0"
base64 = "0.21"

[dev-dependencies]
tokio-test = "0.4"
