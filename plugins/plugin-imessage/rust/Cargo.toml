[package]
name = "elizaos-plugin-imessage"
version = "2.0.0-alpha.1"
edition = "2021"
description = "iMessage plugin for elizaOS agents (macOS)"
license = "MIT"
authors = ["elizaOS Contributors"]
repository = "https://github.com/elizaos/eliza"
keywords = ["elizaos", "plugin", "imessage", "apple", "macos"]
categories = ["api-bindings", "asynchronous"]

[lib]
crate-type = ["cdylib", "rlib"]

[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"

[dependencies]
elizaos = { version = "2.0.0", path = "../../../packages/rust" }
tokio = { version = "1.35", features = ["full", "process"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
thiserror = "1.0"
tracing = "0.1"
uuid = { version = "1.6", features = ["v4", "serde"] }
regex = "1.10"

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.12"

[features]
default = []
