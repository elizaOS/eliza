[package]
name = "elizaos-plugin-memory"
version = "2.0.0"
edition = "2021"
authors = ["elizaOS Contributors"]
description = "Memory management plugin for elizaOS (Rust)"
license = "MIT"
repository = "https://github.com/elizaos/eliza"
keywords = ["elizaos", "plugin", "memory", "knowledge-management"]
categories = ["data-structures"]
readme = "README.md"

[lib]
name = "elizaos_plugin_memory"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
uuid = { version = "1.0", features = ["v4"] }

[dev-dependencies]
tokio-test = "0.4"
