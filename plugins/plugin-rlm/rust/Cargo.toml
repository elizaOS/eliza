[package]
name = "elizaos-plugin-rlm"
version = "0.1.0"
edition = "2021"
description = "RLM (Recursive Language Model) plugin for elizaOS"
license = "MIT"
authors = ["elizaOS Contributors"]
keywords = ["elizaos", "plugin", "rlm", "recursive-language-model", "ai"]
repository = "https://github.com/elizaos/eliza"

[lib]
name = "elizaos_plugin_rlm"
path = "src/lib.rs"

[dependencies]
elizaos = { version = "2.0.0", path = "../../../packages/rust" }
anyhow = "1.0"
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full", "process", "io-util", "sync"] }
thiserror = "1.0"
tracing = "0.1"
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"

[features]
default = []
