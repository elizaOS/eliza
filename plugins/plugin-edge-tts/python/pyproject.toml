[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "eliza-plugin-edge-tts"
version = "2.0.0"
description = "Free text-to-speech plugin for elizaOS using Microsoft Edge TTS - no API key required"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "elizaOS Contributors" }
]
keywords = [
    "elizaos",
    "plugin",
    "tts",
    "text-to-speech",
    "edge-tts",
    "voice-synthesis",
    "microsoft",
    "free"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
]
dependencies = [
    "edge-tts>=6.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/elizaos-plugins/plugin-edge-tts"
Repository = "https://github.com/elizaos-plugins/plugin-edge-tts/tree/main/python"

[tool.hatch.build.targets.wheel]
packages = ["src/eliza_plugin_edge_tts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "-v"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
