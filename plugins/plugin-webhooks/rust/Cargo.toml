[package]
name = "elizaos-plugin-webhooks"
version = "0.1.0"
edition = "2021"
description = "HTTP webhook ingress plugin for elizaOS"
license = "MIT"

[dependencies]
async-trait = "0.1"
hmac = "0.12"
log = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4", "v5"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
