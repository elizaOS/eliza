[package]
name = "elizaos-plugin-plugin-manager"
version = "2.0.0"
edition = "2021"
authors = ["elizaOS Contributors"]
description = "Plugin manager plugin for elizaOS (Rust) - dynamic loading, unloading, and registry integration"
license = "MIT"
repository = "https://github.com/elizaos/eliza"
keywords = ["elizaos", "plugin", "manager", "registry", "dynamic-loading"]
categories = ["development-tools"]
readme = "README.md"

[lib]
name = "elizaos_plugin_plugin_manager"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
uuid = { version = "1.0", features = ["v4"] }
regex = "1"

[dev-dependencies]
tokio-test = "0.4"
