[package]
name = "elizaos-plugin-local-embedding"
version = "2.0.0"
edition = "2021"
authors = ["elizaOS Contributors"]
description = "Local text embedding and tokenization plugin for elizaOS - Rust implementation"
license = "MIT"
repository = "https://github.com/elizaos/eliza"
keywords = ["ai", "agent", "embedding", "tokenizer", "local-ai"]
categories = ["science", "text-processing"]
readme = "README.md"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["tokio/full"]

[dependencies]
# Local embedding model inference (ONNX-based, supports BGE models)
fastembed = "4"

# HuggingFace tokenizer for encode/decode
tokenizers = { version = "0.20", features = ["http"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
async-trait = "0.1"

# Error handling
thiserror = "2.0"

# Logging
tracing = "0.1"

# Native-only dependencies
tokio = { version = "1.0", features = ["rt-multi-thread", "macros", "sync"], optional = true }

[dev-dependencies]
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }
pretty_assertions = "1.0"
dotenvy = "0.15"

[profile.release]
lto = true
opt-level = "z"
