[package]
name = "elizaos-plugin-form"
version = "2.0.0-alpha.1"
edition = "2021"
description = "Guardrails for agent-guided user journeys - Rust port"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
thiserror = "2"
