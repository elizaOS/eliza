[package]
name = "elizaos-plugin-twitch"
version = "2.0.0-alpha.1"
edition = "2021"
description = "Twitch chat integration plugin for elizaOS agents"
license = "MIT"
repository = "https://github.com/elizaos-plugins/plugin-twitch"
keywords = ["elizaos", "plugin", "twitch", "chat", "streaming"]
categories = ["network-programming", "games"]

[lib]
name = "elizaos_plugin_twitch"
path = "src/lib.rs"

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full", "sync"] }
tokio-tungstenite = { version = "0.21", features = ["native-tls"] }

# HTTP client
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Regex for validation
regex = "1.10"
once_cell = "1.19"

# Logging
tracing = "0.1"

# Async traits
async-trait = "0.1"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# URL handling
url = "2.5"

# UUID generation
uuid = { version = "1.6", features = ["v4"] }

# Futures
futures = "0.3"
futures-util = "0.3"

[dev-dependencies]
tokio-test = "0.4"

[features]
default = []
