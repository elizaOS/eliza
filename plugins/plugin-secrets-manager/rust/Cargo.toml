[package]
name = "elizaos-plugin-secrets-manager"
version = "0.1.0"
edition = "2021"
authors = ["elizaOS Team"]
description = "Multi-level secrets management plugin for elizaOS with encryption and dynamic plugin activation"
license = "MIT"
repository = "https://github.com/elizaos/eliza"
documentation = "https://docs.rs/elizaos-plugin-secrets-manager"
keywords = ["elizaos", "secrets", "encryption", "plugin", "ai"]
categories = ["cryptography", "authentication"]
readme = "README.md"

[lib]
name = "elizaos_plugin_secrets_manager"
path = "src/lib.rs"

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["sync", "macros", "rt-multi-thread"] }
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
aes-gcm = "0.10"
sha2 = "0.10"
rand = "0.8"
base64 = "0.21"
hex = "0.4"

# Utilities
thiserror = "1.0"
once_cell = "1.19"
regex = "1.10"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1.35", features = ["test-util"] }

[features]
default = []
# Enable additional validation strategies
full-validation = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
