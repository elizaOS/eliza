name: Dev Smoke

on:
  pull_request:
    branches: [main, develop]
    paths:
      - ".github/workflows/dev-smoke.yml"
      - "package.json"
      - "bun.lock"
      - "packages/app/**"
      - "packages/app-core/**"
      - "packages/core/**"
      - "packages/shared/**"
      - "packages/ui/**"
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/dev-smoke.yml"
      - "package.json"
      - "bun.lock"
      - "packages/app/**"
      - "packages/app-core/**"
      - "packages/core/**"
      - "packages/shared/**"
      - "packages/ui/**"
  workflow_dispatch:

concurrency:
  group: dev-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"
  BUN_VERSION: "canary"
  NODE_VERSION: "24.15.0"
  NODE_NO_WARNINGS: "1"
  CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY }}

jobs:
  dev-smoke:
    name: bun run dev onboarding chat
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_REMOTE_ONLY: true
      PGLITE_WASM_MODE: node
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Generate shared i18n assets
        run: bun run --cwd packages/shared build:i18n

      - name: Run bun dev onboarding chat smoke
        run: bun run --cwd packages/app test:dev-smoke
