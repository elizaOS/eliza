name: Release AOSP Flasher

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag
        required: false
  release:
    types: [created]

# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            artifact: elizaos-setup-macos
          - os: ubuntu-latest
            platform: linux
            artifact: elizaos-setup-linux
          - os: windows-latest
            platform: win32
            artifact: elizaos-setup-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install
      - run: bun run --cwd packages/os/setup build
      - run: bun run --cwd packages/os/setup typecheck
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: packages/os/setup/dist/
