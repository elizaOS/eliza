name: Test AOSP flasher

on:
  pull_request:
    paths:
      - "packages/elizaos-setup/**"
      - ".github/workflows/test-elizaos-setup.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install
      - run: bun run --cwd packages/elizaos-setup typecheck
      - run: bun run --cwd packages/elizaos-setup build
      - run: bun run --cwd packages/elizaos-setup test
