name: Test AOSP flasher

on:
  pull_request:
    paths:
      - "packages/aosp-flasher/**"
      - ".github/workflows/test-aosp-flasher.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install
      - run: bun run --cwd packages/aosp-flasher typecheck
      - run: bun run --cwd packages/aosp-flasher build
      - run: bun run --cwd packages/aosp-flasher test
