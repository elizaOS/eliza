name: Deploy Eliza Provisioning Worker

# SSHes to the Hetzner provisioning host, fetches the latest develop/main commit,
# installs the systemd unit shipped at cloud/packages/scripts/eliza-provisioning-worker.service,
# and restarts the eliza-provisioning-worker daemon.
#
# First-time setup:
#   HCLOUD_TOKEN=... bun run --cwd cloud provisioning-worker:bootstrap --environment staging

on:
  push:
    branches: [develop, main]
    paths:
      - '.github/workflows/deploy-eliza-provisioning-worker.yml'
      - 'cloud/packages/scripts/daemons/provisioning-worker.ts'
      - 'cloud/packages/scripts/eliza-provisioning-worker.service'
      - 'cloud/packages/lib/services/provisioning-jobs.ts'
      - 'cloud/packages/lib/services/docker-sandbox-provider.ts'
      - 'cloud/packages/lib/services/eliza-sandbox.ts'
      - 'cloud/packages/db/repositories/agent-sandboxes.ts'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-eliza-provisioning-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      branch: ${{ steps.env.outputs.branch }}
    steps:
      - name: Set environment
        id: env
        # Interpolate Actions context values into env: rather than the run: body
        # so a malicious branch name (github.ref) cannot break out of the shell.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "environment=$INPUT_ENV" >> "$GITHUB_OUTPUT"
            if [ "$INPUT_ENV" = "production" ]; then
              echo "branch=main" >> "$GITHUB_OUTPUT"
            else
              echo "branch=develop" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$REF" = "refs/heads/main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "branch=develop" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy worker to Hetzner host
    runs-on: ubuntu-latest
    needs: determine-env
    environment: ${{ needs.determine-env.outputs.environment }}
    timeout-minutes: 15
    env:
      SYSTEMD_UNIT: eliza-provisioning-worker.service
      DEPLOY_HOST: ${{ secrets.ELIZA_PROVISIONING_HOST }}
      DEPLOY_SSH_KEY: ${{ secrets.ELIZA_PROVISIONING_SSH_KEY }}
      DEPLOY_BRANCH: ${{ needs.determine-env.outputs.branch }}
    steps:
      - name: Check deploy configuration
        id: deploy_config
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing ELIZA_PROVISIONING_HOST or ELIZA_PROVISIONING_SSH_KEY for environment ${{ needs.determine-env.outputs.environment }}; skipping provisioning-worker deploy."
            {
              echo "### Provisioning worker deploy skipped"
              echo ""
              echo "Missing \`ELIZA_PROVISIONING_HOST\` or \`ELIZA_PROVISIONING_SSH_KEY\` for GitHub environment \`${{ needs.determine-env.outputs.environment }}\`."
              echo ""
              echo "Bootstrap the Hetzner host and secrets with:"
              echo ""
              echo "\`\`\`bash"
              echo "HCLOUD_TOKEN=... bun run --cwd cloud provisioning-worker:bootstrap --environment ${{ needs.determine-env.outputs.environment }}"
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::Manual deployment requires ELIZA_PROVISIONING_HOST and ELIZA_PROVISIONING_SSH_KEY."
              exit 1
            fi
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Deploy and restart worker
        if: steps.deploy_config.outputs.configured == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: deploy
          key: ${{ env.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          envs: DEPLOY_BRANCH,SYSTEMD_UNIT
          script: |
            set -euo pipefail
            echo "=== Deploying eliza-provisioning-worker (branch: $DEPLOY_BRANCH) ==="

            cd /opt/eliza
            export GIT_CONFIG_COUNT=1
            export GIT_CONFIG_KEY_0=safe.directory
            export GIT_CONFIG_VALUE_0=/opt/eliza

            rm -f .git/index.lock

            # Discard local drift, preserve env files.
            git clean -fdx -e .env -e .env.local -e .env.* -e node_modules || true
            git checkout -- . 2>/dev/null || true

            git fetch origin "$DEPLOY_BRANCH"
            git checkout -B "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"

            # Pin bun version on first install to narrow `curl | bash` blast radius.
            if ! command -v bun >/dev/null 2>&1; then
              curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.13"
              export BUN_INSTALL="$HOME/.bun"
              export PATH="$BUN_INSTALL/bin:$PATH"
            fi

            cd /opt/eliza
            for attempt in 1 2 3; do
              if bun install --frozen-lockfile; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then exit 1; fi
              echo "bun install attempt $attempt failed; retrying in 10s..."
              sleep 10
            done

            # Install/refresh the systemd unit.
            sudo install -m 0644 \
              cloud/packages/scripts/eliza-provisioning-worker.service \
              "/etc/systemd/system/$SYSTEMD_UNIT"
            sudo systemctl daemon-reload
            sudo systemctl enable "$SYSTEMD_UNIT"

            sudo systemctl restart "$SYSTEMD_UNIT"
            echo "=== Restart issued; waiting for first poll cycle ==="

      - name: Health check
        if: steps.deploy_config.outputs.configured == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: deploy
          key: ${{ env.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          envs: SYSTEMD_UNIT
          script: |
            set -euo pipefail
            # Anchor the journal window once so it does not shrink across retries.
            SINCE_TS="$(date -u -d '30 seconds ago' '+%Y-%m-%d %H:%M:%S')"
            for attempt in $(seq 1 18); do
              if sudo systemctl is-active --quiet "$SYSTEMD_UNIT"; then
                JOURNAL=$(sudo journalctl -u "$SYSTEMD_UNIT" --since "$SINCE_TS" --no-pager 2>/dev/null || true)
                # Detect a restart loop: the worker prints "starting" each boot,
                # then crashes if env or DB is misconfigured. Treat any fatal log
                # since deploy as a hard failure even if the unit is currently active.
                if echo "$JOURNAL" | grep -qE "\[provisioning-worker\] (fatal|unhandled rejection)"; then
                  echo "::error::Worker logged a fatal/unhandled rejection since deploy."
                  echo "$JOURNAL" | tail -n 50
                  exit 1
                fi
                if echo "$JOURNAL" | grep -q "\[provisioning-worker\] starting"; then
                  echo "Worker is active and emitted startup log on attempt $attempt."
                  exit 0
                fi
              fi
              echo "Health check attempt $attempt/18: not ready yet, retrying in 5s..."
              sleep 5
            done

            echo "::error::$SYSTEMD_UNIT failed to become healthy within 90s."
            sudo systemctl status "$SYSTEMD_UNIT" --no-pager || true
            sudo journalctl -u "$SYSTEMD_UNIT" -n 200 --no-pager || true
            exit 1

      - name: Notify Discord (Success)
        if: success() && steps.deploy_config.outputs.configured == 'true'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          ack_no_webhook: true
          title: "🚀 Eliza Provisioning Worker Deployed"
          nodetail: true
          description: |
            Environment: ${{ needs.determine-env.outputs.environment }}
            Branch: ${{ needs.determine-env.outputs.branch }}
            Commit: ${{ github.sha }}
          color: 0x00ff00

      - name: Notify Discord (Failure)
        if: failure() && steps.deploy_config.outputs.configured == 'true'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          ack_no_webhook: true
          title: "❌ Eliza Provisioning Worker Deploy Failed"
          nodetail: true
          description: |
            Environment: ${{ needs.determine-env.outputs.environment }}
            Branch: ${{ needs.determine-env.outputs.branch }}
            Commit: ${{ github.sha }}
          color: 0xff0000
