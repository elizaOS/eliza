name: Release USB Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag (e.g. v1.0.0)
        required: false
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            artifact: elizaos-usb-installer-macos
          - os: ubuntu-latest
            platform: linux
            artifact: elizaos-usb-installer-linux
          - os: windows-latest
            platform: win32
            artifact: elizaos-usb-installer-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install
      - run: bun run --cwd packages/os-usb-installer build
      - run: bun run --cwd packages/os-usb-installer typecheck
      - run: bun run --cwd packages/os-usb-installer test
      - name: Package desktop app
        run: bun run --cwd packages/os-usb-installer package:${{ matrix.platform }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/os-usb-installer/build/
