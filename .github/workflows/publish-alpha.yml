name: Publish Alpha (develop)

# Bump and publish all non-private workspace packages and plugins to npm
# with the `alpha` dist-tag whenever the Tests workflow finishes
# successfully on develop. Lerna covers `packages/*` and `plugins/*`.
# `lerna publish from-package` is idempotent — versions already on npm
# are skipped, so re-runs and partial failures are safe.

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish from (defaults to develop)"
        required: false
        default: "develop"

concurrency:
  group: publish-alpha-develop
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'develop' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      TARGET_REF: ${{ github.event.workflow_run.head_sha || inputs.ref || 'develop' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0
          filter: blob:none

      - name: Force local branch to develop
        # workflow_run checks out a SHA in detached-HEAD state, which
        # makes lerna's allowBranch check fail. Pin the local branch
        # name to "develop" so lerna sees an allowed branch.
        run: git checkout -B develop

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpq-dev \
            postgresql-client \
            pkg-config \
            libatspi2.0-dev \
            libgtk-3-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libdrm-dev \
            libegl1-mesa-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: bun install

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next prerelease version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(npm view @elizaos/core versions --json | node -e '
            const fs = require("fs");
            const versions = JSON.parse(fs.readFileSync(0, "utf8"));
            const prereleases = versions
              .filter((version) => /^2\.0\.0-alpha(?:\.\d+)?$/.test(version))
              .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
            process.stdout.write(prereleases.at(-1) ?? "2.0.0-alpha.0");
          ')

          if [[ "${CURRENT}" =~ ^2\.0\.0-alpha\.([0-9]+)$ ]]; then
            NEXT="2.0.0-alpha.$((BASH_REMATCH[1] + 1))"
          elif [[ "${CURRENT}" == "2.0.0-alpha" ]]; then
            NEXT="2.0.0-alpha.1"
          else
            echo "Unexpected prerelease version: ${CURRENT}"
            exit 1
          fi

          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${NEXT} to dist-tag alpha"

      - name: Bump package versions
        run: |
          bunx lerna version "${{ steps.version.outputs.next }}" \
            --force-publish \
            --yes \
            --no-private \
            --no-git-tag-version \
            --no-push

      - name: Update lockfile
        run: bun install --no-frozen-lockfile

      - name: Create local version commit
        run: |
          git add -A
          git commit -m "chore: prepare v${{ steps.version.outputs.next }} for next publish [skip ci]"

      - name: Build packages
        run: bun run build

      - name: Ensure clean tree before publish
        run: |
          git checkout -- packages/elizaos/examples-manifest.json || true

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Working tree must be clean before publish."
            git status --short
            exit 1
          fi

      - name: Publish to npm with alpha tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          bunx lerna publish from-package \
            --dist-tag alpha \
            --force-publish \
            --yes \
            --no-verify-access

      - name: Summary
        if: always()
        run: |
          {
            echo "## Publish Alpha"
            echo ""
            echo "- Source SHA: \`${{ env.TARGET_REF }}\`"
            echo "- Previous alpha on npm: \`${{ steps.version.outputs.current }}\`"
            echo "- Published version: \`${{ steps.version.outputs.next }}\`"
            echo "- Dist-tag: \`alpha\`"
            echo "- Scope: all non-private packages under \`packages/*\` and \`plugins/*\`"
          } >> "$GITHUB_STEP_SUMMARY"
