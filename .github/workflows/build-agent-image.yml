name: Build Agent Image (develop/main)

# Continuous publication of the cloud-agent container image used by the
# cloud sandbox provisioner. The release-triggered workflow (image.yaml)
# still handles tagged releases; this one keeps :develop / :stable /
# :latest pointing at the head of each branch so provisioners don't pin
# stale builds.

on:
  push:
    branches: [develop, main]
    paths:
      - "packages/app-core/deploy/Dockerfile.cloud"
      - "packages/agent/**"
      - "packages/server/**"
      - "packages/core/**"
      - "packages/app/**"
      - "packages/app-core/**"
      - ".github/workflows/build-agent-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          show-progress: false

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -a -f || true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: bun install --ignore-scripts --frozen-lockfile

      - name: Build UI
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: bun run build:client

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            env.BUILDKIT_STEP_LOG_MAX_SIZE=10485760
            env.BUILDKIT_STEP_LOG_MAX_SPEED=10485760

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # develop  → :develop + :sha-<short>
          # main     → :stable  + :latest + :sha-<short>
          # Keeping :latest on main avoids breaking the four code sites that
          # still hardcode it (containers-env fallback, sandbox-provider
          # fallback, two test fixtures) until they migrate to :stable.
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/app-core/deploy/Dockerfile.cloud
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
