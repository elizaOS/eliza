name: Build Agent Image (develop/main)

# Continuous publication of the cloud-agent container image used by the
# cloud sandbox provisioner. The release-triggered workflow (image.yaml)
# still handles tagged releases; this one keeps :develop / :stable /
# :latest pointing at the head of each branch so provisioners don't pin
# stale builds.

on:
  push:
    branches: [develop, main]
    paths:
      - "packages/app-core/deploy/Dockerfile.ci"
      - "plugins/plugin-sql/**"
      - "plugins/plugin-elizacloud/**"
      - "packages/agent/**"
      - "packages/server/**"
      - "packages/core/**"
      - "packages/app/**"
      - "packages/app-core/**"
      - ".github/workflows/build-agent-image.yml"
      - ".dockerignore"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          show-progress: false

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -a -f || true

      - name: Install jq
        # Required by packages/app-core/scripts/docker-ci-smoke.sh per-plugin
        # build loop: it gates each `bun run build` on `jq -e '.scripts.build'`.
        # Without jq, the gate silently fails and the plugin dist/ is never
        # produced, which ships a broken image (plugin-sql index.node.js missing).
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        # Use `--no-frozen-lockfile` so a downstream lockfile drift in
        # `develop` doesn't short-circuit the install before postinstall
        # gets a chance to run (which is what was happening with the
        # earlier `--frozen-lockfile` + fallback dance — the frozen
        # install would fail, Bun's silent retry would no-op against
        # the already-extracted virtual store, and postinstall would
        # never run, leaving root-level deps like `uuid`, `drizzle-orm`,
        # and the patched `tsup/dist/rollup.js` unavailable to the
        # per-plugin build loop). The heavy submodule fetch is guarded
        # by NODE_LLAMA_CPP_SKIP_DOWNLOAD.
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          bun install --no-frozen-lockfile

      - name: Apply postinstall patches
        # Belt-and-suspenders for the postinstall path: even with
        # `bun install` (postinstall enabled), the silent fallback that
        # kicks in when frozen-lockfile drifts doesn't always re-run the
        # repo postinstall in CI. Explicitly run the patches the
        # per-plugin builds depend on:
        #   - patch-tsup-dts.mjs: rewires tsup's runtime require to
        #     @rollup/wasm-node AND wraps the resulting `await` calls in
        #     async functions. Without this patch tsup's worker thread
        #     crashes with `SyntaxError: await is only valid in async
        #     functions` (CJS file with top-level await) the moment any
        #     plugin tries to emit .d.ts via tsup.
        #   - ensure-type-package-aliases: materializes @types/* under
        #     node_modules/@types so `tsc --build` resolves them.
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          bun packages/scripts/patch-tsup-dts.mjs || true
          node packages/app-core/scripts/ensure-type-package-aliases.mjs

      - name: Build @elizaos/core, shared, ui
        # The per-plugin tsup `--dts` step needs @elizaos/core's
        # `dist/*.d.ts` to exist; without this build, plugin-video's
        # DTS pass trips `TS2307: Cannot find module '@elizaos/core'`.
        # Build the same set docker-ci-smoke.sh builds before its
        # per-plugin loop: contracts (required by core's
        # tsconfig.declarations.json), core (Node-only), shared,
        # cloud-sdk, ui. Workspace symlinks already exist from
        # `bun install`; we just need the dist artifacts each plugin's
        # tsup resolves through `exports`.
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          # contracts must build BEFORE core: packages/core/tsconfig.declarations.json
          # maps `@elizaos/contracts` to `../contracts/dist/index.d.ts` and the
          # declarations tsc step fails with TS2307 if that file is missing.
          (cd packages/contracts && bun run build)
          (cd packages/core && bun run build.ts --node-only)
          for pkg in packages/shared packages/cloud-sdk packages/cloud-routing packages/skills packages/ui; do
            if [[ -f "$pkg/package.json" ]] && jq -e '.scripts.build' "$pkg/package.json" >/dev/null; then
              echo "::group::Building $pkg"
              (cd "$pkg" && bun install --no-frozen-lockfile --ignore-scripts && bun run build)
              echo "::endgroup::"
            fi
          done

      - name: Build workspace plugins
        # Dockerfile.ci copies the repo and relies on pre-built dist/ in each
        # workspace plugin. The docker-ci-smoke script (used by the smoke
        # workflow) is the canonical place this lives; reuse the same loop so
        # plugin-sql, plugin-elizacloud, etc. land in the image with their
        # built artifacts.
        #
        # Why we re-install each plugin's deps before the build loop:
        # Bun's workspace install leaves per-plugin `node_modules/.bin/`
        # empty for CLI deps that live in DEVDependencies of a workspace
        # *peer* (tsup is declared in plugin-video's own devDeps but Bun
        # still routes its bin symlink through the hoisted root rather
        # than the plugin's local .bin/, and `bun run build` runs the
        # script under bash which only consults the local .bin/). The
        # cheapest workaround: run `bun install --no-frozen-lockfile`
        # inside each plugin dir before the build so the local .bin/ is
        # actually populated. Idempotent and fast — bun reuses the global
        # store.
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          for plugin in plugin-sql plugin-video plugin-agent-skills plugin-pdf \
            plugin-browser plugin-capacitor-bridge plugin-coding-tools \
            plugin-computeruse plugin-discord plugin-elizacloud plugin-imessage \
            plugin-local-inference plugin-mcp plugin-signal plugin-streaming \
            plugin-telegram plugin-whatsapp plugin-workflow plugin-x402; do
            plugin_dir="plugins/$plugin"
            if [[ -f "$plugin_dir/package.json" ]] && jq -e '.scripts.build' "$plugin_dir/package.json" >/dev/null; then
              echo "::group::Building @elizaos/$plugin"
              (
                cd "$plugin_dir"
                # Ensure local node_modules/.bin/ has the dev CLIs the
                # build script references (tsup, tsc, tsdown, etc.).
                bun install --no-frozen-lockfile --ignore-scripts
              )
              # Re-apply patch-tsup-dts AFTER the per-plugin install —
              # `bun install` re-extracts virtual-store entries from the
              # global cache, wiping the earlier patch. Without this,
              # tsup's worker thread loads an un-patched rollup.js with
              # `await` at module-top-level → SyntaxError.
              bun packages/scripts/patch-tsup-dts.mjs >/dev/null || true
              (cd "$plugin_dir" && bun run build)
              echo "::endgroup::"
            fi
          done

      - name: Build UI
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: bun run build:client

      - name: Build agent workspace
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          pushd packages/agent >/dev/null
          bun run build:docker-dist
          popd >/dev/null

      - name: Build app UI
        env:
          NODE_ENV: production
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          pushd packages/app >/dev/null
          bun run build:web
          popd >/dev/null

      - name: Prepare CI dockerignore
        # The root .dockerignore is tuned for `bun install` runs (excludes
        # everything heavy). The Docker build needs a different policy:
        # keep root node_modules (Dockerfile.ci's pruner relink scripts
        # consume them) but strip per-package node_modules and the other
        # bulky CI-only inputs. Use the canonical CI dockerignore from
        # packages/app-core/deploy/.dockerignore.ci, mirroring what
        # docker-ci-smoke.sh does before its `docker build`.
        run: |
          cp packages/app-core/deploy/.dockerignore.ci .dockerignore

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            env.BUILDKIT_STEP_LOG_MAX_SIZE=10485760
            env.BUILDKIT_STEP_LOG_MAX_SPEED=10485760

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # develop  → :develop + :sha-<short>
          # main     → :stable  + :latest + :sha-<short>
          # Keeping :latest on main avoids breaking the four code sites that
          # still hardcode it (containers-env fallback, sandbox-provider
          # fallback, two test fixtures) until they migrate to :stable.
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/app-core/deploy/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
