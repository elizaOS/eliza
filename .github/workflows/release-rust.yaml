          - name: elizaos-plugin-n8n
            path: plugins/plugin-n8n/rust
          - name: elizaos-plugin-nextcloud-talk
            path: plugins/plugin-nextcloud-talk/rust
          - name: elizaos-plugin-nostr
            path: plugins/plugin-nostr/rust
          - name: elizaos-plugin-ollama
            path: plugins/plugin-ollama/rust
          - name: elizaos-plugin-openrouter
            path: plugins/plugin-openrouter/rust
          - name: elizaos-plugin-pdf
            path: plugins/plugin-pdf/rust
          - name: elizaos-plugin-personality
            path: plugins/plugin-personality/rust
          - name: elizaos-plugin-plugin-manager
            path: plugins/plugin-plugin-manager/rust
