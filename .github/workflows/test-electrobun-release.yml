name: Validate Electrobun Release Workflow

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: test-electrobun-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.13"
  NODE_NO_WARNINGS: "1"

jobs:
  validate-release-workflow:
    name: Release Workflow Contract
    runs-on: ${{ vars.RUNNER_UBUNTU || 'ubuntu-24.04' }}
    timeout-minutes: 20
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun workspace
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts
          install-native-deps: "false"
          run-postinstall: "true"

      # TODO: verify these scripts exist in eliza or port equivalents.
      # In milady these were `bun run test:regression-matrix:release-contract`
      # and `bun run test:release:contract`. Port the corresponding
      # release-check / regression-matrix targets if needed.
      - name: Run regression matrix contract
        run: bun run test:regression-matrix:release-contract

      - name: Run release contract suite
        run: bun run test:release:contract
