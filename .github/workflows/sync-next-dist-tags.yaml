name: Sync Next Dist-Tags

on:
  push:
    branches:
      - shaw/release-clean-tree-fix
  workflow_dispatch:
    inputs:
      source_tag:
        description: Source dist-tag to mirror
        required: false
        default: alpha
        type: string
      target_tag:
        description: Target dist-tag to update
        required: false
        default: next
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "23.3.0"
          registry-url: "https://registry.npmjs.org"

      - name: Configure npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Configure npm for authentication using setup-node's registry-url
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          # Verify authentication
          npm whoami || echo "Warning: npm authentication check failed, but continuing..."

      - name: Sync dist-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node scripts/sync-prerelease-dist-tags.js "${{ inputs.source_tag || 'alpha' }}" "${{ inputs.target_tag || 'next' }}"
