name: e2e-coverage-gate

# Issue #8802 — umbrella e2e coverage gate for slash commands, #8791 shortcuts,
# plugin-declared HTTP routes, and views. Builds the canonical coverage matrix
# from real source, uploads it as an artifact, and (advisory) reports any
# surface that ships without a real recorded e2e.
#
# REQUIRED (E2E_COVERAGE_GATE_ENFORCE=1): the advisory cycle is complete and the
# baseline is green — every served slash command, the #8791 shortcut registry
# (now wired into SHORTCUT_COVERAGE), every route-declaring plugin, and the view
# ship-gates resolve to a real recorded e2e, with zero blocking gaps. A new
# command/shortcut/route/view that ships without a real e2e now fails the build.

on:
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-coverage:
    name: e2e coverage matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Bun workspace
        uses: ./.github/actions/setup-bun-workspace
        with:
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Build the e2e coverage matrix (required)
        env:
          E2E_COVERAGE_GATE_ENFORCE: "1"
        run: bun packages/scripts/check-e2e-coverage.ts --report-dir reports/coverage

      - name: Upload e2e coverage matrix
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: e2e-coverage-matrix
          path: reports/coverage/
          if-no-files-found: warn
          retention-days: 7
