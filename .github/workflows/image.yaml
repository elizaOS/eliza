#
name: Create and publish a Docker image

# Runs on GitHub release creation (type: created) and manual dispatch.
on:
  release:
    types: [created]
  workflow_dispatch:

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  build-and-push-image:
    runs-on: ubuntu-24.04
    # Add timeout to prevent hanging builds
    timeout-minutes: 60
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false
          show-progress: false

      - name: Free up disk space
        run: |
          echo "=== Before cleanup ==="
          df -h
          echo "=== Cleaning up disk space ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -a -f
          echo "=== After cleanup ==="
          df -h

      # Dockerfile.ci is a pruner-style image that expects pre-built artifacts
      # (node_modules + per-package dist/) already produced by the host. The
      # release workflow runs the same pre-build sequence as build-agent-image.yml
      # so its `RUN node link-docker-local-app-packages.mjs` can resolve the
      # workspace deps (argon2, jose, plugin-sql root deps) from the populated
      # node_modules tree. Without this prelude the Docker pruner stage fails
      # immediately on the bun store lookup.
      - name: Install jq
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        # Use `--no-frozen-lockfile` so a downstream lockfile drift in
        # `develop`/`main` doesn't short-circuit the install before postinstall
        # gets a chance to run. The heavy submodule fetch is guarded by
        # NODE_LLAMA_CPP_SKIP_DOWNLOAD.
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          bun install --no-frozen-lockfile

      - name: Apply postinstall patches
        # patch-tsup-dts.mjs rewires tsup's runtime require to
        # @rollup/wasm-node so the per-plugin DTS step doesn't crash.
        # ensure-type-package-aliases materializes @types/* under
        # node_modules/@types so `tsc --build` resolves them.
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          bun packages/scripts/patch-tsup-dts.mjs || true
          node packages/app-core/scripts/ensure-type-package-aliases.mjs

      - name: Build @elizaos/core, shared, ui
        # Same set docker-ci-smoke.sh builds before its per-plugin loop:
        # contracts (required by core's tsconfig.declarations.json), core
        # (Node-only), shared, cloud-sdk, cloud-routing, skills, ui.
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          (cd packages/contracts && bun run build)
          node packages/shared/scripts/generate-keywords.mjs --target ts
          (cd packages/core && bun run build.ts --node-only)
          for pkg in packages/shared packages/cloud-sdk packages/cloud-routing packages/skills packages/ui; do
            if [[ -f "$pkg/package.json" ]] && jq -e '.scripts.build' "$pkg/package.json" >/dev/null; then
              echo "::group::Building $pkg"
              (cd "$pkg" && bun install --no-frozen-lockfile --ignore-scripts && bun run build)
              echo "::endgroup::"
            fi
          done

      - name: Build workspace plugins
        # Dockerfile.ci copies the repo and relies on pre-built dist/ in each
        # workspace plugin. Mirror docker-ci-smoke.sh so plugin-sql,
        # plugin-elizacloud, etc. land in the image with their built artifacts.
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          for plugin in plugin-sql plugin-video plugin-agent-skills plugin-pdf \
            plugin-browser plugin-capacitor-bridge plugin-coding-tools \
            plugin-computeruse plugin-discord plugin-elizacloud plugin-imessage \
            plugin-local-inference plugin-mcp plugin-signal plugin-streaming \
            plugin-telegram plugin-whatsapp plugin-workflow plugin-x402; do
            plugin_dir="plugins/$plugin"
            if [[ -f "$plugin_dir/package.json" ]] && jq -e '.scripts.build' "$plugin_dir/package.json" >/dev/null; then
              echo "::group::Building @elizaos/$plugin"
              (
                cd "$plugin_dir"
                bun install --no-frozen-lockfile --ignore-scripts
              )
              bun packages/scripts/patch-tsup-dts.mjs >/dev/null || true
              (cd "$plugin_dir" && bun run build)
              echo "::endgroup::"
            fi
          done

      - name: Build UI
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: bun run build:client

      - name: Build agent workspace
        env:
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          pushd packages/agent >/dev/null
          bun run build:docker-dist
          popd >/dev/null

      - name: Build app UI
        env:
          NODE_ENV: production
          NODE_LLAMA_CPP_SKIP_DOWNLOAD: "true"
        run: |
          pushd packages/app >/dev/null
          bun run build:web
          popd >/dev/null

      - name: Prepare CI dockerignore
        # The root .dockerignore excludes `**/node_modules` (tuned for
        # `bun install` runs). Dockerfile.ci needs root `node_modules/`
        # (with the .bun virtual store) inside the build context so
        # link-docker-local-app-packages.mjs can resolve workspace deps.
        # Swap to the canonical CI dockerignore that strips per-package
        # node_modules but keeps the root tree.
        run: |
          cp packages/app-core/deploy/.dockerignore.ci .dockerignore

      # Uses the `docker/login-action` action to log in to the Container registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      # Set up Buildx (BuildKit) with log limits and constrained parallelism to avoid resource exhaustion.
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            env.BUILDKIT_STEP_LOG_MAX_SIZE=10485760
            env.BUILDKIT_STEP_LOG_MAX_SPEED=10485760
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
            [worker.containerd]
              max-parallelism = 2

      # Build the image using the repository Dockerfile and push it to GHCR.
      # Uses `context` for build context; applies tags and labels from the metadata step (`meta`).
      # See usage docs: https://github.com/docker/build-push-action#usage
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/app-core/deploy/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Increase build resources and add caching
          builder: ${{ steps.buildx.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Target platform (single-arch)
          platforms: linux/amd64

      # Generate a build provenance attestation (supply chain security) and upload it with the image.
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # This step makes the Docker image public, so users can pull it without authentication.
      - name: Make Docker image public
        run: |
          curl \
            -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/${{ env.IMAGE_NAME }}/visibility \
            -d '{"visibility":"public"}'
