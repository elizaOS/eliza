name: Voice Workbench

# Voice Workbench (#8785): the unified voice scenario/benchmark harness.
#
# This lane runs WITHOUT a model or a browser:
#   - the headless workbench unit suite (schema, corpus, runner, scorers,
#     report, entrypoint), and
#   - the `voice:workbench` mocked lane, which drives the full
#     corpus → runner → scorers → report path over the built-in scenario matrix
#     using a ground-truth mock services adapter.
#
# The real local backend is exercised "where provisioned": with no backend the
# CLI reports every scenario `skipped` (never a false `pass`) — the honesty
# contract. A nightly/hardware lane can run `voice:workbench --real` once a
# real services adapter + corpus are provisioned.

on:
  push:
    paths:
      - "plugins/plugin-local-inference/src/services/voice/voice-scenario.ts"
      - "plugins/plugin-local-inference/src/services/voice/e2e-harness.ts"
      - "plugins/plugin-local-inference/src/services/voice/corpus-generator.ts"
      - "plugins/plugin-local-inference/src/services/voice/wav-codec.ts"
      - "plugins/plugin-local-inference/src/services/voice/acoustic-speaker-attribution.ts"
      - "plugins/plugin-local-inference/src/services/voice/acoustic-speaker-attribution.test.ts"
      - "plugins/plugin-local-inference/src/services/voice/workbench-*.ts"
      - "plugins/plugin-local-inference/src/services/voice/__test-helpers__/synthetic-speech.ts"
      - "plugins/plugin-local-inference/src/services/voice/corpus-augment.ts"
      - "plugins/plugin-local-inference/src/services/voice/voice-workbench-report.ts"
      - "plugins/plugin-local-inference/scripts/voice-workbench.ts"
      - "packages/shared/src/voice-wer.ts"
      - "packages/shared/src/voice-eot.ts"
      - "packages/shared/src/voice/respond-gate.ts"
      - "packages/shared/src/voice/owner-inference.ts"
      - ".github/workflows/voice-workbench.yml"
  pull_request:
    paths:
      - "plugins/plugin-local-inference/src/services/voice/voice-scenario.ts"
      - "plugins/plugin-local-inference/src/services/voice/e2e-harness.ts"
      - "plugins/plugin-local-inference/src/services/voice/corpus-generator.ts"
      - "plugins/plugin-local-inference/src/services/voice/wav-codec.ts"
      - "plugins/plugin-local-inference/src/services/voice/acoustic-speaker-attribution.ts"
      - "plugins/plugin-local-inference/src/services/voice/acoustic-speaker-attribution.test.ts"
      - "plugins/plugin-local-inference/src/services/voice/workbench-*.ts"
      - "plugins/plugin-local-inference/src/services/voice/__test-helpers__/synthetic-speech.ts"
      - "plugins/plugin-local-inference/src/services/voice/corpus-augment.ts"
      - "plugins/plugin-local-inference/src/services/voice/voice-workbench-report.ts"
      - "plugins/plugin-local-inference/scripts/voice-workbench.ts"
      - "packages/shared/src/voice-wer.ts"
      - "packages/shared/src/voice-eot.ts"
      - "packages/shared/src/voice/respond-gate.ts"
      - "packages/shared/src/voice/owner-inference.ts"
      - ".github/workflows/voice-workbench.yml"
  workflow_dispatch: {}

concurrency:
  group: voice-workbench-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  voice-workbench:
    name: headless workbench (mocked backends)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/setup-bun-workspace
        with:
          install-native-deps: "false"
          install-protoc: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Headless workbench unit suite
        run: |
          bun run --cwd plugins/plugin-local-inference vitest run \
            src/services/voice/wav-codec.test.ts \
            src/services/voice/corpus-generator.test.ts \
            src/services/voice/corpus-augment.test.ts \
            src/services/voice/acoustic-speaker-attribution.test.ts \
            src/services/voice/workbench-headless-runner.test.ts \
            src/services/voice/workbench-logic-services.test.ts \
            src/services/voice/workbench-entrypoint.test.ts \
            src/services/voice/voice-workbench.test.ts \
            src/services/voice/voice-workbench-report.test.ts \
            src/services/voice/e2e-harness.test.ts

      - name: Shared voice decision-logic suite (gate, EOT, owner inference)
        run: |
          bun run --cwd packages/shared vitest run \
            src/voice/owner-inference.test.ts \
            src/voice-eot.test.ts \
            src/voice-wer.test.ts

      - name: voice:workbench mocked lane (plumbing — runs the matrix → report)
        run: bun run --cwd plugins/plugin-local-inference voice:workbench --out "${RUNNER_TEMP}/voice-workbench-output"

      - name: voice:workbench logic lane (real decision logic + regression gate)
        run: |
          bun run --cwd plugins/plugin-local-inference voice:workbench --logic \
            --baseline src/services/voice/__fixtures__/voice-workbench-logic-baseline.json \
            --out "${RUNNER_TEMP}/voice-workbench-logic-output"

      - name: Upload workbench reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: voice-workbench-report
          path: |
            ${{ runner.temp }}/voice-workbench-output
            ${{ runner.temp }}/voice-workbench-logic-output
          if-no-files-found: ignore
