name: Cloud Database Migrations

# Runs cloud database migrations for the selected environment.
# Hetzner control-plane deployment lives in deploy-eliza-provisioning-worker.yml.

on:
  push:
    branches: [develop, main]
    paths:
      - '.github/workflows/cloud-deploy-backend.yml'
      - 'packages/cloud-api/**'
      - 'packages/cloud-frontend/**'
      - 'packages/cloud-shared/**'
      - 'packages/cloud-services/**'
      - 'packages/cloud-sdk/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to migrate'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cloud-database-migrations-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: "canary"

permissions:
  contents: read

jobs:
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      branch: ${{ steps.env.outputs.branch }}
    steps:
      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.inputs.environment == 'production' && 'main' || 'develop' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "branch=develop" >> "$GITHUB_OUTPUT"
          fi

  migrate-db:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: determine-env
    environment: ${{ needs.determine-env.outputs.environment }}
    timeout-minutes: 10
    env:
      MIGRATION_DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.RAILWAY_DATABASE_URL || secrets.NEON_DATABASE_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if [ "$attempt" -eq 3 ]; then
              bun install --no-save --ignore-scripts --verbose && exit 0
            else
              bun install --no-save --ignore-scripts && exit 0
            fi

            echo "bun install attempt $attempt failed; retrying in 10s..."
            sleep 10
          done

          exit 1

      - name: Fail fast when database secret is missing
        if: ${{ env.MIGRATION_DATABASE_URL == '' }}
        run: |
          echo "::error::DATABASE_URL / RAILWAY_DATABASE_URL / NEON_DATABASE_URL secret is missing on the '${{ needs.determine-env.outputs.environment }}' environment. The schema cannot be migrated."
          echo "Add the secret in: Settings -> Environments -> ${{ needs.determine-env.outputs.environment }} -> Environment secrets."
          exit 1

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.MIGRATION_DATABASE_URL }}
        run: bun run db:cloud:migrate

      - name: Notify Discord (Success)
        if: success()
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          ack_no_webhook: true
          title: "Database Migrated"
          nodetail: true
          description: |
            Environment: ${{ needs.determine-env.outputs.environment }}
            Branch: ${{ needs.determine-env.outputs.branch }}
            Commit: ${{ github.sha }}
          color: 0x00ff00

      - name: Notify Discord (Failure)
        if: failure()
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          ack_no_webhook: true
          title: "Database Migration Failed"
          nodetail: true
          description: |
            Environment: ${{ needs.determine-env.outputs.environment }}
            Branch: ${{ needs.determine-env.outputs.branch }}
            Commit: ${{ github.sha }}
          color: 0xff0000
