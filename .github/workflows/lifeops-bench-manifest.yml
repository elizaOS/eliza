# LifeOps Action Manifest Drift Gate
#
# Re-runs the manifest generator (TS exporter + Python umbrella augment) and
# fails the build if the committed `actions.manifest.json` differs from a
# fresh regeneration. This keeps `packages/benchmarks/lifeops-bench/manifests/`
# in sync with the actual plugin actions exposed by app-lifeops, app-contacts,
# app-phone, plugin-todos, plugin-imessage, and plugin-bluebubbles.
#
# Local equivalent (run before pushing):
#
#     bun run check-actions-manifest
#
# Triggers on PRs that touch any of the input plugins, the export script,
# the Python augment, or the manifest itself.

name: LifeOps Action Manifest Gate

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "plugins/app-lifeops/**"
      - "plugins/app-contacts/**"
      - "plugins/app-phone/**"
      - "plugins/plugin-bluebubbles/**"
      - "plugins/plugin-imessage/**"
      - "plugins/plugin-todos/**"
      - "scripts/lifeops-bench/export-action-manifest.ts"
      - "scripts/lifeops-bench/check-action-manifest.mjs"
      - "packages/benchmarks/lifeops-bench/manifests/actions.manifest.json"
      - "packages/benchmarks/lifeops-bench/eliza_lifeops_bench/manifest_export.py"
      - ".github/workflows/lifeops-bench-manifest.yml"
  workflow_dispatch:

concurrency:
  group: lifeops-bench-manifest-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.13"
  NODE_VERSION: "22.20.0"
  PYTHON_VERSION: "3.12"

jobs:
  manifest-gate:
    name: Verify lifeops action manifest is up to date
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Bun + workspace
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --frozen-lockfile --ignore-scripts
          install-native-deps: "false"

      - name: Install Python bench package
        run: |
          cd packages/benchmarks/lifeops-bench
          pip install -e .

      - name: Verify manifest is up to date
        run: bun run check-actions-manifest
