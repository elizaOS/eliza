name: Build elizaOS Linux ISO

# One unified multi-arch live-build at packages/os/linux/elizaos. The build
# runs inside a Docker builder container (`make build ARCH=<arch>`), so the
# runner only needs Docker — no host live-build/just/rust install. amd64 is
# the gating leg; arm64/riscv64 run continue-on-error until they have
# produced+validated artifacts.

on:
  workflow_call:
    inputs:
      channel:
        type: string
        default: stable
      publish:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        type: choice
        options: [nightly, beta, stable]
        default: nightly
      publish:
        description: Upload to GitHub Release
        type: boolean
        default: false
  schedule:
    - cron: '0 3 * * *'
  release:
    types: [created]

permissions:
  contents: read

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64, riscv64]
    # arm64/riscv64 build under qemu-user-static and have no validated
    # artifact yet — surface failures without blocking the amd64 gate.
    continue-on-error: ${{ matrix.arch != 'amd64' }}
    env:
      CHANNEL: ${{ inputs.channel || (github.event_name == 'release' && 'stable') || 'nightly' }}
      VARIANT_DIR: packages/os/linux/elizaos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore live-build cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.VARIANT_DIR }}/cache
          key: elizaos-iso-${{ matrix.arch }}-${{ hashFiles('packages/os/linux/elizaos/auto/config', 'packages/os/linux/elizaos/config/package-lists/**', 'packages/os/linux/elizaos/Dockerfile') }}
          restore-keys: elizaos-iso-${{ matrix.arch }}-

      - name: Detect KVM acceleration
        id: kvm
        run: |
          if [ -e /dev/kvm ]; then
            echo "have_kvm=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_kvm=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ISO (${{ matrix.arch }})
        working-directory: ${{ env.VARIANT_DIR }}
        run: make build ARCH=${{ matrix.arch }}
        timeout-minutes: 110

      - name: Locate and rename ISO
        id: iso
        run: |
          set -euo pipefail
          ISO=$(find "${VARIANT_DIR}/out" -name "elizaos-linux-${{ matrix.arch }}-*.iso" | sort | tail -1)
          if [ -z "$ISO" ]; then
            echo "ERROR: ISO not found after build"
            exit 1
          fi
          DATE=$(date +%Y.%m.%d)
          DEST="elizaos-linux-${CHANNEL}-${DATE}-${{ matrix.arch }}.iso"
          cp "$ISO" "$DEST"
          sha256sum "$DEST" > "$DEST.sha256"
          {
            echo "path=$DEST"
            echo "filename=$DEST"
            echo "sha256=$(sha256sum "$DEST" | cut -d' ' -f1)"
            echo "size=$(stat --format=%s "$DEST")"
          } >> "$GITHUB_OUTPUT"

      - name: Smoke test ISO (headless QEMU, amd64 only)
        if: matrix.arch == 'amd64' && steps.kvm.outputs.have_kvm == 'true'
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf
          SERIAL_LOG=$(mktemp)
          timeout 180 qemu-system-x86_64 \
            -enable-kvm -cdrom "${{ steps.iso.outputs.path }}" -boot d \
            -m 2G -smp 2 -display none -vga none \
            -serial "file:$SERIAL_LOG" -no-reboot -nographic 2>/dev/null || true
          if grep -qi "elizaOS\|eliza\|login:" "$SERIAL_LOG" 2>/dev/null; then
            echo "ISO smoke test: boot strings found"
          else
            echo "ERROR: boot strings not detected"
            tail -200 "$SERIAL_LOG" || true
            exit 1
          fi
          rm -f "$SERIAL_LOG"

      - name: Smoke test skipped (no KVM or non-amd64)
        if: matrix.arch != 'amd64' || steps.kvm.outputs.have_kvm != 'true'
        run: echo "::notice::Boot smoke test runs only on amd64 with KVM; skipped for ${{ matrix.arch }}."

      - name: Install squashfs-tools (for SBOM extraction)
        if: matrix.arch == 'amd64'
        run: sudo apt-get install -y --no-install-recommends squashfs-tools

      - name: Extract Debian package database from ISO
        # Mount the ISO read-only and unsquashfs only /var/lib/dpkg so syft
        # can inventory the runtime packages. Extracting the full root would
        # cost ~7 GB and ~5 min; the dpkg dir alone is ~50 MB and lets syft
        # enumerate every installed Debian package with name + version.
        if: matrix.arch == 'amd64'
        id: sbom-extract
        run: |
          set -euo pipefail
          MNT=$(mktemp -d)
          SQ=$(mktemp -d)
          sudo mount -o loop,ro "${{ steps.iso.outputs.path }}" "$MNT"
          SQUASH=$(sudo find "$MNT" -maxdepth 4 -name 'filesystem.squashfs' -o -name '*.squashfs' 2>/dev/null | head -1)
          if [ -z "$SQUASH" ]; then
            echo "::warning::No squashfs found in ISO — skipping SBOM generation"
            sudo umount "$MNT"
            rmdir "$MNT" "$SQ"
            echo "extracted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sudo unsquashfs -d "$SQ" "$SQUASH" var/lib/dpkg > /dev/null
          sudo umount "$MNT"
          rmdir "$MNT"
          sudo chown -R "$USER:$USER" "$SQ"
          echo "root=$SQ" >> "$GITHUB_OUTPUT"
          echo "extracted=true" >> "$GITHUB_OUTPUT"

      - name: Generate ISO SBOM (SPDX JSON)
        if: matrix.arch == 'amd64' && steps.sbom-extract.outputs.extracted == 'true'
        uses: anchore/sbom-action@v0
        with:
          path: ${{ steps.sbom-extract.outputs.root }}
          format: spdx-json
          output-file: ${{ steps.iso.outputs.filename }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Report SBOM package count
        if: matrix.arch == 'amd64' && steps.sbom-extract.outputs.extracted == 'true'
        run: |
          set -euo pipefail
          SBOM="${{ steps.iso.outputs.filename }}.spdx.json"
          if [ -f "$SBOM" ]; then
            COUNT=$(jq '.packages | length' "$SBOM")
            echo "::notice::SBOM contains $COUNT packages"
          fi
          # Best-effort cleanup; do not fail the job if the temp dir is gone.
          rm -rf "${{ steps.sbom-extract.outputs.root }}" || true

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: elizaos-linux-iso-${{ env.CHANNEL }}-${{ matrix.arch }}
          path: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.filename }}.sha256
            ${{ steps.iso.outputs.filename }}.spdx.json
          retention-days: 7

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish) || (github.event_name == 'workflow_call' && inputs.publish == true)
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.filename }}.sha256
            ${{ steps.iso.outputs.filename }}.spdx.json
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write ISO metadata to summary
        run: |
          {
            echo "## elizaOS Linux ISO (${{ matrix.arch }})"
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| File | \`${{ steps.iso.outputs.filename }}\` |"
            echo "| SHA-256 | \`${{ steps.iso.outputs.sha256 }}\` |"
            echo "| Size | ${{ steps.iso.outputs.size }} bytes |"
            echo "| Channel | ${CHANNEL} |"
          } >> "$GITHUB_STEP_SUMMARY"
