name: vault-ci

# Cross-platform tests for @elizaos/vault. The package's headline
# claim is that the OS-keyring-backed master key works the same on
# macOS Keychain, Windows Credential Manager, and Linux Secret
# Service (libsecret). This workflow makes that claim verifiable in
# CI on every PR that touches packages/vault/** or the app-core
# wiring that consumes it.

concurrency:
  group: vault-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/vault/**"
      - "packages/app-core/src/api/plugins-compat-routes.ts"
      - "packages/app-core/src/api/secrets-manager-routes.ts"
      - "packages/app-core/src/api/server.ts"
      - "packages/app-core/src/services/vault-mirror.ts"
      - "packages/app-core/src/state/usePluginsSkillsState.ts"
      - "packages/app-core/src/hooks/useSecretsManagerShortcut.ts"
      - ".github/workflows/vault-ci.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/vault/**"
      - "packages/app-core/src/api/plugins-compat-routes.ts"
      - "packages/app-core/src/api/secrets-manager-routes.ts"
      - "packages/app-core/src/api/server.ts"
      - "packages/app-core/src/services/vault-mirror.ts"
      - "packages/app-core/src/state/usePluginsSkillsState.ts"
      - "packages/app-core/src/hooks/useSecretsManagerShortcut.ts"
      - ".github/workflows/vault-ci.yaml"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      # Linux Secret Service prerequisites — without these the
      # @napi-rs/keyring round-trip throws on its first call.
      # The gnome-keyring-daemon is fragile in headless CI:
      #   * It refuses to start if XDG_RUNTIME_DIR/keyring/ doesn't exist
      #     (Ubuntu 24.04 runners don't pre-create it).
      #   * --start and --unlock are mutually exclusive in recent releases.
      #   * --start prints noisy "discover_other_daemon" warnings on
      #     stderr but still returns 0 when the daemon has actually
      #     started; with `set -e` we have to swallow only the warnings,
      #     not real errors.
      #
      # Pattern: pre-create the runtime dir, launch DBus, then start
      # the daemon and unlock it as separate invocations.
      - name: Install Secret Service (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11
          # Pre-create the keyring runtime directory. gnome-keyring-daemon
          # writes its control socket to $XDG_RUNTIME_DIR/keyring/control;
          # it errors out with "couldn't access control socket" when the
          # parent doesn't exist, which is the case on default GitHub
          # runners.
          uid="$(id -u)"
          if [ ! -d "/run/user/$uid" ]; then
            sudo install -d -m 0700 -o "$uid" -g "$(id -g)" "/run/user/$uid"
          fi
          mkdir -p "/run/user/$uid/keyring"
          chmod 700 "/run/user/$uid/keyring"
          export XDG_RUNTIME_DIR="/run/user/$uid"
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          # Launch a session DBus.
          eval "$(dbus-launch --sh-syntax)"
          {
            echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS"
            echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID"
          } >> "$GITHUB_ENV"
          # Start the daemon. Forks into background and prints env vars
          # (GNOME_KEYRING_CONTROL, SSH_AUTH_SOCK, etc.) on stdout in
          # `KEY=VAL` form. Drop stderr (the "discover_other_daemon"
          # warning is harmless when no other daemon is running).
          daemon_env="$(printf '\n' | gnome-keyring-daemon --start --components=secrets 2>/dev/null || true)"
          echo "$daemon_env" | while IFS='=' read -r key value; do
            [ -n "$key" ] && echo "${key}=${value}" >> "$GITHUB_ENV"
          done
          # Unlock the default keyring with an empty password so
          # @napi-rs/keyring writes don't block on a prompt. Tolerate
          # exit-1 here: on a brand-new keyring there's nothing to
          # unlock, and the libsecret call from the test will create
          # one on demand.
          printf '\n' | gnome-keyring-daemon --unlock --components=secrets 2>/dev/null || true

      - name: Install dependencies
        working-directory: packages/vault
        run: bun install

      - name: Typecheck
        working-directory: packages/vault
        run: bun run typecheck

      - name: Test
        working-directory: packages/vault
        run: bun run test

  app-core-wiring:
    # Verifies the app-core consumer code that wires @elizaos/vault into
    # the secrets-manager routes, plugins-compat routes, settings hooks,
    # and the cloud-disconnect orphan-route patch. These tests are
    # platform-agnostic (no OS keyring access — the vault is mocked at
    # the boundary), so we only run them on ubuntu-latest.
    name: app-core wiring tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install workspace dependencies
        run: bun install

      - name: Generate i18n keyword data (transitive prerequisite)
        working-directory: packages/shared
        run: bun run build:i18n

      - name: Generate protobuf bindings (transitive prerequisite)
        working-directory: packages/schemas
        run: bunx buf generate

      - name: Run vault wiring tests
        working-directory: packages/app-core
        run: |
          bunx vitest run --config vitest.config.ts \
            src/api/secrets-manager-routes.test.ts \
            src/services/vault-mirror.test.ts \
            src/state/usePluginsSkillsState.heuristic.test.ts \
            src/hooks/useSecretsManagerShortcut.test.ts \
            src/api/server.cloud-disconnect.test.ts
