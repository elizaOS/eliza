name: vault-ci

# Cross-platform tests for @elizaos/vault. The package's headline
# claim is that the OS-keyring-backed master key works the same on
# macOS Keychain, Windows Credential Manager, and Linux Secret
# Service (libsecret). This workflow makes that claim verifiable in
# CI on every PR that touches packages/vault/** or the app-core
# wiring that consumes it.

concurrency:
  group: vault-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/vault/**"
      - "packages/app-core/src/api/plugins-compat-routes.ts"
      - "packages/app-core/src/api/secrets-manager-routes.ts"
      - "packages/app-core/src/api/server.ts"
      - "packages/app-core/src/services/vault-mirror.ts"
      - "packages/app-core/src/state/usePluginsSkillsState.ts"
      - "packages/app-core/src/hooks/useSecretsManagerShortcut.ts"
      - ".github/workflows/vault-ci.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/vault/**"
      - "packages/app-core/src/api/plugins-compat-routes.ts"
      - "packages/app-core/src/api/secrets-manager-routes.ts"
      - "packages/app-core/src/api/server.ts"
      - "packages/app-core/src/services/vault-mirror.ts"
      - "packages/app-core/src/state/usePluginsSkillsState.ts"
      - "packages/app-core/src/hooks/useSecretsManagerShortcut.ts"
      - ".github/workflows/vault-ci.yaml"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      # Linux Secret Service prerequisites — without these the
      # @napi-rs/keyring round-trip throws on its first call.
      # Install libsecret + gnome-keyring + a session DBus, then
      # start + unlock the secret-service daemon in a single call so
      # the master-key resolver has a real backend to talk to.
      - name: Install Secret Service (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11
          # Start a session DBus first so gnome-keyring-daemon has somewhere
          # to advertise its socket path.
          eval "$(dbus-launch --sh-syntax)"
          {
            echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS"
            echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID"
          } >> "$GITHUB_ENV"
          # One-shot start + unlock with empty password (stdin). The daemon
          # prints its env vars on stdout in `KEY=VAL` form; capture them all
          # and export. The daemon forks but stays alive for the duration of
          # the job.
          daemon_env="$(printf '\n' | gnome-keyring-daemon --start --unlock --components=secrets)"
          echo "$daemon_env" | while IFS='=' read -r key value; do
            [ -n "$key" ] && echo "${key}=${value}" >> "$GITHUB_ENV"
          done

      - name: Install dependencies
        working-directory: packages/vault
        run: bun install

      - name: Typecheck
        working-directory: packages/vault
        run: bun run typecheck

      - name: Test
        working-directory: packages/vault
        run: bun run test

  app-core-wiring:
    # Verifies the app-core consumer code that wires @elizaos/vault into
    # the secrets-manager routes, plugins-compat routes, settings hooks,
    # and the cloud-disconnect orphan-route patch. These tests are
    # platform-agnostic (no OS keyring access — the vault is mocked at
    # the boundary), so we only run them on ubuntu-latest.
    name: app-core wiring tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install workspace dependencies
        run: bun install

      - name: Generate i18n keyword data (transitive prerequisite)
        working-directory: packages/shared
        run: bun run build:i18n

      - name: Run vault wiring tests
        working-directory: packages/app-core
        run: |
          bunx vitest run --config vitest.config.ts \
            src/api/secrets-manager-routes.test.ts \
            src/services/vault-mirror.test.ts \
            src/state/usePluginsSkillsState.heuristic.test.ts \
            src/hooks/useSecretsManagerShortcut.test.ts \
            src/api/server.cloud-disconnect.test.ts
