# Default values for gateway-discord Helm chart

# Override the name of the chart
nameOverride: ""
fullnameOverride: "gateway-discord"

# Namespace configuration
# Note: Use helm upgrade --install --create-namespace to create the namespace
namespace: "gateway-discord"

# Image configuration
image:
  repository: ghcr.io/elizaos/cloud/gateway-discord
  tag: latest
  # Digest takes precedence over tag when set (e.g., sha256:abc123...)
  digest: ""
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets:
  - name: ghcr-credentials

# Number of replicas (base value, HPA will manage scaling)
replicaCount: 1

# Service configuration
service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

# Container port
containerPort: 3000

# Resource requests and limits
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Gateway configuration (environment variables)
config:
  nodeEnv: "production"
  port: "3000"
  maxBotsPerPod: "100"
  failoverCheckIntervalMs: "30000"
  deadPodThresholdMs: "45000"

# KEDA cooldown for scale-to-zero (seconds of inactivity before scaling down)
kedaCooldownSeconds: 900

# Optional envFrom entries for local flat env-var secrets.
# When set, individual secretKeyRef variables below are skipped.
envFrom: []

# Eliza App Discord bot configuration (optional)
# When enabled, the gateway runs a leader election to connect a single
# Eliza App Discord bot across all pods for DM-based interactions.
elizaAppBot:
  # Enable the Eliza App Discord bot
  enabled: false
  # Redis leader key - MUST be unique per environment to prevent cross-env collisions
  # e.g. "discord:eliza-app-bot:leader:prod" or "discord:eliza-app-bot:leader:dev"
  leaderKey: ""

# Secrets configuration
secrets:
  # Name of the existing secret containing sensitive data
  name: "gateway-discord-secrets"
  # Keys in the secret
  keys:
    elizaCloudUrl: "eliza-cloud-url"
    gatewayBootstrapSecret: "gateway-bootstrap-secret"
    redisUrl: "redis-url"
    redisToken: "redis-token"
    blobToken: "blob-token"
    # Eliza App Discord bot (optional - enables DM-based Eliza App integration)
    elizaAppDiscordBotToken: "eliza-app-discord-bot-token"
    elizaAppDiscordApplicationId: "eliza-app-discord-application-id"

# Graceful shutdown configuration
terminationGracePeriodSeconds: 120
preStopDrainSleepSeconds: 90

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /ready
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Horizontal Pod Autoscaler configuration
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  metrics:
    cpu:
      enabled: true
      averageUtilization: 70
    memory:
      enabled: true
      averageUtilization: 80
    # Custom metric for bot count (requires prometheus-adapter)
    # Disabled by default - enable only when prometheus-adapter is installed
    customBotMetric:
      enabled: false
      metricName: "gateway_discord_bots_total"
      targetAverageValue: "50"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      maxPods: 5
      periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      maxPods: 1
      periodSeconds: 120

# Pod Disruption Budget configuration
pdb:
  enabled: true
  maxUnavailable: 1

# Prometheus monitoring configuration
prometheus:
  # Enable ServiceMonitor and PrometheusRule (requires Prometheus Operator)
  enabled: false
  serviceMonitor:
    interval: 30s
    path: /metrics
  alerts:
    enabled: true

# Pod annotations for Prometheus scraping (works without Prometheus Operator)
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

# Service account configuration
serviceAccount:
  create: false
  name: ""
  annotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}
