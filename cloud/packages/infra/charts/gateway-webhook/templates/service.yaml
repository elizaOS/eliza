apiVersion: v1
kind: Service
metadata:
  name: {{ include "gateway-webhook.fullname" . }}
  namespace: {{ include "gateway-webhook.namespace" . }}
  labels:
    {{- include "gateway-webhook.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "gateway-webhook.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      name: http
