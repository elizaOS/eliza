name: PR Checks

on:
  pull_request:
    branches: [develop, main]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test (unit tests, no DB required)
        run: |
          bun test packages/sdk
          bun test packages/policy-engine
        env:
          STEWARD_MASTER_PASSWORD: "ci-test-secret"

      - name: Check PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+"
          if ! echo "$TITLE" | grep -qE "$PATTERN"; then
            echo "::error::PR title must match conventional commits format"
            echo "Expected: type(scope): description"
            echo "Examples: feat(sdk): add new method, fix(api): handle edge case"
            echo "Got: $TITLE"
            exit 1
          fi

  integration:
    name: Integration Tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: steward
          POSTGRES_PASSWORD: steward_ci
          POSTGRES_DB: steward_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U steward"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (required for workspace imports)
        run: bunx turbo run build --filter=@stwd/api...

      - name: Run migrations
        run: bun packages/db/src/migrate.ts
        env:
          DATABASE_URL: "postgres://steward:steward_ci@localhost:5432/steward_test"

      - name: Start API test server
        env:
          DATABASE_URL: "postgres://steward:steward_ci@localhost:5432/steward_test"
          PORT: "3299"
          SKIP_MIGRATIONS: "1"
          STEWARD_BIND_HOST: "127.0.0.1"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
          STEWARD_PLATFORM_KEY: "ci-platform-key"
          STEWARD_PLATFORM_KEYS: "ci-platform-key"
          STEWARD_SESSION_SECRET: "ci-session-secret"
          SIWE_ALLOWED_DOMAINS: "steward.fi,localhost"
        run: |
          bun run packages/api/src/index.ts > /tmp/steward-api-integration.log 2>&1 &
          echo $! > /tmp/steward-api-integration.pid
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3299/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/steward-api-integration.log
          exit 1

      - name: Integration tests (API)
        run: bun test packages/api
        env:
          DATABASE_URL: "postgres://steward:steward_ci@localhost:5432/steward_test"
          PORT: "3299"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
          STEWARD_PLATFORM_KEY: "ci-platform-key"
          STEWARD_PLATFORM_KEYS: "ci-platform-key"
          STEWARD_SESSION_SECRET: "ci-session-secret"
          SIWE_ALLOWED_DOMAINS: "steward.fi,localhost"

      - name: Stop API test server
        if: always()
        run: |
          if [ -f /tmp/steward-api-integration.pid ]; then
            kill "$(cat /tmp/steward-api-integration.pid)" || true
          fi
          if [ -f /tmp/steward-api-integration.log ]; then
            cat /tmp/steward-api-integration.log
          fi

  e2e-smoke:
    name: E2E Smoke (Embedded)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start embedded API
        env:
          PORT: "3200"
          STEWARD_BIND_HOST: "127.0.0.1"
          STEWARD_PGLITE_PATH: "/tmp/steward-fi-e2e-pglite"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
          STEWARD_PLATFORM_KEYS: "ci-platform-key"
          STEWARD_SESSION_SECRET: "ci-session-secret"
          SIWE_ALLOWED_DOMAINS: "steward.fi,localhost"
        run: |
          bun run start:local > /tmp/steward-fi-e2e.log 2>&1 &
          echo $! > /tmp/steward-fi-e2e.pid
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3200/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/steward-fi-e2e.log
          exit 1

      - name: Run e2e smoke
        env:
          STEWARD_URL: "http://127.0.0.1:3200"
          PLATFORM_KEY: "ci-platform-key"
        run: bun run test:e2e:smoke

      - name: Stop embedded API
        if: always()
        run: |
          if [ -f /tmp/steward-fi-e2e.pid ]; then
            kill "$(cat /tmp/steward-fi-e2e.pid)" || true
          fi
          if [ -f /tmp/steward-fi-e2e.log ]; then
            cat /tmp/steward-fi-e2e.log
          fi
