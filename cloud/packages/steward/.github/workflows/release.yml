# Publish npm packages and create a GitHub Release when a version tag is pushed
# Requires NPM_TOKEN secret with publish access to @stwd org
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    # contents:write is required to create GitHub Releases
    # packages:write for GHCR (docker workflow handles this separately, but good to have)
    permissions:
      contents: write
      packages: write

    steps:
      # Checkout the full repo
      - name: Checkout
        uses: actions/checkout@v4

      # Install Bun for building the monorepo
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      # Setup Node for npm publish (Bun doesn't handle npm auth well)
      # registry-url is required for NODE_AUTH_TOKEN to work
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Install all monorepo dependencies
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build all packages via Turborepo (respects dependency order)
      - name: Build all packages
        run: bunx turbo run build

      # Publish each public package to npm
      # continue-on-error allows already-published versions to not block the pipeline
      - name: Publish @stwd/sdk
        run: cd packages/sdk && npm publish --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @stwd/react
        run: cd packages/react && npm publish --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @stwd/eliza-plugin
        run: cd packages/eliza-plugin && npm publish --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release with auto-generated changelog from commits
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
