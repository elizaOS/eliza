# ──────────────────────────────────────────────────────────────────────────────
# Steward — Nginx Reverse Proxy
#
# Routes:
#   api.steward.fi        → steward-api  :3200
#   proxy.steward.fi      → steward-proxy :8080
#   (or subdomain-less via path prefix)
#
# TLS termination via Certbot/Let's Encrypt.
# Run: certbot --nginx -d api.steward.fi -d proxy.steward.fi
#
# Install:
#   cp deploy/nginx.conf /etc/nginx/sites-available/steward
#   ln -s /etc/nginx/sites-available/steward /etc/nginx/sites-enabled/steward
#   nginx -t && systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Rate limiting is handled at the Cloudflare level for production deployments.
# The zones below are provided as reference for bare-metal/non-CF setups.
# To enable nginx-level rate limiting:
#   1. Add these lines to your /etc/nginx/nginx.conf http{} block:
#      limit_req_zone $binary_remote_addr zone=steward_api:10m rate=60r/m;
#      limit_req_zone $binary_remote_addr zone=steward_proxy:10m rate=120r/m;
#   2. Uncomment the limit_req directives in the server blocks below.
#   3. Reload nginx: systemctl reload nginx

# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream steward_api {
    server 127.0.0.1:3200;
    keepalive 32;
}

upstream steward_proxy {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.steward.fi proxy.steward.fi;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Steward API (api.steward.fi) ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.steward.fi;

    # ── TLS — managed by Certbot (replace with your cert paths) ──────────────
    # certbot will inject these automatically; placeholders shown for reference:
    # ssl_certificate     /etc/letsencrypt/live/api.steward.fi/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.steward.fi/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;
    # Allow cross-origin requests from the Steward web dashboard
    # CORS headers are handled by the API itself; nginx does not duplicate them.

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 2m;

    # Rate limiting: 60 req/min per IP, burst 20 (enable after adding zone above)
    # limit_req zone=steward_api burst=20 nodelay;
    # limit_req_status 429;

    # ── Health endpoint (no auth, low rate-limit priority) ────────────────────
    location = /health {
        proxy_pass         http://steward_api;
        proxy_http_version 1.1;
        access_log         off;
    }

    location = /ready {
        proxy_pass         http://steward_api;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ── Main API ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://steward_api;
        proxy_http_version 1.1;

        # Required for keepalive
        proxy_set_header Connection "";

        # Forward real client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade support (for future real-time features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings for streaming responses
        proxy_buffering    off;
        proxy_buffer_size  8k;
    }
}

# ── Steward Proxy Gateway (proxy.steward.fi) ──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name proxy.steward.fi;

    # ── TLS (same cert setup as above) ───────────────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/proxy.steward.fi/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/proxy.steward.fi/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # ── Request limits ────────────────────────────────────────────────────────
    # Proxy handles streamed LLM responses — allow larger bodies and longer reads
    client_max_body_size 10m;

    # Rate limit: 120 req/min per IP, burst 30 (agents make frequent small calls)
    # limit_req zone=steward_proxy burst=30 nodelay;
    # limit_req_status 429;

    # ── Health endpoint ───────────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://steward_proxy;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ── Proxy gateway ─────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://steward_proxy;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (LLM streaming uses chunked transfer, not WS today,
        # but include for future server-sent events or WS proxying)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Extended timeouts for streaming LLM responses
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Disable buffering so streaming responses reach the client immediately
        proxy_buffering    off;
        proxy_buffer_size  8k;
    }
}

# ── WebSocket upgrade map ─────────────────────────────────────────────────────
# Paste this into your nginx.conf http{} block alongside the rate limit zones:
#
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
