name: Gateway Webhook

on:
  push:
    branches: [main, develop]
    paths:
      - "services/gateway-webhook/**"
      - ".github/workflows/gateway-webhook.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/gateway-webhook/**"
      - ".github/workflows/gateway-webhook.yml"

concurrency:
  group: gateway-webhook-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.9"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install service dependencies
        run: cd services/gateway-webhook && bun install --frozen-lockfile

      - name: Run unit tests (isolated — mock.module is process-global in bun)
        working-directory: services/gateway-webhook
        run: |
          bun test ./__tests__/build-forward-body.test.ts --timeout 60000
          bun test ./__tests__/internal-auth.test.ts --timeout 60000
