name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [develop, main]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: claude_review
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 8
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Check for:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use CLAUDE.md for style guidance. Use `gh pr comment` to post your review.
          claude_args: '--allowed-tools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
      - name: Record advisory review status
        if: always() && steps.claude_review.outcome != 'success'
        run: |
          echo "Claude Code Review did not finish successfully; review comments are advisory-only and do not block the branch." >> "$GITHUB_STEP_SUMMARY"
